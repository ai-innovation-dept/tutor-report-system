<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>新しいパスワード設定</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#1e2a3a]">
  <div class="min-h-screen bg-[radial-gradient(circle_at_top,_rgba(59,130,246,0.18),_transparent_28%),linear-gradient(180deg,#1e2a3a_0%,#0f172a_100%)] px-4 py-10">
    <main class="mx-auto flex min-h-[calc(100vh-5rem)] w-full max-w-md items-center justify-center">
      <div class="w-full rounded-2xl border border-white/10 bg-white p-8 shadow-2xl shadow-slate-950/20 md:p-10">
        <div class="mb-8 text-center">
          <div class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-2xl bg-blue-600 text-xl font-bold text-white shadow-lg shadow-blue-600/30">TR</div>
          <h1 class="text-2xl font-bold text-slate-800">新しいパスワード設定</h1>
          <p id="emailInfo" class="mt-2 text-sm text-slate-500"></p>
        </div>

        <div id="loading" class="text-sm text-slate-600">リンクを確認しています。</div>
        <div id="invalidPanel" class="hidden space-y-4">
          <p id="invalidMessage" class="rounded-lg border border-rose-200 bg-rose-50 px-3 py-2 text-sm text-rose-700"></p>
          <a href="/forgot-password" class="block text-center text-sm text-blue-500 hover:text-blue-700">リセットメールを再送する</a>
        </div>
        <form id="resetPasswordForm" class="hidden space-y-5">
          <label class="block">
            <span class="mb-2 block text-sm font-medium text-slate-700">新しいパスワード</span>
            <input id="newPassword" name="new_password" type="password" class="w-full rounded-lg border border-slate-300 px-4 py-3 text-slate-800 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20" required minlength="8">
          </label>
          <label class="block">
            <span class="mb-2 block text-sm font-medium text-slate-700">パスワード（確認）</span>
            <input id="confirmPassword" type="password" class="w-full rounded-lg border border-slate-300 px-4 py-3 text-slate-800 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20" required minlength="8">
          </label>
          <p id="message" class="hidden rounded-lg px-3 py-2 text-sm"></p>
          <button class="w-full rounded-lg bg-blue-600 px-4 py-3 font-medium text-white transition hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">パスワードを変更する</button>
        </form>
      </div>
    </main>
  </div>
  <script>
const params = new URLSearchParams(location.search);
const token = params.get('token') || '';
const loading = document.querySelector('#loading');
const invalidPanel = document.querySelector('#invalidPanel');
const invalidMessage = document.querySelector('#invalidMessage');
const form = document.querySelector('#resetPasswordForm');
const message = document.querySelector('#message');

function reasonLabel(reason) {
  if (reason === 'expired') return 'リンクの有効期限が切れています。';
  if (reason === 'used') return 'このリンクは使用済みです。';
  return 'リンクを確認できません。';
}

function showInvalid(text) {
  loading.classList.add('hidden');
  form.classList.add('hidden');
  invalidMessage.textContent = text;
  invalidPanel.classList.remove('hidden');
}

function showMessage(text, isError = false) {
  message.textContent = text;
  message.className = `rounded-lg px-3 py-2 text-sm ${isError ? 'border border-rose-200 bg-rose-50 text-rose-700' : 'border border-emerald-200 bg-emerald-50 text-emerald-700'}`;
}

async function loadToken() {
  if (!token) {
    showInvalid('リンクを確認できません。');
    return;
  }
  const res = await fetch(`/api/auth/reset-password?token=${encodeURIComponent(token)}`);
  if (!res.ok) {
    showInvalid('リンクを確認できません。');
    return;
  }
  const data = await res.json();
  if (!data.valid) {
    showInvalid(reasonLabel(data.reason));
    return;
  }
  loading.classList.add('hidden');
  emailInfo.textContent = data.email;
  form.classList.remove('hidden');
}

form.addEventListener('submit', async event => {
  event.preventDefault();
  if (newPassword.value !== confirmPassword.value) {
    showMessage('確認用パスワードが一致しません。', true);
    return;
  }
  const res = await fetch('/api/auth/reset-password', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({token, new_password: newPassword.value})
  });
  if (!res.ok) {
    const data = await res.json().catch(() => ({}));
    showMessage(data.detail || 'パスワードを変更できませんでした。', true);
    return;
  }
  showMessage('パスワードを変更しました');
  setTimeout(() => { location.href = '/login'; }, 3000);
});

loadToken();
  </script>
</body>
</html>
