<!-- # === Phase 8: 保護者招待登録 START === -->
<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>アカウント登録</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#1e2a3a]">
  <div class="min-h-screen bg-[radial-gradient(circle_at_top,_rgba(59,130,246,0.18),_transparent_28%),linear-gradient(180deg,#1e2a3a_0%,#0f172a_100%)] px-4 py-10 text-slate-900">
  <main class="mx-auto flex min-h-[calc(100vh-5rem)] w-full max-w-md items-center justify-center">
    <div class="w-full rounded-2xl border border-white/10 bg-white p-8 shadow-2xl shadow-slate-950/20 md:p-10">
    <div id="loading" class="text-sm text-slate-600">招待内容を確認しています。</div>
    <div id="invalidPanel" class="hidden space-y-3">
      <div class="mb-6 text-center">
        <div class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-2xl bg-blue-600 text-xl font-bold text-white shadow-lg shadow-blue-600/30">TR</div>
        <h1 class="text-2xl font-bold text-slate-800">Tutor Reports</h1>
        <p class="mt-2 text-sm text-slate-500">指導実績報告システム</p>
      </div>
      <h1 class="text-xl font-semibold text-slate-800">招待リンクを確認できません</h1>
      <p class="text-sm text-slate-700">この招待リンクは無効または期限切れです。</p>
      <p class="text-sm text-slate-600">管理者へ招待メールの再送をご依頼ください。</p>
    </div>
    <form id="registerForm" class="hidden space-y-4">
      <div class="mb-6 text-center">
        <div class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-2xl bg-blue-600 text-xl font-bold text-white shadow-lg shadow-blue-600/30">TR</div>
        <h1 id="title" class="text-2xl font-bold text-slate-800">アカウント登録</h1>
        <p id="roleInfo" class="mt-2 text-sm text-slate-600"></p>
        <p id="studentName" class="mt-1 text-sm text-slate-600"></p>
        <p id="email" class="mt-1 text-sm text-slate-500"></p>
      </div>
      <label id="displayNameField" class="hidden text-sm">
        <span class="mb-1 block text-slate-700">お名前</span>
        <input id="displayName" name="display_name" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20" maxlength="100">
      </label>
      <label class="block text-sm">
        <span class="mb-1 block text-slate-700">パスワード</span>
        <input id="password" name="password" type="password" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20" required minlength="8">
      </label>
      <label class="block text-sm">
        <span class="mb-1 block text-slate-700">パスワード（確認）</span>
        <input id="passwordConfirm" type="password" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20" required minlength="8">
      </label>
      <button class="w-full rounded-lg bg-blue-600 px-3 py-2 font-medium text-white transition hover:bg-blue-700">アカウントを作成する</button>
      <p id="message" class="text-sm"></p>
    </form>
    </div>
  </main>
  </div>
  <script>
const params = new URLSearchParams(location.search);
const token = params.get('token') || '';

function showInvalid() {
  loading.classList.add('hidden');
  registerForm.classList.add('hidden');
  invalidPanel.classList.remove('hidden');
}
function showMessage(text, isError = false) {
  message.textContent = text;
  message.className = `text-sm ${isError ? 'text-rose-700' : 'text-emerald-700'}`;
}
async function loadInvitation() {
  if (!token) {
    showInvalid();
    return;
  }
  const res = await fetch(`/api/auth/register?token=${encodeURIComponent(token)}`);
  if (!res.ok) {
    showInvalid();
    return;
  }
  const data = await res.json();
  loading.classList.add('hidden');
  if (data.role === 'tutor') {
    title.textContent = '講師アカウントの登録';
    roleInfo.textContent = `講師No：${data.tutor_no || '-'}`;
    studentName.textContent = '';
    displayNameField.classList.remove('hidden');
    displayNameField.classList.add('block');
    displayName.required = true;
    displayName.value = data.display_name || '';
  } else if (data.role && data.role.startsWith('admin_')) {
    title.textContent = '運営スタッフアカウントの登録';
    roleInfo.textContent = `ロール：${data.role_display || data.role}`;
    studentName.textContent = '';
    displayNameField.classList.remove('hidden');
    displayNameField.classList.add('block');
    displayName.required = true;
    displayName.value = data.display_name || '';
  } else {
    title.textContent = `${data.email} さんのアカウント登録`;
    roleInfo.textContent = '';
    studentName.textContent = data.student_name ? `担当生徒：${data.student_name} さん` : '担当生徒：未設定';
    displayNameField.classList.add('hidden');
    displayName.required = false;
  }
  email.textContent = data.email;
  registerForm.classList.remove('hidden');
}
registerForm.addEventListener('submit', async event => {
  event.preventDefault();
  if (password.value !== passwordConfirm.value) {
    showMessage('確認用パスワードが一致しません。', true);
    return;
  }
  const res = await fetch('/api/auth/register', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({token, password: password.value, display_name: displayName.value})
  });
  if (!res.ok) {
    showMessage('登録できませんでした。招待リンクをご確認ください。', true);
    return;
  }
  showMessage('登録が完了しました。ログイン画面へ移動します。');
  location.href = '/login';
});
loadInvitation();
  </script>
</body>
</html>
<!-- # === Phase 8 END === -->
