<!-- # === Phase 8: 保護者招待登録 START === -->
<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>保護者アカウント登録</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 grid place-items-center p-4 text-slate-900">
  <main class="w-full max-w-md rounded-lg border border-slate-200 bg-white p-6 shadow-sm">
    <div id="loading" class="text-sm text-slate-600">招待内容を確認しています。</div>
    <div id="invalidPanel" class="hidden space-y-3">
      <h1 class="text-xl font-semibold">招待リンクを確認できません</h1>
      <p class="text-sm text-slate-700">この招待リンクは無効または期限切れです。</p>
      <p class="text-sm text-slate-600">管理者へ招待メールの再送をご依頼ください。</p>
    </div>
    <form id="registerForm" class="hidden space-y-4">
      <div>
        <h1 id="title" class="text-xl font-semibold">アカウント登録</h1>
        <p id="studentName" class="mt-2 text-sm text-slate-600"></p>
        <p id="email" class="mt-1 text-sm text-slate-500"></p>
      </div>
      <label class="block text-sm">
        <span class="mb-1 block text-slate-700">パスワード</span>
        <input id="password" name="password" type="password" class="w-full rounded border px-3 py-2" required minlength="8">
      </label>
      <label class="block text-sm">
        <span class="mb-1 block text-slate-700">パスワード（確認）</span>
        <input id="passwordConfirm" type="password" class="w-full rounded border px-3 py-2" required minlength="8">
      </label>
      <button class="w-full rounded bg-slate-900 px-3 py-2 text-white">アカウントを作成する</button>
      <p id="message" class="text-sm"></p>
    </form>
  </main>
  <script>
const params = new URLSearchParams(location.search);
const token = params.get('token') || '';

function showInvalid() {
  loading.classList.add('hidden');
  registerForm.classList.add('hidden');
  invalidPanel.classList.remove('hidden');
}
function showMessage(text, isError = false) {
  message.textContent = text;
  message.className = `text-sm ${isError ? 'text-rose-700' : 'text-emerald-700'}`;
}
async function loadInvitation() {
  if (!token) {
    showInvalid();
    return;
  }
  const res = await fetch(`/api/auth/register?token=${encodeURIComponent(token)}`);
  if (!res.ok) {
    showInvalid();
    return;
  }
  const data = await res.json();
  loading.classList.add('hidden');
  title.textContent = `${data.email} さんのアカウント登録`;
  studentName.textContent = data.student_name ? `担当生徒：${data.student_name} さん` : '担当生徒：未設定';
  email.textContent = data.email;
  registerForm.classList.remove('hidden');
}
registerForm.addEventListener('submit', async event => {
  event.preventDefault();
  if (password.value !== passwordConfirm.value) {
    showMessage('確認用パスワードが一致しません。', true);
    return;
  }
  const res = await fetch('/api/auth/register', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({token, password: password.value})
  });
  if (!res.ok) {
    showMessage('登録できませんでした。招待リンクをご確認ください。', true);
    return;
  }
  const data = await res.json();
  localStorage.setItem('access_token', data.access_token);
  localStorage.setItem('token', data.access_token);
  showMessage('登録が完了しました。ログイン画面へ移動します。');
  location.href = '/login';
});
loadInvitation();
  </script>
</body>
</html>
<!-- # === Phase 8 END === -->
