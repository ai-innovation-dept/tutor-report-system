<!-- # === Phase 8: フロントエンド共通 START === -->
<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>指導報告・指導時間確認票</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#1e2a3a]">
  <div class="min-h-screen bg-[radial-gradient(circle_at_top,_rgba(59,130,246,0.18),_transparent_28%),linear-gradient(180deg,#1e2a3a_0%,#0f172a_100%)] px-4 py-10">
    <div class="mx-auto flex min-h-[calc(100vh-5rem)] w-full max-w-md items-center justify-center">
      <div class="w-full rounded-2xl border border-white/10 bg-white p-8 shadow-2xl shadow-slate-950/20 md:p-10">
        <div class="mb-8 text-center">
          <div class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-2xl bg-blue-600 text-white shadow-lg shadow-blue-600/30"><svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-5 8l1.5 1.5L15 11"/></svg></div>
          <h1 class="text-2xl font-bold tracking-tight text-slate-800">指導報告・指導時間確認票</h1>
        </div>

        <form id="loginForm" class="space-y-5">
          <div>
            <label class="mb-2 block text-sm font-medium text-slate-700" for="email">メールアドレス</label>
            <input name="username" id="email" type="email" placeholder="example@email.com" class="w-full rounded-lg border border-slate-300 px-4 py-3 text-slate-800 placeholder-slate-400 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20" required>
          </div>
          <div>
            <label class="mb-2 block text-sm font-medium text-slate-700" for="password">パスワード</label>
            <input name="password" id="password" type="password" placeholder="password" class="w-full rounded-lg border border-slate-300 px-4 py-3 text-slate-800 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20" required>
          </div>
          <p id="error" class="hidden rounded-lg border border-rose-200 bg-rose-50 px-3 py-2 text-sm text-rose-700"></p>
          <button class="w-full rounded-lg bg-blue-600 px-4 py-3 font-medium text-white transition hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">ログイン</button>
          <a href="/forgot-password" class="block text-center text-sm text-blue-500 hover:text-blue-700">
            パスワードをお忘れの方はこちら
          </a>
        </form>
      </div>
    </div>
  </div>
  <script>
    document.querySelector('#loginForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const data = new URLSearchParams(new FormData(event.target));
      const res = await fetch('/api/auth/login', { method: 'POST', body: data });
      if (!res.ok) {
        const errorEl = document.querySelector('#error');
        // 403（未登録システム）はサーバーの案内文を表示、それ以外は汎用メッセージ。
        let message = 'ログインできません';
        if (res.status === 403) {
          const body = await res.json().catch(() => null);
          if (body && body.detail) message = body.detail;
        }
        errorEl.textContent = message;
        errorEl.classList.remove('hidden');
        return;
      }
      const json = await res.json();
      localStorage.setItem('access_token', json.access_token);
      localStorage.setItem('token', json.access_token);
      if (json.must_change_password) {
        location.href = '/change-password';
        return;
      }
      if (json.requires_role_selection) {
        location.href = '/select-role';
        return;
      }
      if (json.role === 'tutor') location.href = '/tutor/reports';
      else if (json.role === 'parent') location.href = '/parent/reports';
      else location.href = '/admin/dashboard';
    });
  </script>
</body>
</html>
<!-- # === Phase 8 END === -->
