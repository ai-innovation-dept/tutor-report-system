<!-- # === Phase 8: フロントエンド共通 START === -->
<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 grid place-items-center p-4">
  <form id="loginForm" class="w-full max-w-sm bg-white border border-slate-200 rounded-lg p-6 space-y-4 shadow-sm">
    <h1 class="text-xl font-semibold">指導実績報告</h1>
    <input name="username" type="email" placeholder="email" class="w-full border rounded px-3 py-2" required>
    <input name="password" type="password" placeholder="password" class="w-full border rounded px-3 py-2" required>
    <button class="w-full bg-slate-900 text-white rounded px-3 py-2">Login</button>
    <p id="error" class="text-sm text-red-700"></p>
  </form>
  <script>
    document.querySelector('#loginForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const data = new URLSearchParams(new FormData(event.target));
      const res = await fetch('/api/auth/login', { method: 'POST', body: data });
      if (!res.ok) { document.querySelector('#error').textContent = 'ログインできません'; return; }
      const json = await res.json();
      localStorage.setItem('access_token', json.access_token);
      localStorage.setItem('token', json.access_token);
      if (json.role === 'tutor') location.href = '/tutor/reports';
      else if (json.role === 'parent') location.href = '/parent/reports';
      else location.href = '/admin/dashboard';
    });
  </script>
</body>
</html>
<!-- # === Phase 8 END === -->
