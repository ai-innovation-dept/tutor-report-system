{% extends "base.html" %}
{% block content %}
<style>
  :root {
    --color-background-primary: #ffffff;
    --color-background-secondary: #f8fafc;
    --color-border-tertiary: #cbd5e1;
    --color-text-secondary: #475569;
    --color-text-tertiary: #94a3b8;
    --border-radius-md: 8px;
  }
  .admin-card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    padding: 14px;
  }
  .kanban-grid {
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    gap: 6px;
  }
  @media (max-width: 1180px) {
    .kanban-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
  }
  @media (max-width: 760px) {
    .kanban-grid {
      grid-template-columns: 1fr;
    }
  }
</style>

<div class="mb-6">
  <p class="text-sm font-medium text-blue-600">運営ポータル</p>
  <h1 class="text-2xl font-semibold text-slate-800" id="pageTitle">統合ダッシュボード</h1>
</div>

<div class="mb-4 flex flex-wrap items-center gap-3 rounded-lg border border-slate-200 bg-white p-4 shadow-sm">
  <label class="text-sm">
    <span class="mr-2 text-slate-700">月選択</span>
    <select id="monthFilter" class="rounded-lg border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20"></select>
  </label>
  <label class="text-sm">
    <span class="mr-2 text-slate-700">講師選択</span>
    <select id="tutorFilter" class="rounded-lg border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20"></select>
  </label>
  <a id="bulkExportPdf" class="inline-flex items-center rounded-lg bg-green-600 px-3 py-2 text-sm text-white hover:bg-green-700" href="#">PDFでダウンロード</a>
</div>

<section id="kpiCards" class="mb-4 grid gap-3 md:grid-cols-3"></section>

<section class="mb-4">
  <div class="mb-2 flex items-center gap-2">
    <h2 class="text-lg font-semibold text-slate-800">📋 あなたのタスク</h2>
    <span id="taskCountBadge" class="rounded-full bg-slate-200 px-2 py-0.5 text-xs font-medium text-slate-700">0</span>
  </div>
  <div id="taskList" class="admin-card p-0"></div>
</section>

<section class="mb-4">
  <h2 class="mb-2 text-lg font-semibold text-slate-800" id="pipelineTitle">🔄 進捗パイプライン</h2>
  <div id="pipelineBoard" class="kanban-grid"></div>
</section>

<section id="detailDrawer" class="hidden overflow-hidden rounded-lg border border-slate-200 bg-white shadow-sm"></section>

<div id="returnModal" class="fixed inset-0 z-[1000] hidden items-center justify-center bg-slate-900/50 px-4" onclick="closeReturnModal()">
  <div class="w-full max-w-lg rounded-xl border border-slate-200 bg-white shadow-2xl" onclick="event.stopPropagation()">
    <div class="flex items-center justify-between border-b border-slate-200 px-5 py-4">
      <h2 class="font-semibold text-slate-800">差戻しコメント</h2>
      <button type="button" class="rounded-lg px-2 py-1 text-sm text-slate-500 hover:bg-slate-100 hover:text-slate-900" onclick="closeReturnModal()">閉じる</button>
    </div>
    <div class="p-5">
      <textarea id="returnComment" class="min-h-28 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20" maxlength="2000" placeholder="差戻し理由を入力してください"></textarea>
      <div id="returnError" class="mt-2 hidden text-sm text-red-700"></div>
      <div class="mt-4 flex justify-end gap-2">
        <button type="button" class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50" onclick="closeReturnModal()">キャンセル</button>
        <button type="button" class="rounded-lg bg-red-600 px-3 py-2 text-sm font-medium text-white hover:bg-red-700" onclick="submitReturn()">差戻し</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const STATUS_LABELS = {
  draft: '講師作成',
  awaiting_parent_approval: '保護者承認待ち',
  parent_approved: '保護者承認済み',
  returned_to_tutor: '講師へ差戻し中',
  returned_to_receiver: '受付へ差戻し中',
  submitted_to_admin: '受付待ち',
  received: '再鑑待ち',
  re_reviewed: '最終承認待ち',
  admin_approved: '完了'
};
const ROLE_LABELS = {
  tutor: '講師',
  parent: '保護者',
  admin_receiver: '受付',
  admin_reviewer: '再鑑',
  admin_master: '管理者'
};
const ACTION_LABELS = {
  submit_to_parent: '承認依頼',
  parent_approve: '承認',
  parent_return: '差戻し',
  receive: '受付承認',
  return_from_receiver: '差戻し',
  re_review: '再鑑承認',
  return_from_reviewer: '差戻し',
  admin_approve: '承認',
  return_from_master: '差戻し'
};
const RETURN_ACTIONS = new Set(['parent_return', 'return_from_receiver', 'return_from_reviewer', 'return_from_master']);
const APPROVAL_ACTIONS = new Set(['submit_to_parent', 'parent_approve', 'receive', 're_review', 'admin_approve']);
const PIPELINE_COLUMNS = [
  {key: 'draft', label: '講師作成', statuses: ['draft', 'returned_to_tutor']},
  {key: 'awaiting_parent_approval', label: '保護者承認待ち', statuses: ['awaiting_parent_approval', 'parent_approved']},
  {key: 'submitted_to_admin', label: '受付待ち', statuses: ['submitted_to_admin', 'returned_to_receiver']},
  {key: 'received', label: '再鑑待ち', statuses: ['received']},
  {key: 're_reviewed', label: '最終承認待ち', statuses: ['re_reviewed']},
  {key: 'admin_approved', label: '完了', statuses: ['admin_approved']}
];
let currentRole = '';
let allReports = [];
let allAssignments = [];
let allTutors = [];
let selectedMonth = new URLSearchParams(location.search).get('month') || currentMonthValue();
let selectedTutorId = new URLSearchParams(location.search).get('tutor_id') || '';
let openCardKey = null;
let returnTargetKey = '';

function currentMonthValue() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
}
function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'}[ch]));
}
function roleLabel(role) { return ROLE_LABELS[role] || role || '-'; }
function actionLabel(action) { return ACTION_LABELS[action] || action || '-'; }
function statusLabel(status) { return STATUS_LABELS[status] || status || '-'; }
function monthLabel(value) {
  if (!value) return '-';
  return `${value.slice(0, 4)}年${Number(value.slice(5, 7))}月`;
}
function monthShortLabel(value) {
  return `${Number(value.slice(5, 7))}月`;
}
function formatDateTime(value) {
  if (!value) return '-';
  const d = new Date(value);
  if (Number.isNaN(d.getTime())) return '-';
  return `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
}
function formatEventDate(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  if (Number.isNaN(d.getTime())) return '';
  return `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
}
function tutorName(id) {
  return allTutors.find(tutor => tutor.id === id)?.display_name || '講師未設定';
}
function studentName(id) {
  return allAssignments.find(assignment => assignment.id === id)?.student_name || '生徒未設定';
}
function visibleReports() {
  return allReports.filter(report =>
    report.target_month === selectedMonth &&
    (!selectedTutorId || report.tutor_id === selectedTutorId)
  );
}
function groupKey(report) {
  return `${report.assignment_id}:${report.tutor_id}:${report.target_month}`;
}
function currentGroupStatus(reports) {
  const statuses = new Set(reports.map(report => report.status));
  for (const status of ['returned_to_tutor', 'returned_to_receiver', 'submitted_to_admin', 'received', 're_reviewed', 'awaiting_parent_approval', 'parent_approved', 'draft', 'admin_approved']) {
    if (statuses.has(status)) return status;
  }
  return reports[0]?.status || '';
}
function groupReports(reports) {
  const grouped = {};
  reports.forEach(report => {
    const key = groupKey(report);
    if (!grouped[key]) {
      grouped[key] = {
        key,
        assignment_id: report.assignment_id,
        tutor_id: report.tutor_id,
        target_month: report.target_month,
        student_name: report.student_name || studentName(report.assignment_id),
        tutor_name: report.tutor_name || tutorName(report.tutor_id),
        reports: []
      };
    }
    grouped[key].reports.push(report);
  });
  return Object.values(grouped).sort((a, b) =>
    a.student_name.localeCompare(b.student_name, 'ja') ||
    a.tutor_name.localeCompare(b.tutor_name, 'ja')
  );
}
function groupedByAssignment(reports) {
  return reports.reduce((groups, report) => {
    (groups[groupKey(report)] ||= []).push(report);
    return groups;
  }, {});
}
function currentGroups() {
  return groupReports(visibleReports());
}
function eventsForGroup(group) {
  const seen = new Set();
  const events = [];
  group.reports.forEach(report => {
    (report.events || []).forEach(event => {
      if (!ACTION_LABELS[event.action]) return;
      const key = `${event.action}:${event.actor_role || ''}:${event.actor_name || ''}:${String(event.created_at).slice(0, 19)}:${event.comment || ''}`;
      if (seen.has(key)) return;
      seen.add(key);
      events.push(event);
    });
  });
  return events.sort((a, b) => new Date(a.created_at).getTime() - new Date(b.created_at).getTime());
}
function reportIdsForStatus(group, status) {
  const statuses = Array.isArray(status) ? status : [status];
  return group.reports.filter(report => statuses.includes(report.status)).map(report => report.id);
}
function taskStatuses(config) {
  if (!config) return [];
  return config.statuses || [config.status];
}
function taskConfig() {
  if (currentRole === 'admin_master') {
    return {
      status: 're_reviewed',
      subtext: '最終承認が必要',
      label: '最終承認',
      endpoint: '/api/reports/admin-approve-bulk',
      returnRole: 'master'
    };
  }
  if (currentRole === 'admin_receiver') {
    return {
      statuses: ['submitted_to_admin', 'returned_to_receiver'],
      subtext: '受付対応が必要',
      label: '受付承認',
      endpoint: '/api/reports/admin-receive-bulk',
      returnRole: 'receiver'
    };
  }
  if (currentRole === 'admin_reviewer') {
    return {
      status: 'received',
      subtext: '再鑑が必要',
      label: '再鑑承認',
      endpoint: '/api/reports/admin-review-bulk',
      returnRole: 'reviewer'
    };
  }
  return null;
}
function getTaskMeta(group, groupStatus) {
  const allEvents = group.reports
    .flatMap(report => report.events || [])
    .sort((a, b) => String(b.created_at || '').localeCompare(String(a.created_at || '')));

  if (groupStatus === 're_reviewed') {
    const event = allEvents.find(item => item.action === 're_review');
    if (event) return `${event.actor_name || ''} / 再鑑完了 ${formatEventDate(event.created_at)}`.trim();
  }
  if (groupStatus === 'received') {
    const event = allEvents.find(item => item.action === 'receive');
    if (event) return `${event.actor_name || ''} / 受付完了 ${formatEventDate(event.created_at)}`.trim();
  }
  if (groupStatus === 'submitted_to_admin') {
    const event = allEvents.find(item => item.action === 'parent_approve');
    if (event) return `${event.actor_name || ''} / 保護者承認 ${formatEventDate(event.created_at)}`.trim();
  }
  if (groupStatus === 'returned_to_receiver') {
    const event = allEvents.find(item => item.action === 'return_from_reviewer' || item.action === 'return_from_master');
    if (event) return `${event.actor_name || ''} / 差戻し ${formatEventDate(event.created_at)}`.trim();
  }
  return '';
}
function renderFilters() {
  const months = [...new Set(allReports.map(report => report.target_month))].sort().reverse();
  if (months.length && !months.includes(selectedMonth)) selectedMonth = months[0];
  monthFilter.innerHTML = months.map(month => `<option value="${month}">${monthLabel(month)}</option>`).join('');
  monthFilter.value = selectedMonth;
  monthFilter.disabled = !months.length;
  const tutorIds = new Set(allReports.filter(report => report.target_month === selectedMonth).map(report => report.tutor_id));
  const tutors = allTutors.filter(tutor => tutorIds.has(tutor.id)).sort((a, b) => a.display_name.localeCompare(b.display_name, 'ja'));
  if (selectedTutorId && !tutorIds.has(selectedTutorId)) selectedTutorId = '';
  tutorFilter.innerHTML = ['<option value="">すべての講師</option>', ...tutors.map(tutor => `<option value="${tutor.id}">${escapeHtml(tutor.display_name)}</option>`)].join('');
  tutorFilter.value = selectedTutorId;
  renderBulkExportLinks();
}
function renderKpis() {
  const monthReports = visibleReports();
  const groups = Object.values(groupedByAssignment(monthReports));
  const config = taskConfig();
  const statuses = taskStatuses(config);
  const approvalWaiting = config ? groups.filter(group => statuses.includes(currentGroupStatus(group))).length : 0;
  const approvalSubtext = config?.subtext || '対応が必要';
  const returnedTutor = groups.filter(group => group.some(report => report.status === 'returned_to_tutor') && !group.some(report => report.status === 'admin_approved')).length;
  const returnedReceiver = groups.filter(group => group.some(report => report.status === 'returned_to_receiver') && !group.some(report => report.status === 'admin_approved')).length;
  const completed = groups.filter(group => group.every(report => report.status === 'admin_approved')).length;
  kpiCards.innerHTML = `
    <div class="admin-card" style="border:2px solid #DC2626;background:#FEF2F2;">
      <div style="font-size:11px;color:var(--color-text-secondary);">あなたの承認待ち</div>
      <div class="mt-1" style="font-size:28px;font-weight:500;color:#DC2626;">${approvalWaiting}</div>
      <div style="font-size:11px;color:var(--color-text-tertiary);">${approvalSubtext}</div>
    </div>
    <div class="admin-card">
      <div style="font-size:11px;color:var(--color-text-secondary);">差戻し中</div>
      <div class="mt-1 text-slate-800" style="font-size:28px;font-weight:500;">${returnedTutor + returnedReceiver}</div>
      <div style="font-size:11px;color:var(--color-text-tertiary);">講師${returnedTutor} / 受付${returnedReceiver}</div>
    </div>
    <div class="admin-card">
      <div style="font-size:11px;color:var(--color-text-secondary);">今月完了</div>
      <div class="mt-1 text-slate-800" style="font-size:28px;font-weight:500;">${completed}</div>
      <div style="font-size:11px;color:var(--color-text-tertiary);">全${groups.length}件中</div>
    </div>`;
}
function renderBulkExportLinks() {
  const month = selectedMonth;
  const reportsInMonth = allReports.filter(report => report.target_month === month);
  const groups = Object.values(groupedByAssignment(reportsInMonth));
  const approvedGroups = groups.filter(group => group.every(report => report.status === 'admin_approved'));
  const hasApprovedGroup = approvedGroups.length > 0;
  const hasUnapprovedGroup = groups.some(group => !group.every(report => report.status === 'admin_approved'));
  const params = new URLSearchParams({scope: 'approved_only', target_month: month, format: 'pdf'});
  bulkExportPdf.href = hasApprovedGroup ? `/api/reports/export?${params.toString()}` : '#';
  bulkExportPdf.classList.toggle('opacity-50', !hasApprovedGroup);
  bulkExportPdf.classList.toggle('pointer-events-none', !hasApprovedGroup);
}
function renderTasks(groups) {
  const config = taskConfig();
  const statuses = taskStatuses(config);
  const tasks = config ? groups.filter(group => statuses.includes(currentGroupStatus(group.reports))) : [];
  taskCountBadge.textContent = tasks.length;
  taskList.innerHTML = tasks.length ? tasks.map(group => {
    const groupStatus = currentGroupStatus(group.reports);
    const meta = getTaskMeta(group, groupStatus);
    return `<div class="flex flex-wrap items-center justify-between gap-3 border-b border-slate-100 px-4 py-3 last:border-b-0">
      <div>
        <div class="font-medium text-slate-800">${escapeHtml(group.student_name)} - ${escapeHtml(monthShortLabel(group.target_month))}</div>
        <div class="mt-1 text-xs text-slate-500">${escapeHtml(group.tutor_name)}${meta ? ` / ${escapeHtml(meta)}` : ''}</div>
      </div>
      <div class="flex flex-wrap gap-2">
        <button class="rounded-lg px-3 py-2 text-sm font-medium text-white" style="background:#16A34A;" onclick="approveGroup('${group.key}')">${escapeHtml(config.label)}</button>
        <button class="rounded-lg border px-3 py-2 text-sm font-medium" style="border-color:#FCA5A5;color:#DC2626;background:#fff;" onclick="openReturnModal('${group.key}')">差戻し</button>
      </div>
    </div>`;
  }).join('') : '<div class="px-4 py-4 text-sm text-slate-500">あなたの承認待ちはありません。</div>';
}
function pipelineColumnForStatus(status) {
  if (status === 'returned_to_tutor') return 'draft';
  if (status === 'returned_to_receiver') return 'submitted_to_admin';
  if (status === 'parent_approved') return 'awaiting_parent_approval';
  return status;
}
function pipelineCardClass(status) {
  if (['returned_to_tutor', 'returned_to_receiver'].includes(status)) return 'border-l-[#DC2626] bg-[#FEF2F2]';
  if (status === 'admin_approved') return 'border-l-[#16A34A] bg-[#F0FDF4]';
  return 'border-l-[#CBD5E1] bg-[#F8FAFC]';
}
function renderPipeline(groups) {
  pipelineTitle.textContent = `🔄 進捗パイプライン（${monthLabel(selectedMonth)}）`;
  pipelineBoard.innerHTML = PIPELINE_COLUMNS.map(column => {
    const items = groups.filter(group => pipelineColumnForStatus(currentGroupStatus(group.reports)) === column.key);
    return `<div class="rounded-lg border border-slate-200 bg-white">
      <div class="flex items-center justify-between border-b border-slate-100 px-2 py-2">
        <div class="text-xs font-semibold text-slate-700">${column.label}</div>
        <span class="rounded-full bg-slate-100 px-2 py-0.5 text-[10px] font-medium text-slate-600">${items.length}</span>
      </div>
      <div class="space-y-2 p-2">
        ${items.length ? items.map(group => {
          const status = currentGroupStatus(group.reports);
          return `<button type="button" class="block w-full cursor-pointer border-l-[3px] p-2 text-left transition hover:brightness-95 ${pipelineCardClass(status)} ${openCardKey === group.key ? 'ring-2 ring-blue-200' : ''}" onclick="toggleDetails('${group.key}')">
            <div class="text-[12px] font-medium text-slate-800">${escapeHtml(group.student_name)}</div>
            <div class="mt-1 text-[10px] text-slate-500">${escapeHtml(group.tutor_name)} / ${escapeHtml(statusLabel(status))}</div>
          </button>`;
        }).join('') : '<div class="px-2 py-4 text-center text-xs text-slate-400">なし</div>'}
      </div>
    </div>`;
  }).join('');
}
function currentWaitLabel(status) {
  const labels = {
    draft: '講師の作成待ち',
    returned_to_tutor: '講師の修正待ち',
    awaiting_parent_approval: '保護者の承認待ち',
    parent_approved: '講師の運営提出待ち',
    submitted_to_admin: '受付の承認待ち',
    returned_to_receiver: '受付の対応待ち',
    received: '再鑑の承認待ち',
    re_reviewed: '管理者の最終承認待ち',
    admin_approved: '完了'
  };
  return labels[status] || statusLabel(status);
}
function eventDotClass(action) {
  if (RETURN_ACTIONS.has(action)) return 'bg-[#DC2626]';
  if (APPROVAL_ACTIONS.has(action)) return 'bg-[#16A34A]';
  return 'bg-slate-400';
}
function actionBadge(action) {
  const returnStyle = RETURN_ACTIONS.has(action);
  const cls = returnStyle ? 'bg-[#FEE2E2] text-[#991B1B]' : 'bg-[#DCFCE7] text-[#166534]';
  return `<span class="rounded-full px-2 py-0.5 text-[11px] font-medium ${cls}">${escapeHtml(actionLabel(action))}</span>`;
}
function statusBadge(status) {
  if (['returned_to_tutor', 'returned_to_receiver'].includes(status)) return '<span class="rounded-full bg-red-100 px-2 py-1 text-xs font-medium text-red-700">差戻し中</span>';
  if (status === 'admin_approved') return '<span class="rounded-full bg-green-100 px-2 py-1 text-xs font-medium text-green-700">完了</span>';
  return '<span class="rounded-full bg-blue-100 px-2 py-1 text-xs font-medium text-blue-700">進行中</span>';
}
function timelineRow(event) {
  const isReturn = RETURN_ACTIONS.has(event.action);
  return `<div class="relative pb-5 pl-8">
    <span class="absolute left-[-5px] top-1 h-3 w-3 rounded-full ${eventDotClass(event.action)}"></span>
    <div class="flex flex-wrap items-center gap-2 text-xs text-slate-500">
      <span>${escapeHtml(formatDateTime(event.created_at))}</span>
      <span>${escapeHtml(roleLabel(event.actor_role))}</span>
      <span>${escapeHtml(event.actor_name || '-')}</span>
      ${actionBadge(event.action)}
    </div>
    ${isReturn && event.comment ? `<div class="mt-2 whitespace-pre-wrap border-l-4 bg-[#FFF7ED] px-3 py-2 text-sm text-slate-700" style="border-color:#F59E0B;">${escapeHtml(event.comment)}</div>` : ''}
  </div>`;
}
function currentTimelineRow(status) {
  return `<div class="relative pl-8">
    <span class="absolute left-[-5px] top-1 h-3 w-3 rounded-full bg-[#F59E0B]"></span>
    <div class="flex flex-wrap items-center gap-2 text-xs text-slate-500">
      <span>現在</span>
      <span class="rounded-full bg-[#FEF3C7] px-2 py-0.5 text-[11px] font-medium text-[#92400E]">${escapeHtml(currentWaitLabel(status))}</span>
    </div>
  </div>`;
}
function closeDetails() {
  openCardKey = null;
  detailDrawer.classList.add('hidden');
  detailDrawer.innerHTML = '';
  renderPipeline(currentGroups());
}
function toggleDetails(key) {
  if (openCardKey === key) {
    closeDetails();
    return;
  }
  showDetails(key);
}
function showDetails(key) {
  openCardKey = key;
  const group = currentGroups().find(item => item.key === key);
  if (!group) return;
  const status = currentGroupStatus(group.reports);
  const events = eventsForGroup(group);
  detailDrawer.classList.remove('hidden');
  detailDrawer.innerHTML = `<div class="flex flex-wrap items-center justify-between gap-3 border-b border-slate-200 bg-slate-50 px-4 py-3">
    <h2 class="font-semibold text-slate-800">📄 ${escapeHtml(group.student_name)} - ${escapeHtml(monthShortLabel(group.target_month))}（講師：${escapeHtml(group.tutor_name)}）</h2>
    ${statusBadge(status)}
  </div>
  <div class="p-5">
    <div class="ml-2 border-l-2 pl-0" style="border-color:var(--color-border-tertiary);">
      ${events.length ? events.map(timelineRow).join('') : '<div class="pb-5 pl-8 text-sm text-slate-500">履歴はありません。</div>'}
      ${currentTimelineRow(status)}
    </div>
  </div>`;
  renderPipeline(currentGroups());
}
async function approveGroup(key) {
  const group = currentGroups().find(item => item.key === key);
  if (!group) return;
  const config = taskConfig();
  if (!config) return;
  const ids = reportIdsForStatus(group, taskStatuses(config));
  if (!ids.length) return;
  if (!confirm(`${group.student_name}さんの${monthShortLabel(group.target_month)}分を${config.label}します。よろしいですか？`)) return;
  await api(config.endpoint, {method: 'POST', body: JSON.stringify({report_ids: ids, target_month: group.target_month})});
  await loadAdmin();
}
function openReturnModal(key) {
  returnTargetKey = key;
  returnComment.value = '';
  returnError.classList.add('hidden');
  returnModal.classList.remove('hidden');
  returnModal.classList.add('flex');
}
function closeReturnModal() {
  returnTargetKey = '';
  returnModal.classList.add('hidden');
  returnModal.classList.remove('flex');
}
async function submitReturn() {
  const group = currentGroups().find(item => item.key === returnTargetKey);
  if (!group) return;
  const config = taskConfig();
  if (!config) return;
  const comment = returnComment.value.trim();
  if (!comment) {
    returnError.textContent = '差戻し理由を入力してください';
    returnError.classList.remove('hidden');
    return;
  }
  const ids = reportIdsForStatus(group, taskStatuses(config));
  if (!ids.length) return;
  await api('/api/reports/admin-return-bulk', {method: 'POST', body: JSON.stringify({report_ids: ids, target_month: group.target_month, from_role: config.returnRole, comment})});
  closeReturnModal();
  await loadAdmin();
}
function updateUrl() {
  const params = new URLSearchParams();
  if (selectedMonth) params.set('month', selectedMonth);
  if (selectedTutorId) params.set('tutor_id', selectedTutorId);
  location.href = `${location.pathname}?${params.toString()}`;
}
function renderDashboard() {
  const groups = currentGroups();
  renderKpis();
  renderTasks(groups);
  renderPipeline(groups);
  if (openCardKey && groups.some(group => group.key === openCardKey)) {
    showDetails(openCardKey);
  } else {
    openCardKey = null;
    detailDrawer.classList.add('hidden');
    detailDrawer.innerHTML = '';
  }
}
async function loadAdmin() {
  const [reports, assignments, tutors] = await Promise.all([
    api('/api/reports'),
    api('/api/assignments'),
    api('/api/users?roles=tutor&per_page=100')
  ]);
  allReports = reports;
  allAssignments = assignments;
  allTutors = tutors.items || tutors;
  renderFilters();
  renderDashboard();
}
monthFilter.addEventListener('change', () => {
  selectedMonth = monthFilter.value;
  selectedTutorId = '';
  openCardKey = null;
  updateUrl();
});
tutorFilter.addEventListener('change', () => {
  selectedTutorId = tutorFilter.value;
  openCardKey = null;
  updateUrl();
});
window.authReady.then(user => {
  if (!user) return;
  currentRole = user.role;
  loadAdmin();
});
</script>
{% endblock %}
