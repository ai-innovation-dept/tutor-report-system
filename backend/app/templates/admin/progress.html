{% extends "base.html" %}
{% block content %}
<div class="mb-6">
  <p class="text-sm font-medium text-blue-600">運営ポータル</p>
  <h1 class="text-2xl font-semibold text-slate-800">進捗管理</h1>
</div>

<div id="progressList" class="space-y-4"></div>

<div id="returnModal" class="fixed inset-0 z-[1000] hidden items-center justify-center bg-slate-900/50 px-4" onclick="closeReturnModal()">
  <div class="w-full max-w-lg rounded-xl border border-slate-200 bg-white shadow-2xl" onclick="event.stopPropagation()">
    <div class="flex items-center justify-between border-b border-slate-200 px-5 py-4">
      <h2 class="font-semibold text-slate-800">差戻しコメント</h2>
      <button type="button" class="rounded-lg px-2 py-1 text-sm text-slate-500 hover:bg-slate-100 hover:text-slate-900" onclick="closeReturnModal()">閉じる</button>
    </div>
    <div class="p-5">
      <textarea id="returnComment" class="min-h-28 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20" maxlength="2000" placeholder="差戻し理由を入力してください"></textarea>
      <div id="returnError" class="mt-2 hidden text-sm text-red-700"></div>
      <div class="mt-4 flex justify-end gap-2">
        <button type="button" class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50" onclick="closeReturnModal()">キャンセル</button>
        <button type="button" class="rounded-lg bg-red-600 px-3 py-2 text-sm font-medium text-white hover:bg-red-700" onclick="submitReturn()">差戻し</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
const STATUS_LABELS = {
  draft: '下書き',
  awaiting_parent_approval: '保護者承認待ち',
  parent_approved: '保護者承認済み',
  returned_to_tutor: '講師へ差戻し中',
  returned_to_receiver: '受付へ差戻し中',
  submitted_to_admin: '受付待ち',
  received: '再鑑待ち',
  re_reviewed: '最終承認待ち',
  admin_approved: '最終承認済み'
};
const ROLE_LABELS = {
  tutor: '講師',
  parent: '保護者',
  admin_receiver: '受付',
  admin_reviewer: '再鑑',
  admin_master: '管理者'
};
const ACTION_LABELS = {
  submit_to_parent: '承認依頼',
  parent_approve: '承認',
  parent_return: '差戻',
  receive: '受付承認',
  return_from_receiver: '差戻',
  re_review: '再鑑承認',
  return_from_reviewer: '差戻',
  admin_approve: '承認',
  return_from_master: '差戻',
  create: '作成',
  update: '更新',
  submit_to_admin: '受付依頼'
};
let groups = [];
let returnTarget = null;

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'}[ch]));
}
function statusLabel(status) { return STATUS_LABELS[status] || status || '-'; }
function roleLabel(role) { return ROLE_LABELS[role] || role || '-'; }
function actionLabel(action) { return ACTION_LABELS[action] || action || '-'; }
function monthLabel(month) {
  return month ? `${month.slice(0, 4)}年${Number(month.slice(5, 7))}月` : '-';
}
function dateText(value) {
  const d = new Date(value);
  if (Number.isNaN(d.getTime())) return '-';
  return `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()}`;
}
function timeText(value) {
  const d = new Date(value);
  if (Number.isNaN(d.getTime())) return '-';
  return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
}
function currentGroupStatus(reports) {
  const statuses = new Set(reports.map(report => report.status));
  for (const status of ['returned_to_tutor', 'returned_to_receiver', 'submitted_to_admin', 'received', 're_reviewed', 'awaiting_parent_approval', 'parent_approved', 'draft']) {
    if (statuses.has(status)) return status;
  }
  return reports[0]?.status || '';
}
function groupReports(reports) {
  const grouped = {};
  reports.filter(report => report.status !== 'admin_approved').forEach(report => {
    const key = `${report.assignment_id}:${report.tutor_id}:${report.target_month}`;
    if (!grouped[key]) {
      grouped[key] = {
        key,
        assignment_id: report.assignment_id,
        tutor_id: report.tutor_id,
        target_month: report.target_month,
        student_name: report.student_name || '生徒未設定',
        tutor_name: report.tutor_name || '講師未設定',
        reports: []
      };
    }
    grouped[key].reports.push(report);
  });
  return Object.values(grouped).sort((a, b) =>
    b.target_month.localeCompare(a.target_month) ||
    a.student_name.localeCompare(b.student_name, 'ja') ||
    a.tutor_name.localeCompare(b.tutor_name, 'ja')
  );
}
function historyRows(group) {
  const seen = new Set();
  const events = [];
  group.reports.forEach(report => {
    (report.events || []).forEach(event => {
      const key = `${event.action}:${event.actor_role || ''}:${event.actor_name || ''}:${String(event.created_at).slice(0, 19)}:${event.comment || ''}`;
      if (seen.has(key)) return;
      seen.add(key);
      events.push(event);
    });
  });
  events.sort((a, b) => new Date(a.created_at).getTime() - new Date(b.created_at).getTime());
  if (!events.length) return '<tr><td colspan="5" class="px-4 py-4 text-sm text-slate-500">履歴はありません。</td></tr>';
  const status = currentGroupStatus(group.reports);
  return events.map((event, index) => {
    const latest = index === events.length - 1;
    const actions = latest && status === 're_reviewed'
      ? `<div class="mt-2 flex flex-wrap gap-2">
          <button type="button" class="rounded-lg bg-blue-600 px-3 py-2 text-sm font-medium text-white hover:bg-blue-700" onclick="approveGroup('${group.key}')">承認する</button>
          <button type="button" class="rounded-lg bg-red-600 px-3 py-2 text-sm font-medium text-white hover:bg-red-700" onclick="openReturnModal('${group.key}')">差戻し</button>
        </div>`
      : '';
    return `<tr class="border-t border-slate-100 align-top ${latest ? 'bg-blue-50/40' : ''}">
      <td class="px-4 py-3">${dateText(event.created_at)}</td>
      <td class="px-4 py-3">${timeText(event.created_at)}</td>
      <td class="px-4 py-3">${escapeHtml(roleLabel(event.actor_role))}</td>
      <td class="px-4 py-3">${escapeHtml(event.actor_name || '-')}</td>
      <td class="px-4 py-3">${latest ? '承認依頼' : escapeHtml(actionLabel(event.action))}${event.comment ? `<div class="mt-1 whitespace-pre-wrap text-xs text-slate-500">${escapeHtml(event.comment)}</div>` : ''}${actions}</td>
    </tr>`;
  }).join('');
}
function renderProgress() {
  progressList.innerHTML = groups.length ? groups.map(group => {
    const status = currentGroupStatus(group.reports);
    return `<section class="rounded-xl border border-slate-200 bg-white shadow-sm">
      <div class="grid gap-3 border-b border-slate-200 bg-slate-50 p-4 md:grid-cols-4">
        <div><div class="text-xs font-medium text-slate-500">生徒名</div><div class="font-semibold text-slate-800">${escapeHtml(group.student_name)}</div></div>
        <div><div class="text-xs font-medium text-slate-500">講師名</div><div class="font-semibold text-slate-800">${escapeHtml(group.tutor_name)}</div></div>
        <div><div class="text-xs font-medium text-slate-500">対象月</div><div class="font-semibold text-slate-800">${escapeHtml(monthLabel(group.target_month))}</div></div>
        <div><div class="text-xs font-medium text-slate-500">現在のステータス</div><div class="font-semibold text-slate-800">${escapeHtml(statusLabel(status))}</div></div>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-white text-xs font-medium uppercase tracking-wide text-slate-500">
            <tr>
              <th class="px-4 py-3 text-left">日付</th>
              <th class="px-4 py-3 text-left">時間</th>
              <th class="px-4 py-3 text-left">ロール</th>
              <th class="px-4 py-3 text-left">氏名</th>
              <th class="px-4 py-3 text-left">状態</th>
            </tr>
          </thead>
          <tbody>${historyRows(group)}</tbody>
        </table>
      </div>
    </section>`;
  }).join('') : '<div class="rounded-xl border border-slate-200 bg-white p-4 text-sm text-slate-600 shadow-sm">最終承認が完了していない案件はありません。</div>';
}
function targetReportIds(group) {
  return group.reports.filter(report => report.status === 're_reviewed').map(report => report.id);
}
async function approveGroup(key) {
  const group = groups.find(item => item.key === key);
  if (!group) return;
  const reportIds = targetReportIds(group);
  if (!reportIds.length) return;
  if (!confirm(`${group.student_name}さんの${monthLabel(group.target_month)}分を承認します。よろしいですか？`)) return;
  await api('/api/reports/admin-approve-bulk', {
    method: 'POST',
    body: JSON.stringify({report_ids: reportIds, target_month: group.target_month})
  });
  await loadProgress();
}
function openReturnModal(key) {
  returnTarget = groups.find(item => item.key === key) || null;
  returnComment.value = '';
  returnError.classList.add('hidden');
  returnModal.classList.remove('hidden');
  returnModal.classList.add('flex');
}
function closeReturnModal() {
  returnTarget = null;
  returnModal.classList.add('hidden');
  returnModal.classList.remove('flex');
}
async function submitReturn() {
  if (!returnTarget) return;
  const comment = returnComment.value.trim();
  if (!comment) {
    returnError.textContent = '差戻し理由を入力してください';
    returnError.classList.remove('hidden');
    return;
  }
  const reportIds = targetReportIds(returnTarget);
  if (!reportIds.length) return;
  await api('/api/reports/admin-return-bulk', {
    method: 'POST',
    body: JSON.stringify({report_ids: reportIds, target_month: returnTarget.target_month, from_role: 'master', comment})
  });
  closeReturnModal();
  await loadProgress();
}
async function loadProgress() {
  groups = groupReports(await api('/api/reports'));
  renderProgress();
}
window.authReady.then(user => {
  if (!user || user.role !== 'admin_master') return;
  loadProgress();
});
</script>
{% endblock %}
