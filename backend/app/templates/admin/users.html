{% extends "base.html" %}
{% block content %}
<!-- # === Phase 9: ユーザー管理 START === -->
<div class="mb-6">
  <p class="text-sm font-medium text-blue-600">運営ポータル</p>
  <h1 class="text-2xl font-semibold text-slate-800">ユーザー管理</h1>
</div>

<section class="mb-4 rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
  <h2 class="font-semibold text-slate-800">新規ユーザー登録</h2>
  <form id="inviteForm" class="mt-4 space-y-3">
    <div class="grid gap-3 md:grid-cols-[150px_1fr_1.4fr]">
      <label class="block text-sm">
        <span class="mb-1 block text-slate-700">ロール</span>
        <select name="role" id="roleSelect" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20">
          <option value="tutor">講師</option>
          <option value="parent">保護者</option>
          <option value="admin_receiver">受付担当</option>
          <option value="admin_reviewer">再鑑者</option>
          <option value="admin_master">管理者</option>
        </select>
      </label>
      <label id="displayNameField" class="block text-sm">
        <span class="mb-1 block text-slate-700">氏名</span>
        <input name="display_name" id="displayNameInput" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20" maxlength="100">
      </label>
      <label class="block text-sm">
        <span class="mb-1 block text-slate-700">メール</span>
        <input name="email" type="email" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20" required>
      </label>
    </div>
    <div id="parentFields" class="hidden grid gap-3 md:grid-cols-[1fr_1fr]">
      <label class="block text-sm">
        <span class="mb-1 block text-slate-700">担当講師</span>
        <select name="tutor_id" id="tutorSelect" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20"></select>
      </label>
      <label class="block text-sm">
        <span class="mb-1 block text-slate-700">生徒名</span>
        <input name="student_name" id="studentNameInput" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20" maxlength="100">
      </label>
    </div>
    <div class="flex flex-wrap items-center justify-between gap-3">
      <p id="roleHint" class="text-sm text-slate-500">講師Noは自動で割り当てられます。</p>
      <button class="rounded-lg bg-blue-600 px-4 py-2 font-medium text-white transition hover:bg-blue-700">招待メールを送る</button>
    </div>
  </form>
  <p id="inviteMessage" class="mt-3 text-sm"></p>
</section>

<section class="rounded-xl border border-slate-200 bg-white shadow-sm">
  <div class="border-b border-slate-200 bg-slate-50 p-4">
    <h2 class="font-semibold text-slate-800">招待済み一覧</h2>
  </div>
  <div class="overflow-x-auto">
    <table class="w-full text-sm">
      <thead class="bg-slate-50 text-xs font-medium uppercase tracking-wide text-slate-500">
        <tr>
          <th class="px-4 py-3 text-left">メール</th>
          <th class="px-4 py-3 text-left">役割</th>
          <th class="px-4 py-3 text-left">担当講師</th>
          <th class="px-4 py-3 text-left">担当生徒</th>
          <th class="px-4 py-3 text-left">送信日時</th>
          <th class="px-4 py-3 text-left">状態</th>
          <th class="px-4 py-3 text-left">操作</th>
        </tr>
      </thead>
      <tbody id="invitationRows"></tbody>
    </table>
  </div>
</section>

<section class="mt-4 rounded-xl border border-slate-200 bg-white shadow-sm">
  <div class="flex flex-wrap items-center justify-between gap-3 border-b border-slate-200 bg-slate-50 p-4">
    <h2 class="font-semibold text-slate-800">登録済みユーザー</h2>
    <label class="text-sm">
      <span class="mr-2 text-slate-600">検索</span>
      <input id="userSearch" class="rounded-lg border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20" placeholder="名前・メール">
    </label>
  </div>
  <div class="overflow-x-auto">
    <table class="w-full text-sm">
      <thead class="bg-slate-50 text-xs font-medium uppercase tracking-wide text-slate-500">
        <tr>
          <th class="px-4 py-3 text-left">ロール</th>
          <th class="px-4 py-3 text-left">名前</th>
          <th class="px-4 py-3 text-left">メール</th>
          <th class="px-4 py-3 text-left">講師No</th>
          <th class="px-4 py-3 text-left">登録日</th>
          <th class="px-4 py-3 text-left">状態</th>
          <th class="px-4 py-3 text-left">操作</th>
        </tr>
      </thead>
      <tbody id="userRows"></tbody>
    </table>
  </div>
</section>
{% endblock %}
{% block scripts %}
<script>
let invitations = [];
let tutors = [];
let users = [];
const ROLE_LABELS = {
  admin_master: '管理者',
  tutor: '講師',
  admin_receiver: '受付担当',
  admin_reviewer: '再鑑者',
  parent: '保護者'
};
const ROLE_ORDER = {
  admin_master: 0,
  tutor: 1,
  admin_receiver: 2,
  admin_reviewer: 3,
  parent: 4
};

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'}[ch]));
}
function roleLabel(role) { return ROLE_LABELS[role] || role; }
function formatDateTime(value) {
  if (!value) return '-';
  const d = new Date(value);
  return `${d.getMonth() + 1}/${d.getDate()} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
}
function formatDate(value) {
  if (!value) return '-';
  const d = new Date(value);
  return `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()}`;
}
function statusText(invitation) {
  if (invitation.accepted_at) return '登録済み';
  const expires = new Date(invitation.expires_at);
  const diffHours = Math.max(0, Math.ceil((expires.getTime() - Date.now()) / 3600000));
  if (diffHours <= 0) return '期限切れ';
  return `未登録（残り${diffHours}時間）`;
}
function showInviteMessage(text, isError = false) {
  inviteMessage.textContent = text;
  inviteMessage.className = `mt-3 text-sm ${isError ? 'text-rose-700' : 'text-emerald-700'}`;
}
function renderTutorOptions() {
  tutorSelect.innerHTML = tutors.map(tutor => `<option value="${tutor.id}">${escapeHtml(tutor.display_name)}（${escapeHtml(tutor.email)}）</option>`).join('');
}
function syncRoleFields() {
  const role = roleSelect.value;
  const parentMode = role === 'parent';
  parentFields.classList.toggle('hidden', !parentMode);
  displayNameField.classList.toggle('hidden', parentMode);
  displayNameInput.required = !parentMode;
  displayNameInput.disabled = parentMode;
  tutorSelect.required = parentMode;
  tutorSelect.disabled = !parentMode;
  studentNameInput.required = parentMode;
  studentNameInput.disabled = !parentMode;
  if (role === 'tutor') {
    roleHint.textContent = '講師Noは自動で割り当てられます。';
  } else if (parentMode) {
    roleHint.textContent = '保護者は登録URLで本人がパスワードを設定します。既存保護者メールなら生徒を追加します。';
  } else {
    roleHint.textContent = '運営スタッフは登録URLで本人がパスワードを設定します。';
  }
}
function renderInvitations() {
  invitationRows.innerHTML = invitations.length ? invitations.map(invitation => {
    const action = invitation.accepted_at
      ? ''
      : `<button class="rounded-lg bg-blue-600 px-3 py-1.5 text-sm font-medium text-white transition hover:bg-blue-700" onclick="resendInvitation('${invitation.id}')">再送</button>
         <button class="ml-2 rounded-lg border border-red-200 bg-red-50 px-3 py-1.5 text-sm font-medium text-red-700 transition hover:bg-red-100" onclick="deleteInvitation('${invitation.id}')">取消</button>`;
    return `<tr class="border-t border-slate-100 hover:bg-slate-50">
      <td class="px-4 py-3">${escapeHtml(invitation.email)}</td>
      <td class="px-4 py-3">${roleLabel(invitation.role)}</td>
      <td class="px-4 py-3">${invitation.role === 'parent' ? escapeHtml(invitation.tutor_name || '-') : '-'}</td>
      <td class="px-4 py-3">${invitation.role === 'parent' ? escapeHtml(invitation.student_name || '-') : '-'}</td>
      <td class="px-4 py-3">${formatDateTime(invitation.created_at)}</td>
      <td class="px-4 py-3">${statusText(invitation)}</td>
      <td class="px-4 py-3">${action}</td>
    </tr>`;
  }).join('') : '<tr><td class="p-4 text-slate-600" colspan="7">招待はありません。</td></tr>';
}
function sortedUsers() {
  const keyword = userSearch.value.trim().toLowerCase();
  return [...users]
    .filter(user => !keyword || `${user.display_name} ${user.email}`.toLowerCase().includes(keyword))
    .sort((a, b) => {
      const roleCompare = (ROLE_ORDER[primaryRole(a)] ?? 99) - (ROLE_ORDER[primaryRole(b)] ?? 99);
      if (roleCompare !== 0) return roleCompare;
      return a.display_name.localeCompare(b.display_name, 'ja');
    });
}
function userRoles(user) {
  return user.roles && user.roles.length ? user.roles : [user.role];
}
function primaryRole(user) {
  return userRoles(user)[0] || user.role;
}
function canEditAdminRoles(user) {
  const roles = userRoles(user);
  return roles.every(role => ['admin_receiver', 'admin_reviewer'].includes(role));
}
function roleCheckboxes(user) {
  const roles = new Set(userRoles(user));
  const editable = canEditAdminRoles(user);
  return ['tutor', 'parent', 'admin_receiver', 'admin_reviewer', 'admin_master'].map(role => {
    const enabled = editable && ['admin_receiver', 'admin_reviewer'].includes(role);
    return `<label class="mr-3 inline-flex items-center gap-1 whitespace-nowrap text-xs ${enabled ? 'text-slate-700' : 'text-slate-400'}">
      <input type="checkbox" data-role-user="${user.id}" value="${role}" ${roles.has(role) ? 'checked' : ''} ${enabled ? '' : 'disabled'} class="rounded border-slate-300">
      <span>${roleLabel(role)}</span>
    </label>`;
  }).join('');
}
function renderUsers() {
  const rows = sortedUsers();
  userRows.innerHTML = rows.length ? rows.map(user => {
    const active = user.is_active ? '有効' : '無効';
    const rowClass = user.is_active ? 'hover:bg-slate-50' : 'bg-slate-100 text-slate-500';
    const activeAction = user.is_active
      ? `<button class="rounded-lg border border-red-200 bg-red-50 px-3 py-1.5 text-sm font-medium text-red-700 transition hover:bg-red-100" onclick="toggleUserActive('${user.id}', false)">無効化</button>`
      : `<button class="rounded-lg border border-emerald-200 bg-emerald-50 px-3 py-1.5 text-sm font-medium text-emerald-700 transition hover:bg-emerald-100" onclick="toggleUserActive('${user.id}', true)">有効化</button>`;
    const roleAction = canEditAdminRoles(user)
      ? `<button class="rounded-lg border border-blue-200 bg-blue-50 px-3 py-1.5 text-sm font-medium text-blue-700 transition hover:bg-blue-100" onclick="updateUserRoles('${user.id}')">更新</button>`
      : '';
    const deleteAction = userRoles(user).includes('admin_master')
      ? ''
      : `<button class="rounded-lg border border-red-200 bg-white px-3 py-1.5 text-sm font-medium text-red-700 transition hover:bg-red-50" onclick="deleteUser('${user.id}')">削除</button>`;
    return `<tr class="border-t border-slate-100 ${rowClass}">
      <td class="px-4 py-3 min-w-72">${roleCheckboxes(user)}</td>
      <td class="px-4 py-3">${escapeHtml(user.display_name)}</td>
      <td class="px-4 py-3">${escapeHtml(user.email)}</td>
      <td class="px-4 py-3">${escapeHtml(user.tutor_no || '-')}</td>
      <td class="px-4 py-3">${formatDate(user.created_at)}</td>
      <td class="px-4 py-3">${active}</td>
      <td class="px-4 py-3"><div class="flex flex-wrap gap-2">${roleAction}${activeAction}${deleteAction}</div></td>
    </tr>`;
  }).join('') : '<tr><td class="p-4 text-slate-600" colspan="7">登録済みユーザーはありません。</td></tr>';
}
async function loadUsersPage() {
  const [invitationRows, tutorRows, userRowsData] = await Promise.all([
    api('/api/invitations'),
    api('/api/users?role=tutor'),
    api('/api/users')
  ]);
  invitations = invitationRows;
  tutors = tutorRows;
  users = userRowsData;
  renderTutorOptions();
  renderInvitations();
  renderUsers();
  syncRoleFields();
}
inviteForm.addEventListener('submit', async event => {
  event.preventDefault();
  const data = Object.fromEntries(new FormData(inviteForm));
  if (data.role !== 'parent') {
    delete data.tutor_id;
    delete data.student_name;
  } else {
    delete data.display_name;
  }
  try {
    const result = await api('/api/invitations', {method: 'POST', body: JSON.stringify(data)});
    inviteForm.reset();
    roleSelect.value = data.role;
    syncRoleFields();
    showInviteMessage(result.message || '招待メールを送信しました。');
    await loadUsersPage();
  } catch (error) {
    showInviteMessage('招待メールを送信できませんでした。', true);
  }
});
async function resendInvitation(id) {
  const invitation = invitations.find(item => item.id === id);
  if (!invitation) return;
  const payload = {
    email: invitation.email,
    role: invitation.role,
    display_name: invitation.display_name,
    tutor_id: invitation.tutor_id,
    student_name: invitation.student_name
  };
  await api('/api/invitations', {method: 'POST', body: JSON.stringify(payload)});
  showInviteMessage('招待メールを再送しました。');
  await loadUsersPage();
}
async function deleteInvitation(id) {
  if (!confirm('この招待を取り消しますか。')) return;
  await api(`/api/invitations/${id}`, {method: 'DELETE'});
  showInviteMessage('招待を取り消しました。');
  await loadUsersPage();
}
async function toggleUserActive(id, isActive) {
  const label = isActive ? '有効化' : '無効化';
  if (!confirm(`このユーザーを${label}しますか。`)) return;
  await api(`/api/users/${id}`, {method: 'PATCH', body: JSON.stringify({is_active: isActive})});
  showInviteMessage(`ユーザーを${label}しました。`);
  await loadUsersPage();
}
async function updateUserRoles(id) {
  const checked = [...document.querySelectorAll(`input[data-role-user="${id}"]:checked`)].map(input => input.value);
  if (!checked.length) {
    showInviteMessage('少なくとも1つの運営ロールを選択してください。', true);
    return;
  }
  await api(`/api/users/${id}/roles`, {method: 'PATCH', body: JSON.stringify({roles: checked})});
  showInviteMessage('ロールを更新しました。');
  await loadUsersPage();
}
async function deleteUser(id) {
  if (!confirm('本当に削除しますか？この操作は取り消せません')) return;
  await api(`/api/users/${id}`, {method: 'DELETE'});
  showInviteMessage('ユーザーを削除しました。');
  await loadUsersPage();
}
roleSelect.addEventListener('change', syncRoleFields);
userSearch.addEventListener('input', renderUsers);
window.authReady.then(user => {
  if (!user) return;
  loadUsersPage();
});
</script>
<!-- # === Phase 9 END === -->
{% endblock %}
