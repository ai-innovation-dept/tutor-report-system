{% extends "base.html" %}
{% block content %}
<!-- # === Phase 9: 紐付け管理 START === -->
<div class="mb-6">
  <p class="text-sm font-medium text-blue-600">運営ポータル</p>
  <h1 class="text-2xl font-semibold text-slate-800">紐付け管理</h1>
</div>

<section class="mb-4 rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
  <h2 class="font-semibold text-slate-800">既存生徒への講師追加</h2>
  <form id="existingStudentForm" class="mt-4 grid gap-3 md:grid-cols-[1.3fr_1fr_auto]">
    <label class="block text-sm">
      <span class="mb-1 block text-slate-700">生徒</span>
      <select id="existingStudentSelect" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20" required></select>
    </label>
    <label class="block text-sm">
      <span class="mb-1 block text-slate-700">追加する講師</span>
      <select id="additionalTutorSelect" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20" required></select>
    </label>
    <button class="self-end rounded-lg bg-blue-600 px-4 py-2 font-medium text-white transition hover:bg-blue-700">紐付けを追加する</button>
  </form>
  <p id="existingStudentMessage" class="mt-3 text-sm"></p>
</section>

<section class="rounded-xl border border-slate-200 bg-white shadow-sm">
  <div class="border-b border-slate-200 bg-slate-50 p-4">
    <h2 class="font-semibold text-slate-800">紐付け一覧</h2>
  </div>
  <div class="overflow-x-auto">
    <table class="w-full text-sm">
      <thead class="bg-slate-50 text-xs font-medium uppercase tracking-wide text-slate-500">
        <tr>
          <th class="px-4 py-3 text-left">生徒名</th>
          <th class="px-4 py-3 text-left">保護者</th>
          <th class="px-4 py-3 text-left">講師</th>
          <th class="px-4 py-3 text-left">状態</th>
          <th class="px-4 py-3 text-left">操作</th>
        </tr>
      </thead>
      <tbody id="assignmentRows"></tbody>
    </table>
  </div>
</section>
{% endblock %}
{% block scripts %}
<script>
let assignments = [];
let tutors = [];
let parents = [];

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'}[ch]));
}
function tutorName(id) {
  return tutors.find(user => user.id === id)?.display_name || '講師未設定';
}
function tutorLabel(tutor) {
  return `${tutor.display_name}${tutor.tutor_no ? `（${tutor.tutor_no}）` : `（${tutor.email}）`}`;
}
function parentLabel(id) {
  const parent = parents.find(user => user.id === id);
  return parent ? `${parent.display_name}（${parent.email}）` : '未設定';
}
function studentKey(studentName, parentId) {
  return `${studentName}::${parentId || ''}`;
}
function selectedStudentOption() {
  const value = existingStudentSelect.value;
  if (!value) return null;
  return JSON.parse(decodeURIComponent(value));
}
function showExistingStudentMessage(text, isError = false) {
  existingStudentMessage.textContent = text;
  existingStudentMessage.className = `mt-3 text-sm ${isError ? 'text-rose-700' : 'text-emerald-700'}`;
}
function renderFormOptions() {
  renderExistingStudentOptions();
}
function uniqueStudents() {
  const map = new Map();
  for (const assignment of assignments) {
    const key = studentKey(assignment.student_name, assignment.parent_id);
    if (!map.has(key)) {
      map.set(key, {
        student_name: assignment.student_name,
        parent_id: assignment.parent_id,
        parent_label: parentLabel(assignment.parent_id)
      });
    }
  }
  return [...map.values()].sort((a, b) => a.student_name.localeCompare(b.student_name, 'ja'));
}
function renderExistingStudentOptions() {
  const students = uniqueStudents();
  existingStudentSelect.innerHTML = students.length
    ? students.map(student => {
        const value = encodeURIComponent(JSON.stringify({student_name: student.student_name, parent_id: student.parent_id}));
        return `<option value="${value}">${escapeHtml(student.student_name)}（保護者：${escapeHtml(student.parent_label)}）</option>`;
      }).join('')
    : '<option value="">既存生徒がありません</option>';
  existingStudentSelect.disabled = !students.length;
  renderAdditionalTutorOptions();
}
function renderAdditionalTutorOptions() {
  const student = selectedStudentOption();
  if (!student) {
    additionalTutorSelect.innerHTML = '<option value="">追加できる講師がありません</option>';
    additionalTutorSelect.disabled = true;
    return;
  }
  const linkedTutorIds = new Set(
    assignments
      .filter(assignment => assignment.student_name === student.student_name)
      .map(assignment => assignment.tutor_id)
  );
  const availableTutors = tutors
    .filter(tutor => !linkedTutorIds.has(tutor.id))
    .sort((a, b) => a.display_name.localeCompare(b.display_name, 'ja'));
  additionalTutorSelect.innerHTML = availableTutors.length
    ? availableTutors.map(tutor => `<option value="${tutor.id}">${escapeHtml(tutorLabel(tutor))}</option>`).join('')
    : '<option value="">追加できる講師がありません</option>';
  additionalTutorSelect.disabled = !availableTutors.length;
}
function renderAssignments() {
  assignmentRows.innerHTML = assignments.length ? assignments.map(assignment => {
    const parentText = parentLabel(assignment.parent_id);
    const status = assignment.is_active ? '有効' : '無効';
    const action = !assignment.is_active
      ? '<span class="text-sm text-slate-400">無効化済み</span>'
      : `<button class="rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm font-medium text-red-700 transition hover:bg-red-100" onclick="deactivateAssignment('${assignment.id}')">無効化</button>`;
    return `<tr class="border-t border-slate-100 hover:bg-slate-50 ${assignment.is_active ? '' : 'bg-slate-50 text-slate-400'}">
      <td class="px-4 py-3">${escapeHtml(assignment.student_name)}</td>
      <td class="px-4 py-3">${escapeHtml(parentText)}</td>
      <td class="px-4 py-3">${escapeHtml(tutorName(assignment.tutor_id))}</td>
      <td class="px-4 py-3">${status}</td>
      <td class="px-4 py-3">${action}</td>
    </tr>`;
  }).join('') : '<tr><td class="p-4 text-slate-600" colspan="5">紐付けはありません。</td></tr>';
}
async function loadAssignmentsPage() {
  const [assignmentRows, tutorRows, parentRows] = await Promise.all([
    api('/api/assignments'),
    api('/api/users?roles=tutor&per_page=100'),
    api('/api/users?roles=parent&per_page=100')
  ]);
  assignments = assignmentRows;
  tutors = tutorRows.items || tutorRows;
  parents = parentRows.items || parentRows;
  renderFormOptions();
  renderAssignments();
}
existingStudentForm.addEventListener('submit', async event => {
  event.preventDefault();
  const student = selectedStudentOption();
  if (!student || !additionalTutorSelect.value) {
    showExistingStudentMessage('生徒と講師を選択してください。', true);
    return;
  }
  try {
    await api('/api/assignments', {
      method: 'POST',
      body: JSON.stringify({
        tutor_id: additionalTutorSelect.value,
        student_name: student.student_name,
        parent_id: student.parent_id || null
      })
    });
    showExistingStudentMessage('紐付けを追加しました。');
    await loadAssignmentsPage();
  } catch (error) {
    showExistingStudentMessage(error.message || '紐付けを追加できませんでした。', true);
  }
});
existingStudentSelect.addEventListener('change', renderAdditionalTutorOptions);
async function deactivateAssignment(assignmentId) {
  if (!confirm('この紐付けを無効化しますか。')) return;
  await api(`/api/assignments/${assignmentId}`, {method: 'PATCH', body: JSON.stringify({is_active: false})});
  alert('紐付けを無効化しました。');
  await loadAssignmentsPage();
}
window.authReady.then(user => {
  if (!user) return;
  loadAssignmentsPage();
});
</script>
<!-- # === Phase 9 END === -->
{% endblock %}
