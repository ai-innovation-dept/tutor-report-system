{% extends "base.html" %}
{% block content %}
<section class="mb-4 flex flex-wrap items-center justify-between gap-3">
  <div>
    <h1 class="text-xl font-bold text-slate-800">担当管理</h1>
    <p class="mt-1 text-sm text-slate-500">生徒の担当（講師 × 保護者 × 生徒）を管理します。講師の交代・追加、保護者の変更、生徒名の修正、有効／無効の切替ができます。</p>
  </div>
  <button id="addBtn" type="button" class="shrink-0 rounded-lg bg-emerald-600 px-4 py-2 text-sm font-medium text-white transition hover:bg-emerald-700">＋ 担当を追加</button>
</section>

<section class="rounded-xl border border-slate-200 bg-white shadow-sm">
  <div class="flex flex-col gap-3 border-b border-slate-200 bg-slate-50 p-4 sm:flex-row sm:items-center sm:justify-between">
    <label class="text-sm">
      <span class="sr-only">検索</span>
      <input id="searchInput" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20 sm:w-72" placeholder="生徒名・講師名・保護者名で検索">
    </label>
    <label class="flex items-center gap-2 text-sm text-slate-700">
      <input id="activeOnly" type="checkbox" checked class="h-4 w-4 rounded border-slate-300"> 有効のみ表示
    </label>
  </div>
  <div class="overflow-x-auto">
    <table class="mobile-cards w-full text-sm">
      <thead class="bg-slate-50 text-xs font-medium uppercase tracking-wide text-slate-500">
        <tr>
          <th class="px-4 py-3 text-left">生徒名</th>
          <th class="px-4 py-3 text-left">講師</th>
          <th class="px-4 py-3 text-left">保護者</th>
          <th class="px-4 py-3 text-left">状態</th>
          <th class="px-4 py-3 text-left">操作</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
</section>

<div id="editOverlay" class="fixed inset-0 z-[1000] hidden items-center justify-center bg-slate-900/50 p-4" onclick="closeEdit()">
  <div class="w-full max-w-lg rounded-xl border border-slate-200 bg-white shadow-2xl" onclick="event.stopPropagation()">
    <div class="flex items-center justify-between border-b border-slate-200 px-5 py-4">
      <h2 id="editTitle" class="font-semibold text-slate-800">担当を編集</h2>
      <button type="button" class="rounded-lg px-2 py-1 text-sm text-slate-500 hover:bg-slate-100" onclick="closeEdit()">閉じる</button>
    </div>
    <div class="grid gap-4 p-5">
      <label class="block text-sm">
        <span class="mb-1 block text-slate-700">生徒名</span>
        <input id="fStudent" maxlength="100" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20">
      </label>
      <label class="block text-sm">
        <span class="mb-1 block text-slate-700">講師</span>
        <select id="fTutor" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20"></select>
        <span class="mt-1 block text-xs text-slate-500">変更すると以降の担当が新しい講師になります（過去の報告書の作成者はそのまま保持されます）。</span>
      </label>
      <label class="block text-sm">
        <span class="mb-1 block text-slate-700">保護者</span>
        <select id="fParent" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20"></select>
        <span class="mt-1 block text-xs text-slate-500">変更すると報告書の承認先も変わります。「未設定」で紐づけを解除します。</span>
      </label>
      <label id="activeField" class="flex items-center gap-2 text-sm text-slate-700">
        <input id="fActive" type="checkbox" class="h-4 w-4 rounded border-slate-300"> 有効
      </label>
      <p id="editMsg" class="hidden text-sm"></p>
      <div class="flex justify-end gap-2">
        <button type="button" class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50" onclick="closeEdit()">キャンセル</button>
        <button id="saveBtn" type="button" class="rounded-lg bg-blue-600 px-3 py-2 text-sm font-medium text-white hover:bg-blue-700" onclick="saveEdit()">保存</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
setBreadcrumb('運営ポータル', '担当管理');
let assignments = [];
let tutors = [];
let parents = [];
let editingId = null;

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'}[ch]));
}
function tutorOptions(selectedId) {
  return tutors.map(t => `<option value="${t.id}"${t.id === selectedId ? ' selected' : ''}>${escapeHtml(t.display_name)}${t.user_no ? `（${escapeHtml(t.user_no)}）` : ''}</option>`).join('');
}
function parentOptions(selectedId) {
  return ['<option value="">未設定</option>'].concat(
    parents.map(p => `<option value="${p.id}"${p.id === selectedId ? ' selected' : ''}>${escapeHtml(p.display_name)}${p.email ? `（${escapeHtml(p.email)}）` : ''}</option>`)
  ).join('');
}
function filteredAssignments() {
  const keyword = (document.getElementById('searchInput').value || '').trim().toLowerCase();
  const activeOnly = document.getElementById('activeOnly').checked;
  return assignments.filter(a => {
    if (activeOnly && !a.is_active) return false;
    if (!keyword) return true;
    return `${a.student_name || ''} ${a.tutor_name || ''} ${a.parent_name || ''}`.toLowerCase().includes(keyword);
  });
}
function render() {
  const list = filteredAssignments();
  document.getElementById('rows').innerHTML = list.length
    ? list.map(a => `<tr class="border-t border-slate-100 ${a.is_active ? 'hover:bg-slate-50' : 'bg-slate-100 text-slate-400'}">
        <td class="px-4 py-3 font-medium text-slate-800" data-label="生徒名">${escapeHtml(a.student_name || '-')}</td>
        <td class="px-4 py-3" data-label="講師">${escapeHtml(a.tutor_name || '-')}</td>
        <td class="px-4 py-3" data-label="保護者">${a.parent_id ? escapeHtml(a.parent_name || '-') : '<span class="font-medium text-amber-600">未設定</span>'}</td>
        <td class="px-4 py-3" data-label="状態">${a.is_active ? '有効' : '無効'}</td>
        <td class="px-4 py-3" data-label="操作"><button class="min-h-[40px] rounded-lg bg-slate-200 px-3 py-1.5 text-sm font-medium text-slate-700 hover:bg-slate-300" onclick="openEdit('${a.id}')">編集</button></td>
      </tr>`).join('')
    : '<tr><td colspan="5" class="p-4 text-slate-500">該当する担当はありません。</td></tr>';
}
function openOverlay() {
  const overlay = document.getElementById('editOverlay');
  overlay.classList.remove('hidden');
  overlay.classList.add('flex');
}
function closeEdit() {
  const overlay = document.getElementById('editOverlay');
  overlay.classList.add('hidden');
  overlay.classList.remove('flex');
  editingId = null;
}
function showEditMsg(text, isError) {
  const el = document.getElementById('editMsg');
  if (!text) { el.className = 'hidden text-sm'; el.textContent = ''; return; }
  el.className = `text-sm ${isError ? 'text-rose-700' : 'text-emerald-700'}`;
  el.textContent = text;
}
function openAdd() {
  editingId = null;
  document.getElementById('editTitle').textContent = '担当を追加';
  document.getElementById('fStudent').value = '';
  document.getElementById('fTutor').innerHTML = '<option value="">選択してください</option>' + tutorOptions('');
  document.getElementById('fParent').innerHTML = parentOptions('');
  document.getElementById('activeField').classList.add('hidden');
  showEditMsg('');
  openOverlay();
}
function openEdit(id) {
  const a = assignments.find(x => x.id === id);
  if (!a) return;
  editingId = id;
  document.getElementById('editTitle').textContent = '担当を編集';
  document.getElementById('fStudent').value = a.student_name || '';
  document.getElementById('fTutor').innerHTML = tutorOptions(a.tutor_id);
  document.getElementById('fParent').innerHTML = parentOptions(a.parent_id || '');
  document.getElementById('activeField').classList.remove('hidden');
  document.getElementById('fActive').checked = !!a.is_active;
  showEditMsg('');
  openOverlay();
}
async function saveEdit() {
  const student = document.getElementById('fStudent').value.trim();
  const tutorId = document.getElementById('fTutor').value;
  const parentId = document.getElementById('fParent').value || null;
  if (!student) { showEditMsg('生徒名を入力してください', true); return; }
  if (!tutorId) { showEditMsg('講師を選択してください', true); return; }
  try {
    if (editingId) {
      const isActive = document.getElementById('fActive').checked;
      await api(`/api/assignments/${editingId}`, {method: 'PATCH', body: JSON.stringify({student_name: student, tutor_id: tutorId, parent_id: parentId, is_active: isActive})});
      showToast('担当を更新しました', 'success');
    } else {
      const body = {tutor_id: tutorId, student_name: student};
      if (parentId) body.parent_id = parentId;
      await api('/api/assignments', {method: 'POST', body: JSON.stringify(body)});
      showToast('担当を追加しました', 'success');
    }
    closeEdit();
    await load();
  } catch (error) {
    let msg = error.message;
    try { msg = JSON.parse(msg).detail || msg; } catch (_) {}
    showEditMsg(msg || '保存できませんでした', true);
  }
}
document.getElementById('addBtn').addEventListener('click', openAdd);
document.getElementById('searchInput').addEventListener('input', render);
document.getElementById('activeOnly').addEventListener('change', render);
async function load() {
  const [asg, tut, par] = await Promise.all([
    api('/api/assignments'),
    api('/api/users?roles=tutor&per_page=200'),
    api('/api/users?roles=parent&per_page=500'),
  ]);
  assignments = asg || [];
  tutors = tut.items || tut;
  parents = par.items || par;
  render();
}
window.authReady.then(user => {
  if (!user) return;
  load();
});
</script>
{% endblock %}
