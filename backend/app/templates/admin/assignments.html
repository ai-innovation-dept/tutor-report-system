{% extends "base.html" %}
{% block content %}
<!-- # === Phase 9: 紐付け管理 START === -->
<div class="mb-4">
  <h1 class="text-xl font-semibold">紐付け管理</h1>
</div>

<section class="mb-4 rounded border bg-white p-4">
  <h2 class="font-semibold">紐付け作成</h2>
  <form id="assignmentForm" class="mt-4 grid gap-3 md:grid-cols-[1fr_1fr_1fr_auto]">
    <label class="block text-sm">
      <span class="mb-1 block text-slate-700">講師</span>
      <select name="tutor_id" id="tutorSelect" class="w-full rounded border px-3 py-2" required></select>
    </label>
    <label class="block text-sm">
      <span class="mb-1 block text-slate-700">生徒名</span>
      <input name="student_name" class="w-full rounded border px-3 py-2" required maxlength="100">
    </label>
    <label class="block text-sm">
      <span class="mb-1 block text-slate-700">保護者</span>
      <select name="parent_id" id="parentSelect" class="w-full rounded border px-3 py-2"></select>
    </label>
    <button class="self-end rounded bg-slate-900 px-4 py-2 text-white">作成</button>
  </form>
  <p id="assignmentMessage" class="mt-3 text-sm"></p>
</section>

<section class="rounded border bg-white">
  <div class="border-b bg-slate-50 p-4">
    <h2 class="font-semibold">紐付け一覧</h2>
  </div>
  <div class="overflow-x-auto">
    <table class="w-full text-sm">
      <thead class="bg-white">
        <tr>
          <th class="p-2 text-left">講師名</th>
          <th class="p-2 text-left">生徒名</th>
          <th class="p-2 text-left">保護者名</th>
          <th class="p-2 text-left">操作</th>
        </tr>
      </thead>
      <tbody id="assignmentRows"></tbody>
    </table>
  </div>
</section>
{% endblock %}
{% block scripts %}
<script>
let assignments = [];
let tutors = [];
let parents = [];
let editingAssignmentId = '';

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'}[ch]));
}
function tutorName(id) {
  return tutors.find(user => user.id === id)?.display_name || '講師未設定';
}
function parentName(id) {
  return parents.find(user => user.id === id)?.display_name || '未設定';
}
function parentOptions(selectedId = '') {
  return [
    '<option value="">未設定</option>',
    ...parents.map(parent => `<option value="${parent.id}" ${parent.id === selectedId ? 'selected' : ''}>${escapeHtml(parent.display_name)}（${escapeHtml(parent.email)}）</option>`)
  ].join('');
}
function showAssignmentMessage(text, isError = false) {
  assignmentMessage.textContent = text;
  assignmentMessage.className = `mt-3 text-sm ${isError ? 'text-rose-700' : 'text-emerald-700'}`;
}
function renderFormOptions() {
  tutorSelect.innerHTML = tutors.map(tutor => `<option value="${tutor.id}">${escapeHtml(tutor.display_name)}（${escapeHtml(tutor.email)}）</option>`).join('');
  parentSelect.innerHTML = parentOptions();
}
function renderAssignments() {
  assignmentRows.innerHTML = assignments.length ? assignments.map(assignment => {
    const parentLabel = assignment.parent_id ? parentName(assignment.parent_id) : '未設定';
    const action = assignment.parent_id
      ? ''
      : editingAssignmentId === assignment.id
        ? `<div class="flex flex-wrap gap-2">
            <select id="link-parent-${assignment.id}" class="rounded border px-3 py-2">${parentOptions()}</select>
            <button class="rounded bg-slate-900 px-3 py-2 text-white" onclick="saveParent('${assignment.id}')">保存</button>
            <button class="rounded border px-3 py-2" onclick="cancelLinkParent()">取消</button>
          </div>`
        : `<button class="underline" onclick="showLinkParent('${assignment.id}')">保護者を紐付ける</button>`;
    return `<tr class="border-t">
      <td class="p-2">${escapeHtml(tutorName(assignment.tutor_id))}</td>
      <td class="p-2">${escapeHtml(assignment.student_name)}</td>
      <td class="p-2">${escapeHtml(parentLabel)}</td>
      <td class="p-2">${action}</td>
    </tr>`;
  }).join('') : '<tr><td class="p-4 text-slate-600" colspan="4">紐付けはありません。</td></tr>';
}
async function loadAssignmentsPage() {
  const [assignmentRows, tutorRows, parentRows] = await Promise.all([
    api('/api/assignments'),
    api('/api/users?role=tutor'),
    api('/api/users?role=parent')
  ]);
  assignments = assignmentRows;
  tutors = tutorRows;
  parents = parentRows;
  renderFormOptions();
  renderAssignments();
}
assignmentForm.addEventListener('submit', async event => {
  event.preventDefault();
  const data = Object.fromEntries(new FormData(assignmentForm));
  if (!data.parent_id) data.parent_id = null;
  try {
    await api('/api/assignments', {method: 'POST', body: JSON.stringify(data)});
    assignmentForm.reset();
    showAssignmentMessage('紐付けを作成しました。');
    await loadAssignmentsPage();
  } catch (error) {
    showAssignmentMessage('紐付けを作成できませんでした。', true);
  }
});
function showLinkParent(assignmentId) {
  editingAssignmentId = assignmentId;
  renderAssignments();
}
function cancelLinkParent() {
  editingAssignmentId = '';
  renderAssignments();
}
async function saveParent(assignmentId) {
  const parentId = document.getElementById(`link-parent-${assignmentId}`).value;
  if (!parentId) {
    showAssignmentMessage('保護者を選択してください。', true);
    return;
  }
  await api(`/api/assignments/${assignmentId}`, {method: 'PATCH', body: JSON.stringify({parent_id: parentId})});
  editingAssignmentId = '';
  showAssignmentMessage('保護者を紐付けました。');
  await loadAssignmentsPage();
}
window.authReady.then(user => {
  if (!user) return;
  loadAssignmentsPage();
});
</script>
<!-- # === Phase 9 END === -->
{% endblock %}
