{% extends "base.html" %}
{% block content %}
<!-- # === Phase 9: フロントエンド ロール別画面 START === -->
<div class="mb-6 flex flex-wrap items-end justify-between gap-4">
  <div>
    <p class="text-sm font-medium text-blue-600">保護者ポータル</p>
    <h1 class="text-2xl font-semibold text-slate-800">報告書一覧</h1>
    <p class="mt-1 text-sm text-slate-500">月ごとの報告書を確認し、承認または差戻しできます。</p>
  </div>
  <div class="flex flex-wrap items-center gap-3">
    <label class="flex items-center gap-3 rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm shadow-sm">
      <span class="text-slate-600">表示月</span>
      <select id="monthFilter" class="rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20"></select>
    </label>
    <label class="flex items-center gap-3 rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm shadow-sm">
      <span class="text-slate-600">講師</span>
      <select id="tutorFilter" class="rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20"></select>
    </label>
  </div>
</div>
<div id="studentTabs" class="mb-4 hidden flex-wrap gap-2"></div>
<div id="selectedStudentLabel" class="mb-4 hidden text-sm font-medium text-slate-700"></div>
<section class="mb-4 rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
  <div class="mb-4">
    <h2 class="text-base font-semibold text-slate-800">エクスポート</h2>
  </div>
  <div class="flex flex-wrap items-end gap-3">
    <label class="grid gap-1 text-sm">
      <span class="text-slate-600">月</span>
      <select id="bulkExportMonth" class="min-w-36 rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20"></select>
    </label>
    <div id="bulkExportButtons" class="flex flex-wrap gap-2"></div>
  </div>
</section>
<div id="parentReports" class="grid gap-4"></div>
{% endblock %}
{% block scripts %}
<script>
const WEEKDAYS = ['日', '月', '火', '水', '木', '金', '土'];
const currentMonth = new Date().toISOString().slice(0, 7);
const parentAssignments = {{ assignments | default([]) | tojson }};
let allReports = [];
let selectedMonth = new URLSearchParams(location.search).get('month') || currentMonth;
let selectedTutorId = new URLSearchParams(location.search).get('tutor_id') || '';
let selectedAssignmentId = new URLSearchParams(location.search).get('assignment_id') || '';
let expandedReturnMonth = null;

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'}[ch]));
}
function timeText(value) { return (value || '').slice(0, 5); }
function dateLabel(value) {
  const d = new Date(`${value}T00:00:00`);
  return `${d.getMonth() + 1}月${d.getDate()}日（${WEEKDAYS[d.getDay()]}）`;
}
function monthLabel(value) {
  const [year, month] = value.split('-');
  return `${year}年${Number(month)}月分`;
}
function monthOptionLabel(value) {
  const [year, month] = value.split('-');
  return `${year}年${Number(month)}月`;
}
function minutesBetween(start, end) {
  const [sh, sm] = start.split(':').map(Number);
  const [eh, em] = end.split(':').map(Number);
  return Math.max(0, (eh * 60 + em) - (sh * 60 + sm));
}
function teachingMinutes(report) {
  return Math.max(0, minutesBetween(timeText(report.start_time), timeText(report.end_time)) - Number(report.break_minutes || 0));
}
function durationLabel(minutes) {
  const hours = Math.floor(minutes / 60);
  const mins = minutes % 60;
  if (hours && mins) return `${hours}時間${mins}分`;
  if (hours) return `${hours}時間`;
  return `${mins}分`;
}
function sortReportsOldestFirst(reports) {
  return [...reports].sort((a, b) => {
    const dateCompare = a.lesson_date.localeCompare(b.lesson_date);
    if (dateCompare !== 0) return dateCompare;
    return timeText(a.start_time).localeCompare(timeText(b.start_time));
  });
}
function filteredReports() {
  return allReports.filter(report =>
    (!selectedAssignmentId || report.assignment_id === selectedAssignmentId) &&
    (!selectedTutorId || report.tutor_id === selectedTutorId)
  );
}
function tutorLabel(reports) {
  const names = [...new Set(reports.map(report => report.tutor_name || '講師').filter(Boolean))];
  return names.length ? `　担当講師：${names.map(escapeHtml).join('、')}` : '';
}
function statusBadge(report) {
  if (report.status === 'awaiting_parent_approval') return '<span class="inline-flex rounded-full bg-yellow-100 px-2.5 py-1 text-xs font-medium text-yellow-800">確認待ち</span>';
  if (report.status === 'returned_to_tutor') return '<span class="inline-flex rounded-full bg-red-100 px-2.5 py-1 text-xs font-medium text-red-700">差戻し済み</span>';
  if (report.status === 'parent_approved') return '<span class="inline-flex rounded-full bg-blue-100 px-2.5 py-1 text-xs font-medium text-blue-700">承認済み</span>';
  return '<span class="inline-flex rounded-full bg-slate-100 px-2.5 py-1 text-xs font-medium text-slate-500">対象外</span>';
}
function returnComment(report) {
  if (report.status !== 'returned_to_tutor' || !report.last_return_comment) return '';
  return `<div class="mt-2 rounded-lg bg-red-50 px-3 py-2 text-xs text-red-700">コメント：${escapeHtml(report.last_return_comment)}</div>`;
}
function renderReportRows(reports) {
  return reports.map((report, index) => `<tr class="border-t align-top ${report.status === 'returned_to_tutor' ? 'bg-red-50/70' : ''}">
    <td class="p-2">${index + 1}</td>
    <td class="p-2">${dateLabel(report.lesson_date)}</td>
    <td class="p-2">${timeText(report.start_time)} ～ ${timeText(report.end_time)}</td>
    <td class="p-2">${Number(report.break_minutes || 0)}分</td>
    <td class="p-2">${durationLabel(teachingMinutes(report))}</td>
    <td class="p-2">${escapeHtml(report.subject || '')}</td>
    <td class="p-2">${statusBadge(report)}${returnComment(report)}</td>
  </tr>`).join('');
}
function monthReturnForm(month) {
  if (expandedReturnMonth !== month) return '';
  return `<div class="mt-3 rounded-xl border border-red-200 bg-red-50 p-4">
    <label class="text-sm font-medium text-slate-700" for="returnComment-${month}">差戻しコメント</label>
    <textarea id="returnComment-${month}" class="mt-2 min-h-24 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20" maxlength="2000" placeholder="コメントを入力してください"></textarea>
    <div class="mt-3 flex flex-wrap gap-2">
      <button class="rounded-lg bg-red-600 px-3 py-2 text-sm font-medium text-white transition hover:bg-red-700" onclick="confirmMonthReturn('${month}')">コメントを送信する</button>
      <button class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50" onclick="hideMonthReturnForm()">キャンセル</button>
    </div>
  </div>`;
}
function renderActionArea(month, reports) {
  const pending = reports.filter(report => report.status === 'awaiting_parent_approval');
  const returned = reports.filter(report => report.status === 'returned_to_tutor');
  const summary = `<div class="text-sm text-slate-700">差戻し済み：${returned.length}件　未確認：${pending.length}件</div>`;
  if (month !== currentMonth) {
    return `${summary}<div class="mt-3 rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-600">過去月のため差戻しできません。</div>`;
  }
  if (returned.length) {
    return `${summary}<div class="mt-3 flex flex-wrap gap-2">
        <button class="rounded-lg bg-slate-200 px-4 py-2 text-sm font-medium text-slate-500" disabled>${Number(month.slice(5, 7))}月分を差戻す</button>
        <button class="rounded-lg bg-slate-200 px-4 py-2 text-sm font-medium text-slate-500" disabled>すべての指導日を承認する</button>
      </div>
      <div class="mt-2 text-sm text-slate-600">差戻し中の報告書があります。講師の修正をお待ちください。</div>`;
  }
  if (pending.length) {
    return `${summary}<div class="mt-3 flex flex-wrap gap-2">
        <button class="rounded-lg bg-red-600 px-4 py-2 text-sm font-medium text-white transition hover:bg-red-700" onclick="showMonthReturnForm('${month}')">${Number(month.slice(5, 7))}月分を差戻す</button>
        <button class="rounded-lg bg-emerald-600 px-4 py-2 text-sm font-medium text-white transition hover:bg-emerald-700" onclick="approvePending('${month}')">すべての指導日を承認する</button>
      </div>${monthReturnForm(month)}`;
  }
  return `${summary}<div class="mt-3 rounded-lg border border-emerald-200 bg-emerald-50 px-3 py-2 text-sm text-emerald-700">承認対象はありません。</div>`;
}
function renderDownloadArea(month, reports) {
  const byAssignment = {};
  for (const r of reports) {
    if (!byAssignment[r.assignment_id]) {
      byAssignment[r.assignment_id] = {assignment_id: r.assignment_id, student_name: r.student_name || '生徒', reports: []};
    }
    byAssignment[r.assignment_id].reports.push(r);
  }
  const groups = Object.values(byAssignment).filter(g =>
    g.reports.length > 0 && g.reports.every(r => r.status === 'admin_approved')
  );
  if (!groups.length) return '';
  const buttons = groups.map(g => `<div class="flex flex-wrap items-center gap-2">
    ${groups.length > 1 ? `<span class="text-sm text-slate-600">${escapeHtml(g.student_name)}：</span>` : ''}
    <a href="/api/reports/export?assignment_id=${g.assignment_id}&target_month=${month}&format=xlsx" class="inline-flex items-center px-3 py-2 bg-green-600 hover:bg-green-700 text-white text-sm rounded-lg mr-2">Excelでダウンロード</a>
    <a href="/api/reports/export?assignment_id=${g.assignment_id}&target_month=${month}&format=csv" class="inline-flex items-center px-3 py-2 bg-slate-600 hover:bg-slate-700 text-white text-sm rounded-lg">CSVでダウンロード</a>
  </div>`).join('');
  return `<div class="mt-3 flex flex-col gap-2">${buttons}</div>`;
}
function exportTargetReports(month) {
  return allReports.filter(report =>
    report.target_month === month
  );
}
function renderBulkExportLinks() {
  const month = bulkExportMonth.value || selectedMonth;
  const reports = exportTargetReports(month);
  const approved = reports.length > 0 && reports.every(report => report.status === 'admin_approved');
  if (!approved) {
    bulkExportButtons.innerHTML = '';
    return;
  }
  bulkExportButtons.innerHTML = `
    <a href="/api/reports/export?scope=all&target_month=${month}&format=xlsx" class="inline-flex items-center rounded-lg bg-green-600 px-3 py-2 text-sm text-white transition hover:bg-green-700">Excelでダウンロード</a>
    <a href="/api/reports/export?scope=all&target_month=${month}&format=csv" class="inline-flex items-center rounded-lg bg-slate-600 px-3 py-2 text-sm text-white transition hover:bg-slate-700">CSVでダウンロード</a>
  `;
}
function renderBulkExportArea() {
  const months = [...new Set(allReports.map(report => report.target_month))].filter(month => month <= currentMonth).sort().reverse();
  if (months.length && !months.includes(selectedMonth)) selectedMonth = months.includes(currentMonth) ? currentMonth : months[0];
  bulkExportMonth.innerHTML = months.map(month => `<option value="${month}">${monthOptionLabel(month)}</option>`).join('');
  bulkExportMonth.value = selectedMonth;
  bulkExportMonth.disabled = !months.length;
  renderBulkExportLinks();
}
function renderMonthSection(month, reports) {
  const sorted = sortReportsOldestFirst(reports);
  const totalMinutes = sorted.reduce((sum, report) => sum + teachingMinutes(report), 0);
  if (!sorted.length) {
    return '<div class="rounded-xl border border-slate-200 bg-white p-5 text-sm text-slate-600 shadow-sm">この月の報告書はありません。</div>';
  }
  return `<section class="overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm">
    <div class="border-b border-slate-200 bg-slate-50 px-5 py-4">
      <h2 class="font-semibold text-slate-800">${monthLabel(month)}　全${sorted.length}件 / 合計${durationLabel(totalMinutes)}${tutorLabel(sorted)}</h2>
    </div>
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead class="bg-slate-50 text-xs font-medium uppercase tracking-wide text-slate-500">
          <tr>
            <th class="px-4 py-3 text-left">回</th>
            <th class="px-4 py-3 text-left">指導日</th>
            <th class="px-4 py-3 text-left">在室時間</th>
            <th class="px-4 py-3 text-left">休憩（分）</th>
            <th class="px-4 py-3 text-left">指導時間数</th>
            <th class="px-4 py-3 text-left">科目</th>
            <th class="px-4 py-3 text-left">状態</th>
          </tr>
        </thead>
        <tbody>${renderReportRows(sorted)}</tbody>
      </table>
    </div>
    <div class="border-t border-slate-200 p-5">${renderActionArea(month, sorted)}${renderDownloadArea(month, sorted)}</div>
  </section>`;
}
function renderMonthFilter(groups) {
  const assignmentReports = allReports.filter(report => !selectedAssignmentId || report.assignment_id === selectedAssignmentId);
  const months = [...new Set(assignmentReports.map(report => report.target_month))].filter(month => month <= currentMonth).sort().reverse();
  if (months.length && !months.includes(selectedMonth)) selectedMonth = months.includes(currentMonth) ? currentMonth : months[0];
  monthFilter.innerHTML = months.map(month => `<option value="${month}">${monthOptionLabel(month)}</option>`).join('');
  monthFilter.value = selectedMonth;
  monthFilter.disabled = !months.length;
}
function renderTutorFilter() {
  const assignmentReports = allReports.filter(report => !selectedAssignmentId || report.assignment_id === selectedAssignmentId);
  const tutors = Object.values(assignmentReports.reduce((acc, report) => {
    acc[report.tutor_id] ||= {id: report.tutor_id, name: report.tutor_name || '講師'};
    return acc;
  }, {})).sort((a, b) => a.name.localeCompare(b.name, 'ja'));
  if (selectedTutorId && !tutors.some(tutor => tutor.id === selectedTutorId)) selectedTutorId = '';
  tutorFilter.innerHTML = [
    '<option value="">すべての講師</option>',
    ...tutors.map(tutor => `<option value="${tutor.id}">${escapeHtml(tutor.name)}</option>`)
  ].join('');
  tutorFilter.value = selectedTutorId;
  tutorFilter.disabled = !tutors.length;
}
function selectedAssignment() {
  return parentAssignments.find(assignment => assignment.id === selectedAssignmentId) || parentAssignments[0] || null;
}
function renderStudentTabs() {
  if (!parentAssignments.length) {
    selectedAssignmentId = '';
    studentTabs.classList.add('hidden');
    selectedStudentLabel.classList.add('hidden');
    return;
  }
  if (!selectedAssignmentId || !parentAssignments.some(assignment => assignment.id === selectedAssignmentId)) {
    selectedAssignmentId = parentAssignments[0].id;
  }
  if (parentAssignments.length <= 1) {
    studentTabs.classList.add('hidden');
    selectedStudentLabel.classList.add('hidden');
    return;
  }
  const current = selectedAssignment();
  selectedStudentLabel.textContent = `選択中の生徒：${current ? current.student_name : '未設定'}`;
  selectedStudentLabel.classList.remove('hidden');
  studentTabs.classList.remove('hidden');
  studentTabs.classList.add('flex');
  studentTabs.innerHTML = parentAssignments.map(assignment => {
    const active = assignment.id === selectedAssignmentId;
    const classes = active
      ? 'border-blue-600 bg-blue-600 text-white'
      : 'border-slate-200 bg-white text-slate-700 hover:border-blue-300 hover:text-blue-700';
    return `<button type="button" class="rounded-lg border px-4 py-2 text-sm font-medium shadow-sm transition ${classes}" onclick="selectStudent('${assignment.id}')">${escapeHtml(assignment.student_name)}</button>`;
  }).join('');
}
function renderParent() {
  renderStudentTabs();
  const reports = filteredReports();
  const groups = reports.reduce((acc, report) => ((acc[report.target_month] ||= []).push(report), acc), {});
  renderMonthFilter(groups);
  renderTutorFilter();
  renderBulkExportArea();
  parentReports.innerHTML = groups[selectedMonth]
    ? renderMonthSection(selectedMonth, groups[selectedMonth])
    : '<div class="rounded-xl border border-slate-200 bg-white p-4 text-sm text-slate-600 shadow-sm">表示できる報告書はありません。</div>';
}
function selectStudent(assignmentId) {
  selectedAssignmentId = assignmentId;
  selectedTutorId = '';
  expandedReturnMonth = null;
  const params = new URLSearchParams(location.search);
  params.set('assignment_id', selectedAssignmentId);
  params.set('month', selectedMonth);
  params.delete('tutor_id');
  location.href = `${location.pathname}?${params.toString()}`;
}
function showMonthReturnForm(month) {
  expandedReturnMonth = month;
  renderParent();
}
function hideMonthReturnForm() {
  expandedReturnMonth = null;
  renderParent();
}
async function confirmMonthReturn(month) {
  const input = document.getElementById(`returnComment-${month}`);
  const comment = input.value.trim();
  if (!comment) {
    alert('コメントを入力してください。');
    return;
  }
  const reports = filteredReports().filter(report => report.target_month === month);
  const pending = reports.filter(report => report.status === 'awaiting_parent_approval');
  if (!pending.length) return;
  await api('/api/reports/parent-return-bulk', {
    method: 'POST',
    body: JSON.stringify({report_ids: pending.map(report => report.id), target_month: month, comment})
  });
  expandedReturnMonth = null;
  await loadParent();
}
async function approvePending(month) {
  const reports = filteredReports().filter(report => report.target_month === month);
  const pending = reports.filter(report => report.status === 'awaiting_parent_approval');
  if (!pending.length) return;
  if (!confirm(`${Number(month.slice(5, 7))}月分の指導日をすべて承認します。よろしいですか？`)) return;
  await api('/api/reports/parent-approve-bulk', {
    method: 'POST',
    body: JSON.stringify({report_ids: pending.map(report => report.id), target_month: month})
  });
  window.location.href = '/parent/reports';
}
async function loadParent() {
  allReports = sortReportsOldestFirst(await api('/api/reports'));
  renderParent();
}
monthFilter.addEventListener('change', () => {
  const params = new URLSearchParams(location.search);
  params.set('month', monthFilter.value);
  if (selectedAssignmentId) params.set('assignment_id', selectedAssignmentId);
  if (selectedTutorId) params.set('tutor_id', selectedTutorId);
  else params.delete('tutor_id');
  location.href = `${location.pathname}?${params.toString()}`;
});
tutorFilter.addEventListener('change', () => {
  const params = new URLSearchParams(location.search);
  selectedTutorId = tutorFilter.value;
  params.set('month', selectedMonth);
  if (selectedAssignmentId) params.set('assignment_id', selectedAssignmentId);
  if (selectedTutorId) params.set('tutor_id', selectedTutorId);
  else params.delete('tutor_id');
  location.href = `${location.pathname}?${params.toString()}`;
});
bulkExportMonth.addEventListener('change', renderBulkExportLinks);
window.authReady.then(user => {
  if (!user) return;
  loadParent();
});
</script>
<!-- # === Phase 9 END === -->
{% endblock %}
