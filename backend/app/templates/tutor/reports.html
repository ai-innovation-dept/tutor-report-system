{% extends "base.html" %}
{% block content %}
<!-- # === Phase 9: フロントエンド ロール別画面 START === -->
<div class="mb-6 flex flex-wrap items-end justify-between gap-4">
  <div>
    <div id="studentBadge" class="inline-flex rounded-full bg-blue-100 px-3 py-1.5 text-sm font-medium text-blue-800">生徒：すべて</div>
  </div>
  <div class="flex flex-wrap items-center gap-3 rounded-xl border border-slate-200 bg-white px-4 py-3 shadow-sm">
    <label class="text-sm text-slate-700" for="monthFilter">表示月</label>
    <select id="monthFilter" class="rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20"></select>
  </div>
</div>
<div class="grid gap-4 lg:grid-cols-[1fr_380px]">
  <section class="overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm">
    <div id="bulkSubmitPanel" class="hidden border-b border-slate-200 bg-slate-50 p-5"></div>
    <div class="overflow-x-auto">
      <table class="hidden w-full text-sm md:table">
        <thead class="bg-slate-50 text-xs font-medium uppercase tracking-wide text-slate-500">
          <tr>
            <th class="px-4 py-3 text-left">回数</th>
            <th class="px-4 py-3 text-left">指導日</th>
            <th class="px-4 py-3 text-left">在室時間</th>
            <th class="px-4 py-3 text-left">休憩（分）</th>
            <th class="px-4 py-3 text-left">指導時間数</th>
            <th class="px-4 py-3 text-left">科目</th>
            <th class="px-4 py-3 text-left">状態</th>
            <th class="px-4 py-3 text-left">アクション</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
    <div id="cards" class="md:hidden divide-y"></div>
    <div id="totalTeachingTime" class="border-t border-slate-200 bg-slate-50 p-4 text-sm font-semibold text-slate-700"></div>
  </section>
  <section class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm" id="formPanel">
    <h2 class="mb-4 font-semibold text-slate-800" id="formTitle">簡易作成</h2>
    <div id="formMessage" class="mb-3 hidden rounded-lg px-3 py-2 text-sm"></div>
    <form id="reportForm" class="space-y-3">
      <input type="hidden" id="editingId">
      <label class="block text-sm">
        <span class="mb-1 flex items-center gap-2">
          <span class="text-slate-700">生徒</span>
          <span id="assignmentError" class="hidden text-xs text-red-600">※生徒を選択してください</span>
        </span>
        <select name="assignment_id" id="assignment" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20"></select>
      </label>
      <div class="rounded-lg border border-slate-200 bg-slate-50 p-3">
        <button type="button" id="copyLastButton" onclick="copyLastReport()" class="inline-flex w-full items-center justify-center gap-1.5 rounded-lg border border-blue-200 bg-blue-50 px-3 py-2 text-sm font-medium text-blue-700 transition hover:bg-blue-100">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
          前回の記入分をコピー
        </button>
        <p id="copyLastHint" class="mt-1.5 text-xs text-slate-500"></p>
      </div>
      <label class="block text-sm">
        <span class="block mb-1 text-slate-700">指導日</span>
        <input name="lesson_date" id="lessonDate" type="date" class="block h-10 w-full min-w-0 appearance-none rounded-lg border border-slate-300 px-3 py-2 text-sm leading-5 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20" required>
        <span id="lessonDateLabel" class="block mt-1 text-xs text-slate-500"></span>
      </label>
      <div class="grid grid-cols-2 gap-3 sm:gap-6">
        <div class="min-w-0">
          <label class="block mb-1 text-sm text-slate-700" for="startHour">開始時刻</label>
          <div class="flex items-center gap-1.5">
            <select id="startHour" aria-label="開始時刻（時）" class="block h-10 w-full min-w-0 rounded-lg border border-slate-300 px-2 py-2 text-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20"></select>
            <span class="text-slate-500">:</span>
            <select id="startMin" aria-label="開始時刻（分）" class="block h-10 w-full min-w-0 rounded-lg border border-slate-300 px-2 py-2 text-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20"></select>
          </div>
        </div>
        <div class="min-w-0">
          <label class="block mb-1 text-sm text-slate-700" for="endHour">終了時刻</label>
          <div class="flex items-center gap-1.5">
            <select id="endHour" aria-label="終了時刻（時）" class="block h-10 w-full min-w-0 rounded-lg border border-slate-300 px-2 py-2 text-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20"></select>
            <span class="text-slate-500">:</span>
            <select id="endMin" aria-label="終了時刻（分）" class="block h-10 w-full min-w-0 rounded-lg border border-slate-300 px-2 py-2 text-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20"></select>
          </div>
          <p id="endTimeError" class="hidden mt-1 text-xs text-red-600">終了時刻は開始時刻より後の時刻を選択してください</p>
        </div>
      </div>
      <input type="hidden" name="start_time" id="startTime">
      <input type="hidden" name="end_time" id="endTime">
      <label class="block text-sm">
        <span class="block mb-1 text-slate-700">休憩等の時間（分）</span>
        <select name="break_minutes" id="breakMinutes" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20" required></select>
      </label>
      <label class="block text-sm">
        <span class="block mb-1 text-slate-700">指導時間数</span>
        <input id="teachingMinutesLabel" type="text" value="0分" class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-slate-700" readonly>
        <span id="teachingUnitError" class="hidden mt-1 block text-xs text-red-600">指導時間数は0.5時間（30分）単位にしてください。休憩で調整できます（例：在室2時間10分＋休憩10分＝2.0時間）。</span>
      </label>
      <label class="block text-sm">
        <span class="block mb-1 text-slate-700">科目</span>
        <input name="subject" id="subject" placeholder="科目" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20">
      </label>
      <label class="block text-sm">
        <span class="block mb-1 text-slate-700">指導内容</span>
        <textarea name="content" id="content" placeholder="指導内容" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20" required></textarea>
      </label>
      <div class="flex gap-2">
        <button class="flex-1 rounded-lg bg-blue-600 px-3 py-2 font-medium text-white transition hover:bg-blue-700" id="saveButton">保存</button>
        <button type="button" class="rounded-lg border border-slate-300 px-3 py-2 font-medium text-slate-700 transition hover:bg-slate-50" onclick="resetReportForm()">取消</button>
      </div>
    </form>
  </section>
  <section class="hidden rounded-xl border border-slate-200 bg-white p-4 text-sm text-slate-600 shadow-sm" id="formUnavailablePanel"></section>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/chat.js"></script>
<script>
setBreadcrumb('講師ポータル', '報告書一覧');
const STATUS_LABELS = {
  draft: '下書き',
  awaiting_parent_approval: '保護者承認待ち',
  parent_approved: '保護者承認済み',
  returned_to_tutor: '差戻し（要修正）',
  submitted_to_admin: '運営提出済み',
  received: '受付済み',
  re_reviewed: '再鑑済み',
  admin_approved: '最終承認済み',
  returned_to_receiver: '運営内差戻し',
  closed: 'クローズ'
};
const WEEKDAYS = ['日', '月', '火', '水', '木', '金', '土'];
let allReports = [];
let allAssignments = [];
const isSubmitPage = location.pathname === '/tutor/submit';
function getCurrentMonth() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
}
const currentMonth = getCurrentMonth();
let selectedMonth = new URLSearchParams(location.search).get('month') || currentMonth;
let selectedAssignmentId = '';

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'}[ch]));
}
function statusLabel(status) { return STATUS_LABELS[status] || status; }
function timeText(value) { return (value || '').slice(0, 5); }
function dateLabel(value) {
  if (!value) return '';
  const d = new Date(`${value}T00:00:00`);
  return `${d.getMonth() + 1}月${d.getDate()}日（${WEEKDAYS[d.getDay()]}）`;
}
function monthLabel(value) {
  const [year, month] = value.split('-');
  return `${year}年${Number(month)}月分`;
}
function minutesBetween(start, end) {
  if (!start || !end) return 0;
  const [sh, sm] = start.split(':').map(Number);
  const [eh, em] = end.split(':').map(Number);
  return Math.max(0, (eh * 60 + em) - (sh * 60 + sm));
}
function teachingMinutes(report) {
  return Math.max(0, minutesBetween(timeText(report.start_time), timeText(report.end_time)) - Number(report.break_minutes || 0));
}
function durationLabel(minutes) {
  const hours = Math.floor(minutes / 60);
  const mins = minutes % 60;
  if (hours && mins) return `${hours}時間${mins}分`;
  if (hours) return `${hours}時間`;
  return `${mins}分`;
}
function statusBadge(status) {
  const label = statusLabel(status);
  if (status === 'returned_to_tutor') {
    return `<span class="inline-flex rounded-full bg-red-100 px-2.5 py-1 text-xs font-medium text-red-700">${label}</span>`;
  }
  if (status === 'draft') {
    return `<span class="inline-flex rounded-full bg-slate-100 px-2.5 py-1 text-xs font-medium text-slate-600">${label}</span>`;
  }
  if (status === 'admin_approved') {
    return `<span class="inline-flex rounded-full bg-emerald-100 px-2.5 py-1 text-xs font-medium text-emerald-700">${label}</span>`;
  }
  if (status === 'closed') {
    return `<span class="inline-flex rounded-full bg-slate-100 px-2.5 py-1 text-xs font-medium text-slate-600">${label}</span>`;
  }
  return `<span class="inline-flex rounded-full bg-blue-100 px-2.5 py-1 text-xs font-medium text-blue-700">${label}</span>`;
}
function returnComment(r) {
  if (r.status !== 'returned_to_tutor' || !r.last_return_comment) return '';
  return `<div class="mt-1 max-w-xs whitespace-pre-wrap text-xs text-red-700">差戻し理由：${escapeHtml(r.last_return_comment)}</div>`;
}
function dateTimeLabel(value) {
  if (!value) return '-';
  const d = new Date(value);
  if (Number.isNaN(d.getTime())) return '-';
  return `${d.getFullYear()}/${d.getMonth()+1}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function closeInfo(r, showActor = false) {
  if (r.status !== 'closed') return '';
  const actor = showActor && r.closed_by_name ? `<div class="mt-1 text-xs text-slate-700">操作者：${escapeHtml(r.closed_by_name)}</div>` : '';
  return `<div class="mt-2 max-w-xs rounded-lg border border-slate-200 bg-slate-50 p-3 text-xs text-slate-700">
    <div class="font-medium text-slate-800">クローズ済み</div>
    <div class="mt-1 whitespace-pre-wrap">理由：${escapeHtml(r.close_reason || '-')}</div>
    <div class="mt-1">日時：${escapeHtml(dateTimeLabel(r.closed_at))}</div>
    ${actor}
  </div>`;
}
function rowAction(r) {
  if (selectedMonth !== currentMonth) return '';
  const parts = [];
  if (r.status === 'draft') {
    parts.push(`<button class="rounded-lg bg-blue-600 px-3 py-2 text-sm font-medium text-white transition hover:bg-blue-700" onclick="editReport('${r.id}')">編集</button>`);
    parts.push(`<button class="rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm font-medium text-red-700 transition hover:bg-red-100" onclick="deleteReport('${r.id}')">削除</button>`);
  } else if (r.status === 'returned_to_tutor') {
    parts.push(`<button class="rounded-lg bg-blue-600 px-3 py-2 text-sm font-medium text-white transition hover:bg-blue-700" onclick="editReport('${r.id}')">編集</button>`);
    parts.push(`<button class="rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm font-medium text-red-700 transition hover:bg-red-100" onclick="deleteReport('${r.id}')">削除</button>`);
    parts.push('<span class="text-xs text-slate-500">承認管理から再依頼できます</span>');
  }
  return parts.length ? `<div class="flex flex-wrap gap-2">${parts.join('')}</div>` : '';
}
function selectedAssignment() {
  return allAssignments.find(a => a.id === selectedAssignmentId);
}
function selectedAssignmentApproved() {
  if (!selectedAssignmentId) return false;
  return allReports.some(r => r.target_month === currentMonth && r.assignment_id === selectedAssignmentId && r.status === 'admin_approved');
}
function selectedAssignmentInProgress() {
  if (!selectedAssignmentId) return false;
  const inProgressStatuses = [
    'awaiting_parent_approval', 'parent_approved',
    'submitted_to_admin', 'received', 're_reviewed',
    'returned_to_tutor', 'returned_to_receiver'
  ];
  return allReports.some(r =>
    r.target_month === currentMonth &&
    r.assignment_id === selectedAssignmentId &&
    inProgressStatuses.includes(r.status)
  );
}
function filteredReports() {
  return allReports.filter(r => {
    const monthMatches = isSubmitPage || r.target_month === selectedMonth;
    const assignmentMatches = !selectedAssignmentId || r.assignment_id === selectedAssignmentId;
    return monthMatches && assignmentMatches;
  });
}
function updateStudentBadge() {
  const current = selectedAssignment();
  studentBadge.textContent = `生徒：${current ? current.student_name : 'すべて'}`;
}
function renderCurrentList() {
  const visible = isSubmitPage
    ? allReports.filter(r => r.status === 'parent_approved' && (!selectedAssignmentId || r.assignment_id === selectedAssignmentId))
    : filteredReports();
  renderRows(visible);
}
function renderFormAvailability() {
  if (isSubmitPage) {
    formPanel.classList.add('hidden');
    formUnavailablePanel.classList.add('hidden');
    return;
  }
  if (!selectedAssignmentId) {
    formPanel.classList.remove('hidden');
    formUnavailablePanel.classList.add('hidden');
    setReportInputsDisabled(true);
    document.getElementById('assignmentError').classList.remove('hidden');
    return;
  } else {
    document.getElementById('assignmentError').classList.add('hidden');
  }
  let message = '';
  if (selectedMonth !== currentMonth) {
    message = '過去月は参照のみです';
  } else if (selectedAssignmentApproved()) {
    message = '当月分は最終承認済みです。追加修正は運営への差戻し依頼が必要です。';
  } else if (selectedAssignmentInProgress()) {
    message = '当月分の報告書がすでに進行中です。';
  }
  formPanel.classList.remove('hidden');
  formUnavailablePanel.classList.add('hidden');
  formUnavailablePanel.textContent = '';
  setReportInputsDisabled(Boolean(message));
  if (message) {
    showFormMessage(message);
  } else if (!editingId.value) {
    clearFormMessage();
  }
}
function showFormMessage(message, isError = false) {
  formMessage.textContent = message;
  formMessage.className = `mb-3 rounded-lg px-3 py-2 text-sm ${isError ? 'border border-rose-200 bg-rose-50 text-rose-700' : 'border border-emerald-200 bg-emerald-50 text-emerald-700'}`;
}
function clearFormMessage() {
  formMessage.className = 'mb-3 hidden rounded-lg px-3 py-2 text-sm';
  formMessage.textContent = '';
}
function setEndTimeDisabled(disabled) {
  [endHour, endMin].forEach(el => {
    el.disabled = disabled;
    el.classList.toggle('opacity-50', disabled);
    el.classList.toggle('cursor-not-allowed', disabled);
  });
}
let reportInputsDisabled = true;
function setReportInputsDisabled(disabled) {
  reportInputsDisabled = disabled;
  [lessonDate, startHour, startMin, endHour, endMin, breakMinutes, subject, content, saveButton].forEach(el => {
    el.disabled = disabled;
  });
  saveButton.classList.toggle('opacity-50', disabled);
  saveButton.classList.toggle('cursor-not-allowed', disabled);
  if (!disabled) setEndTimeDisabled(!startTime.value);
  updateCopyLastButton();
}
function reportSummary(r) {
  return `${dateLabel(r.lesson_date)} ${timeText(r.start_time)} ～ ${timeText(r.end_time)} ${durationLabel(teachingMinutes(r))} ${r.subject || ''}`;
}
function renderRows(reports) {
  const totalMinutes = reports.reduce((sum, r) => sum + teachingMinutes(r), 0);
  rows.innerHTML = reports.map((r, index) => `<tr class="border-t border-slate-100 hover:bg-slate-50">
    <td class="px-4 py-3">${index + 1}</td>
    <td class="px-4 py-3">${dateLabel(r.lesson_date)}</td>
    <td class="px-4 py-3">${timeText(r.start_time)} ～ ${timeText(r.end_time)}</td>
    <td class="px-4 py-3">${Number(r.break_minutes || 0)}分</td>
    <td class="px-4 py-3">${durationLabel(teachingMinutes(r))}</td>
    <td class="px-4 py-3">${escapeHtml(r.subject || '')}</td>
    <td class="px-4 py-3">${statusBadge(r.status)}${returnComment(r)}${closeInfo(r)}</td>
    <td class="px-4 py-3 align-middle">${rowAction(r)}</td>
  </tr>`).join('');
  cards.innerHTML = reports.map((r, index) => `<div class="p-4">
    <div class="flex flex-wrap items-start justify-between gap-2">
      <div class="font-medium text-slate-800">${index + 1}回目 ${reportSummary(r)}</div>
      ${statusBadge(r.status)}
    </div>
    ${returnComment(r)}
    ${closeInfo(r)}
    <div class="mt-3">${rowAction(r)}</div>
  </div>`).join('');
  totalTeachingTime.textContent = `合計指導時間：${durationLabel(totalMinutes)}`;
}
function renderBulkSubmit(reports) {
  if (!isSubmitPage) {
    bulkSubmitPanel.classList.add('hidden');
    return;
  }
  const eligible = reports.filter(r => r.target_month === currentMonth && r.status === 'parent_approved');
  const groups = eligible.reduce((acc, r) => ((acc[r.assignment_id] ||= []).push(r), acc), {});
  bulkSubmitPanel.classList.remove('hidden');
  bulkSubmitPanel.innerHTML = Object.keys(groups).length
    ? Object.entries(groups).map(([assignmentId, items]) => {
        const assignmentName = allAssignments.find(a => a.id === assignmentId)?.student_name || '生徒未設定';
        return `<div class="flex flex-col gap-3 rounded-lg border border-slate-200 bg-white p-4 md:flex-row md:items-center md:justify-between">
        <div class="font-medium text-slate-800">${escapeHtml(assignmentName)} <span class="text-sm text-slate-500">${monthLabel(currentMonth)} ${items.length}件</span></div>
        <button class="rounded-lg bg-blue-600 px-3 py-2 text-sm font-medium text-white transition hover:bg-blue-700" onclick="submitAssignment('${assignmentId}')">まとめて提出</button>
      </div>`;
      }).join('')
    : '<div class="text-sm text-slate-600">当月分で運営へ提出できる報告書はありません。</div>';
}
async function loadTutor() {
  const [reports, assignments] = await Promise.all([api('/api/reports'), api('/api/assignments')]);
  allReports = sortReportsOldestFirst(reports);
  allAssignments = assignments;
  renderAssignmentOptions();
  renderMonthFilter();
  updateStudentBadge();
  setBreadcrumb('講師ポータル', isSubmitPage ? '運営へ提出' : '報告書一覧');
  renderCurrentList();
  renderBulkSubmit(allReports);
  renderFormAvailability();
  if (location.pathname === '/tutor/reports/new') {
    resetReportForm(false);
    formPanel.scrollIntoView({behavior: 'smooth', block: 'start'});
  }
}
function renderAssignmentOptions() {
  const options = ['<option value="">すべての生徒</option>', ...allAssignments.map(a => `<option value="${a.id}">${escapeHtml(a.student_name)}</option>`)];
  assignment.innerHTML = options.join('');
  if (selectedAssignmentId && allAssignments.some(a => a.id === selectedAssignmentId)) {
    assignment.value = selectedAssignmentId;
  } else {
    assignment.value = '';
    selectedAssignmentId = '';
  }
}
function renderMonthFilter() {
  const months = [...new Set([...allReports.map(r => r.target_month), currentMonth])]
    .filter(month => month <= currentMonth)
    .sort()
    .reverse();
  if (!months.includes(selectedMonth)) selectedMonth = months.includes(currentMonth) ? currentMonth : (months[0] || currentMonth);
  monthFilter.innerHTML = months.map(month => `<option value="${month}">${monthLabel(month)}</option>`).join('');
  monthFilter.value = selectedMonth;
}
function sortReportsOldestFirst(reports) {
  return [...reports].sort((a, b) => {
    const dateCompare = a.lesson_date.localeCompare(b.lesson_date);
    if (dateCompare !== 0) return dateCompare;
    return timeText(a.start_time).localeCompare(timeText(b.start_time));
  });
}
function formPayload() {
  const data = Object.fromEntries(new FormData(reportForm));
  data.break_minutes = Number(data.break_minutes || 0);
  return data;
}
function updateComputedFields() {
  lessonDateLabel.textContent = dateLabel(lessonDate.value);
  const raw = minutesBetween(startTime.value, endTime.value) - Number(breakMinutes.value || 0);
  const minutes = Number.isFinite(raw) ? Math.max(0, raw) : 0;
  teachingMinutesLabel.value = durationLabel(minutes);
  validateTeachingUnit();
}
// 指導時間確認票の記入単位に合わせ、指導時間数（=終了−開始−休憩）は0.5時間（30分）単位とする。
// 入力（開始・終了・休憩）は5分単位のまま、休憩で30分単位に調整する運用。倍数でなければ保存不可。
function validateTeachingUnit() {
  const hasValidTimes = Boolean(startTime.value && endTime.value && endTime.value > startTime.value);
  const minutes = hasValidTimes ? Math.max(0, minutesBetween(startTime.value, endTime.value) - Number(breakMinutes.value || 0)) : 0;
  const invalid = hasValidTimes && (minutes <= 0 || minutes % 30 !== 0);
  breakMinutes.setCustomValidity(invalid ? '指導時間数を0.5時間（30分）単位にしてください。休憩で調整できます。' : '');
  teachingUnitError.classList.toggle('hidden', !invalid);
  teachingMinutesLabel.classList.toggle('border-red-500', invalid);
  teachingMinutesLabel.classList.toggle('text-red-600', invalid);
  teachingMinutesLabel.classList.toggle('border-slate-200', !invalid);
}
// 開始・終了・休憩を5分単位の選択式（PC=ドロップダウン／スマホ=ドラムロール）にする。
// 表示は「時(0-23)」「分(5分刻み)」のselectだが、APIへは従来どおり start_time/end_time(HH:MM)・break_minutes(数値)で送る。
function buildTimeSelectOptions() {
  const pad = n => String(n).padStart(2, '0');
  const hourOptions = ['<option value="">--</option>', ...Array.from({length: 24}, (_, h) => `<option value="${pad(h)}">${pad(h)}</option>`)].join('');
  const minuteOptions = ['<option value="">--</option>', ...Array.from({length: 12}, (_, i) => `<option value="${pad(i * 5)}">${pad(i * 5)}</option>`)].join('');
  startHour.innerHTML = endHour.innerHTML = hourOptions;
  startMin.innerHTML = endMin.innerHTML = minuteOptions;
  breakMinutes.innerHTML = Array.from({length: 37}, (_, i) => `<option value="${i * 5}">${i * 5}分</option>`).join('');
  breakMinutes.value = '0';
}
function syncStartTime() {
  startTime.value = (startHour.value !== '' && startMin.value !== '') ? `${startHour.value}:${startMin.value}` : '';
}
function syncEndTime() {
  endTime.value = (endHour.value !== '' && endMin.value !== '') ? `${endHour.value}:${endMin.value}` : '';
}
// 既存データの時刻をselectに反映。5分単位でない分は最寄りの5分に寄せる（保存は0.5時間単位必須のため調整前提）。
function setTimeSelects(hourSel, minSel, value) {
  const text = timeText(value);
  if (text && text.includes(':')) {
    const [h, m] = text.split(':');
    hourSel.value = h;
    minSel.value = [...minSel.options].some(o => o.value === m) ? m : String(Math.min(55, Math.round(Number(m) / 5) * 5)).padStart(2, '0');
  } else {
    hourSel.value = '';
    minSel.value = '';
  }
}
function snapBreakMinutes(value) {
  return String(Math.min(180, Math.max(0, Math.round(Number(value || 0) / 5) * 5)));
}
function resetReportForm(keepAssignment = false) {
  const currentAssignment = assignment.value;
  reportForm.reset();
  editingId.value = '';
  startHour.value = ''; startMin.value = '';
  endHour.value = ''; endMin.value = '';
  breakMinutes.value = '0';
  syncStartTime();
  syncEndTime();
  if (keepAssignment) {
    assignment.value = currentAssignment;
  }
  selectedAssignmentId = assignment.value || selectedAssignmentId;
  updateStudentBadge();
  formTitle.textContent = '簡易作成';
  saveButton.textContent = '保存';
  setEndTimeDisabled(true);
  updateComputedFields();
  updateCopyLastButton();
}
// 前回コピー: 選択中の生徒の直近の報告書（編集中の報告書自身は除く）をコピー元とする。
// allReports は loadTutor() で全月分が古い順に入っているため、末尾の該当データが「前回」。
function lastReportForAssignment(assignmentId) {
  if (!assignmentId) return null;
  const candidates = allReports.filter(r => r.assignment_id === assignmentId && r.id !== editingId.value);
  return candidates.length ? candidates[candidates.length - 1] : null;
}
function updateCopyLastButton() {
  const source = lastReportForAssignment(assignment.value);
  const disabled = reportInputsDisabled || !source;
  copyLastButton.disabled = disabled;
  copyLastButton.classList.toggle('opacity-50', disabled);
  copyLastButton.classList.toggle('cursor-not-allowed', disabled);
  if (!assignment.value) {
    copyLastHint.textContent = '生徒を選択するとコピーできます';
  } else if (!source) {
    copyLastHint.textContent = 'コピーできる前回の報告書はありません';
  } else {
    copyLastHint.textContent = `前回：${reportSummary(source)}`;
  }
}
// 指導日はコピーしない（当月分のみ作成可のため）。コピー後は指導日の入力へ誘導する。
function copyLastReport() {
  const source = lastReportForAssignment(assignment.value);
  if (!source || copyLastButton.disabled) return;
  if ((subject.value.trim() || content.value.trim()) && !confirm('入力中の科目・指導内容を前回の内容で上書きします。よろしいですか。')) return;
  setTimeSelects(startHour, startMin, source.start_time);
  syncStartTime();
  setEndTimeDisabled(!startTime.value);
  setTimeSelects(endHour, endMin, source.end_time);
  syncEndTime();
  breakMinutes.value = snapBreakMinutes(source.break_minutes);
  subject.value = source.subject || '';
  content.value = source.content || '';
  validateEndTime();
  updateComputedFields();
  showFormMessage(`前回（${dateLabel(source.lesson_date)}）の内容をコピーしました。指導日を確認して保存してください。`);
  if (!lessonDate.value) lessonDate.focus();
}
function editReport(id) {
  const r = allReports.find(item => item.id === id);
  if (!r) return;
  editingId.value = r.id;
  selectedAssignmentId = r.assignment_id;
  assignment.value = r.assignment_id;
  lessonDate.value = r.lesson_date;
  setTimeSelects(startHour, startMin, r.start_time);
  syncStartTime();
  setEndTimeDisabled(!startTime.value);
  setTimeSelects(endHour, endMin, r.end_time);
  syncEndTime();
  breakMinutes.value = snapBreakMinutes(r.break_minutes);
  subject.value = r.subject || '';
  content.value = r.content || '';
  formTitle.textContent = `編集中：${dateLabel(r.lesson_date)}`;
  saveButton.textContent = '保存';
  updateComputedFields();
  updateCopyLastButton();
  formPanel.scrollIntoView({behavior: 'smooth', block: 'start'});
}
async function deleteReport(id) {
  if (!confirm('この報告書を削除しますか。')) return;
  await api(`/api/reports/${id}`, {method:'DELETE'});
  await loadTutor();
}
async function submitToParent(id) {
  await api(`/api/reports/${id}/submit-to-parent`, {method:'POST', body:JSON.stringify({})});
  await loadTutor();
}
async function submitToAdmin(id) {
  await api(`/api/reports/${id}/submit-to-admin`, {method:'POST', body:JSON.stringify({})});
  await loadTutor();
}
async function submitAssignment(assignmentId) {
  const ids = allReports.filter(r => r.target_month === currentMonth && r.assignment_id === assignmentId && r.status === 'parent_approved').map(r => r.id);
  await api('/api/reports/submit-to-admin-bulk', {method:'POST', body:JSON.stringify({report_ids: ids, target_month: currentMonth})});
  await loadTutor();
}
reportForm.addEventListener('submit', async e => {
  e.preventDefault();
  const payload = formPayload();
  clearFormMessage();
  // 改修1C: フロントエンド時刻バリデーション
  if (!payload.start_time || !payload.end_time) {
    showFormMessage('開始時刻と終了時刻を選択してください', true);
    return;
  }
  if (payload.end_time <= payload.start_time) {
    validateEndTime();
    return;
  }
  try {
    if (editingId.value) {
      delete payload.assignment_id;
      await api(`/api/reports/${editingId.value}`, {method:'PATCH', body: JSON.stringify(payload), suppressFlash: true});
      showFormMessage('報告書を更新しました');
    } else {
      if (!payload.assignment_id) {
        throw new Error('生徒を選択してください');
      }
      await api('/api/reports', {method:'POST', body: JSON.stringify(payload), suppressFlash: true});
      showFormMessage('報告書を作成しました');
    }
    await loadTutor();
    resetReportForm(true);
  } catch (error) {
    let msg = error.message;
    try { msg = JSON.parse(msg).detail || msg; } catch (_) {}
    showFormMessage(`作成に失敗しました：${msg}`, true);
    return;
  }
});
assignment.addEventListener('change', () => {
  selectedAssignmentId = assignment.value;
  updateStudentBadge();
  renderCurrentList();
  renderFormAvailability();
});
monthFilter.addEventListener('change', () => {
  selectedMonth = monthFilter.value;
  renderCurrentList();
  renderFormAvailability();
});
// 改修1A/1B: 開始時刻に連動して終了時刻の disabled / クリアを制御
function onStartChange() {
  syncStartTime();
  if (startTime.value) {
    setEndTimeDisabled(false);
    if (endTime.value && endTime.value <= startTime.value) {
      endHour.value = '';
      endMin.value = '';
      syncEndTime();
    }
  } else {
    endHour.value = '';
    endMin.value = '';
    syncEndTime();
    setEndTimeDisabled(true);
  }
  validateEndTime();
  updateComputedFields();
}
// 改修1B: 終了時刻が開始時刻以前の場合はエラーメッセージを表示してフォーム送信をブロック
function validateEndTime() {
  const invalid = Boolean(startTime.value && endTime.value && endTime.value <= startTime.value);
  endTimeError.classList.toggle('hidden', !invalid);
  [endHour, endMin].forEach(el => {
    el.classList.toggle('border-red-500', invalid);
    el.classList.toggle('border-slate-300', !invalid);
  });
}
function onEndChange() {
  syncEndTime();
  validateEndTime();
  updateComputedFields();
}
startHour.addEventListener('change', onStartChange);
startMin.addEventListener('change', onStartChange);
endHour.addEventListener('change', onEndChange);
endMin.addEventListener('change', onEndChange);
breakMinutes.addEventListener('change', updateComputedFields);
lessonDate.addEventListener('input', updateComputedFields);
buildTimeSelectOptions();
window.authReady.then(user => {
  if (!user) return;
  loadTutor();
});
</script>
