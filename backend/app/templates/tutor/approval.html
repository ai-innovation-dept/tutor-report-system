{% extends "base.html" %}
{% block content %}
<!-- # === Phase 9: フロントエンド ロール別画面 START === -->
<section class="mb-4 rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
  <h2 class="font-semibold text-slate-800">エクスポート</h2>
  <div class="mt-3 flex flex-wrap items-end gap-3">
    <label class="text-sm">
      <span class="mb-1 block text-slate-700">月</span>
      <select id="exportMonth" class="rounded-lg border border-slate-300 px-3 py-2 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20"></select>
    </label>
    <a id="bulkExportPdf" class="inline-flex items-center rounded-lg bg-green-600 px-3 py-2 text-sm text-white hover:bg-green-700" href="#">指導時間確認票PDF</a>
    <a id="bulkExportDailyPdf" class="inline-flex items-center rounded-lg bg-teal-600 px-3 py-2 text-sm text-white hover:bg-teal-700" href="#">指導日報PDF</a>
    <a id="bulkExportMonthlyPdf" class="hidden items-center rounded-lg bg-indigo-600 px-3 py-2 text-sm text-white hover:bg-indigo-700" href="#">指導月報PDF</a>
    <span id="exportWarning" class="text-sm text-rose-700"></span>
  </div>
  <p class="mt-2 text-xs text-slate-500">最終承認済みの生徒のみダウンロード可能</p>
</section>
<div id="approvalMonths" class="grid gap-4"></div>
{% endblock %}
{% block scripts %}
<script>
setBreadcrumb('講師ポータル', '承認管理');
const WEEKDAYS = ['日', '月', '火', '水', '木', '金', '土'];
const STEPS = [
  {key: 'request', label: '保護者へ依頼'},
  {key: 'parent', label: '保護者 承認'},
  {key: 'adminApprove', label: '運営 承認'}
];
const PHASE_CURRENT_STEP = {
  recording: 0,
  returned: 1,
  awaiting_parent: 1,
  parent_approved: 2,
  submitted_to_admin: 2,
  received: 2,
  re_reviewed: 2,
  completed: 3,
  closed: 3
};
const STATUS_LABELS = {
  draft: '下書き',
  awaiting_parent_approval: '保護者承認待ち',
  parent_approved: '保護者承認済み',
  returned_to_tutor: '差戻し（要修正）',
  submitted_to_admin: '受付待ち',
  received: '受付済み',
  re_reviewed: '再鑑済み',
  admin_approved: '最終承認済み',
  closed: 'クローズ'
};
let allReports = [];
let allAssignments = [];
let groups = [];
// 指導月報の存在キー（`assignment_id|target_month`）。月報PDFボタンは作成済みの担当×月のみ表示する。
let monthlyKeys = new Set();
function hasMonthly(assignmentId, month) { return monthlyKeys.has(`${assignmentId}|${month}`); }

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'}[ch]));
}
function monthLabel(value) {
  const [year, month] = value.split('-');
  return `${year}年${Number(month)}月分`;
}
function durationLabel(minutes) {
  const hours = Math.floor(minutes / 60);
  const mins = minutes % 60;
  if (hours && mins) return `${hours}時間${mins}分`;
  if (hours) return `${hours}時間`;
  return `${mins}分`;
}
function dateLabel(value) {
  const d = new Date(`${value}T00:00:00`);
  return `${d.getMonth() + 1}月${d.getDate()}日（${WEEKDAYS[d.getDay()]}）`;
}
function timeLabel(value, fallback = '') {
  if (!value) return fallback;
  const d = new Date(value);
  if (Number.isNaN(d.getTime())) return fallback;
  return `${d.getMonth() + 1}/${d.getDate()} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
}
function statusLabel(status) { return STATUS_LABELS[status] || status; }
function currentMonth() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
}
function timeText(value) { return (value || '').slice(0, 5); }
function minutesBetween(start, end) {
  if (!start || !end) return 0;
  const [sh, sm] = start.split(':').map(Number);
  const [eh, em] = end.split(':').map(Number);
  return Math.max(0, (eh * 60 + em) - (sh * 60 + sm));
}
function teachingMinutes(report) {
  return Math.max(0, minutesBetween(timeText(report.start_time), timeText(report.end_time)) - Number(report.break_minutes || 0));
}
function latest(values) {
  return values.filter(Boolean).sort().at(-1) || null;
}
function earliest(values) {
  return values.filter(Boolean).sort()[0] || null;
}
function reportIds(group, status) {
  return group.reports.filter(r => r.status === status).map(r => r.id);
}
function reportIdsForParentSubmit(group) {
  return group.reports
    .filter(r => ['draft', 'returned_to_tutor'].includes(r.status))
    .map(r => r.id);
}
function returnedReportIds(group) {
  return group.reports.filter(r => r.status === 'returned_to_tutor').map(r => r.id);
}
function monthlyPhase(reports) {
  const statuses = reports.map(report => report.status);
  const ranks = statuses.map(status => ({
    draft: 0,
    returned_to_tutor: 0,
    awaiting_parent_approval: 1,
    parent_approved: 2,
    submitted_to_admin: 3,
    received: 4,
    re_reviewed: 5,
    admin_approved: 6,
    closed: 7
  }[status] ?? 0));
  if (statuses.includes('returned_to_tutor')) return 'returned';
  if (statuses.length && statuses.every(status => status === 'closed')) return 'closed';
  if (statuses.length && statuses.every(status => status === 'admin_approved')) return 'completed';
  if (statuses.length && ranks.every(rank => rank >= 5)) return 're_reviewed';
  if (statuses.length && ranks.every(rank => rank >= 4)) return 'received';
  if (statuses.length && ranks.every(rank => rank >= 3)) return 'submitted_to_admin';
  if (statuses.length && ranks.every(rank => rank >= 2)) return 'parent_approved';
  if (statuses.length && ranks.every(rank => rank >= 1)) return 'awaiting_parent';
  return 'recording';
}
function buildGroup(assignment, reports) {
  const sorted = [...reports].sort((a, b) => {
    const dateCompare = a.lesson_date.localeCompare(b.lesson_date);
    if (dateCompare !== 0) return dateCompare;
    return timeText(a.start_time).localeCompare(timeText(b.start_time));
  });
  return {
    assignment_id: assignment?.id || sorted[0]?.assignment_id,
    student_name: assignment?.student_name || '生徒未設定',
    parent_id: assignment?.parent_id || sorted[0]?.parent_id || null,
    parent_display_name: assignment?.parent_display_name || '',
    parent_no: assignment?.parent_no || '',
    skip_parent_approval: sorted.some(report => report.skip_parent_approval),
    target_month: currentMonth(),
    reports: sorted,
    phase: monthlyPhase(sorted),
    total_count: sorted.length,
    total_minutes: sorted.reduce((sum, report) => sum + teachingMinutes(report), 0),
    submitted_to_parent_at: latest(sorted.map(report => report.submitted_to_parent_at)),
    first_submitted_to_parent_at: earliest(sorted.map(report => report.submitted_to_parent_at)),
    parent_approved_at: latest(sorted.map(report => report.parent_approved_at)),
    submitted_to_admin_at: latest(sorted.map(report => report.submitted_to_admin_at)),
    admin_approved_at: latest(sorted.map(report => report.admin_approved_at)),
    can_submit_to_parent: sorted.length > 0 && sorted.every(report => ['draft', 'returned_to_tutor'].includes(report.status)),
  };
}
function stepTimestamp(group, index) {
  if (index === 0) return group.first_submitted_to_parent_at || group.submitted_to_parent_at;
  if (index === 1) return group.parent_approved_at;
  if (index === 2) return group.admin_approved_at;
  return null;
}
function stepState(group, index) {
  const current = PHASE_CURRENT_STEP[group.phase] ?? 0;
  if (group.phase === 'completed') return 'done';
  if (index < current) return 'done';
  if (index === current) return 'current';
  return 'todo';
}
function circleClass(state) {
  if (state === 'done') return 'bg-emerald-600 border-emerald-600 text-white';
  if (state === 'current') return 'bg-blue-600 border-blue-600 text-white';
  return 'bg-white border-dashed border-slate-300 text-slate-400';
}
function connectorClass(group, index) {
  const leftDone = stepState(group, index) === 'done';
  const rightDone = stepState(group, index + 1) === 'done';
  return leftDone && rightDone ? 'border-emerald-500 text-emerald-600' : 'border-dashed border-slate-300 text-slate-400';
}
function renderStepper(group) {
  return `<div class="mt-5 overflow-x-auto">
    <div class="grid min-w-[480px] grid-cols-[repeat(5,minmax(0,1fr))] items-start gap-2">
    ${STEPS.map((step, index) => {
      const state = stepState(group, index);
      const icon = state === 'done' ? '✓' : (state === 'current' ? '⏱' : '');
      const connector = index < STEPS.length - 1
        ? `<div class="pt-5 text-center"><div class="border-t-2 ${connectorClass(group, index)}"></div><div class="${connectorClass(group, index)} text-lg leading-none">→</div></div>`
        : '';
      return `<div class="text-center">
          <div class="mx-auto flex h-10 w-10 items-center justify-center rounded-full border-2 text-sm font-semibold ${circleClass(state)}">${icon}</div>
          <div class="mt-2 text-sm font-medium">${step.label}</div>
          <div class="mt-1 min-h-5 text-xs text-slate-500">${timeLabel(stepTimestamp(group, index), state === 'todo' ? '' : '-')}</div>
          ${state === 'current' ? '<div class="mt-1 inline-block rounded-full bg-blue-100 px-2 py-0.5 text-xs text-blue-700">現在</div>' : ''}
        </div>${connector}`;
    }).join('')}
    </div>
  </div>`;
}
function exportButtons(group) {
  if (group.phase !== 'completed') return '';
  const query = `assignment_id=${group.assignment_id}&target_month=${group.target_month}`;
  const monthlyButton = hasMonthly(group.assignment_id, group.target_month)
    ? `<a href="/api/reports/export-monthly?${query}" class="inline-flex items-center px-3 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm rounded-lg">指導月報PDF</a>`
    : '';
  return `<div class="mt-3 flex flex-wrap gap-2">
    <a href="/api/reports/export?${query}&format=pdf" class="inline-flex items-center px-3 py-2 bg-green-600 hover:bg-green-700 text-white text-sm rounded-lg">指導時間確認票PDF</a>
    <a href="/api/reports/export-daily?${query}" class="inline-flex items-center px-3 py-2 bg-teal-600 hover:bg-teal-700 text-white text-sm rounded-lg">指導日報PDF</a>
    ${monthlyButton}
  </div>`;
}
function renderBulkExportArea() {
  const months = [...new Set(allReports.map(report => report.target_month))].sort().reverse();
  exportMonth.innerHTML = months.map(month => `<option value="${month}">${monthLabel(month)}</option>`).join('');
  exportMonth.value = currentMonth();
  exportMonth.disabled = !months.length;
  renderBulkExportLinks();
}
function setBulkExportEnabled(enabled, message = '') {
  for (const link of [bulkExportPdf, bulkExportDailyPdf, bulkExportMonthlyPdf]) {
    link.classList.toggle('pointer-events-none', !enabled);
    link.classList.toggle('opacity-50', !enabled);
    if (!enabled) link.removeAttribute('href');
  }
  exportWarning.textContent = message;
}
function renderBulkExportLinks() {
  const month = exportMonth.value || currentMonth();
  let targetGroups = groups;
  const params = new URLSearchParams({scope: 'all', target_month: month, format: 'pdf'});
  // 指導月報PDF（一括）は、その月に月報が1件でも作成済みの場合のみ表示する。
  const anyMonthly = [...monthlyKeys].some(key => key.endsWith(`|${month}`));
  bulkExportMonthlyPdf.classList.toggle('hidden', !anyMonthly);
  bulkExportMonthlyPdf.classList.toggle('inline-flex', anyMonthly);
  const exportable = targetGroups.length > 0 && targetGroups.every(group => group.phase === 'completed');
  if (!exportable) {
    setBulkExportEnabled(false, '未承認の生徒が含まれています');
    return;
  }
  setBulkExportEnabled(true);
  bulkExportPdf.href = `/api/reports/export?${params.toString()}`;
  bulkExportDailyPdf.href = `/api/reports/export-daily?${new URLSearchParams({scope: 'all', target_month: month}).toString()}`;
  bulkExportMonthlyPdf.href = `/api/reports/export-monthly?${new URLSearchParams({scope: 'all', target_month: month}).toString()}`;
}
function actionArea(group) {
  if (group.phase === 'completed') {
    return `<div class="mt-5 rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-700">最終承認済み（${timeLabel(group.admin_approved_at, '-')}）<br>追加修正が必要な場合は運営へ差戻しを依頼してください。</div>${exportButtons(group)}`;
  }
  if (['parent_approved', 'submitted_to_admin'].includes(group.phase)) {
    return '<div class="mt-5 rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-700">運営確認中</div>';
  }
  if (group.phase === 'received') {
    return '<div class="mt-5 rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-700">受付済み</div>';
  }
  if (group.phase === 're_reviewed') {
    return '<div class="mt-5 rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-700">再鑑済み</div>';
  }
  if (!group.skip_parent_approval && !group.parent_id && group.can_submit_to_parent) {
    return '<div class="mt-5 rounded-xl border border-amber-200 bg-amber-50 px-3 py-2 text-sm text-amber-800">保護者が未設定のため承認依頼できません。</div>';
  }
  if (group.phase === 'returned') {
    if (!group.skip_parent_approval && !group.parent_id) {
      return '<div class="mt-5 rounded-xl border border-amber-200 bg-amber-50 px-3 py-2 text-sm text-amber-800">保護者が未設定のため再依頼できません。</div>';
    }
    const label = group.skip_parent_approval ? '修正済みの報告書を運営へまとめて再提出' : '修正済みの報告書を保護者へまとめて再依頼';
    return `<div class="mt-5 flex flex-wrap items-center gap-3">
      <button class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white transition hover:bg-blue-700" onclick="resendReturnedReports('${group.assignment_id}')">${label}</button>
      <a class="text-sm text-rose-700 underline" href="/tutor/reports?month=${group.target_month}">報告書を修正する</a>
    </div>`;
  }
  if (group.can_submit_to_parent) {
    const label = group.skip_parent_approval ? '運営へ提出' : '保護者へまとめて承認依頼';
    return `<div class="mt-5">
      <button class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white transition hover:bg-blue-700" onclick="submitToParentGroup('${group.assignment_id}')">${label}</button>
    </div>`;
  }
  if (group.phase === 'recording') {
    return '<button class="mt-5 rounded-lg bg-slate-200 px-4 py-2 text-sm font-medium text-slate-500" disabled>まだ記録中の指導日があります</button>';
  }
  if (group.phase === 'awaiting_parent') {
    return '<button class="mt-5 rounded-lg bg-slate-200 px-4 py-2 text-sm font-medium text-slate-500" disabled>保護者の承認を待っています</button>';
  }
  return '';
}
function summaryGrid(group) {
  // 承認依頼前（下書き=recording／差戻し中=returned）は「依頼日時＝作成中／承認日時＝-」。
  // 依頼後（awaiting_parent 以降）は依頼日時を表示し、未承認なら「承認待ち」。
  // 保護者承認をスキップする場合、保護者は承認に関与しないため依頼・承認日時は「-」固定とし、
  // 未承認の「承認待ち」表示は運営承認日時へ出す（運営へ提出済み＝運営の承認待ち）。
  const preRequest = group.phase === 'recording' || group.phase === 'returned';
  const skip = group.skip_parent_approval;
  const requestedAt = group.first_submitted_to_parent_at || group.submitted_to_parent_at;
  const requestCell = skip ? '-' : (preRequest ? '作成中' : (requestedAt ? timeLabel(requestedAt) : '作成中'));
  const approveCell = skip ? '-' : (preRequest ? '-' : (group.parent_approved_at ? timeLabel(group.parent_approved_at) : '承認待ち'));
  const adminApproveCell = group.admin_approved_at
    ? timeLabel(group.admin_approved_at)
    : (skip && !preRequest ? '承認待ち' : '-');
  return `<div class="mt-5 grid gap-3 sm:grid-cols-3">
    <div class="rounded-xl border border-slate-200 bg-slate-50 p-3"><div class="text-xs font-medium text-slate-500">保護者へ依頼日時</div><div class="font-medium text-slate-800">${requestCell}</div></div>
    <div class="rounded-xl border border-slate-200 bg-slate-50 p-3"><div class="text-xs font-medium text-slate-500">保護者 承認日時</div><div class="font-medium text-slate-800">${approveCell}</div></div>
    <div class="rounded-xl border border-slate-200 bg-slate-50 p-3"><div class="text-xs font-medium text-slate-500">運営 承認日時</div><div class="font-medium text-slate-800">${adminApproveCell}</div></div>
  </div>`;
}
function detailRows(group) {
  const rows = group.reports.map(r => `<tr class="border-t border-slate-100 hover:bg-slate-50">
    <td class="px-4 py-3">${dateLabel(r.lesson_date)}</td>
    <td class="px-4 py-3">${statusLabel(r.status)}</td>
    <td class="px-4 py-3">${timeLabel(r.submitted_to_parent_at, '-')}</td>
    <td class="px-4 py-3">${timeLabel(r.parent_approved_at, '-')}</td>
    <td class="px-4 py-3">${timeLabel(r.admin_approved_at, '-')}</td>
    <td class="px-4 py-3 text-rose-700">${r.status === 'returned_to_tutor' ? (r.last_return_comment || '') : ''}</td>
    <td class="px-4 py-3 text-slate-700">${r.status === 'closed' ? `<div class="font-medium text-slate-800">クローズ済み</div><div class="mt-1 whitespace-pre-wrap">理由：${escapeHtml(r.close_reason || '-')}</div><div class="mt-1">日時：${timeLabel(r.closed_at, '-')}</div>` : ''}</td>
  </tr>`).join('');
  return `<div class="mt-5 overflow-x-auto">
    <table class="w-full text-sm">
      <thead class="bg-slate-50 text-xs font-medium uppercase tracking-wide text-slate-500"><tr><th class="px-4 py-3 text-left">指導日</th><th class="px-4 py-3 text-left">状態</th><th class="px-4 py-3 text-left">保護者へ依頼</th><th class="px-4 py-3 text-left">保護者承認</th><th class="px-4 py-3 text-left">最終承認</th><th class="px-4 py-3 text-left">差戻し理由</th><th class="px-4 py-3 text-left">クローズ情報</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}
function renderApproval() {
  if (!groups.length) {
    approvalMonths.innerHTML = '<div class="rounded-xl border border-slate-200 bg-white p-5 text-sm text-slate-600 shadow-sm">当月分の承認対象はありません。</div>';
    return;
  }
  approvalMonths.innerHTML = groups.map(group => {
    const completeBadge = group.phase === 'completed' ? '<span class="rounded-full bg-emerald-100 px-2 py-0.5 text-xs text-emerald-700">完了</span>' : '';
    const collapsedAttr = group.phase === 'completed' ? '' : 'open';
    const parentLabel = group.parent_display_name ? `保護者：${escapeHtml(nameWithNo(group.parent_display_name, group.parent_no))}` : '保護者：未設定';
    return `<details class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm overflow-hidden" ${collapsedAttr}>
      <summary class="cursor-pointer list-none">
        <div class="flex flex-wrap items-center justify-between gap-3">
          <div>
            <div class="font-semibold text-slate-800">${escapeHtml(group.student_name)}　${monthLabel(group.target_month)}　全${group.total_count}件 / 合計${durationLabel(group.total_minutes)}</div>
            <div class="mt-1 text-sm text-slate-500">${parentLabel}</div>
          </div>
          ${completeBadge}
        </div>
      </summary>
      ${renderStepper(group)}
      ${summaryGrid(group)}
      ${actionArea(group)}
      <button class="mt-4 text-sm font-medium text-blue-600 underline decoration-blue-300 underline-offset-4" onclick="toggleDetails('${group.assignment_id}')">対象報告書を表示</button>
      <div id="detail-${group.assignment_id}"></div>
    </details>`;
  }).join('');
}
function toggleDetails(assignmentId) {
  const group = groups.find(item => item.assignment_id === assignmentId);
  const area = document.getElementById(`detail-${assignmentId}`);
  area.innerHTML = area.innerHTML ? '' : detailRows(group);
}
async function submitToParentGroup(assignmentId) {
  const group = groups.find(item => item.assignment_id === assignmentId);
  // リマインドメール設定は運営（管理者ダッシュボード）で管理する。講師は承認依頼のみ行う。
  await api('/api/reports/submit-to-parent-bulk', {
    method: 'POST',
    body: JSON.stringify({target_month: group.target_month, report_ids: reportIdsForParentSubmit(group)})
  });
  await loadApproval();
}
async function resendReturnedReports(assignmentId) {
  const group = groups.find(item => item.assignment_id === assignmentId);
  const ids = returnedReportIds(group);
  for (const id of ids) {
    await api(`/api/reports/${id}/submit-to-parent`, {
      method: 'POST',
      body: JSON.stringify({})
    });
  }
  await loadApproval();
}
async function loadApproval() {
  const [reports, assignments, monthlies] = await Promise.all([
    api(`/api/reports?target_month=${currentMonth()}`),
    api('/api/assignments'),
    api('/api/monthly-reports').catch(() => [])
  ]);
  allReports = reports;
  allAssignments = assignments;
  monthlyKeys = new Set((monthlies || []).map(m => `${m.assignment_id}|${m.target_month}`));
  const assignmentMap = new Map(allAssignments.map(assignment => [assignment.id, assignment]));
  const reportGroups = allReports.reduce((acc, report) => {
    (acc[report.assignment_id] ||= []).push(report);
    return acc;
  }, {});
  groups = Object.entries(reportGroups).map(([assignmentId, items]) => buildGroup(assignmentMap.get(assignmentId), items));
  renderBulkExportArea();
  renderApproval();
  // サイドバーの「差戻しあり」バッジを再計算（再承認依頼の直後に消えるように）
  window.refreshReturnComments?.();
}
exportMonth.addEventListener('change', renderBulkExportLinks);
window.authReady.then(user => {

});
