<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Role Select</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#1e2a3a]">
  <div class="min-h-screen bg-[radial-gradient(circle_at_top,_rgba(59,130,246,0.18),_transparent_28%),linear-gradient(180deg,#1e2a3a_0%,#0f172a_100%)] px-4 py-10">
    <div class="mx-auto flex min-h-[calc(100vh-5rem)] w-full max-w-md items-center justify-center">
      <div class="w-full rounded-2xl border border-white/10 bg-white p-8 shadow-2xl shadow-slate-950/20 md:p-10">
        <div class="mb-8 text-center">
          <div class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-2xl bg-blue-600 text-white shadow-lg shadow-blue-600/30"><svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-5 8l1.5 1.5L15 11"/></svg></div>
          <h1 class="text-2xl font-bold text-slate-800">ロール選択</h1>
          <p class="mt-2 text-sm text-slate-500">利用する権限を選択してください</p>
        </div>

        <div id="roleButtons" class="space-y-3"></div>
        <p id="error" class="mt-4 hidden rounded-lg border border-rose-200 bg-rose-50 px-3 py-2 text-sm text-rose-700"></p>
      </div>
    </div>
  </div>
  <script>
    const roles = {{ (current_user.roles or [current_user.role]) | tojson }};
    const labels = {
      tutor: '講師',
      parent: '保護者',
      admin_receiver: '受付担当',
      admin_reviewer: '再鑑者',
      admin_master: '管理者'
    };
    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'}[ch]));
    }
    roleButtons.innerHTML = roles.map(role => `<button type="button" class="w-full rounded-lg border border-slate-200 bg-white px-4 py-3 text-left font-medium text-slate-800 transition hover:border-blue-300 hover:bg-blue-50" onclick="selectRole('${role}')">${escapeHtml(labels[role] || role)}</button>`).join('');
    async function selectRole(role) {
      const res = await fetch('/api/auth/select-role', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({role})
      });
      if (!res.ok) {
        error.textContent = 'ロールを選択できません';
        error.classList.remove('hidden');
        return;
      }
      const json = await res.json();
      location.href = json.redirect_url || '/dashboard';
    }
  </script>
</body>
</html>
