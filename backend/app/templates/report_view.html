<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>指導実績報告書（参照）</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 指導時間の計算規約（在室時間・指導時間数15分切り捨て）の共通コア -->
  <script src="/static/js/lesson_time.js"></script>
</head>
<body class="bg-slate-100">
  <div class="mx-auto max-w-5xl p-4">
    <div id="loading" class="rounded-xl border border-slate-200 bg-white p-6 text-sm text-slate-500 shadow-sm">読み込み中...</div>
    <div id="content" class="hidden space-y-4"></div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const assignmentId = params.get('assignment_id') || '';
    const targetMonth = params.get('month') || '';
    const WEEKDAYS = ['日', '月', '火', '水', '木', '金', '土'];
    // 保護者の参照画面でのみ承認/差戻しを許可（pages.py が parent_can_act を渡したときだけ true。admin 参照は false）。
    const PARENT_CAN_ACT = {{ parent_can_act | default(false) | tojson }};
    // 受付/再鑑担当の参照画面でのみ承認/差戻しを許可（pages.py が admin_can_act / admin_role を渡したときだけ）。
    // 管理者・管理責任者は承認フロー外のため両方とも未設定＝参照のみ。
    const ADMIN_CAN_ACT = {{ admin_can_act | default(false) | tojson }};
    const ADMIN_ROLE = {{ admin_role | default('') | tojson }};
    let adminLocks = {received_report_ids: [], reviewed_report_ids: []};
    const CURRENT_MONTH = new Date().toISOString().slice(0, 7);
    let currentFiltered = [];
    let monthlyReport = null;   // 指導月報（担当×対象月で1件。未作成なら null）
    let parentSurvey = null;    // 保護者アンケート（自分の回答。未回答なら null。保護者のみ取得）
    let flashMsg = null;

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'}[ch]));
    }
    function timeText(value) { return (value || '').slice(0, 5); }
    function dateLabel(value) {
      const d = new Date(`${value}T00:00:00`);
      if (Number.isNaN(d.getTime())) return escapeHtml(value || '');
      return `${d.getMonth() + 1}月${d.getDate()}日（${WEEKDAYS[d.getDay()]}）`;
    }
    function monthLabel(value) {
      if (!value) return '-';
      return `${value.slice(0, 4)}年${Number(value.slice(5, 7))}月分`;
    }
    // 在室時間・指導時間数（15分単位切り捨て）の計算は共通コア（/static/js/lesson_time.js）に委譲
    function presenceMinutes(report) { return LessonTime.presenceMinutes(report); }
    function teachingMinutes(report) { return LessonTime.teachingMinutes(report); }
    function durationLabel(minutes) { return LessonTime.durationLabel(minutes); }
    // 全ステータスを明示マッピング（未マッピングを「承認済み」と誤表示しないこと）
    const STATUS_BADGE = {
      draft: ['下書き', 'bg-slate-100 text-slate-600'],
      awaiting_parent_approval: ['確認待ち', 'bg-yellow-100 text-yellow-800'],
      parent_approved: ['承認済み', 'bg-blue-100 text-blue-700'],
      submitted_to_admin: ['受付待ち', 'bg-yellow-100 text-yellow-800'],
      received: ['再鑑待ち', 'bg-yellow-100 text-yellow-800'],
      re_reviewed: ['最終承認待ち', 'bg-yellow-100 text-yellow-800'],
      returned_to_tutor: ['差戻し済み', 'bg-red-100 text-red-700'],
      returned_to_receiver: ['差戻し済み', 'bg-red-100 text-red-700'],
      admin_approved: ['最終承認済み', 'bg-emerald-100 text-emerald-700'],
      closed: ['クローズ', 'bg-slate-100 text-slate-600'],
    };
    function statusBadge(status) {
      const [label, cls] = STATUS_BADGE[status] || [status || '-', 'bg-slate-100 text-slate-600'];
      return `<span class="inline-flex rounded-full px-2.5 py-1 text-xs font-medium ${cls}">${escapeHtml(label)}</span>`;
    }
    function sortReports(reports) {
      return [...reports].sort((a, b) => {
        const dateCompare = a.lesson_date.localeCompare(b.lesson_date);
        if (dateCompare !== 0) return dateCompare;
        return timeText(a.start_time).localeCompare(timeText(b.start_time));
      });
    }
    // 指導内容の詳細（教科ほか7項目）。時間テーブルの下に指導日ごとのカードで表示する。
    const HOMEWORK_LABELS = {A: 'ほぼ完ぺき', B: '半分くらい', C: 'やらなかった'};
    function homeworkStatusText(v) { return v ? `${v}（${HOMEWORK_LABELS[v] || ''}）` : ''; }
    // 学年（区分＋学年数）。両方そろっている時のみ表示（旧データは未設定のため省略）。
    function gradeText(report) {
      return (report.grade_level && report.grade_year) ? `${report.grade_level}${report.grade_year}年` : '';
    }
    function nextLessonText(report) {
      const d = report.next_lesson_date ? dateLabel(report.next_lesson_date) : '';
      const t = report.next_lesson_start ? timeText(report.next_lesson_start) : '';
      if (!d && !t) return '';
      return [d, t ? `指導開始 ${t}` : ''].filter(Boolean).join('　');
    }
    function detailField(label, value, pre) {
      const v = (value ?? '').toString().trim();
      const body = v
        ? (pre ? `<div class="whitespace-pre-wrap text-slate-800">${escapeHtml(v)}</div>` : `<span class="text-slate-800">${escapeHtml(v)}</span>`)
        : '<span class="text-slate-400">—</span>';
      return `<div><dt class="text-xs text-slate-500">${label}</dt><dd class="mt-0.5 text-sm">${body}</dd></div>`;
    }
    function detailCardsHtml(reports) {
      if (!reports.length) return '';
      const cards = reports.map((report, index) => `
        <div class="rounded-lg border border-slate-200 p-4 ${report.status === 'returned_to_tutor' ? 'bg-red-50/40' : 'bg-white'}">
          <div class="mb-3 flex flex-wrap items-center gap-2">
            <span class="rounded-full bg-slate-100 px-2 py-0.5 text-xs font-medium text-slate-600">${index + 1}回</span>
            <span class="font-medium text-slate-800">${dateLabel(report.lesson_date)}</span>
            ${statusBadge(report.status)}
          </div>
          <dl class="grid grid-cols-1 gap-x-6 gap-y-3 sm:grid-cols-2">
            ${gradeText(report) ? `<div class="sm:col-span-2">${detailField('学年', gradeText(report))}</div>` : ''}
            ${detailField('教科', report.subject)}
            ${detailField('宿題／状況', homeworkStatusText(report.homework_status))}
            ${detailField('使用教材／テキスト名', report.material_name)}
            ${detailField('次回までの宿題', report.next_homework, true)}
            <div class="sm:col-span-2">${detailField('何を指導したか／単元など', report.content, true)}</div>
            <div class="sm:col-span-2">${detailField('学習状況／問題と対策', report.learning_status, true)}</div>
            ${nextLessonText(report) ? `<div class="sm:col-span-2">${detailField('次回の予定／指導日', nextLessonText(report))}</div>` : ''}
          </dl>
        </div>`).join('');
      return `<section class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
        <h2 class="mb-3 font-semibold text-slate-800">指導内容の詳細</h2>
        <div class="space-y-3">${cards}</div>
      </section>`;
    }

    async function load() {
      let reports;
      try {
        // 受付/再鑑担当は職務分掌（受付・再鑑の兼務不可）の判定用にロック情報も取得する。
        const requests = [fetch('/api/reports', {credentials: 'same-origin'})];
        if (ADMIN_CAN_ACT) requests.push(fetch('/api/reports/admin-separation-locks', {credentials: 'same-origin'}));
        const [res, lockRes] = await Promise.all(requests);
        if (!res.ok) throw new Error(String(res.status));
        reports = await res.json();
        if (lockRes && lockRes.ok) adminLocks = await lockRes.json();
      } catch (err) {
        document.getElementById('loading').textContent = '報告書を読み込めませんでした。';
        return;
      }
      const filtered = sortReports((reports || []).filter(report =>
        report.target_month === targetMonth && (!assignmentId || report.assignment_id === assignmentId)));
      const totalMinutes = filtered.reduce((sum, report) => sum + teachingMinutes(report), 0);
      const first = filtered[0] || {};
      currentFiltered = filtered;

      // 指導月報（承認依頼時に提出されるフォーム）を取得。未作成・取得失敗時は非表示のまま続行する。
      monthlyReport = null;
      const monthlyAssignmentId = assignmentId || first.assignment_id || '';
      if (monthlyAssignmentId) {
        try {
          const mres = await fetch(`/api/monthly-reports?target_month=${encodeURIComponent(targetMonth)}&assignment_id=${encodeURIComponent(monthlyAssignmentId)}`, {credentials: 'same-origin'});
          if (mres.ok) monthlyReport = (await mres.json())[0] || null;
        } catch (_) {}
      }

      // 保護者アンケート（講師評価・改修 202607231755 ③）: 保護者本人の回答を取得（未回答なら null）。
      // 取得失敗時はアンケート欄なしで続行する（承認・差戻しは妨げない）。
      parentSurvey = null;
      if (PARENT_CAN_ACT && monthlyReport) {
        try {
          const sres = await fetch(`/api/parent-surveys/${encodeURIComponent(monthlyReport.id)}`, {credentials: 'same-origin'});
          if (sres.ok) parentSurvey = await sres.json();
        } catch (_) {}
      }

      const bodyRows = filtered.length ? filtered.map((report, index) => `<tr class="${report.status === 'returned_to_tutor' ? 'bg-red-50/70' : ''}">
        <td class="border border-slate-200 px-2 py-1 text-center text-slate-500">${index + 1}</td>
        <td class="border border-slate-200 px-2 py-1">${dateLabel(report.lesson_date)}</td>
        <td class="border border-slate-200 px-2 py-1">${timeText(report.start_time)} ～ ${timeText(report.end_time)}</td>
        <td class="border border-slate-200 px-2 py-1 text-right">${Number(report.break_minutes || 0)}分</td>
        <td class="border border-slate-200 px-2 py-1 text-right">${durationLabel(presenceMinutes(report))}</td>
        <td class="border border-slate-200 px-2 py-1 text-right">${durationLabel(teachingMinutes(report))}</td>
        <td class="border border-slate-200 px-2 py-1">${escapeHtml(report.subject || '')}</td>
        <td class="border border-slate-200 px-2 py-1">${statusBadge(report.status)}</td>
      </tr>`).join('') : `<tr><td class="border border-slate-200 px-2 py-3 text-center text-slate-400" colspan="8">入力された指導日はありません。</td></tr>`;

      document.getElementById('loading').classList.add('hidden');
      const content = document.getElementById('content');
      content.classList.remove('hidden');
      content.innerHTML = bannerHtml() + `
        <section class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
          <h1 class="text-lg font-bold text-slate-800">${escapeHtml(monthLabel(targetMonth))} 指導実績報告書（参照）</h1>
          <dl class="mt-3 grid grid-cols-1 gap-x-6 gap-y-1 text-sm sm:grid-cols-2">
            <div class="flex gap-2"><dt class="text-slate-500">生徒名</dt><dd class="font-medium text-slate-800">${escapeHtml(first.student_name || '-')}</dd></div>
            <div class="flex gap-2"><dt class="text-slate-500">講師名</dt><dd class="font-medium text-slate-800">${escapeHtml(first.tutor_name || '-')}${first.tutor_no ? `（${escapeHtml(first.tutor_no)}）` : ''}</dd></div>
          </dl>
        </section>
        <section class="overflow-x-auto rounded-xl border border-slate-200 bg-white p-3 shadow-sm">
          <table class="w-full border-collapse text-sm">
            <thead>
              <tr class="bg-slate-50 text-xs font-medium text-slate-600">
                <th class="border border-slate-300 px-2 py-1">回</th>
                <th class="border border-slate-300 px-2 py-1 text-left">指導日</th>
                <th class="border border-slate-300 px-2 py-1 text-left">在室した時間帯</th>
                <th class="border border-slate-300 px-2 py-1 text-left">休憩</th>
                <th class="border border-slate-300 px-2 py-1 text-left">在室時間</th>
                <th class="border border-slate-300 px-2 py-1 text-left">指導時間数</th>
                <th class="border border-slate-300 px-2 py-1 text-left">教科</th>
                <th class="border border-slate-300 px-2 py-1 text-left">状態</th>
              </tr>
            </thead>
            <tbody>${bodyRows}</tbody>
          </table>
          <div class="mt-3 flex flex-wrap gap-x-6 gap-y-1 px-1 text-sm text-slate-700">
            <div>指導日数：<span class="font-semibold">${filtered.length}</span>日</div>
            <div>合計指導時間：<span class="font-semibold">${durationLabel(totalMinutes)}</span></div>
          </div>
        </section>` + detailCardsHtml(filtered) + monthlyReportHtml()
        // 保護者アンケート（202607231755 ③）は月報の直後・承認エリアの前（承認前に回答を促す位置）
        + parentSurveyHtml()
        // 差戻し要求（202607211144）は承認・差戻しエリアの前に出す（対応が必要なことを先に伝える）
        + requestSectionHtml(filtered) + actionAreaHtml(filtered) + adminActionAreaHtml(filtered);
      if (PARENT_CAN_ACT) { wireParentActions(); wireSurveyActions(); }
      if (ADMIN_CAN_ACT) wireAdminActions();
      wireRequestActions();
    }

    // ===== 指導月報（原本_月報.pdf 準拠）の参照表示 =====
    // 講師が承認依頼前に作成した月報を、保護者・運営が承認判断の材料として確認できるようにする。
    // 教科の並びはサーバ定義（services/monthly_report_service.py）と同一にすること。
    const MOCK_SUBJECTS = ['国語', '算数', '2科', '社会', '理科', '4科'];
    const SCHOOL_SUBJECTS = ['英語', '算数', '国語', '社会', '理科'];
    function monthlyField(label, value, pre) {
      const v = (value ?? '').toString().trim();
      const body = v
        ? (pre ? `<div class="whitespace-pre-wrap text-slate-800">${escapeHtml(v)}</div>` : `<span class="text-slate-800">${escapeHtml(v)}</span>`)
        : '<span class="text-slate-400">—</span>';
      return `<div><dt class="text-xs text-slate-500">${label}</dt><dd class="mt-0.5 text-sm">${body}</dd></div>`;
    }
    function numberedList(items) {
      const rows = (items || []).map((v, i) => ({no: i + 1, text: (v || '').trim()})).filter(r => r.text);
      if (!rows.length) return '<span class="text-sm text-slate-400">—</span>';
      return `<ol class="space-y-1">${rows.map(r => `<li class="flex gap-2 text-sm"><span class="w-5 shrink-0 text-center font-semibold text-slate-500">${r.no}</span><span class="whitespace-pre-wrap text-slate-800">${escapeHtml(r.text)}</span></li>`).join('')}</ol>`;
    }
    function scoreTableHtml(subjects, scores) {
      const rows = scores || [];
      if (!rows.some(s => (s && (s.score || s.deviation)))) return '';
      const head = subjects.map(s => `<th class="border border-slate-300 bg-slate-50 px-2 py-1 text-center text-xs font-medium text-slate-600">${escapeHtml(s)}</th>`).join('');
      const line = key => subjects.map((_, i) => `<td class="border border-slate-200 px-2 py-1 text-center text-sm">${escapeHtml((rows[i] || {})[key] || '')}</td>`).join('');
      return `<div class="mt-2 overflow-x-auto"><table class="w-full border-collapse">
        <thead><tr><th class="w-16 border border-slate-300 bg-slate-50 px-2 py-1 text-left text-xs font-medium text-slate-600">教科</th>${head}</tr></thead>
        <tbody>
          <tr><th class="border border-slate-300 bg-slate-50 px-2 py-1 text-left text-xs font-medium text-slate-600">素点</th>${line('score')}</tr>
          <tr><th class="border border-slate-300 bg-slate-50 px-2 py-1 text-left text-xs font-medium text-slate-600">偏差値</th>${line('deviation')}</tr>
        </tbody>
      </table></div>`;
    }
    function dayChips(days, monthText) {
      if (!(days || []).length) return '<span class="text-sm text-slate-400">—</span>';
      return `<div class="flex flex-wrap items-center gap-1.5">${days.map(d => `<span class="inline-flex h-7 w-7 items-center justify-center rounded-full bg-blue-600 text-xs font-semibold text-white">${d}</span>`).join('')}<span class="ml-1 text-xs text-slate-500">${monthText}</span></div>`;
    }
    function abChoiceText(row, aLabel, bLabel) {
      if (!row || !row.answer) return '';
      if (row.answer === 'A') return `A ${aLabel}`;
      const count = (row.count || '').trim();
      const informed = row.informed === 'a' ? '（会員に事前連絡をした）' : (row.informed === 'b' ? '（会員に事前連絡をしなかった）' : '');
      return `B ${bLabel}${count ? `（${count}回）` : ''}${informed}`;
    }
    function makeupText(makeup) {
      if (!makeup || !makeup.answer) return '';
      if (makeup.answer === 'A') return 'A 当月中に済';
      if (makeup.answer === 'B') return 'B 振替日未定';
      const plans = (makeup.plans || [])
        .map(p => `${p.from_month ?? '?'}月${p.from_day ?? '?'}日→${p.to_month ?? '?'}月${p.to_day ?? '?'}日`)
        .join('、');
      return `C 振替予定あり${plans ? `（${plans}）` : ''}`;
    }
    function nextMonthLabel(value) {
      const [year, month] = value.split('-').map(Number);
      const d = new Date(year, month, 1);
      return `${d.getFullYear()}年${d.getMonth() + 1}月`;
    }
    function monthlyReportHtml() {
      if (!monthlyReport) return '';
      const data = monthlyReport.form_data || {};
      const mock = data.test_mock || {};
      const school = data.test_school || {};
      const retro = data.retrospect || {};
      const reason = retro.change_reason || {};
      const reasonText = reason.answer === 'A' ? 'A 会員都合'
        : (reason.answer === 'B' ? `B 講師都合${(reason.reason || '').trim() ? `（理由：${reason.reason.trim()}）` : ''}` : '');
      const mockMeta = [mock.name ? `模試の種類：${mock.name}` : '', (mock.exam_month && mock.exam_day) ? `受験日：${mock.exam_month}月${mock.exam_day}日` : ''].filter(Boolean).join('　');
      const schoolMeta = [school.term ? `${school.term}期` : '', school.term_type || ''].filter(Boolean).join('　');
      const hasMock = Boolean(mockMeta) || (mock.scores || []).some(s => s && (s.score || s.deviation));
      const hasSchool = Boolean(schoolMeta) || (school.scores || []).some(s => s && (s.score || s.deviation));
      const parentNote = (monthlyReport.parent_note || '').trim();
      return `<section class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
        <div class="flex flex-wrap items-center gap-2">
          <h2 class="font-semibold text-slate-800">指導月報</h2>
          <span class="rounded-full bg-blue-100 px-2.5 py-1 text-xs font-medium text-blue-700">${escapeHtml(monthLabel(targetMonth))}</span>
        </div>
        <dl class="mt-3 grid grid-cols-1 gap-x-6 gap-y-3 sm:grid-cols-2">
          ${monthlyField('学年', monthlyReport.grade)}
          ${monthlyField('指導時間合計', (data.total_hours || '').trim() ? `${data.total_hours}時間` : '')}
        </dl>
        <div class="mt-4 grid gap-4">
          <div><h3 class="text-sm font-semibold text-slate-700">次月に向けての問題点と対策</h3><div class="mt-1.5">${numberedList(data.issues)}</div></div>
          <div><h3 class="text-sm font-semibold text-slate-700">現時点での志望校</h3><div class="mt-1.5">${numberedList(data.target_schools)}</div></div>
          ${(hasMock || hasSchool) ? `<div>
            <h3 class="text-sm font-semibold text-slate-700">最近のテスト結果</h3>
            <div class="mt-1.5 grid gap-3 lg:grid-cols-2">
              ${hasMock ? `<div class="rounded-lg border border-slate-200 p-3"><div class="text-xs font-medium text-slate-600">模試／実力テスト${mockMeta ? `　<span class="font-normal">${escapeHtml(mockMeta)}</span>` : ''}</div>${scoreTableHtml(MOCK_SUBJECTS, mock.scores)}</div>` : ''}
              ${hasSchool ? `<div class="rounded-lg border border-slate-200 p-3"><div class="text-xs font-medium text-slate-600">学校${schoolMeta ? `　<span class="font-normal">${escapeHtml(schoolMeta)}</span>` : ''}</div>${scoreTableHtml(SCHOOL_SUBJECTS, school.scores)}</div>` : ''}
            </div>
          </div>` : ''}
          <div class="grid gap-3 lg:grid-cols-2">
            <div><h3 class="text-sm font-semibold text-slate-700">指導実施日（今月）</h3><div class="mt-1.5">${dayChips(data.lesson_days, monthLabel(targetMonth))}</div></div>
            <div><h3 class="text-sm font-semibold text-slate-700">指導予定日（次月）</h3><div class="mt-1.5">${dayChips(data.next_month_plan_days, nextMonthLabel(targetMonth))}</div></div>
          </div>
          <div>
            <h3 class="text-sm font-semibold text-slate-700">今月を振り返って</h3>
            <dl class="mt-1.5 grid grid-cols-1 gap-x-6 gap-y-2 sm:grid-cols-2">
              ${monthlyField('遅刻', abChoiceText(retro.late, 'なし', 'あり'))}
              ${monthlyField('指導日の変更', abChoiceText(retro.schedule_change, 'なし', 'あり'))}
              ${monthlyField('変更理由', reasonText)}
              ${monthlyField('休んだ日の振替', makeupText(retro.makeup))}
            </dl>
          </div>
          ${monthlyField('連絡事項', data.notes, true)}
          <div class="rounded-lg border border-slate-200 bg-slate-50 p-3">
            <h3 class="text-sm font-semibold text-slate-700">保護者記入欄（ご要望／連絡事項）</h3>
            ${parentNote
              ? `<div class="mt-1.5 whitespace-pre-wrap text-sm text-slate-800">${escapeHtml(parentNote)}</div>`
              : '<div class="mt-1.5 text-sm text-slate-500">未記入です（保護者が承認時に記入します）。</div>'}
          </div>
        </div>
      </section>`;
    }

    // ===== 保護者アンケート（講師評価・改修 202607231755 ③） =====
    // 回答は任意（未回答でも承認できる）。回答内容は運営スタッフのみが閲覧し、講師には一切表示されない。
    // 送信は「すべて承認する」の承認と同時のみ（改修 202607231908＝専用の送信ボタンは廃止）。
    // 設問キー・選択肢はサーバ（models.ParentSurvey / schemas.ParentSurveyIn）および
    // 集計画面（admin/surveys.html）の定義と同一にすること（変更時は3箇所を同時更新）。
    const SURVEY_SCALE_QUESTIONS = [
      {key: 'q_satisfaction', label: '講師への総合的な満足度', low: '不満', high: '満足'},
      {key: 'q_clarity', label: '指導のわかりやすさ', low: 'わかりにくい', high: 'わかりやすい'},
      {key: 'q_communication', label: '報告・連絡・相談などの対応', low: '不満', high: '満足'},
      {key: 'q_motivation', label: 'お子さまの学習意欲の変化', low: '下がった', high: '高まった'},
      {key: 'q_punctuality', label: '時間厳守・礼儀・マナー', low: '不満', high: '満足'},
    ];
    const SURVEY_CONTINUATION_OPTIONS = [
      ['continue', '続けたい'],
      ['neutral', 'どちらともいえない'],
      ['change', '変更を検討したい'],
    ];
    function surveyPill(name, value, label, checked) {
      return `<label class="inline-flex cursor-pointer items-center gap-1.5 rounded-lg border px-3 py-2 text-sm transition ${checked ? 'border-blue-500 bg-blue-50 font-medium text-blue-800' : 'border-slate-200 bg-white text-slate-700 hover:bg-slate-50'}">
        <input type="radio" name="${name}" value="${escapeHtml(String(value))}" ${checked ? 'checked' : ''} class="h-4 w-4 border-slate-300 text-blue-600 focus:ring-blue-500" onchange="syncSurveyPills()">
        <span>${escapeHtml(label)}</span>
      </label>`;
    }
    function syncSurveyPills() {
      // 選択中ラジオのラベル強調を選択の変更に追従させる（tutor/monthly_report.html と同じ意匠）
      document.querySelectorAll('#surveyCard input[type="radio"]').forEach(input => {
        const label = input.closest('label');
        if (!label) return;
        for (const cls of ['border-blue-500', 'bg-blue-50', 'font-medium', 'text-blue-800']) label.classList.toggle(cls, input.checked);
        for (const cls of ['border-slate-200', 'bg-white', 'text-slate-700', 'hover:bg-slate-50']) label.classList.toggle(cls, !input.checked);
      });
    }
    function surveyScaleRow(question, index, selected) {
      const pills = [1, 2, 3, 4, 5].map(v => {
        const text = v === 1 ? `1 ${question.low}` : (v === 5 ? `5 ${question.high}` : String(v));
        return surveyPill(`survey_${question.key}`, v, text, Number(selected) === v);
      }).join('');
      return `<div class="grid gap-1.5">
        <span class="text-sm font-medium text-slate-700">Q${index + 1}. ${escapeHtml(question.label)}</span>
        <div class="flex flex-wrap items-center gap-1.5">${pills}</div>
      </div>`;
    }
    function parentSurveyHtml() {
      if (!PARENT_CAN_ACT || !monthlyReport) return '';
      // 送信は承認と同時のみ（202607231908）のため、承認操作ができない状態（差戻し中・承認対象なし）では出さない。
      if (currentFiltered.some(report => report.status === 'returned_to_tutor')) return '';
      if (!currentFiltered.some(report => report.status === 'awaiting_parent_approval')) return '';
      const saved = parentSurvey || {};
      const answered = Boolean(parentSurvey);
      const badge = answered
        ? '<span class="rounded-full bg-emerald-100 px-2.5 py-1 text-xs font-medium text-emerald-700">回答済み</span>'
        : '<span class="rounded-full bg-amber-100 px-2.5 py-1 text-xs font-medium text-amber-800">未回答（任意）</span>';
      const scaleRows = SURVEY_SCALE_QUESTIONS.map((q, i) => surveyScaleRow(q, i, saved[q.key])).join('');
      const contPills = SURVEY_CONTINUATION_OPTIONS
        .map(([value, label]) => surveyPill('survey_q_continuation', value, label, saved.q_continuation === value)).join('');
      return `<section id="surveyCard" class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
        <div class="flex flex-wrap items-center gap-2">
          <h2 class="font-semibold text-slate-800">講師評価アンケート</h2>
          ${badge}
          <span class="text-xs text-slate-500">所要3分程度</span>
        </div>
        <p class="mt-2 rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-xs text-slate-600">回答内容は<span class="font-medium">運営スタッフのみ</span>が確認し、<span class="font-medium">講師には表示されません</span>。率直なご意見をお聞かせください。ご回答は、下の<span class="font-medium">「すべて承認する」で承認したときに送信されます</span>。回答は任意のため、未回答のままでも承認できます。</p>
        <div class="mt-4 grid gap-4">
          ${scaleRows}
          <div class="grid gap-1.5 border-t border-slate-100 pt-4">
            <span class="text-sm font-medium text-slate-700">Q6. 今後もこの講師による指導を続けたいと思いますか</span>
            <div class="flex flex-wrap items-center gap-1.5">${contPills}</div>
          </div>
          <div class="grid gap-1.5 border-t border-slate-100 pt-4">
            <label class="text-sm font-medium text-slate-700" for="surveyComment">ご意見・ご要望（任意）</label>
            <textarea id="surveyComment" maxlength="2000" class="min-h-20 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20" placeholder="講師や指導についてのご意見があればご記入ください（運営のみ確認します）">${escapeHtml(saved.comment || '')}</textarea>
          </div>
        </div>
        <div class="mt-4 flex flex-col gap-2 sm:flex-row sm:flex-wrap">
          <button id="surveyResetBtn" type="button" class="w-full rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50 sm:w-auto">${answered ? '入力を元に戻す' : '選択をクリア'}</button>
        </div>
      </section>`;
    }
    function collectSurvey() {
      const radio = name => document.querySelector(`input[name="${name}"]:checked`)?.value || '';
      const values = {};
      for (const question of SURVEY_SCALE_QUESTIONS) values[question.key] = Number(radio(`survey_${question.key}`)) || null;
      values.q_continuation = radio('survey_q_continuation') || null;
      values.comment = (document.getElementById('surveyComment')?.value || '').trim();
      return values;
    }
    function surveyAnsweredCount(values) {
      return SURVEY_SCALE_QUESTIONS.filter(question => values[question.key]).length + (values.q_continuation ? 1 : 0);
    }
    function surveyDirty(values) {
      // 保存済みの回答（未回答なら空）と比べて画面の入力に変更があるか
      if (!parentSurvey) return surveyAnsweredCount(values) > 0 || Boolean(values.comment);
      return SURVEY_SCALE_QUESTIONS.some(question => values[question.key] !== parentSurvey[question.key])
        || values.q_continuation !== parentSurvey.q_continuation
        || values.comment !== (parentSurvey.comment || '');
    }
    // 承認と同時の自動送信専用（202607231908 で専用の送信ボタンを廃止）。結果メッセージは呼び出し元が表示する。
    async function submitSurvey() {
      if (!monthlyReport) return false;
      const values = collectSurvey();
      if (surveyAnsweredCount(values) < 6) return false;
      try {
        const res = await fetch(`/api/parent-surveys/${encodeURIComponent(monthlyReport.id)}`, {
          method: 'PUT',
          credentials: 'same-origin',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({...values, comment: values.comment || null}),
        });
        if (!res.ok) throw new Error(String(res.status));
        parentSurvey = await res.json();
        return true;
      } catch (_) {
        return false;
      }
    }
    function resetSurveyCard() {
      // 保存済みの回答（未回答なら空欄）へ入力を戻す
      const card = document.getElementById('surveyCard');
      if (!card) return;
      card.outerHTML = parentSurveyHtml();
      wireSurveyActions();
    }
    function wireSurveyActions() {
      // 送信は承認と同時に行う（202607231908）ため、アンケート欄の操作は入力を戻す／クリアのみ。
      const resetBtn = document.getElementById('surveyResetBtn');
      if (!resetBtn) return; // アンケート欄なし（月報なし・承認対象なし・保護者以外）
      resetBtn.addEventListener('click', resetSurveyCard);
    }

    // 保護者の参照画面に出す「承認・差戻し」エリア。承認管理一覧から本画面へ機能を集約したもの。
    // 当月かつ承認待ち（awaiting_parent_approval）のときのみ操作可。差戻し中・過去月・対象なしは案内のみ。
    function actionAreaHtml(filtered) {
      if (!PARENT_CAN_ACT) return '';
      const wrap = (inner) => `<section class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">${inner}</section>`;
      // 過去月でも承認・差戻し可（改修 202607211716・案B＝月ではなくステータスで判定）。
      if (filtered.some(report => report.status === 'returned_to_tutor')) {
        return wrap('<div class="rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700">差戻し中の報告書があります。講師の修正をお待ちください。</div>');
      }
      const pending = filtered.filter(report => report.status === 'awaiting_parent_approval');
      if (!pending.length) {
        return wrap('<div class="rounded-lg border border-emerald-200 bg-emerald-50 px-3 py-2 text-sm text-emerald-700">承認対象はありません。</div>');
      }
      // 指導月報がある月は、承認と同時に保護者記入欄（ご要望/連絡事項）の入力が必須。
      const parentNoteForm = monthlyReport ? `
        <div class="mt-3 rounded-xl border border-blue-200 bg-blue-50 p-4">
          <label class="text-sm font-medium text-slate-800" for="parentNoteInput">指導月報「保護者記入欄（ご要望／連絡事項）」<span class="ml-1 font-semibold text-amber-700">※承認に必須</span></label>
          <p class="mt-1 text-xs text-slate-600">ご記入いただいた内容は指導月報に記載され、講師・運営へ共有されます。</p>
          <textarea id="parentNoteInput" class="mt-2 min-h-24 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20" maxlength="2000" placeholder="ご要望・ご連絡事項をご記入ください">${escapeHtml(monthlyReport.parent_note || '')}</textarea>
        </div>` : '';
      return wrap(`
        <h2 class="font-semibold text-slate-800">承認・差戻し</h2>
        <p class="mt-1 text-sm text-slate-600">上記の内容をご確認のうえ、${escapeHtml(monthLabel(targetMonth))}の指導実績を承認、または差戻してください。</p>
        ${parentNoteForm}
        <div id="returnForm" class="mt-3 hidden rounded-xl border border-red-200 bg-red-50 p-4">
          <label class="text-sm font-medium text-slate-700" for="returnComment">差戻しコメント</label>
          <textarea id="returnComment" class="mt-2 min-h-24 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20" maxlength="2000" placeholder="コメントを入力してください"></textarea>
          <div class="mt-3 flex flex-wrap gap-2">
            <button id="returnConfirmBtn" type="button" class="rounded-lg bg-red-600 px-3 py-2 text-sm font-medium text-white transition hover:bg-red-700">差戻す</button>
            <button id="returnCancelBtn" type="button" class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50">キャンセル</button>
          </div>
        </div>
        <label class="mt-3 flex cursor-pointer items-start gap-2 rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-700">
          <input type="checkbox" id="selfConfirm" class="mt-0.5 h-4 w-4 rounded border-slate-300 text-emerald-600 focus:ring-emerald-500">
          <span>承認は保護者本人が操作しています</span>
        </label>
        <div class="mt-3 flex flex-col gap-2 sm:flex-row sm:flex-wrap">
          <button id="returnOpenBtn" type="button" class="w-full rounded-lg bg-red-600 px-4 py-2 text-sm font-medium text-white transition hover:bg-red-700 disabled:cursor-not-allowed disabled:bg-slate-200 disabled:text-slate-500 sm:w-auto" disabled>差戻す</button>
          <button id="approveBtn" type="button" class="w-full rounded-lg bg-emerald-600 px-4 py-2 text-sm font-medium text-white transition hover:bg-emerald-700 disabled:cursor-not-allowed disabled:bg-slate-200 disabled:text-slate-500 sm:w-auto" disabled>すべて承認する</button>
        </div>
        <div id="actionMsg" class="mt-3 hidden rounded-lg px-3 py-2 text-sm"></div>
      `);
    }
    // ===== 講師起点の差戻し要求（改修依頼 202607211144・EMPS と同一仕様） =====
    // 許可（approve_return_request）で講師へ差戻り、却下（decline_return_request・理由必須）で要求のみ解消する。
    // 要求は承認等でボールが移っても引き継がれるため、対応可否は「現在のステータスのボール保持ロール」で判定する。
    // サーバの対応表（workflow_service.RETURN_REQUEST_BALL_HOLDERS）と同一。変更時は両方を更新すること。
    const REQUEST_BALL_STATUSES = {
      parent: ['awaiting_parent_approval'],
      admin_receiver: ['submitted_to_admin', 'returned_to_receiver'],
      admin_reviewer: ['received', 're_reviewed', 'admin_approved'],
    };
    // この画面で操作できるロール（受付/再鑑担当 → そのロール、保護者 → parent、閲覧のみ → 空）
    const ACTIVE_ROLE = ADMIN_CAN_ACT ? ADMIN_ROLE : (PARENT_CAN_ACT ? 'parent' : '');
    function canActOnRequest(report) {
      const statuses = REQUEST_BALL_STATUSES[ACTIVE_ROLE] || [];
      if (!statuses.includes(report.status)) return false;
      // 保護者も過去月の要求対応が可能（改修 202607211716・案B）。
      if (ACTIVE_ROLE === 'parent') return true;
      // 受付／再鑑は職務分掌のロック（同一報告書での兼務不可）に従う
      return !adminLocked([report]);
    }
    function pendingRequestReports(filtered) {
      return filtered.filter(report => report.return_request_pending);
    }
    function actionableRequestReports(filtered) {
      return pendingRequestReports(filtered).filter(canActOnRequest);
    }
    function requestReasons(reports) {
      return [...new Set(reports.map(report => report.return_request_comment).filter(Boolean))]
        .map(reason => `<div class="mt-1 whitespace-pre-wrap text-sm text-amber-900">要求理由：${escapeHtml(reason)}</div>`).join('');
    }
    // 差戻し要求のセクション。対応できるロールには許可／却下の操作、それ以外には状況の案内だけを出す。
    function requestSectionHtml(filtered) {
      const pending = pendingRequestReports(filtered);
      if (!pending.length) return '';
      const actionable = actionableRequestReports(filtered);
      if (!actionable.length) {
        return `<section class="rounded-xl border border-amber-200 bg-amber-50 p-4 text-sm text-amber-800">
          <div class="font-semibold text-amber-900">講師から差戻し要求があります（現在の承認担当の対応待ち）</div>
          ${requestReasons(pending)}
        </section>`;
      }
      return `<section class="rounded-xl border border-amber-300 bg-amber-50 p-5 shadow-sm">
        <div class="flex items-start gap-2">
          <span aria-hidden="true">📩</span>
          <div class="min-w-0">
            <h2 class="font-semibold text-amber-900">講師から差戻し要求が届いています</h2>
            ${requestReasons(actionable)}
            <p class="mt-2 text-xs text-amber-800">許可すると${escapeHtml(monthLabel(targetMonth))}の報告書は講師へ差戻され、講師が修正・再提出できるようになります。却下する場合は理由の入力が必要です。</p>
          </div>
        </div>
        <div id="requestDeclineForm" class="mt-3 hidden rounded-lg border border-slate-300 bg-white p-3">
          <label class="text-sm font-medium text-slate-700" for="requestDeclineComment">却下理由</label>
          <textarea id="requestDeclineComment" class="mt-2 min-h-20 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20" maxlength="2000" placeholder="却下する理由を入力してください（講師に表示されます）"></textarea>
          <div class="mt-3 flex flex-wrap gap-2">
            <button id="requestDeclineConfirmBtn" type="button" class="rounded-lg bg-slate-700 px-3 py-2 text-sm font-medium text-white transition hover:bg-slate-800">却下する</button>
            <button id="requestDeclineCancelBtn" type="button" class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50">キャンセル</button>
          </div>
        </div>
        <div class="mt-3 flex flex-col gap-2 sm:flex-row sm:flex-wrap">
          <button id="requestApproveBtn" type="button" class="w-full rounded-lg bg-amber-600 px-4 py-2 text-sm font-medium text-white transition hover:bg-amber-700 sm:w-auto">要求を許可（講師へ差戻す）</button>
          <button id="requestDeclineOpenBtn" type="button" class="w-full rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50 sm:w-auto">要求を却下</button>
        </div>
        <div id="requestActionMsg" class="mt-3 hidden rounded-lg px-3 py-2 text-sm"></div>
      </section>`;
    }
    function wireRequestActions() {
      const approveBtn = document.getElementById('requestApproveBtn');
      if (!approveBtn) return; // 要求なし・対応対象外
      approveBtn.addEventListener('click', requestApprove);
      document.getElementById('requestDeclineOpenBtn').addEventListener('click', () => {
        document.getElementById('requestDeclineForm').classList.remove('hidden');
        document.getElementById('requestDeclineComment').focus();
      });
      document.getElementById('requestDeclineCancelBtn').addEventListener('click', () => {
        document.getElementById('requestDeclineForm').classList.add('hidden');
      });
      document.getElementById('requestDeclineConfirmBtn').addEventListener('click', requestDecline);
    }
    function showRequestActionMsg(text, ok) {
      const el = document.getElementById('requestActionMsg');
      if (!el) return;
      el.textContent = text;
      el.className = `mt-3 rounded-lg px-3 py-2 text-sm ${ok ? 'border border-emerald-200 bg-emerald-50 text-emerald-700' : 'border border-rose-200 bg-rose-50 text-rose-700'}`;
    }
    function notifyRequestOpener() {
      // 呼び出し元（保護者の承認管理／運営ダッシュボード）の一覧を更新させる
      if (ACTIVE_ROLE === 'parent') notifyOpener(); else notifyAdminOpener();
    }
    async function requestApprove() {
      const targets = actionableRequestReports(currentFiltered);
      if (!targets.length) return;
      if (!confirm('講師の差戻し要求を許可し、報告書を講師へ差戻します。よろしいですか？')) return;
      try {
        await postJson('/api/reports/approve-return-request-bulk', {report_ids: targets.map(report => report.id), target_month: targetMonth});
        notifyRequestOpener();
        flashMsg = `${monthLabel(targetMonth)}の指導実績を講師へ差戻しました（差戻し要求を許可）。`;
        await load();
      } catch (e) {
        showRequestActionMsg(`差戻し要求を許可できませんでした：${e.message}`, false);
      }
    }
    async function requestDecline() {
      const targets = actionableRequestReports(currentFiltered);
      if (!targets.length) return;
      const comment = (document.getElementById('requestDeclineComment').value || '').trim();
      if (!comment) { showRequestActionMsg('却下理由を入力してください。', false); return; }
      try {
        await postJson('/api/reports/decline-return-request-bulk', {report_ids: targets.map(report => report.id), target_month: targetMonth, comment});
        notifyRequestOpener();
        flashMsg = '差戻し要求を却下しました。';
        await load();
      } catch (e) {
        showRequestActionMsg(`差戻し要求を却下できませんでした：${e.message}`, false);
      }
    }

    function bannerHtml() {
      if (!flashMsg) return '';
      const message = flashMsg;
      flashMsg = null;
      return `<div class="rounded-xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm font-medium text-emerald-800">${escapeHtml(message)}</div>`;
    }
    function wireParentActions() {
      const approveBtn = document.getElementById('approveBtn');
      if (!approveBtn) return; // 操作エリア未表示（admin・過去月・対象なし等）
      const selfConfirm = document.getElementById('selfConfirm');
      const returnOpenBtn = document.getElementById('returnOpenBtn');
      const returnForm = document.getElementById('returnForm');
      const returnConfirmBtn = document.getElementById('returnConfirmBtn');
      const returnCancelBtn = document.getElementById('returnCancelBtn');
      // 「承認は保護者本人が操作しています」をチェックするまで、承認・差戻しの両ボタンを無効化する。
      const syncSelfConfirm = () => {
        const ok = selfConfirm.checked;
        approveBtn.disabled = !ok;
        returnOpenBtn.disabled = !ok;
      };
      selfConfirm.addEventListener('change', syncSelfConfirm);
      syncSelfConfirm();
      returnOpenBtn.addEventListener('click', () => {
        returnForm.classList.remove('hidden');
        document.getElementById('returnComment').focus();
      });
      returnCancelBtn.addEventListener('click', () => returnForm.classList.add('hidden'));
      approveBtn.addEventListener('click', parentApprove);
      returnConfirmBtn.addEventListener('click', parentReturn);
    }
    function showActionMsg(text, ok) {
      const el = document.getElementById('actionMsg');
      if (!el) return;
      el.textContent = text;
      el.className = `mt-3 rounded-lg px-3 py-2 text-sm ${ok ? 'border border-emerald-200 bg-emerald-50 text-emerald-700' : 'border border-rose-200 bg-rose-50 text-rose-700'}`;
    }
    async function postJson(url, body) {
      const res = await fetch(url, {method: 'POST', credentials: 'same-origin', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)});
      if (!res.ok) {
        let detail = `エラー（${res.status}）`;
        try { detail = (await res.json()).detail || detail; } catch (_) {}
        throw new Error(detail);
      }
      return res.json().catch(() => ({}));
    }
    // 参照画面は別ウィンドウのポップアップで開かれるため、承認管理一覧へは localStorage 経由で更新を通知する。
    function notifyOpener() {
      try { localStorage.setItem('parentApprovalRefresh', String(Date.now())); } catch (_) {}
    }
    // 承認・差戻しとも「保護者本人が操作」のチェックを必須にする（チェック後に外された場合の保険）。
    function requireSelfConfirm() {
      const el = document.getElementById('selfConfirm');
      if (el && el.checked) return true;
      showActionMsg('「承認は保護者本人が操作しています」にチェックしてください。', false);
      return false;
    }
    async function parentApprove() {
      if (!requireSelfConfirm()) return;
      const pending = currentFiltered.filter(report => report.status === 'awaiting_parent_approval');
      if (!pending.length) return;
      // 指導月報がある月は保護者記入欄の入力を必須にする（サーバ側でも同一の検証を行う）。
      const parentNote = (document.getElementById('parentNoteInput')?.value || '').trim();
      if (monthlyReport && !parentNote) {
        showActionMsg('指導月報の「保護者記入欄（ご要望／連絡事項）」を入力してから承認してください。', false);
        document.getElementById('parentNoteInput')?.focus();
        return;
      }
      // 講師評価アンケート（任意・202607231755 ③）: 回答は承認と同時に送信する（202607231908＝専用の送信ボタン廃止）。
      // 入力が途中なら、完了か未回答へ戻すかを選んでもらってから承認する。
      let surveySent = false;
      if (document.getElementById('surveyCard')) {
        const surveyValues = collectSurvey();
        if (surveyDirty(surveyValues)) {
          if (surveyAnsweredCount(surveyValues) === 6) {
            if (!(await submitSurvey())) {
              showActionMsg('講師評価アンケートを送信できませんでした。通信環境をご確認のうえ、もう一度お試しください。', false);
              return;
            }
            surveySent = true;
          } else {
            showActionMsg('講師評価アンケートの入力が途中です。Q1〜Q6のすべてに回答するか、アンケート欄の「入力を元に戻す／選択をクリア」で未回答に戻してから承認してください。', false);
            return;
          }
        }
      }
      try {
        await postJson('/api/reports/parent-approve-bulk', {report_ids: pending.map(report => report.id), target_month: targetMonth, parent_note: parentNote || null});
        notifyOpener();
        flashMsg = `${monthLabel(targetMonth)}の指導実績を承認しました。`
          + (surveySent ? '講師評価アンケートもあわせて送信しました。ご協力ありがとうございました。' : '');
        await load();
      } catch (e) {
        showActionMsg(`承認できませんでした：${e.message}`, false);
      }
    }
    async function parentReturn() {
      if (!requireSelfConfirm()) return;
      const comment = (document.getElementById('returnComment').value || '').trim();
      if (!comment) { showActionMsg('差戻しコメントを入力してください。', false); return; }
      const pending = currentFiltered.filter(report => report.status === 'awaiting_parent_approval');
      if (!pending.length) return;
      try {
        await postJson('/api/reports/parent-return-bulk', {report_ids: pending.map(report => report.id), target_month: targetMonth, comment});
        notifyOpener();
        flashMsg = `${monthLabel(targetMonth)}の指導実績を差戻しました。`;
        await load();
      } catch (e) {
        showActionMsg(`差戻しできませんでした：${e.message}`, false);
      }
    }

    // ===== 受付/再鑑担当の承認・差戻し（ダッシュボードのタスク欄から本画面へ集約） =====
    // ロール別に「承認対象ステータス・承認ラベル・承認API・差戻しfrom_role・職務分掌の衝突ロック」を定義。
    const ADMIN_ACTION_CONFIG = {
      admin_receiver: {
        statuses: ['submitted_to_admin', 'returned_to_receiver'],
        approveLabel: '受付承認',
        approveEndpoint: '/api/reports/admin-receive-bulk',
        returnFromRole: 'receiver',
        conflictLockKey: 'reviewed_report_ids',  // 再鑑を担当済みなら受付不可
        lockReason: 'この報告書は再鑑を担当済みのため、受付承認・差戻しはできません（受付と再鑑は同一報告書で兼務できません）。',
      },
      admin_reviewer: {
        statuses: ['received', 're_reviewed'],
        approveLabel: '再鑑承認',
        approveEndpoint: '/api/reports/admin-review-bulk',
        returnFromRole: 'reviewer',
        conflictLockKey: 'received_report_ids',  // 受付を担当済みなら再鑑不可
        lockReason: 'この報告書は受付を担当済みのため、再鑑承認・差戻しはできません（受付と再鑑は同一報告書で兼務できません）。',
      },
    };
    function adminApprovable(filtered) {
      const config = ADMIN_ACTION_CONFIG[ADMIN_ROLE];
      return config ? filtered.filter(report => config.statuses.includes(report.status)) : [];
    }
    function adminCompletedForReturn(filtered) {
      // 再鑑担当のみ：最終承認済み（完了）報告書を受付へ差戻せる。
      return ADMIN_ROLE === 'admin_reviewer' ? filtered.filter(report => report.status === 'admin_approved') : [];
    }
    function adminLocked(targets) {
      const config = ADMIN_ACTION_CONFIG[ADMIN_ROLE];
      if (!config) return false;
      const lockedIds = adminLocks[config.conflictLockKey] || [];
      return targets.some(report => lockedIds.includes(report.id));
    }
    function adminControlsHtml(approveLabel, returnOnly) {
      const approveButton = returnOnly ? '' :
        `<button id="approveBtn" type="button" class="w-full rounded-lg bg-emerald-600 px-4 py-2 text-sm font-medium text-white transition hover:bg-emerald-700 sm:w-auto">${escapeHtml(approveLabel)}</button>`;
      return `
        <div id="returnForm" class="mt-3 hidden rounded-xl border border-red-200 bg-red-50 p-4">
          <label class="text-sm font-medium text-slate-700" for="returnComment">差戻しコメント</label>
          <textarea id="returnComment" class="mt-2 min-h-24 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20" maxlength="2000" placeholder="差戻し理由を入力してください"></textarea>
          <div class="mt-3 flex flex-wrap gap-2">
            <button id="returnConfirmBtn" type="button" class="rounded-lg bg-red-600 px-3 py-2 text-sm font-medium text-white transition hover:bg-red-700">差戻す</button>
            <button id="returnCancelBtn" type="button" class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50">キャンセル</button>
          </div>
        </div>
        <div class="mt-3 flex flex-col gap-2 sm:flex-row sm:flex-wrap">
          <button id="returnOpenBtn" type="button" class="w-full rounded-lg border border-red-300 bg-white px-4 py-2 text-sm font-medium text-red-600 transition hover:bg-red-50 sm:w-auto">差戻す</button>
          ${approveButton}
        </div>
        <div id="actionMsg" class="mt-3 hidden rounded-lg px-3 py-2 text-sm"></div>`;
    }
    // 受付/再鑑の操作エリア。承認対象があれば承認＋差戻し、なければ（再鑑のみ）完了後差戻し、それも無ければ案内のみ。
    function adminActionAreaHtml(filtered) {
      if (!ADMIN_CAN_ACT) return '';
      const config = ADMIN_ACTION_CONFIG[ADMIN_ROLE];
      if (!config) return '';
      const wrap = (inner) => `<section class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">${inner}</section>`;
      const lockedNotice = (heading) => wrap(`<h2 class="font-semibold text-slate-800">${escapeHtml(heading)}</h2>
        <div class="mt-2 rounded-lg border border-amber-200 bg-amber-50 px-3 py-2 text-sm text-amber-800">⚠ ${escapeHtml(config.lockReason)}</div>`);
      const approvable = adminApprovable(filtered);
      if (approvable.length) {
        if (adminLocked(approvable)) return lockedNotice(`${config.approveLabel}・差戻し`);
        return wrap(`<h2 class="font-semibold text-slate-800">${escapeHtml(config.approveLabel)}・差戻し</h2>
          <p class="mt-1 text-sm text-slate-600">上記の内容をご確認のうえ、${escapeHtml(monthLabel(targetMonth))}の指導実績を${escapeHtml(config.approveLabel)}、または差戻してください。</p>`
          + adminControlsHtml(config.approveLabel, false));
      }
      const completed = adminCompletedForReturn(filtered);
      if (completed.length) {
        if (adminLocked(completed)) return lockedNotice('差戻し');
        return wrap(`<h2 class="font-semibold text-slate-800">差戻し</h2>
          <p class="mt-1 text-sm text-slate-600">この報告書は最終承認済みです。修正が必要な場合は受付へ差戻しできます。</p>`
          + adminControlsHtml(null, true));
      }
      return wrap('<div class="rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-600">あなたが対応する承認・差戻しはありません。</div>');
    }
    function wireAdminActions() {
      const returnOpenBtn = document.getElementById('returnOpenBtn');
      if (!returnOpenBtn) return; // 操作エリア未表示（対象なし・ロック中）
      const approveBtn = document.getElementById('approveBtn');
      const returnForm = document.getElementById('returnForm');
      const returnConfirmBtn = document.getElementById('returnConfirmBtn');
      const returnCancelBtn = document.getElementById('returnCancelBtn');
      returnOpenBtn.addEventListener('click', () => {
        returnForm.classList.remove('hidden');
        document.getElementById('returnComment').focus();
      });
      returnCancelBtn.addEventListener('click', () => returnForm.classList.add('hidden'));
      returnConfirmBtn.addEventListener('click', adminReturn);
      if (approveBtn) approveBtn.addEventListener('click', adminApprove);
    }
    // 参照画面は別ウィンドウのポップアップで開かれるため、運営ダッシュボードへは localStorage 経由で更新を通知する。
    function notifyAdminOpener() {
      try { localStorage.setItem('adminDashboardRefresh', String(Date.now())); } catch (_) {}
    }
    async function adminApprove() {
      const config = ADMIN_ACTION_CONFIG[ADMIN_ROLE];
      const approvable = adminApprovable(currentFiltered);
      if (!config || !approvable.length) return;
      if (adminLocked(approvable)) { showActionMsg(config.lockReason, false); return; }
      if (!confirm(`${monthLabel(targetMonth)}の指導実績を${config.approveLabel}します。よろしいですか？`)) return;
      try {
        await postJson(config.approveEndpoint, {report_ids: approvable.map(report => report.id), target_month: targetMonth});
        notifyAdminOpener();
        flashMsg = `${monthLabel(targetMonth)}の指導実績を${config.approveLabel}しました。`;
        await load();
      } catch (e) {
        showActionMsg(`${config.approveLabel}できませんでした：${e.message}`, false);
      }
    }
    async function adminReturn() {
      const config = ADMIN_ACTION_CONFIG[ADMIN_ROLE];
      if (!config) return;
      const comment = (document.getElementById('returnComment').value || '').trim();
      if (!comment) { showActionMsg('差戻しコメントを入力してください。', false); return; }
      // 承認対象があればそれを、無ければ（再鑑のみ）完了後差戻し対象を差戻す。
      let targets = adminApprovable(currentFiltered);
      if (!targets.length) targets = adminCompletedForReturn(currentFiltered);
      if (!targets.length) return;
      if (adminLocked(targets)) { showActionMsg(config.lockReason, false); return; }
      try {
        await postJson('/api/reports/admin-return-bulk', {report_ids: targets.map(report => report.id), target_month: targetMonth, from_role: config.returnFromRole, comment});
        notifyAdminOpener();
        flashMsg = `${monthLabel(targetMonth)}の指導実績を差戻しました。`;
        await load();
      } catch (e) {
        showActionMsg(`差戻しできませんでした：${e.message}`, false);
      }
    }
    load();
  </script>
</body>
</html>
