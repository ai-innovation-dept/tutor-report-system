<!-- # === Phase 8: フロントエンド共通 START === -->
<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tutor Reports</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <nav class="bg-white border-b border-slate-200">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between gap-3">
      <div class="flex flex-wrap items-center gap-2">
        <a href="/login" class="font-semibold" id="navHome">Tutor Reports</a>
        <button type="button" id="returnCommentBadge" onclick="openReturnCommentsModal()" class="hidden rounded-full border border-red-300 bg-red-100 px-2.5 py-1 text-xs font-medium text-red-700">
          差戻しあり
        </button>
      </div>
      <div class="flex flex-wrap items-center justify-end gap-2 text-sm" id="navItems">
        <button onclick="logout()" class="px-3 py-1 bg-slate-900 text-white rounded">Logout</button>
      </div>
    </div>
  </nav>
  <div id="returnCommentsOverlay" class="fixed inset-0 z-[1000] hidden items-center justify-center bg-slate-900/50 px-4" onclick="closeReturnCommentsModal()">
    <div class="w-full max-w-lg rounded-lg bg-white shadow-xl" onclick="event.stopPropagation()">
      <div class="flex items-center justify-between border-b px-5 py-3">
        <h2 class="font-semibold">差戻しコメント</h2>
        <button type="button" class="rounded px-2 py-1 text-sm hover:bg-slate-100" onclick="closeReturnCommentsModal()">閉じる</button>
      </div>
      <div id="returnCommentsList" class="max-h-[70vh] overflow-y-auto p-5 text-sm"></div>
    </div>
  </div>
  <main class="max-w-6xl mx-auto px-4 py-6">
    <div id="flash" class="hidden mb-4 p-3 rounded bg-amber-100 text-amber-900"></div>
    {% block content %}{% endblock %}
  </main>
  <script src="/static/js/auth.js"></script>
  <script>
    window.currentUser = {
      id: '{{ current_user.id }}',
      email: {{ current_user.email | tojson }},
      role: '{{ current_user.role }}',
      display_name: {{ current_user.display_name | tojson }},
      tutor_no: {{ (current_user.tutor_no or "") | tojson }}
    };
    renderNav(window.currentUser);
    window.authReady = Promise.resolve(window.currentUser);

    function currentMonthValue() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    }

    function navEscape(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'}[ch]));
    }

    function navDurationLabel(minutes) {
      const hours = Math.floor(minutes / 60);
      const mins = minutes % 60;
      if (hours && mins) return `${hours}時間${mins}分`;
      if (hours) return `${hours}時間`;
      return `${mins}分`;
    }

    function navTimeText(value) {
      return (value || '').slice(0, 5);
    }

    function navMinutesBetween(start, end) {
      if (!start || !end) return 0;
      const [sh, sm] = start.split(':').map(Number);
      const [eh, em] = end.split(':').map(Number);
      return Math.max(0, (eh * 60 + em) - (sh * 60 + sm));
    }

    function navTeachingMinutes(report) {
      return Math.max(0, navMinutesBetween(navTimeText(report.start_time), navTimeText(report.end_time)) - Number(report.break_minutes || 0));
    }

    function navLink(href, label) {
      return `<a class="px-2 py-1 hover:bg-slate-100 rounded" href="${href}">${label}</a>`;
    }

    async function renderNav(user) {
      const items = [];
      if (user.role === 'tutor') {
        navHome.href = '/tutor/reports';
        items.push(navLink('/tutor/reports', '報告書一覧'));
        items.push(navLink('/tutor/approval', '承認管理'));
        items.push(`<span class="px-2 py-1 text-slate-600">講師：${navEscape(user.tutor_no || '-')}</span>`);
        items.push(`<span class="px-2 py-1 text-slate-600" id="navUsername">${navEscape(user.display_name)}</span>`);
        items.push('<span class="px-2 py-1 text-slate-600" id="navTutorTotal">合計：0分</span>');
      } else if (user.role === 'parent') {
        navHome.href = '/parent/reports';
        items.push(navLink('/parent/reports', '報告書一覧'));
        items.push(`<span class="px-2 py-1 text-slate-600" id="navUsername">${navEscape(user.display_name)}</span>`);
      } else if (user.role === 'admin_receiver') {
        navHome.href = '/admin/dashboard';
        items.push(navLink('/admin/dashboard', 'ダッシュボード'));
        items.push(navLink('/admin/queue/receive', '受付待ち一覧'));
        items.push('<span class="px-2 py-1 text-slate-600">受付担当</span>');
      } else if (user.role === 'admin_reviewer') {
        navHome.href = '/admin/dashboard';
        items.push(navLink('/admin/dashboard', 'ダッシュボード'));
        items.push(navLink('/admin/queue/review', '再鑑待ち一覧'));
        items.push('<span class="px-2 py-1 text-slate-600">再鑑者</span>');
      } else if (user.role === 'admin_master') {
        navHome.href = '/admin/dashboard';
        items.push(navLink('/admin/dashboard', 'ダッシュボード'));
        items.push(navLink('/admin/queue/receive', '受付待ち一覧'));
        items.push(navLink('/admin/queue/review', '再鑑待ち一覧'));
        items.push(navLink('/admin/queue/approve', '承認待ち一覧'));
        items.push(navLink('/admin/users', 'ユーザー管理'));
        items.push(navLink('/admin/assignments', '紐付け管理'));
        items.push('<span class="px-2 py-1 text-slate-600">管理者</span>');
      }
      items.push('<button onclick="logout()" class="px-3 py-1 bg-slate-900 text-white rounded">Logout</button>');
      navItems.innerHTML = items.join('');
      if (user.role === 'tutor') await renderTutorNavExtras();
    }

    async function renderTutorNavExtras() {
      const currentMonth = currentMonthValue();
      const [reports, assignments] = await Promise.all([
        api(`/api/reports?target_month=${currentMonth}`),
        api('/api/assignments')
      ]);
      const total = reports.reduce((sum, report) => sum + navTeachingMinutes(report), 0);
      const totalArea = document.getElementById('navTutorTotal');
      if (totalArea) totalArea.textContent = `合計：${navDurationLabel(total)}`;

      const assignmentMap = new Map(assignments.map(assignment => [assignment.id, assignment]));
      const returned = reports.filter(report => report.status === 'returned_to_tutor' && report.last_return_comment);
      if (!returned.length) return;
      returnCommentsList.innerHTML = returned.map(report => {
        const assignment = assignmentMap.get(report.assignment_id);
        const actorLabel = report.last_event === 'parent_return' ? '保護者' : '運営';
        return `<div class="border-b py-4 last:border-b-0 first:pt-0 last:pb-0">
          <div class="font-semibold">【${navEscape(assignment?.student_name || '生徒未設定')}】${returnCommentDateLabel(report.lesson_date)}</div>
          <div class="mt-2 text-slate-700">差戻し者：${actorLabel}</div>
          <div class="mt-1 text-slate-700">日時：${navEscape(formatReturnDateTime(report.last_return_at))}</div>
          <div class="mt-1 whitespace-pre-wrap text-slate-900">コメント：${navEscape(report.last_return_comment)}</div>
        </div>`;
      }).join('');
      returnCommentBadge.classList.remove('hidden');
    }

    function returnCommentDateLabel(value) {
      const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
      const d = new Date(`${value}T00:00:00`);
      if (Number.isNaN(d.getTime())) return value || '';
      return `${d.getMonth() + 1}月${d.getDate()}日（${weekdays[d.getDay()]}）`;
    }

    function formatReturnDateTime(value) {
      if (!value) return '-';
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return '-';
      return `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
    }

    function openReturnCommentsModal() {
      returnCommentsOverlay.classList.remove('hidden');
      returnCommentsOverlay.classList.add('flex');
    }

    function closeReturnCommentsModal() {
      returnCommentsOverlay.classList.add('hidden');
      returnCommentsOverlay.classList.remove('flex');
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
<!-- # === Phase 8 END === -->
