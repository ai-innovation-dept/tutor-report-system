<!-- # === Phase 8: フロントエンド共通 START === -->
<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tutor Reports</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-900">
  <div id="sidebarBackdrop" class="fixed inset-0 z-30 hidden bg-slate-900/50 md:hidden" onclick="closeSidebar()"></div>

  <aside id="sidebarPanel" class="fixed inset-y-0 left-0 z-40 flex w-56 -translate-x-full transform flex-col bg-[#1e2a3a] text-white shadow-2xl transition-transform duration-300 md:translate-x-0">
    <div class="border-b border-slate-700 px-6 py-5">
      <a href="/login" class="block" id="navHome">
        <h1 class="text-lg font-bold text-white">Tutor Reports</h1>
        <p class="mt-1 text-xs text-slate-400">指導実績報告システム</p>
      </a>
    </div>

    <div class="border-b border-slate-700 px-4 py-4">
      <p class="text-xs text-slate-400">ログイン中</p>
      <p class="mt-1 text-sm font-semibold text-white" id="sidebarUserName">{{ current_user.display_name }}</p>
      <p class="mt-1 text-xs text-slate-400" id="sidebarUserRole">{{ current_user.role }}</p>
      <p class="mt-1 text-xs text-slate-400 {% if current_user.role != 'tutor' %}hidden{% endif %}" id="sidebarTutorNo">講師No：{{ current_user.tutor_no or '-' }}</p>
      <p class="mt-1 text-xs text-slate-400 {% if current_user.role != 'tutor' %}hidden{% endif %}" id="navTutorTotal">合計：0分</p>
    </div>

    <nav id="navItems" class="flex-1 space-y-1 overflow-y-auto px-3 py-4"></nav>

    <div class="border-t border-slate-700 px-4 py-4">
      <button id="returnCommentBadge" type="button" onclick="openReturnCommentsModal()" class="hidden w-full rounded-lg border border-red-300 bg-red-100 px-3 py-2 text-left text-sm font-medium text-red-700 hover:bg-red-200">
        差戻しあり
      </button>
      <button onclick="logout()" class="mt-3 w-full rounded-lg border border-white/10 bg-white/10 px-3 py-2 text-left text-sm font-medium text-slate-100 hover:bg-white/15">
        ログアウト
      </button>
    </div>
  </aside>

  <div class="min-h-screen md:pl-56">
    <header class="sticky top-0 z-20 border-b border-slate-200 bg-white/95 backdrop-blur">
      <div class="flex items-center justify-between gap-3 px-4 py-4 md:px-8">
        <div class="flex items-center gap-3">
          <button type="button" class="inline-flex h-10 w-10 items-center justify-center rounded-lg border border-slate-200 bg-white text-slate-700 shadow-sm transition hover:bg-slate-50 md:hidden" onclick="openSidebar()" aria-label="メニューを開く">
            ☰
          </button>
          <div>
            <div id="page-title" class="text-lg font-semibold text-slate-800"></div>
            <div class="text-xs text-slate-500">業務システム</div>
          </div>
        </div>
        <div class="flex items-center gap-2"></div>
      </div>
    </header>

    <main class="px-4 py-6 md:px-8">
      <div id="flash" class="mb-4 hidden rounded-xl border border-amber-200 bg-amber-100 p-3 text-amber-900"></div>
      {% block content %}{% endblock %}
    </main>
  </div>

  <div id="returnCommentsOverlay" class="fixed inset-0 z-[1000] hidden items-center justify-center bg-slate-900/50 px-4" onclick="closeReturnCommentsModal()">
    <div class="w-full max-w-lg rounded-xl border border-slate-200 bg-white shadow-2xl" onclick="event.stopPropagation()">
      <div class="flex items-center justify-between border-b border-slate-200 px-5 py-4">
        <h2 class="font-semibold text-slate-800">差戻しコメント</h2>
        <button type="button" class="rounded-lg px-2 py-1 text-sm text-slate-500 hover:bg-slate-100 hover:text-slate-900" onclick="closeReturnCommentsModal()">閉じる</button>
      </div>
      <div id="returnCommentsList" class="max-h-[70vh] overflow-y-auto p-5 text-sm"></div>
    </div>
  </div>

  <div id="toastContainer" class="fixed right-4 top-4 z-[1200] space-y-2"></div>

  <script src="/static/js/auth.js"></script>
  <script>
    window.currentUser = {
      id: '{{ current_user.id }}',
      email: {{ current_user.email | tojson }},
      role: '{{ current_user.role }}',
      roles: {{ (current_user.roles or [current_user.role]) | tojson }},
      display_name: {{ current_user.display_name | tojson }},
      tutor_no: {{ (current_user.tutor_no or "") | tojson }}
    };

    window.authReady = Promise.resolve(window.currentUser);

    function showToast(message, type = 'info') {
      const colors = {
        success: 'bg-emerald-600 text-white',
        error: 'bg-red-600 text-white',
        info: 'bg-blue-600 text-white'
      };
      const toast = document.createElement('div');
      toast.className = `min-w-64 max-w-sm rounded-lg px-4 py-3 text-sm font-medium shadow-lg transition ${colors[type] || colors.info}`;
      toast.textContent = message;
      toastContainer.appendChild(toast);
      setTimeout(() => {
        toast.classList.add('opacity-0');
        setTimeout(() => toast.remove(), 200);
      }, 3000);
    }

    function roleDisplayName(role) {
      if (role === 'tutor') return '講師';
      if (role === 'parent') return '保護者';
      if (role === 'admin_receiver') return '受付担当';
      if (role === 'admin_reviewer') return '再鑑者';
      if (role === 'admin_master') return '管理者';
      return role;
    }

    function openSidebar() {
      sidebarPanel.classList.remove('-translate-x-full');
      sidebarBackdrop.classList.remove('hidden');
    }

    function closeSidebar() {
      sidebarPanel.classList.add('-translate-x-full');
      sidebarBackdrop.classList.add('hidden');
    }

    function currentMonthValue() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    }

    function navEscape(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'}[ch]));
    }

    function navDurationLabel(minutes) {
      const hours = Math.floor(minutes / 60);
      const mins = minutes % 60;
      if (hours && mins) return `${hours}時間${mins}分`;
      if (hours) return `${hours}時間`;
      return `${mins}分`;
    }

    function navTimeText(value) {
      return (value || '').slice(0, 5);
    }

    function navMinutesBetween(start, end) {
      if (!start || !end) return 0;
      const [sh, sm] = start.split(':').map(Number);
      const [eh, em] = end.split(':').map(Number);
      return Math.max(0, (eh * 60 + em) - (sh * 60 + sm));
    }

    function navTeachingMinutes(report) {
      return Math.max(0, navMinutesBetween(navTimeText(report.start_time), navTimeText(report.end_time)) - Number(report.break_minutes || 0));
    }

    function navLink(href, label) {
      const active = isActiveNavLink(href);
      const base = 'flex items-center justify-between rounded-lg px-3 py-2 text-sm font-medium transition';
      const state = active
        ? 'bg-blue-600 text-white shadow-sm'
        : 'text-slate-200 hover:bg-white/10 hover:text-white';
      return `<a data-nav-link href="${href}" class="${base} ${state}">${label}</a>`;
    }

    function isActiveNavLink(href) {
      const path = window.location.pathname;
      if (href === '/tutor/reports') return path === '/tutor/reports' || path.startsWith('/tutor/reports/');
      if (href === '/admin/dashboard') return path === '/admin/dashboard';
      return path === href;
    }

    function syncPageTitle() {
      const title = document.getElementById('page-title');
      const heading = document.querySelector('main h1');
      if (title && heading) title.textContent = heading.textContent.trim();
    }

    async function renderNav(user) {
      sidebarUserName.textContent = user.display_name;
      sidebarUserRole.textContent = roleDisplayName(user.role);
      sidebarTutorNo.textContent = `講師No：${user.tutor_no || '-'}`;
      sidebarTutorNo.classList.toggle('hidden', user.role !== 'tutor');

      const items = [];
      if (user.role === 'tutor') {
        navHome.href = '/tutor/reports';
        items.push(navLink('/tutor/reports', '報告書一覧'));
        items.push(navLink('/tutor/approval', '承認管理'));
      } else if (user.role === 'parent') {
        navHome.href = '/parent/reports';
        items.push(navLink('/parent/reports', '報告書一覧'));
        items.push(navLink('/parent/approval', '承認管理'));
      } else if (user.role === 'admin_receiver') {
        navHome.href = '/admin/dashboard';
        items.push(navLink('/admin/dashboard', 'ダッシュボード'));
      } else if (user.role === 'admin_reviewer') {
        navHome.href = '/admin/dashboard';
        items.push(navLink('/admin/dashboard', 'ダッシュボード'));
      } else if (user.role === 'admin_master') {
        navHome.href = '/admin/dashboard';
        items.push(navLink('/admin/dashboard', 'ダッシュボード'));
        items.push(navLink('/admin/users', 'ユーザー管理'));
        items.push(navLink('/admin/assignments', '紐付け管理'));
      }
      navItems.innerHTML = items.join('');

      syncPageTitle();
      closeSidebar();
      if (user.role === 'tutor') await renderTutorNavExtras();
    }

    async function renderTutorNavExtras() {
      const currentMonth = currentMonthValue();
      const [reports, assignments] = await Promise.all([
        api(`/api/reports?target_month=${currentMonth}`),
        api('/api/assignments')
      ]);
      const total = reports.reduce((sum, report) => sum + navTeachingMinutes(report), 0);
      const totalArea = document.getElementById('navTutorTotal');
      if (totalArea) totalArea.textContent = `合計：${navDurationLabel(total)}`;

      const assignmentMap = new Map(assignments.map(assignment => [assignment.id, assignment]));
      const returned = reports.filter(report => ['returned_to_tutor', 'returned_to_receiver'].includes(report.status) && report.last_return_comment);
      if (!returned.length) return;
      returnCommentsList.innerHTML = latestMonthlyReturnComments(returned).map(report => {
        const assignment = assignmentMap.get(report.assignment_id);
        const actorLabel = returnActorLabel(report);
        const month = report.target_month || currentMonth;
        return `<div class="border-b border-slate-200 py-4 last:border-b-0 first:pt-0 last:pb-0">
          <div class="font-semibold text-slate-800">【${navEscape(assignment?.student_name || '生徒未設定')}】${Number(month.slice(5, 7))}月分差戻し</div>
          <div class="mt-2 text-slate-700">差戻し者：${navEscape(actorLabel)}</div>
          <div class="mt-1 text-slate-700">日時：${navEscape(formatReturnDateTime(report.last_return_at))}</div>
          <div class="mt-1 whitespace-pre-wrap text-slate-900">コメント：${navEscape(report.last_return_comment)}</div>
        </div>`;
      }).join('');
      document.getElementById('returnCommentBadge')?.classList.remove('hidden');
    }

    function latestMonthlyReturnComments(reports) {
      const latestByMonth = new Map();
      reports.forEach(report => {
        const month = report.target_month || (report.lesson_date || '').slice(0, 7);
        const key = `${report.assignment_id || ''}:${month}`;
        const current = latestByMonth.get(key);
        if (!current || compareReturnReports(report, current) > 0) {
          latestByMonth.set(key, report);
        }
      });
      return [...latestByMonth.values()].sort(compareReturnReports).reverse();
    }

    function compareReturnReports(a, b) {
      const dateCompare = String(a.lesson_date || '').localeCompare(String(b.lesson_date || ''));
      if (dateCompare !== 0) return dateCompare;
      return new Date(a.last_return_at || a.updated_at || 0).getTime() - new Date(b.last_return_at || b.updated_at || 0).getTime();
    }

    function returnActorLabel(report) {
      const role = report.last_return_by || report.returned_by_role;
      if (role) return roleDisplayName(role);
      return report.last_event === 'parent_return' ? '保護者' : '運営';
    }

    function formatReturnDateTime(value) {
      if (!value) return '-';
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return '-';
      return `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2, '0')}`;
    }

    function openReturnCommentsModal() {
      returnCommentsOverlay.classList.remove('hidden');
      returnCommentsOverlay.classList.add('flex');
    }

    function closeReturnCommentsModal() {
      returnCommentsOverlay.classList.add('hidden');
      returnCommentsOverlay.classList.remove('flex');
    }

    window.addEventListener('resize', () => {
      if (window.innerWidth >= 768) closeSidebar();
    });

    renderNav(window.currentUser);
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
<!-- # === Phase 8 END === -->
