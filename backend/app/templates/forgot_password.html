<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>パスワードリセット</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#1e2a3a]">
  <div class="min-h-screen bg-[radial-gradient(circle_at_top,_rgba(59,130,246,0.18),_transparent_28%),linear-gradient(180deg,#1e2a3a_0%,#0f172a_100%)] px-4 py-10">
    <main class="mx-auto flex min-h-[calc(100vh-5rem)] w-full max-w-md items-center justify-center">
      <div class="w-full rounded-2xl border border-white/10 bg-white p-8 shadow-2xl shadow-slate-950/20 md:p-10">
        <div class="mb-8 text-center">
          <div class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-2xl bg-blue-600 text-white shadow-lg shadow-blue-600/30"><svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-5 8l1.5 1.5L15 11"/></svg></div>
          <h1 class="text-2xl font-bold text-slate-800">パスワードリセット</h1>
          <p class="mt-2 text-sm text-slate-500">登録済みのメールアドレスを入力してください。</p>
        </div>

        <form id="forgotPasswordForm" class="space-y-5">
          <label class="block">
            <span class="mb-2 block text-sm font-medium text-slate-700">メールアドレス</span>
            <input name="email" type="email" placeholder="example@email.com" class="w-full rounded-lg border border-slate-300 px-4 py-3 text-slate-800 placeholder-slate-400 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20" required>
          </label>
          <p id="message" class="hidden rounded-lg px-3 py-2 text-sm"></p>
          <button class="w-full rounded-lg bg-blue-600 px-4 py-3 font-medium text-white transition hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">リセットメールを送る</button>
          <a href="/login" class="block text-center text-sm text-slate-500 hover:text-slate-700">ログイン画面へ戻る</a>
        </form>
      </div>
    </main>
  </div>
  <script>
const form = document.querySelector('#forgotPasswordForm');
const message = document.querySelector('#message');

function showMessage(text, isError = false) {
  message.textContent = text;
  message.className = `rounded-lg px-3 py-2 text-sm ${isError ? 'border border-rose-200 bg-rose-50 text-rose-700' : 'border border-emerald-200 bg-emerald-50 text-emerald-700'}`;
}

form.addEventListener('submit', async event => {
  event.preventDefault();
  const data = Object.fromEntries(new FormData(form));
  const res = await fetch('/api/auth/forgot-password', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  });
  if (!res.ok) {
    showMessage('送信できませんでした。時間をおいて再度お試しください。', true);
    return;
  }
  showMessage('メールを送信しました。ご確認ください。');
});
  </script>
</body>
</html>
