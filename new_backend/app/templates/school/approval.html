{% extends "base.html" %}
{% block content %}
<div class="mb-6 flex flex-wrap items-end justify-between gap-4">
  <div>
    <h1 class="text-xl font-bold text-slate-800">承認管理</h1>
    <p class="mt-1 text-sm text-slate-500">講師から届いた業務連絡表を確認し、承認または差戻しを行います。</p>
  </div>
  <label class="flex items-center gap-3 rounded-xl border border-slate-200 bg-white px-4 py-3 text-sm shadow-sm">
    <span class="text-slate-600">表示月</span>
    <select id="monthFilter" class="rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20"></select>
  </label>
</div>

<section id="exportArea" class="mb-4 hidden rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
  <div id="exportButtons" class="flex flex-col gap-2 sm:flex-row sm:flex-wrap"></div>
</section>

<div id="approvalContent" class="grid gap-4"></div>
{% endblock %}
{% block scripts %}
<script>
setBreadcrumb('学校ポータル', '承認管理');
const currentMonth = new Date().toISOString().slice(0, 7);
let allReports = [];
let selectedMonth = new URLSearchParams(location.search).get('month') || currentMonth;

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'}[ch]));
}
function monthLabel(value) {
  const [year, month] = value.split('-');
  return `${year}年${Number(month)}月分`;
}
function monthOptionLabel(value) {
  const [year, month] = value.split('-');
  return `${year}年${Number(month)}月`;
}
function dateTimeLabel(value) {
  if (!value) return '-';
  const d = new Date(value);
  if (Number.isNaN(d.getTime())) return '-';
  return `${d.getFullYear()}/${d.getMonth() + 1}/${String(d.getDate()).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
}
function statusBadge(status) {
  if (status === 'draft') return '<span class="inline-flex rounded-full bg-slate-100 px-2.5 py-1 text-xs font-medium text-slate-600">未提出</span>';
  if (status === 'awaiting_office_precheck') return '<span class="inline-flex rounded-full bg-slate-100 px-2.5 py-1 text-xs font-medium text-slate-600">事務確認中</span>';
  if (status === 'awaiting_school') return '<span class="inline-flex rounded-full bg-yellow-100 px-2.5 py-1 text-xs font-medium text-yellow-800">確認待ち</span>';
  if (status === 'returned_to_tutor') return '<span class="inline-flex rounded-full bg-red-100 px-2.5 py-1 text-xs font-medium text-red-700">差戻し済み</span>';
  if (status === 'approved') return '<span class="inline-flex rounded-full bg-emerald-100 px-2.5 py-1 text-xs font-medium text-emerald-700">最終承認済み</span>';
  if (['awaiting_office', 'awaiting_sales', 'returned_to_office'].includes(status)) return '<span class="inline-flex rounded-full bg-emerald-100 px-2.5 py-1 text-xs font-medium text-emerald-700">承認済み</span>';
  if (status === 'closed') return '<span class="inline-flex rounded-full bg-slate-100 px-2.5 py-1 text-xs font-medium text-slate-600">クローズ</span>';
  return '<span class="inline-flex rounded-full bg-slate-100 px-2.5 py-1 text-xs font-medium text-slate-600">状態確認中</span>';
}
function schoolName(report) { return report.school_name || '学校未設定'; }
function tutorName(report) { return report.tutor_name || '講師未設定'; }
function reportsForMonth() {
  return allReports
    .filter(report => report.target_month === selectedMonth && report.status !== 'draft')
    .sort((a, b) => tutorName(a).localeCompare(tutorName(b), 'ja'));
}
function openReportWindow(reportId) {
  openReportPopup(`/reports/${reportId}/view`, `report_${reportId}`);
}
// 学校が必要とするのは「いつ・どの講師から提出されたか」と「自分（学校）がいつ承認/差戻したか」のみ。
// 事務・営業など後段の承認は学校には不要なため除外する（submit と、学校確認(awaiting_school)からの自分の操作だけ表示）。
// 講師の差戻し要求（request_return）と、学校確認待ちでの要求許可・却下も学校の関心事のため表示する。
const SCHOOL_STAGE_ACTIONS = new Set(['approve', 'return', 'approve_return_request', 'decline_return_request']);
function operationHistory(report) {
  const events = (report.events || [])
    .filter(event => event.action === 'submit'
      || event.action === 'request_return'
      || (SCHOOL_STAGE_ACTIONS.has(event.action) && event.from_status === 'awaiting_school'))
    .sort((a, b) => String(a.created_at).localeCompare(String(b.created_at)));
  if (!events.length) return '';
  const tutorLabel = `講師　${escapeHtml(tutorName(report))}${report.tutor_no ? `（${escapeHtml(report.tutor_no)}）` : ''}`;
  const schoolLabel = `学校　${escapeHtml(schoolName(report))}${report.school_no ? `（${escapeHtml(report.school_no)}）` : ''}`;
  const row = (datetime, actor, action, extra = '') =>
    `<li class="grid gap-1 sm:grid-cols-[11rem_1fr]"><span class="text-slate-600">${escapeHtml(dateTimeLabel(datetime))}</span><span>${actor}　${action}${extra}</span></li>`;
  const commentBlock = (event) => event.comment ? `<span class="mt-1 block text-slate-700">コメント：${escapeHtml(event.comment)}</span>` : '';
  return `<div class="mt-3 rounded-lg border border-slate-200 bg-slate-50 p-3 text-sm">
    <div class="font-medium text-slate-800">操作履歴</div>
    <ul class="mt-2 space-y-2">
      ${events.map(event => {
        if (event.action === 'submit') return row(event.created_at, tutorLabel, '<span class="font-medium text-slate-700">提出</span>');
        if (event.action === 'request_return') return row(event.created_at, tutorLabel, '<span class="font-medium text-amber-700">差戻し要求</span>', commentBlock(event));
        if (event.action === 'approve') return row(event.created_at, schoolLabel, '<span class="font-medium text-emerald-700">承認</span>');
        if (event.action === 'approve_return_request') return row(event.created_at, schoolLabel, '<span class="font-medium text-red-700">要求許可（講師へ差戻し）</span>', commentBlock(event));
        if (event.action === 'decline_return_request') return row(event.created_at, schoolLabel, '<span class="font-medium text-amber-700">要求却下</span>', commentBlock(event));
        return row(event.created_at, schoolLabel, '<span class="font-medium text-red-700">差戻し</span>', commentBlock(event));
      }).join('')}
    </ul>
  </div>`;
}
// 承認・差戻しの操作は「報告書を確認」で開く参照画面（report_view.html）へ集約した。
// 学校が報告書の中身を確認したうえで操作する導線のため、一覧には状態案内のみを表示しボタンは置かない。
function actionArea(report) {
  // 過去月も承認・差戻し可（月をまたいだ承認に対応＝改修 202607211716・案B）。状態で判定する。
  if (report.status === 'returned_to_tutor') {
    return '<div class="mt-3 rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700">差戻し済みです。講師の修正をお待ちください。</div>';
  }
  if (report.status === 'awaiting_school') {
    if (report.return_request_pending) {
      return '<div class="mt-3 rounded-lg border border-amber-300 bg-amber-50 px-3 py-2 text-sm text-amber-800">📩 講師から差戻し要求が届いています。「報告書を確認」を開き、要求を許可（講師へ差戻し）または却下してください。</div>';
    }
    return '<div class="mt-3 rounded-lg border border-emerald-200 bg-emerald-50 px-3 py-2 text-sm text-emerald-700">「報告書を確認」を開き、内容をご確認のうえ承認・差戻しを行ってください。</div>';
  }
  if (report.status === 'awaiting_office_precheck') {
    return '<div class="mt-3 rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-600">事務確認中です。学校への承認依頼をお待ちください。</div>';
  }
  if (['awaiting_office', 'awaiting_sales', 'returned_to_office', 'approved'].includes(report.status)) {
    return '<div class="mt-3 rounded-lg border border-emerald-200 bg-emerald-50 px-3 py-2 text-sm text-emerald-700">承認済みです。</div>';
  }
  return '<div class="mt-3 rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-600">現在確認できる操作はありません。</div>';
}
function reportCard(report) {
  const requestBadge = (report.return_request_pending && report.status === 'awaiting_school')
    ? '<span class="inline-flex rounded-full bg-amber-100 px-2.5 py-1 text-xs font-medium text-amber-800">差戻し要求あり</span>'
    : '';
  return `<section class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
    <div class="flex flex-wrap items-start justify-between gap-3">
      <div>
        <div class="font-semibold text-slate-800">${escapeHtml(monthLabel(report.target_month))}　学校名：${escapeHtml(schoolName(report))}　講師名：${escapeHtml(tutorName(report))}</div>
      </div>
      <div class="flex flex-wrap items-center gap-2">${requestBadge}${statusBadge(report.status)}</div>
    </div>
    ${report.school_approved_at ? `<div class="mt-2 text-sm text-emerald-700">承認日時：${escapeHtml(dateTimeLabel(report.school_approved_at))}</div>` : ''}
    <div class="mt-3">
      <button class="rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50" onclick="openReportWindow('${report.id}')">報告書を確認</button>
    </div>
    ${operationHistory(report)}
    ${actionArea(report)}
  </section>`;
}
function renderMonthFilter() {
  const months = [...new Set([...allReports.map(report => report.target_month), currentMonth])]
    .filter(month => month <= currentMonth).sort().reverse();
  if (!months.includes(selectedMonth)) selectedMonth = months.includes(currentMonth) ? currentMonth : months[0];
  monthFilter.innerHTML = months.map(month => `<option value="${month}">${monthOptionLabel(month)}</option>`).join('');
  monthFilter.value = selectedMonth;
  monthFilter.disabled = !months.length;
}
function renderExportArea() {
  const hasApproved = reportsForMonth().some(report => report.status === 'approved');
  if (!hasApproved) {
    exportArea.classList.add('hidden');
    exportButtons.innerHTML = '';
    return;
  }
  exportArea.classList.remove('hidden');
  exportButtons.innerHTML = `<a href="/api/w/reports/export?target_month=${selectedMonth}&format=pdf&scope=all" class="inline-flex w-full items-center justify-center rounded-lg bg-emerald-600 px-3 py-2 text-sm text-white transition hover:bg-emerald-700 sm:w-auto">最終承認済みをPDFでダウンロード</a>`;
}
function renderApproval() {
  renderMonthFilter();
  renderExportArea();
  const reports = reportsForMonth();
  approvalContent.innerHTML = reports.length
    ? reports.map(reportCard).join('')
    : '<div class="rounded-xl border border-slate-200 bg-white p-5 text-sm text-slate-600 shadow-sm">この月に表示できる報告書はありません。</div>';
}
async function loadApproval() {
  allReports = await api('/api/w/reports');
  renderApproval();
}
monthFilter.addEventListener('change', () => {
  selectedMonth = monthFilter.value;
  renderApproval();
});
// 「報告書を確認」ポップアップ（report_view.html）で承認/差戻しが行われたら一覧を再読込する。
// ポップアップは別ウィンドウで開くため、localStorage の更新を介して通知を受け取る。
window.addEventListener('storage', event => {
  if (event.key === 'schoolApprovalRefresh') loadApproval();
});
window.authReady.then(user => {
  if (!user) return;
  loadApproval();
});
</script>
{% endblock %}
