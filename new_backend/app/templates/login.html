<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ログイン - 業務連絡表システム</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#1a2e1a]">
  <div class="min-h-screen bg-[radial-gradient(circle_at_top,_rgba(16,185,129,0.15),_transparent_28%),linear-gradient(180deg,#1a2e1a_0%,#0d1a0d_100%)] px-4 py-10">
    <div class="mx-auto flex min-h-[calc(100vh-5rem)] w-full max-w-md items-center justify-center">
      <div class="w-full rounded-2xl border border-white/10 bg-white p-8 shadow-2xl shadow-slate-950/20 md:p-10">
        <div class="mb-8 text-center">
          <div class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-2xl bg-emerald-600 text-xl font-bold text-white shadow-lg shadow-emerald-600/30">業</div>
          <h1 class="text-2xl font-bold text-slate-800">業務連絡表システム</h1>
          <p class="mt-2 text-sm text-slate-500">Work Report System</p>
        </div>

        <form id="loginForm" class="space-y-5">
          <div>
            <label class="mb-2 block text-sm font-medium text-slate-700" for="email">メールアドレス</label>
            <input name="username" id="email" type="email" placeholder="example@email.com"
              class="w-full rounded-lg border border-slate-300 px-4 py-3 text-slate-800 placeholder-slate-400 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20" required>
          </div>
          <div>
            <label class="mb-2 block text-sm font-medium text-slate-700" for="password">パスワード</label>
            <input name="password" id="password" type="password" placeholder="password"
              class="w-full rounded-lg border border-slate-300 px-4 py-3 text-slate-800 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20" required>
          </div>
          <p id="error" class="hidden rounded-lg border border-rose-200 bg-rose-50 px-3 py-2 text-sm text-rose-700"></p>
          <button type="submit"
            class="w-full rounded-lg bg-emerald-600 px-4 py-3 font-medium text-white transition hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2">
            ログイン
          </button>
        </form>
      </div>
    </div>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const errorEl = document.getElementById('error');
      errorEl.classList.add('hidden');
      const data = {
        username: document.getElementById('email').value,
        password: document.getElementById('password').value
      };
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(data)
        });
        if (!res.ok) {
          errorEl.textContent = 'メールアドレスまたはパスワードが正しくありません';
          errorEl.classList.remove('hidden');
          return;
        }
        const json = await res.json();
        location.href = json.redirect_url || '/w/';
      } catch {
        errorEl.textContent = 'ネットワークエラーが発生しました';
        errorEl.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
