{% extends "base.html" %}
{% block title %}ログイン{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto mt-20">
  <h1 class="text-2xl font-bold mb-6 text-center">ログイン</h1>
  {% if error %}
  <p class="text-red-600 text-sm mb-4 text-center">{{ error }}</p>
  {% endif %}
  <form method="post" action="/w/login" class="bg-white shadow rounded p-6 space-y-4">
    <div>
      <label class="block text-sm font-medium mb-1">メールアドレス</label>
      <input type="email" name="username" required class="w-full border rounded px-3 py-2 text-sm">
    </div>
    <div>
      <label class="block text-sm font-medium mb-1">パスワード</label>
      <input type="password" name="password" required class="w-full border rounded px-3 py-2 text-sm">
    </div>
    <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded hover:bg-indigo-700">ログイン</button>
  </form>
</div>
{% endblock %}
