<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>業務連絡表（参照）</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">
  <div class="mx-auto max-w-5xl p-4">
    <div id="loading" class="rounded-xl border border-slate-200 bg-white p-6 text-sm text-slate-500 shadow-sm">読み込み中...</div>
    <div id="content" class="hidden space-y-4"></div>
  </div>
  <div id="noteViewOverlay" class="fixed inset-0 z-[1200] hidden items-center justify-center bg-slate-900/50 p-4" onclick="closeNoteView()">
    <div class="w-full max-w-lg rounded-xl border border-slate-200 bg-white shadow-2xl" onclick="event.stopPropagation()">
      <div class="flex items-center justify-between border-b border-slate-200 px-5 py-4">
        <h2 class="font-semibold text-slate-800">内容</h2>
        <button type="button" class="rounded-lg px-2 py-1 text-sm text-slate-500 hover:bg-slate-100" onclick="closeNoteView()">閉じる</button>
      </div>
      <div id="noteViewText" class="max-h-[60vh] overflow-y-auto whitespace-pre-wrap px-5 py-4 text-sm text-slate-800"></div>
    </div>
  </div>
  <script>
    const reportId = {{ report_id | tojson }};
    // 学校ロールの参照画面でのみ承認/差戻しを表示する。参照画面は全ロール共有のため active_role で限定し、
    // office/sales/finance/admin には出さない（承認管理一覧のボタンを本画面へ集約したもの）。
    const ACTIVE_ROLE = {{ active_role | default('') | tojson }};
    const CURRENT_MONTH = new Date().toISOString().slice(0, 7);
    let currentReport = null;
    let flashMsg = null;
    // 事務/営業の参照画面では職務分掌（事務・営業の兼務不可）の判定用にロック情報を保持する。
    let separationLocks = {office_tutor_ids: [], sales_tutor_ids: []};
    const WEEKDAYS = ['日', '月', '火', '水', '木', '金', '土'];
    // 勤怠区分（種別）。講師フォーム・PDFと共有する不変キー。空＝勤務。
    const ATTENDANCE_LABELS = {'': '勤務', work: '勤務', paid_leave: '有給休暇', absent: '欠勤'};
    function isLeaveKind(value) { return value === 'paid_leave' || value === 'absent'; }

    // 講師の報告書フォームと同じ列・値・集計で表示するため、保存済みの列定義スナップショット
    // (form_data.meta.column_definition) を使う。無い旧データは従来の静的列にフォールバックする。
    const DEFAULT_COLUMNS = [
      {key: 'date', label: '日付', type: 'date'},
      {key: 'start', label: '業務開始時間', type: 'time'},
      {key: 'end', label: '業務終了時間', type: 'time'},
      {key: 'subject_period', label: '担当時限', type: 'text'},
      {key: 'teach_minutes', label: '数学科指導（分）', type: 'number', summable: true},
      {key: 'break_minutes', label: '休憩時間（分）', type: 'number', summable: true},
      {key: 'commute_fee', label: '往復交通費（円）', type: 'number', summable: true},
      {key: 'note', label: '内容', type: 'text'}
    ];
    // 種別列は列定義(snapshot)には含まれず、講師フォーム同様に日付の直後へフロントで差し込む。
    const KIND_COLUMN = {key: 'kind', label: '種別', type: 'kind'};

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'}[ch]));
    }
    function monthLabel(value) {
      if (!value) return '-';
      return `${value.slice(0, 4)}年${Number(value.slice(5, 7))}月分`;
    }
    function weekday(value) {
      if (!value) return '';
      const d = new Date(`${value}T00:00:00`);
      return Number.isNaN(d.getTime()) ? '' : WEEKDAYS[d.getDay()];
    }
    function num(value) {
      const n = Number(value || 0);
      return Number.isFinite(n) ? n : 0;
    }
    function hasData(line) {
      return Object.values(line || {}).some(v => String(v ?? '').trim() !== '');
    }
    function noteDigest(value) {
      const text = String(value || '').replace(/\s+/g, ' ').trim();
      return text.length > 10 ? text.slice(0, 10) + '…' : text;
    }

    function snapshotColumns(report) {
      const cols = report && report.form_data && report.form_data.meta && report.form_data.meta.column_definition;
      return Array.isArray(cols) && cols.length ? cols : DEFAULT_COLUMNS;
    }
    // 表示列: 日付の直後に種別を差し込み、開始/終了は「業務開始〜終了時間」1列に結合（講師フォームと同様）。
    function displayColumns(report) {
      const src = snapshotColumns(report);
      const out = [];
      for (let i = 0; i < src.length; i += 1) {
        const c = src[i];
        if (c.key === 'start' && src[i + 1] && src[i + 1].key === 'end') {
          out.push({key: '__timerange', label: '業務開始〜終了時間', type: 'timerange'});
          i += 1;
          continue;
        }
        out.push(c);
        if (c.key === 'date') out.push(KIND_COLUMN);
      }
      return out;
    }
    function isNumericColumn(column) { return column.type === 'number' || column.type === 'count_minutes'; }

    function cell(line, column) {
      if (column.type === 'date') {
        const v = line[column.key];
        const wd = weekday(v);
        return `${escapeHtml(v || '')}${wd ? `（${wd}）` : ''}`;
      }
      if (column.type === 'kind') {
        const k = line.kind || '';
        if (k === 'paid_leave') return '<span class="inline-block rounded bg-amber-100 px-1.5 py-0.5 text-xs font-medium text-amber-800">有給</span>';
        if (k === 'absent') return '<span class="inline-block rounded bg-rose-100 px-1.5 py-0.5 text-xs font-medium text-rose-800">欠勤</span>';
        return '<span class="text-slate-400">勤務</span>';
      }
      if (column.type === 'timerange') {
        const s = line.start || '';
        const e = line.end || '';
        return (s || e) ? `${escapeHtml(s)}〜${escapeHtml(e)}` : '<span class="text-slate-400">-</span>';
      }
      if (column.type === 'count_minutes') {
        const c = line[column.count_key];
        const m = line[column.minutes_key];
        if ((c === '' || c == null) && (m === '' || m == null)) return '<span class="text-slate-400">-</span>';
        return `${num(c).toLocaleString()}${escapeHtml(column.unit || '回')} / ${num(m).toLocaleString()}分`;
      }
      if (column.key === 'note') {
        const text = String(line.note || '');
        if (!text.trim()) return '<span class="text-slate-400">-</span>';
        return `<button type="button" class="note-view-btn text-emerald-700 underline-offset-2 hover:underline" data-note="${escapeHtml(text)}"><span class="inline-block max-w-[12rem] truncate align-bottom">${escapeHtml(noteDigest(text))}</span></button>`;
      }
      const value = line[column.key];
      if (column.type === 'number') return value === '' || value == null ? '' : escapeHtml(String(value));
      return escapeHtml(value || '');
    }

    function openNoteView(text) {
      document.getElementById('noteViewText').textContent = text;
      const ov = document.getElementById('noteViewOverlay');
      ov.classList.remove('hidden');
      ov.classList.add('flex');
    }
    function closeNoteView() {
      const ov = document.getElementById('noteViewOverlay');
      ov.classList.add('hidden');
      ov.classList.remove('flex');
    }

    async function load() {
      let report;
      try {
        // 事務/営業は職務分掌（事務・営業の兼務不可）の判定用にロック情報も取得する。
        const requests = [fetch(`/api/w/reports/${reportId}`, {credentials: 'same-origin'})];
        if (ACTIVE_ROLE === 'office' || ACTIVE_ROLE === 'sales') {
          requests.push(fetch('/api/w/reports/admin-separation-locks', {credentials: 'same-origin'}));
        }
        const [res, lockRes] = await Promise.all(requests);
        if (!res.ok) throw new Error(String(res.status));
        report = await res.json();
        if (lockRes && lockRes.ok) separationLocks = await lockRes.json();
      } catch (err) {
        document.getElementById('loading').textContent = '報告書を読み込めませんでした。';
        return;
      }
      currentReport = report;
      const meta = (report.form_data && report.form_data.meta) || {};
      const lines = (report.form_data && Array.isArray(report.form_data.lines) ? report.form_data.lines : []).filter(hasData);
      // 有給休暇・欠勤の行は勤務日数・時間に含めず、取得回数・欠勤回数として集計する（講師フォームと同一）
      const workLines = lines.filter(line => !isLeaveKind(line.kind));
      const paidLeaveCount = lines.filter(line => line.kind === 'paid_leave').length;
      const absentCount = lines.filter(line => line.kind === 'absent').length;
      const cols = displayColumns(report);
      const summable = snapshotColumns(report).filter(c => c.summable);

      const headRow = `<tr class="bg-slate-50 text-xs font-medium text-slate-600">
        <th class="border border-slate-300 px-2 py-1 whitespace-nowrap">回</th>
        ${cols.map(c => `<th class="border border-slate-300 px-2 py-1 text-left whitespace-nowrap">${escapeHtml(c.label)}</th>`).join('')}
      </tr>`;
      const bodyRows = lines.length ? lines.map((line, index) => `<tr>
        <td class="border border-slate-200 px-2 py-1 text-center text-slate-500">${index + 1}</td>
        ${cols.map(c => `<td class="border border-slate-200 px-2 py-1 ${isNumericColumn(c) ? 'text-right' : ''}">${cell(line, c)}</td>`).join('')}
      </tr>`).join('') : `<tr><td class="border border-slate-200 px-2 py-3 text-center text-slate-400" colspan="${cols.length + 1}">入力された指導日はありません。</td></tr>`;

      const summaryParts = [
        `<div>勤務日数：<span class="font-semibold">${workLines.length}</span>日</div>`,
        `<div>有給休暇：<span class="font-semibold text-amber-700">${paidLeaveCount}</span>回</div>`,
        `<div>欠勤：<span class="font-semibold text-rose-700">${absentCount}</span>回</div>`,
      ];
      summable.forEach(c => {
        if (c.type === 'count_minutes') {
          const cnt = workLines.reduce((sum, line) => sum + num(line[c.count_key]), 0);
          const mn = workLines.reduce((sum, line) => sum + num(line[c.minutes_key]), 0);
          summaryParts.push(`<div>${escapeHtml(c.label)}：<span class="font-semibold">${cnt.toLocaleString()}</span>${escapeHtml(c.unit || '回')} / <span class="font-semibold">${mn.toLocaleString()}</span>分</div>`);
        } else {
          const sum = workLines.reduce((acc, line) => acc + num(line[c.key]), 0);
          summaryParts.push(`<div>${escapeHtml(c.label)}：<span class="font-semibold">${sum.toLocaleString()}</span></div>`);
        }
      });

      document.getElementById('loading').classList.add('hidden');
      const content = document.getElementById('content');
      content.classList.remove('hidden');
      content.innerHTML = bannerHtml() + `
        <section class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
          <div class="flex flex-wrap items-center justify-between gap-2">
            <h1 class="text-lg font-bold text-slate-800">${escapeHtml(monthLabel(report.target_month))} 業務連絡表（参照）</h1>
            ${report.status === 'approved'
              ? `<a href="/api/w/reports/${reportId}/export" class="rounded-lg bg-emerald-600 px-3 py-2 text-sm font-medium text-white hover:bg-emerald-700">PDFでダウンロード</a>`
              : `<span class="cursor-not-allowed rounded-lg bg-slate-300 px-3 py-2 text-sm font-medium text-white opacity-70" title="最終承認の完了後にダウンロードできます">PDFでダウンロード</span>`}
          </div>
          <dl class="mt-3 grid grid-cols-1 gap-x-6 gap-y-1 text-sm sm:grid-cols-2">
            <div class="flex gap-2"><dt class="text-slate-500">学校名</dt><dd class="font-medium text-slate-800">${escapeHtml(report.school_name || meta.dispatch_place_name || '-')}${report.school_no ? `（${escapeHtml(report.school_no)}）` : ''}</dd></div>
            <div class="flex gap-2"><dt class="text-slate-500">講師名</dt><dd class="font-medium text-slate-800">${escapeHtml(report.tutor_name || '-')}${report.tutor_no ? `（${escapeHtml(report.tutor_no)}）` : ''}</dd></div>
            <div class="flex gap-2"><dt class="text-slate-500">弊社担当</dt><dd class="text-slate-800">${escapeHtml(meta.our_staff || '-')}</dd></div>
            <div class="flex gap-2"><dt class="text-slate-500">事業所の所在地</dt><dd class="text-slate-800">${escapeHtml(meta.dispatch_place_address || '-')}</dd></div>
            <div class="flex gap-2"><dt class="text-slate-500">従事業務内容</dt><dd class="text-slate-800">${escapeHtml(meta.work_content || '-')}</dd></div>
          </dl>
        </section>
        <section class="overflow-x-auto rounded-xl border border-slate-200 bg-white p-3 shadow-sm">
          <table class="w-full border-collapse text-sm">
            <thead>${headRow}</thead>
            <tbody>${bodyRows}</tbody>
          </table>
          <div class="mt-3 flex flex-wrap gap-x-6 gap-y-1 px-1 text-sm text-slate-700">${summaryParts.join('')}</div>
        </section>` + schoolActionAreaHtml(report) + staffActionAreaHtml(report);
      content.querySelectorAll('.note-view-btn').forEach(btn => {
        btn.addEventListener('click', () => openNoteView(btn.dataset.note || ''));
      });
      if (ACTIVE_ROLE === 'school') wireSchoolActions();
      else if (ACTIVE_ROLE === 'office' || ACTIVE_ROLE === 'sales') wireStaffActions();
    }

    // 学校の参照画面に出す「承認・差戻し」エリア。承認管理一覧から本画面へ機能を集約したもの。
    // 当月かつ学校確認待ち（awaiting_school）のときのみ操作可。差戻し中・過去月・それ以外は案内のみ。
    function schoolActionAreaHtml(report) {
      if (ACTIVE_ROLE !== 'school') return '';
      const wrap = (inner) => `<section class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">${inner}</section>`;
      if (report.target_month !== CURRENT_MONTH) {
        return wrap('<div class="rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-600">過去月のため承認・差戻しはできません。</div>');
      }
      if (report.status === 'returned_to_tutor') {
        return wrap('<div class="rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700">差戻し済みです。講師の修正をお待ちください。</div>');
      }
      if (report.status !== 'awaiting_school') {
        return wrap('<div class="rounded-lg border border-emerald-200 bg-emerald-50 px-3 py-2 text-sm text-emerald-700">承認済みです。</div>');
      }
      return wrap(`
        <h2 class="font-semibold text-slate-800">承認・差戻し</h2>
        <p class="mt-1 text-sm text-slate-600">上記の内容をご確認のうえ、${escapeHtml(monthLabel(report.target_month))}の業務連絡表を承認、または差戻してください。</p>
        <div id="returnForm" class="mt-3 hidden rounded-xl border border-red-200 bg-red-50 p-4">
          <label class="text-sm font-medium text-slate-700" for="returnComment">差戻しコメント</label>
          <textarea id="returnComment" class="mt-2 min-h-24 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20" maxlength="2000" placeholder="コメントを入力してください"></textarea>
          <div class="mt-3 flex flex-wrap gap-2">
            <button id="returnConfirmBtn" type="button" class="rounded-lg bg-red-600 px-3 py-2 text-sm font-medium text-white transition hover:bg-red-700">差戻す</button>
            <button id="returnCancelBtn" type="button" class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50">キャンセル</button>
          </div>
        </div>
        <div class="mt-3 flex flex-col gap-2 sm:flex-row sm:flex-wrap">
          <button id="returnOpenBtn" type="button" class="w-full rounded-lg bg-red-600 px-4 py-2 text-sm font-medium text-white transition hover:bg-red-700 sm:w-auto">差戻す</button>
          <button id="approveBtn" type="button" class="w-full rounded-lg bg-emerald-600 px-4 py-2 text-sm font-medium text-white transition hover:bg-emerald-700 sm:w-auto">承認する</button>
        </div>
        <div id="actionMsg" class="mt-3 hidden rounded-lg px-3 py-2 text-sm"></div>
      `);
    }
    function bannerHtml() {
      if (!flashMsg) return '';
      const message = flashMsg;
      flashMsg = null;
      return `<div class="rounded-xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm font-medium text-emerald-800">${escapeHtml(message)}</div>`;
    }
    function wireSchoolActions() {
      const approveBtn = document.getElementById('approveBtn');
      if (!approveBtn) return; // 操作エリア未表示（学校以外・過去月・対象外等）
      const returnOpenBtn = document.getElementById('returnOpenBtn');
      const returnForm = document.getElementById('returnForm');
      const returnConfirmBtn = document.getElementById('returnConfirmBtn');
      const returnCancelBtn = document.getElementById('returnCancelBtn');
      returnOpenBtn.addEventListener('click', () => {
        returnForm.classList.remove('hidden');
        document.getElementById('returnComment').focus();
      });
      returnCancelBtn.addEventListener('click', () => returnForm.classList.add('hidden'));
      approveBtn.addEventListener('click', schoolApprove);
      returnConfirmBtn.addEventListener('click', schoolReturn);
    }
    function showActionMsg(text, ok) {
      const el = document.getElementById('actionMsg');
      if (!el) return;
      el.textContent = text;
      el.className = `mt-3 rounded-lg px-3 py-2 text-sm ${ok ? 'border border-emerald-200 bg-emerald-50 text-emerald-700' : 'border border-rose-200 bg-rose-50 text-rose-700'}`;
    }
    async function postAction(body) {
      const res = await fetch(`/api/w/reports/${reportId}/action`, {method: 'POST', credentials: 'same-origin', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body)});
      if (!res.ok) {
        let detail = `エラー（${res.status}）`;
        try { detail = (await res.json()).detail || detail; } catch (_) {}
        throw new Error(detail);
      }
      return res.json().catch(() => ({}));
    }
    // 参照画面は別ウィンドウのポップアップで開かれるため、呼び出し元の一覧へは localStorage 経由で更新を通知する。
    // 通知キーは操作ロールごとに分け、各ダッシュボード（学校承認一覧・事務/営業キュー）が自分のキーを監視する。
    function notifyOpener() {
      const key = ACTIVE_ROLE === 'office' ? 'officeQueueRefresh'
        : ACTIVE_ROLE === 'sales' ? 'salesQueueRefresh'
        : 'schoolApprovalRefresh';
      try { localStorage.setItem(key, String(Date.now())); } catch (_) {}
    }
    async function schoolApprove() {
      if (!confirm('この報告書を承認します。よろしいですか？')) return;
      try {
        await postAction({action: 'approve'});
        notifyOpener();
        flashMsg = `${monthLabel(currentReport.target_month)}の業務連絡表を承認しました。`;
        await load();
      } catch (e) {
        showActionMsg(`承認できませんでした：${e.message}`, false);
      }
    }
    async function schoolReturn() {
      const comment = (document.getElementById('returnComment').value || '').trim();
      if (!comment) { showActionMsg('差戻しコメントを入力してください。', false); return; }
      try {
        await postAction({action: 'return', comment});
        notifyOpener();
        flashMsg = `${monthLabel(currentReport.target_month)}の業務連絡表を差戻しました。`;
        await load();
      } catch (e) {
        showActionMsg(`差戻しできませんでした：${e.message}`, false);
      }
    }

    // ===== 事務(office)/営業(sales)の承認・差戻し（ダッシュボードのタスク欄から本画面へ集約） =====
    // ロール別に「承認対象ステータス・完了後差戻し対象・承認ラベル・職務分掌の衝突講師IDキー」を定義。
    const STAFF_ACTION_CONFIG = {
      office: {
        // awaiting_office_precheck = 月分超過の事前確認（承認で学校確認へ進む）
        statuses: ['awaiting_office_precheck', 'awaiting_office', 'returned_to_office'],
        completedStatuses: [],
        approveLabel: '事務承認',
        lockKey: 'sales_tutor_ids',  // 営業承認を担当済みの講師は事務不可
        lockReason: 'この講師は営業承認を担当済みのため、事務での承認・差戻しはできません（事務と営業は同一講師で兼務できません）。',
      },
      sales: {
        statuses: ['awaiting_sales'],
        completedStatuses: ['approved'],  // 完了後は事務へ差戻しのみ可
        approveLabel: '営業承認',
        lockKey: 'office_tutor_ids',  // 事務承認を担当済みの講師は営業不可
        lockReason: 'この講師は事務承認を担当済みのため、営業での承認・差戻しはできません（事務と営業は同一講師で兼務できません）。',
      },
    };
    function staffConfig() { return STAFF_ACTION_CONFIG[ACTIVE_ROLE] || null; }
    function staffLocked(report) {
      const config = staffConfig();
      if (!config || !report) return false;
      return (separationLocks[config.lockKey] || []).includes(String(report.tutor_id));
    }
    function staffControlsHtml(approveLabel, returnOnly) {
      const approveButton = returnOnly ? '' :
        `<button id="approveBtn" type="button" class="w-full rounded-lg bg-emerald-600 px-4 py-2 text-sm font-medium text-white transition hover:bg-emerald-700 sm:w-auto">${escapeHtml(approveLabel)}</button>`;
      return `
        <div id="returnForm" class="mt-3 hidden rounded-xl border border-red-200 bg-red-50 p-4">
          <label class="text-sm font-medium text-slate-700" for="returnComment">差戻しコメント</label>
          <textarea id="returnComment" class="mt-2 min-h-24 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20" maxlength="2000" placeholder="差戻し理由を入力してください"></textarea>
          <div class="mt-3 flex flex-wrap gap-2">
            <button id="returnConfirmBtn" type="button" class="rounded-lg bg-red-600 px-3 py-2 text-sm font-medium text-white transition hover:bg-red-700">差戻す</button>
            <button id="returnCancelBtn" type="button" class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50">キャンセル</button>
          </div>
        </div>
        <div class="mt-3 flex flex-col gap-2 sm:flex-row sm:flex-wrap">
          <button id="returnOpenBtn" type="button" class="w-full rounded-lg border border-red-300 bg-white px-4 py-2 text-sm font-medium text-red-600 transition hover:bg-red-50 sm:w-auto">差戻す</button>
          ${approveButton}
        </div>
        <div id="actionMsg" class="mt-3 hidden rounded-lg px-3 py-2 text-sm"></div>`;
    }
    // 事務/営業の操作エリア。承認対象があれば承認＋差戻し、なければ（営業のみ）完了後差戻し、それも無ければ案内のみ。
    function staffActionAreaHtml(report) {
      const config = staffConfig();
      if (!config) return '';
      const wrap = (inner) => `<section class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">${inner}</section>`;
      const lockedNotice = (heading) => wrap(`<h2 class="font-semibold text-slate-800">${escapeHtml(heading)}</h2>
        <div class="mt-2 rounded-lg border border-amber-200 bg-amber-50 px-3 py-2 text-sm text-amber-800">⚠ ${escapeHtml(config.lockReason)}</div>`);
      if (config.statuses.includes(report.status)) {
        if (staffLocked(report)) return lockedNotice(`${config.approveLabel}・差戻し`);
        return wrap(`<h2 class="font-semibold text-slate-800">${escapeHtml(config.approveLabel)}・差戻し</h2>
          <p class="mt-1 text-sm text-slate-600">上記の内容をご確認のうえ、${escapeHtml(monthLabel(report.target_month))}の業務連絡表を${escapeHtml(config.approveLabel)}、または差戻してください。</p>`
          + staffControlsHtml(config.approveLabel, false));
      }
      if (config.completedStatuses.includes(report.status)) {
        if (staffLocked(report)) return lockedNotice('差戻し');
        return wrap(`<h2 class="font-semibold text-slate-800">差戻し</h2>
          <p class="mt-1 text-sm text-slate-600">この業務連絡表は最終承認済みです。修正が必要な場合は事務へ差戻しできます。</p>`
          + staffControlsHtml(null, true));
      }
      return wrap('<div class="rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-600">あなたが対応する承認・差戻しはありません。</div>');
    }
    function wireStaffActions() {
      const returnOpenBtn = document.getElementById('returnOpenBtn');
      if (!returnOpenBtn) return; // 操作エリア未表示（対象なし・ロック中）
      const approveBtn = document.getElementById('approveBtn');
      const returnForm = document.getElementById('returnForm');
      const returnConfirmBtn = document.getElementById('returnConfirmBtn');
      const returnCancelBtn = document.getElementById('returnCancelBtn');
      returnOpenBtn.addEventListener('click', () => {
        returnForm.classList.remove('hidden');
        document.getElementById('returnComment').focus();
      });
      returnCancelBtn.addEventListener('click', () => returnForm.classList.add('hidden'));
      returnConfirmBtn.addEventListener('click', staffReturn);
      if (approveBtn) approveBtn.addEventListener('click', staffApprove);
    }
    async function staffApprove() {
      const config = staffConfig();
      if (!config || !currentReport || !config.statuses.includes(currentReport.status)) return;
      if (staffLocked(currentReport)) { showActionMsg(config.lockReason, false); return; }
      if (!confirm(`${monthLabel(currentReport.target_month)}の業務連絡表を${config.approveLabel}します。よろしいですか？`)) return;
      try {
        await postAction({action: 'approve', actor_role: ACTIVE_ROLE});
        notifyOpener();
        flashMsg = `${monthLabel(currentReport.target_month)}の業務連絡表を${config.approveLabel}しました。`;
        await load();
      } catch (e) {
        showActionMsg(`${config.approveLabel}できませんでした：${e.message}`, false);
      }
    }
    async function staffReturn() {
      const config = staffConfig();
      if (!config || !currentReport) return;
      const comment = (document.getElementById('returnComment').value || '').trim();
      if (!comment) { showActionMsg('差戻しコメントを入力してください。', false); return; }
      if (staffLocked(currentReport)) { showActionMsg(config.lockReason, false); return; }
      try {
        await postAction({action: 'return', comment, actor_role: ACTIVE_ROLE});
        notifyOpener();
        flashMsg = `${monthLabel(currentReport.target_month)}の業務連絡表を差戻しました。`;
        await load();
      } catch (e) {
        showActionMsg(`差戻しできませんでした：${e.message}`, false);
      }
    }
    load();
  </script>
</body>
</html>
