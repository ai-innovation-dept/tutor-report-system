{% extends "base.html" %}
{% block content %}
<style>
  :root {
    --color-background-primary: #ffffff;
    --color-background-secondary: #f8fafc;
    --color-border-tertiary: #cbd5e1;
    --color-text-secondary: #475569;
    --color-text-tertiary: #94a3b8;
    --border-radius-md: 8px;
  }
  .admin-card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    padding: 14px;
  }
  .kanban-grid {
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    gap: 6px;
  }
  @media (max-width: 1180px) {
    .kanban-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
  }
  @media (max-width: 760px) {
    .kanban-grid {
      grid-template-columns: repeat(6, minmax(160px, 1fr));
    }
  }
</style>

<div class="mb-4 flex flex-col gap-3 rounded-lg border border-slate-200 bg-white p-4 shadow-sm sm:flex-row sm:flex-wrap sm:items-center">
  <label class="flex items-center gap-2 text-sm">
    <span class="text-slate-700">月選択</span>
    <select id="monthFilter" class="rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20"></select>
  </label>
  <label class="flex items-center gap-2 text-sm">
    <span class="text-slate-700">講師選択</span>
    <select id="tutorFilter" class="rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20"></select>
  </label>
  <a id="bulkExportPdf" class="inline-flex w-full items-center justify-center rounded-lg bg-emerald-600 px-3 py-2 text-sm text-white hover:bg-emerald-700 sm:w-auto" href="#">完了分をすべてPDFダウンロード</a>
</div>

<section id="kpiCards" class="mb-4 grid gap-3 md:grid-cols-3"></section>

<section class="mb-4">
  <div class="mb-2 flex items-center gap-2">
    <h2 class="text-lg font-semibold text-slate-800">📋 あなたのタスク</h2>
    <span id="taskCountBadge" class="rounded-full bg-slate-200 px-2 py-0.5 text-xs font-medium text-slate-700">0</span>
  </div>
  <div id="taskList" class="admin-card p-0"></div>
</section>

<section class="mb-4">
  <h2 class="mb-2 text-lg font-semibold text-slate-800" id="pipelineTitle">🔄 進捗パイプライン</h2>
  <div class="overflow-x-auto">
    <div id="pipelineBoard" class="kanban-grid"></div>
  </div>
</section>

<section id="detailDrawer" class="hidden overflow-hidden rounded-lg border border-slate-200 bg-white shadow-sm"></section>

<div id="returnModal" class="fixed inset-0 z-[1000] hidden items-center justify-center bg-slate-900/50 px-4" onclick="closeReturnModal()">
  <div class="w-full max-w-lg rounded-xl border border-slate-200 bg-white shadow-2xl" onclick="event.stopPropagation()">
    <div class="flex items-center justify-between border-b border-slate-200 px-5 py-4">
      <h2 class="font-semibold text-slate-800">差戻しコメント</h2>
      <button type="button" class="rounded-lg px-2 py-1 text-sm text-slate-500 hover:bg-slate-100 hover:text-slate-900" onclick="closeReturnModal()">閉じる</button>
    </div>
    <div class="p-5">
      <textarea id="returnComment" class="min-h-28 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20" maxlength="2000" placeholder="差戻し理由を入力してください"></textarea>
      <div id="returnError" class="mt-2 hidden text-sm text-red-700"></div>
      <div class="mt-4 flex justify-end gap-2">
        <button type="button" class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50" onclick="closeReturnModal()">キャンセル</button>
        <button type="button" class="rounded-lg bg-red-600 px-3 py-2 text-sm font-medium text-white hover:bg-red-700" onclick="submitReturn()">差戻し</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
setBreadcrumb('管理ポータル', '統合ダッシュボード');
const STATUS_LABELS = {
  draft: '講師作成',
  awaiting_school: '学校確認待ち',
  returned_to_tutor: '講師へ差戻し中',
  returned_to_office: '事務へ差戻し中',
  awaiting_sales: '営業確認待ち',
  awaiting_office: '事務確認待ち',
  awaiting_finance: '最終確認待ち',
  approved: '完了',
  closed: '強制クローズ'
};
const ROLE_LABELS = {
  tutor: '講師',
  school: '学校',
  sales: '営業',
  office: '事務',
  admin_master: '経理'
};
const ACTION_LABELS = {
  submit: '提出',
  approve: '承認',
  return: '差戻し',
  office_edit: '事務修正'
};
const RETURN_ACTIONS = new Set(['return']);
const APPROVAL_ACTIONS = new Set(['submit', 'approve']);
const PIPELINE_COLUMNS = [
  {key: 'draft', label: '講師作成', statuses: ['draft', 'returned_to_tutor']},
  {key: 'awaiting_school', label: '学校確認待ち', statuses: ['awaiting_school']},
  {key: 'awaiting_office', label: '事務確認待ち', statuses: ['awaiting_office', 'returned_to_office']},
  {key: 'awaiting_sales', label: '営業確認待ち（最終）', statuses: ['awaiting_sales']},
  {key: 'approved', label: '完了', statuses: ['approved']},
  {key: 'closed', label: '強制クローズ', statuses: ['closed']}
];
let currentRole = '';
let allReports = [];
let allAssignments = [];
let allTutors = [];
// 職務分掌：兼務スタッフが事務/営業承認を担当済みの講師ID（UI制御用）
let separationLocks = {office_tutor_ids: [], sales_tutor_ids: []};
let selectedMonth = new URLSearchParams(location.search).get('month') || currentMonthValue();
let selectedTutorId = new URLSearchParams(location.search).get('tutor_id') || '';
let openCardKey = null;
let returnTargetKey = '';

function currentMonthValue() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
}
function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'}[ch]));
}
function roleLabel(role) { return ROLE_LABELS[role] || role || '-'; }
function actionLabel(action) { return ACTION_LABELS[action] || action || '-'; }
function statusLabel(status) { return STATUS_LABELS[status] || status || '-'; }
function monthLabel(value) {
  if (!value) return '-';
  return `${value.slice(0, 4)}年${Number(value.slice(5, 7))}月`;
}
function monthShortLabel(value) {
  return `${Number(value.slice(5, 7))}月`;
}
function formatDateTime(value) {
  if (!value) return '-';
  const d = new Date(value);
  if (Number.isNaN(d.getTime())) return '-';
  return `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
}
function formatEventDate(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  if (Number.isNaN(d.getTime())) return '';
  return `${d.getFullYear()}/${d.getMonth() + 1}/${d.getDate()} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
}
function tutorName(id) {
  return allTutors.find(tutor => tutor.id === id)?.display_name || '講師未設定';
}
function studentName(id) {
  return allAssignments.find(assignment => assignment.id === id)?.student_name || '生徒未設定';
}
function schoolNameFor(report) {
  // 紐付け済みの学校名 → 報告書一覧の派遣先事業所名（meta）の順で解決する
  const assignment = allAssignments.find(a => a.id === report.assignment_id);
  if (assignment && assignment.school_name) return assignment.school_name;
  const meta = (report.form_data && report.form_data.meta) || {};
  return meta.dispatch_place_name || '学校未設定';
}
function openReportWindow(reportId) {
  // 対象報告書を参照専用ウィンドウで開く
  window.open(`/reports/${reportId}/view`, `report_${reportId}`, 'width=1000,height=800,noopener');
}
function openGroupReports(key) {
  const group = currentGroups().find(item => item.key === key);
  if (!group) return;
  group.reports.forEach(report => openReportWindow(report.id));
}
function visibleReports() {
  return allReports.filter(report =>
    report.target_month === selectedMonth &&
    (!selectedTutorId || report.tutor_id === selectedTutorId)
  );
}
function groupKey(report) {
  return `${report.assignment_id}:${report.tutor_id}:${report.target_month}`;
}
function currentGroupStatus(reports) {
  const statuses = new Set(reports.map(report => report.status));
  for (const status of ['closed', 'returned_to_tutor', 'returned_to_office', 'awaiting_finance', 'awaiting_sales', 'awaiting_office', 'awaiting_school', 'draft', 'approved']) {
    if (statuses.has(status)) return status;
  }
  return reports[0]?.status || '';
}
function groupReports(reports) {
  const grouped = {};
  reports.forEach(report => {
    const key = groupKey(report);
    if (!grouped[key]) {
      grouped[key] = {
        key,
        assignment_id: report.assignment_id,
        tutor_id: report.tutor_id,
        target_month: report.target_month,
        student_name: report.student_name || studentName(report.assignment_id),
        tutor_name: report.tutor_name || tutorName(report.tutor_id),
        school_name: schoolNameFor(report),
        reports: []
      };
    }
    grouped[key].reports.push(report);
  });
  return Object.values(grouped).sort((a, b) =>
    a.student_name.localeCompare(b.student_name, 'ja') ||
    a.tutor_name.localeCompare(b.tutor_name, 'ja')
  );
}
function groupedByAssignment(reports) {
  return reports.reduce((groups, report) => {
    (groups[groupKey(report)] ||= []).push(report);
    return groups;
  }, {});
}
function currentGroups() {
  return groupReports(visibleReports());
}
function groupPdfUrl(group) {
  // 完了（最終承認済み）グループ単位のPDF出力URL
  const params = new URLSearchParams({target_month: group.target_month, assignment_id: group.assignment_id, scope: 'approved_only', format: 'pdf'});
  return `/api/w/reports/export?${params.toString()}`;
}
function eventsForGroup(group) {
  const seen = new Set();
  const events = [];
  group.reports.forEach(report => {
    (report.events || []).forEach(event => {
      if (!ACTION_LABELS[event.action]) return;
      const key = `${event.action}:${event.actor_role || ''}:${event.actor_name || ''}:${String(event.created_at).slice(0, 19)}:${event.comment || ''}`;
      if (seen.has(key)) return;
      seen.add(key);
      events.push(event);
    });
  });
  return events.sort((a, b) => new Date(a.created_at).getTime() - new Date(b.created_at).getTime());
}
function reportIdsForStatus(group, status) {
  const statuses = Array.isArray(status) ? status : [status];
  return group.reports.filter(report => statuses.includes(report.status)).map(report => report.id);
}
function taskStatuses(config) {
  if (!config) return [];
  return config.statuses || [config.status];
}
function taskConfig() {
  // 経理（管理者・管理責任者）は承認フローから外れ、承認タスクは持たない（閲覧・エクスポートのみ）
  if (currentRole === 'sales') {
    return {
      statuses: ['awaiting_sales'],
      subtext: '営業対応が必要',
      label: '営業承認',
      returnRole: 'sales'
    };
  }
  if (currentRole === 'office') {
    return {
      statuses: ['awaiting_office', 'returned_to_office'],
      subtext: '事務確認が必要',
      label: '事務承認',
      returnRole: 'office'
    };
  }
  return null;
}
function getTaskMeta(group, groupStatus) {
  const allEvents = group.reports
    .flatMap(report => report.events || [])
    .sort((a, b) => String(b.created_at || '').localeCompare(String(a.created_at || '')));

  if (groupStatus === 'awaiting_finance') {
    const event = allEvents.find(item => item.action === 'approve');
    if (event) return `${event.actor_name || ''} / 営業完了 ${formatEventDate(event.created_at)}`.trim();
  }
  if (groupStatus === 'awaiting_office') {
    const event = allEvents.find(item => item.action === 'approve');
    if (event) return `${event.actor_name || ''} / 学校承認 ${formatEventDate(event.created_at)}`.trim();
  }
  if (groupStatus === 'awaiting_sales') {
    const event = allEvents.find(item => item.action === 'approve');
    if (event) return `${event.actor_name || ''} / 事務完了 ${formatEventDate(event.created_at)}`.trim();
  }
  if (groupStatus === 'returned_to_office') {
    const event = allEvents.find(item => item.action === 'return');
    if (event) return `${event.actor_name || ''} / 差戻し ${formatEventDate(event.created_at)}`.trim();
  }
  return '';
}
function renderFilters() {
  const months = [...new Set(allReports.map(report => report.target_month))].sort().reverse();
  if (months.length && !months.includes(selectedMonth)) selectedMonth = months[0];
  monthFilter.innerHTML = months.map(month => `<option value="${month}">${monthLabel(month)}</option>`).join('');
  monthFilter.value = selectedMonth;
  monthFilter.disabled = !months.length;
  const tutorIds = new Set(allReports.filter(report => report.target_month === selectedMonth).map(report => report.tutor_id));
  const tutors = allTutors.filter(tutor => tutorIds.has(tutor.id)).sort((a, b) => a.display_name.localeCompare(b.display_name, 'ja'));
  if (selectedTutorId && !tutorIds.has(selectedTutorId)) selectedTutorId = '';
  tutorFilter.innerHTML = ['<option value="">すべての講師</option>', ...tutors.map(tutor => `<option value="${tutor.id}">${escapeHtml(tutor.display_name)}</option>`)].join('');
  tutorFilter.value = selectedTutorId;
  renderBulkExportLinks();
}
function renderKpis() {
  const monthReports = visibleReports();
  const groups = Object.values(groupedByAssignment(monthReports));
  const config = taskConfig();
  const statuses = taskStatuses(config);
  const approvalWaiting = config ? groups.filter(group => statuses.includes(currentGroupStatus(group))).length : 0;
  const approvalSubtext = config?.subtext || '対応が必要';
  const returnedTutor = groups.filter(group => group.some(report => report.status === 'returned_to_tutor') && !group.some(report => report.status === 'approved')).length;
  const returnedReceiver = groups.filter(group => group.some(report => report.status === 'returned_to_office') && !group.some(report => report.status === 'approved')).length;
  const completed = groups.filter(group => group.every(report => report.status === 'approved')).length;
  kpiCards.innerHTML = `
    <div class="admin-card" style="border:2px solid #DC2626;background:#FEF2F2;">
      <div style="font-size:11px;color:var(--color-text-secondary);">あなたの承認待ち</div>
      <div class="mt-1" style="font-size:28px;font-weight:500;color:#DC2626;">${approvalWaiting}</div>
      <div style="font-size:11px;color:var(--color-text-tertiary);">${approvalSubtext}</div>
    </div>
    <div class="admin-card">
      <div style="font-size:11px;color:var(--color-text-secondary);">差戻し中</div>
      <div class="mt-1 text-slate-800" style="font-size:28px;font-weight:500;">${returnedTutor + returnedReceiver}</div>
      <div style="font-size:11px;color:var(--color-text-tertiary);">講師${returnedTutor} / 事務${returnedReceiver}</div>
    </div>
    <div class="admin-card">
      <div style="font-size:11px;color:var(--color-text-secondary);">今月完了</div>
      <div class="mt-1 text-slate-800" style="font-size:28px;font-weight:500;">${completed}</div>
      <div style="font-size:11px;color:var(--color-text-tertiary);">全${groups.length}件中</div>
    </div>`;
}
function renderBulkExportLinks() {
  const month = selectedMonth;
  const reportsInMonth = allReports.filter(report => report.target_month === month);
  const groups = Object.values(groupedByAssignment(reportsInMonth));
  const approvedGroups = groups.filter(group => group.every(report => report.status === 'approved'));
  const hasApprovedGroup = approvedGroups.length > 0;
  const hasUnapprovedGroup = groups.some(group => !group.every(report => report.status === 'approved'));
  const params = new URLSearchParams({scope: 'approved_only', target_month: month, format: 'pdf'});
  bulkExportPdf.href = hasApprovedGroup ? `/api/w/reports/export?${params.toString()}` : '#';
  bulkExportPdf.classList.toggle('opacity-50', !hasApprovedGroup);
  bulkExportPdf.classList.toggle('pointer-events-none', !hasApprovedGroup);
}
function separationLockReason(tutorId) {
  // 事務と営業を兼務するスタッフは、同一講師で事務承認と営業承認を兼務できない
  if (currentRole === 'office' && separationLocks.sales_tutor_ids.includes(tutorId)) {
    return 'この講師は営業承認を担当済みのため事務承認できません';
  }
  if (currentRole === 'sales' && separationLocks.office_tutor_ids.includes(tutorId)) {
    return 'この講師は事務承認を担当済みのため営業承認できません';
  }
  return '';
}
function renderTasks(groups) {
  const config = taskConfig();
  const statuses = taskStatuses(config);
  const tasks = config ? groups.filter(group => statuses.includes(currentGroupStatus(group.reports))) : [];
  taskCountBadge.textContent = tasks.length;
  taskList.innerHTML = tasks.length ? tasks.map(group => {
    const groupStatus = currentGroupStatus(group.reports);
    const meta = getTaskMeta(group, groupStatus);
    const lockReason = separationLockReason(group.tutor_id);
    const approveButton = lockReason
      ? `<button class="w-full cursor-not-allowed rounded-lg px-3 py-2 text-sm font-medium text-white opacity-60 sm:w-auto" style="background:#9CA3AF;" disabled title="${escapeHtml(lockReason)}">${escapeHtml(config.label)}</button>`
      : `<button class="w-full rounded-lg px-3 py-2 text-sm font-medium text-white sm:w-auto" style="background:#059669;" onclick="approveGroup('${group.key}')">${escapeHtml(config.label)}</button>`;
    const returnButton = lockReason
      ? `<button class="w-full cursor-not-allowed rounded-lg border px-3 py-2 text-sm font-medium opacity-60 sm:w-auto" style="border-color:#E5E7EB;color:#9CA3AF;background:#fff;" disabled title="${escapeHtml(lockReason)}">差戻し</button>`
      : `<button class="w-full rounded-lg border px-3 py-2 text-sm font-medium sm:w-auto" style="border-color:#FCA5A5;color:#DC2626;background:#fff;" onclick="openReturnModal('${group.key}')">差戻し</button>`;
    return `<div class="flex flex-col gap-3 border-b border-slate-100 px-4 py-3 last:border-b-0 sm:flex-row sm:items-center sm:justify-between">
      <div>
        <div class="font-medium text-slate-800">${escapeHtml(group.school_name)} - ${escapeHtml(monthShortLabel(group.target_month))}</div>
        <div class="mt-1 text-xs text-slate-500">講師：${escapeHtml(group.tutor_name)}${meta ? ` / ${escapeHtml(meta)}` : ''}</div>
        ${lockReason ? `<div class="mt-1 text-xs font-medium text-amber-600">⚠ ${escapeHtml(lockReason)}</div>` : ''}
      </div>
      <div class="flex flex-col gap-2 sm:flex-row">
        <button class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50 sm:w-auto" onclick="openGroupReports('${group.key}')">報告書を確認</button>
        ${approveButton}
        ${returnButton}
      </div>
    </div>`;
  }).join('') : '<div class="px-4 py-4 text-sm text-slate-500">あなたの承認待ちはありません。</div>';
}
function pipelineColumnForStatus(status) {
  if (status === 'returned_to_tutor') return 'draft';
  if (status === 'returned_to_office') return 'awaiting_office';
  return status;
}
function pipelineCardClass(status) {
  if (['returned_to_tutor', 'returned_to_office'].includes(status)) return 'border-l-[#DC2626] bg-[#FEF2F2]';
  if (status === 'closed') return 'border-l-slate-400 bg-slate-50';
  if (status === 'approved') return 'border-l-[#059669] bg-[#ECFDF5]';
  return 'border-l-[#CBD5E1] bg-[#F8FAFC]';
}
function renderPipeline(groups) {
  pipelineTitle.textContent = `🔄 進捗パイプライン（${monthLabel(selectedMonth)}）`;
  pipelineBoard.innerHTML = PIPELINE_COLUMNS.map(column => {
    const items = groups.filter(group => pipelineColumnForStatus(currentGroupStatus(group.reports)) === column.key);
    return `<div class="rounded-lg border border-slate-200 bg-white">
      <div class="flex items-center justify-between border-b border-slate-100 px-2 py-2">
        <div class="text-xs font-semibold text-slate-700">${column.label}</div>
        <span class="rounded-full bg-slate-100 px-2 py-0.5 text-[10px] font-medium text-slate-600">${items.length}</span>
      </div>
      <div class="space-y-2 p-2">
        ${items.length ? items.map(group => {
          const status = currentGroupStatus(group.reports);
          return `<button type="button" class="block w-full cursor-pointer border-l-[3px] p-2 text-left transition hover:brightness-95 ${pipelineCardClass(status)} ${openCardKey === group.key ? 'ring-2 ring-emerald-200' : ''}" onclick="toggleDetails('${group.key}')">
            <div class="text-[12px] font-medium text-slate-800">${escapeHtml(group.school_name)}</div>
            <div class="mt-1 text-[10px] text-slate-500">講師：${escapeHtml(group.tutor_name)} / ${escapeHtml(statusLabel(status))}</div>
          </button>`;
        }).join('') : '<div class="px-2 py-4 text-center text-xs text-slate-400">なし</div>'}
      </div>
    </div>`;
  }).join('');
}
function currentWaitLabel(status) {
  const labels = {
    draft: '講師の作成待ち',
    returned_to_tutor: '講師の修正待ち',
    awaiting_school: '学校の承認待ち',
    awaiting_sales: '営業の承認待ち',
    returned_to_office: '事務の対応待ち',
    awaiting_office: '事務の承認待ち',
    awaiting_finance: '経理の最終承認待ち',
    approved: '完了',
    closed: '強制クローズ'
  };
  return labels[status] || statusLabel(status);
}
function eventDotClass(action) {
  if (RETURN_ACTIONS.has(action)) return 'bg-[#DC2626]';
  if (APPROVAL_ACTIONS.has(action)) return 'bg-[#059669]';
  return 'bg-slate-400';
}
function actionBadge(action) {
  const returnStyle = RETURN_ACTIONS.has(action);
  const cls = returnStyle ? 'bg-[#FEE2E2] text-[#991B1B]' : 'bg-[#D1FAE5] text-[#065F46]';
  return `<span class="rounded-full px-2 py-0.5 text-[11px] font-medium ${cls}">${escapeHtml(actionLabel(action))}</span>`;
}
function statusBadge(status) {
  if (['returned_to_tutor', 'returned_to_office'].includes(status)) return '<span class="rounded-full bg-red-100 px-2 py-1 text-xs font-medium text-red-700">差戻し中</span>';
  if (status === 'closed') return '<span class="rounded-full bg-slate-100 px-2 py-1 text-xs font-medium text-slate-600">クローズ</span>';
  if (status === 'approved') return '<span class="rounded-full bg-emerald-100 px-2 py-1 text-xs font-medium text-emerald-700">完了</span>';
  return '<span class="rounded-full bg-emerald-100 px-2 py-1 text-xs font-medium text-emerald-700">進行中</span>';
}
function closedReportInfo(group) {
  const closed = group.reports.filter(report => report.status === 'closed');
  if (!closed.length) return '';
  return `<div class="mb-4 rounded-lg border border-slate-200 bg-slate-50 p-4 text-sm">
    <div class="font-semibold text-slate-800">クローズ済み</div>
    <div class="mt-3 space-y-3">
      ${closed.map(report => `<div class="border-t border-slate-200 pt-3 first:border-t-0 first:pt-0">
        <div class="text-slate-700">指導日：${escapeHtml(report.lesson_date || '-')}</div>
        <div class="mt-1 whitespace-pre-wrap text-slate-700">理由：${escapeHtml(report.close_reason || '-')}</div>
        <div class="mt-1 text-slate-700">日時：${escapeHtml(formatDateTime(report.closed_at))}</div>
        <div class="mt-1 text-slate-700">操作者：${escapeHtml(report.closed_by_name || '-')}</div>
      </div>`).join('')}
    </div>
  </div>`;
}
function timelineRow(event) {
  const isReturn = RETURN_ACTIONS.has(event.action);
  return `<div class="relative pb-5 pl-8">
    <span class="absolute left-[-5px] top-1 h-3 w-3 rounded-full ${eventDotClass(event.action)}"></span>
    <div class="flex flex-wrap items-center gap-2 text-xs text-slate-500">
      <span>${escapeHtml(formatDateTime(event.created_at))}</span>
      <span>${escapeHtml(roleLabel(event.actor_role))}</span>
      <span>${escapeHtml(event.actor_name || '-')}</span>
      ${actionBadge(event.action)}
    </div>
    ${isReturn && event.comment ? `<div class="mt-2 whitespace-pre-wrap border-l-4 bg-[#FFF7ED] px-3 py-2 text-sm text-slate-700" style="border-color:#F59E0B;">${escapeHtml(event.comment)}</div>` : ''}
  </div>`;
}
function currentTimelineRow(status) {
  return `<div class="relative pl-8">
    <span class="absolute left-[-5px] top-1 h-3 w-3 rounded-full bg-[#F59E0B]"></span>
    <div class="flex flex-wrap items-center gap-2 text-xs text-slate-500">
      <span>現在</span>
      <span class="rounded-full bg-[#FEF3C7] px-2 py-0.5 text-[11px] font-medium text-[#92400E]">${escapeHtml(currentWaitLabel(status))}</span>
    </div>
  </div>`;
}
function assignmentById(id) {
  return allAssignments.find(assignment => assignment.id === id);
}
function reminderPanel(group, activeStatus) {
  // 学校確認待ちの案件にのみ、学校へのリマインドメール設定を表示する
  if (activeStatus !== 'awaiting_school') return '';
  const assignment = assignmentById(group.assignment_id);
  // 学校確認をスキップする学校宛にはリマインド対象外なので表示しない
  if (assignment && assignment.skip_school_approval) return '';
  const enabled = Boolean(assignment?.reminder_enabled);
  const days = assignment?.reminder_days_after || 3;
  return `<div class="mb-4 rounded-lg border border-amber-200 bg-amber-50 p-4">
    <div class="text-sm font-semibold text-amber-800">🔔 学校へのリマインドメール</div>
    <p class="mt-1 text-xs text-amber-700">学校が承認するまで、設定した日数ごとに自動でリマインドメールを送信します。承認されると自動的に停止します。</p>
    <label class="mt-3 flex items-center gap-2 text-sm text-slate-700">
      <input id="reminderEnabled" type="checkbox" class="h-4 w-4 rounded border-slate-300" ${enabled ? 'checked' : ''} onchange="toggleReminderInputs()">
      <span>リマインドメールを送る</span>
    </label>
    <div class="mt-3 flex flex-wrap items-center gap-2 text-sm text-slate-700">
      <span>承認されない場合、</span>
      <input id="reminderDays" type="number" min="1" max="60" value="${days}" class="w-20 rounded-lg border border-slate-300 px-2 py-1 text-sm disabled:bg-slate-100 disabled:text-slate-400" ${enabled ? '' : 'disabled'}>
      <span>日ごとに送信</span>
      <button id="reminderSave" class="ml-auto rounded-lg bg-amber-600 px-4 py-2 text-sm font-medium text-white transition hover:bg-amber-700" onclick="saveReminder('${group.assignment_id}')">保存</button>
    </div>
  </div>`;
}
function toggleReminderInputs() {
  const enabled = document.getElementById('reminderEnabled')?.checked;
  const daysInput = document.getElementById('reminderDays');
  if (daysInput) daysInput.disabled = !enabled;
}
async function saveReminder(assignmentId) {
  const enabled = document.getElementById('reminderEnabled')?.checked || false;
  const days = Math.min(60, Math.max(1, Number(document.getElementById('reminderDays')?.value || 3)));
  const btn = document.getElementById('reminderSave');
  if (btn) btn.disabled = true;
  try {
    await api(`/api/w/assignments/${assignmentId}`, {
      method: 'PATCH',
      body: JSON.stringify({reminder_enabled: enabled, reminder_days_after: days})
    });
    showToast(enabled ? `リマインドメールを有効にしました（${days}日ごと）` : 'リマインドメールを無効にしました', 'success');
    await loadAdmin();
  } catch (error) {
    showToast(error.message || '保存に失敗しました', 'error');
    if (btn) btn.disabled = false;
  }
}
function closeDetails() {
  openCardKey = null;
  detailDrawer.classList.add('hidden');
  detailDrawer.innerHTML = '';
  renderPipeline(currentGroups());
}
function toggleDetails(key) {
  if (openCardKey === key) {
    closeDetails();
    return;
  }
  showDetails(key);
}
function reportCard(report) {
  const events = (report.events || [])
    .filter(e => ACTION_LABELS[e.action])
    .sort((a, b) => new Date(a.created_at).getTime() - new Date(b.created_at).getTime());
  const closedSection = report.status === 'closed' ? `
    <div class="mt-2 rounded-lg border border-slate-200 bg-slate-50 p-3 text-xs text-slate-700">
      <div class="font-medium text-slate-800">クローズ済み</div>
      <div class="mt-1 whitespace-pre-wrap">理由：${escapeHtml(report.close_reason || '-')}</div>
      <div class="mt-1">日時：${escapeHtml(formatDateTime(report.closed_at))}</div>
      <div class="mt-1">操作者：${escapeHtml(report.closed_by_name || '-')}</div>
    </div>` : '';
  return `<div class="rounded-lg border border-slate-200 bg-white p-4">
    <div class="flex flex-wrap items-center justify-between gap-2">
      <div class="flex flex-wrap items-center gap-2">
        <span class="text-sm font-medium text-slate-800">${escapeHtml(monthShortLabel(report.target_month))}分</span>
        ${statusBadge(report.status)}
      </div>
      <button class="rounded-lg border border-slate-300 bg-white px-3 py-1.5 text-xs font-medium text-slate-700 hover:bg-slate-50" onclick="openReportWindow('${report.id}')">報告書を確認</button>
    </div>
    ${closedSection}
    <div class="mt-3 ml-2 border-l-2 pl-0" style="border-color:var(--color-border-tertiary);">
      ${events.length ? events.map(timelineRow).join('') : '<div class="pb-5 pl-8 text-sm text-slate-500">履歴はありません。</div>'}
      ${report.status !== 'closed' ? currentTimelineRow(report.status) : ''}
    </div>
  </div>`;
}
function showDetails(key) {
  openCardKey = key;
  const group = currentGroups().find(item => item.key === key);
  if (!group) return;
  const overallStatus = currentGroupStatus(group.reports);
  const activeStatus = currentGroupStatus(group.reports.filter(r => r.status !== 'closed'));
  const sortedReports = [...group.reports].sort((a, b) => {
    if (a.status === 'closed' && b.status !== 'closed') return 1;
    if (b.status === 'closed' && a.status !== 'closed') return -1;
    return (a.lesson_date || '').localeCompare(b.lesson_date || '');
  });
  detailDrawer.classList.remove('hidden');
  detailDrawer.innerHTML = `<div class="flex flex-wrap items-center justify-between gap-3 border-b border-slate-200 bg-slate-50 px-4 py-3">
    <h2 class="font-semibold text-slate-800">📄 ${escapeHtml(group.school_name)} - ${escapeHtml(monthShortLabel(group.target_month))}（講師：${escapeHtml(group.tutor_name)}）</h2>
    ${statusBadge(overallStatus)}
  </div>
  <div class="p-5">
    ${activeStatus === 'approved' ? `
    <div class="mb-4 flex flex-wrap gap-2">
      <a class="inline-flex items-center rounded-lg bg-emerald-600 px-4 py-2 text-sm font-medium text-white transition hover:bg-emerald-700" href="${groupPdfUrl(group)}">PDFダウンロード</a>
    </div>` : ''}
    ${reminderPanel(group, activeStatus)}
    <div class="space-y-6">
      ${sortedReports.map(report => reportCard(report)).join('')}
    </div>
    ${currentRole === 'sales' && activeStatus === 'approved' ? `
    <div class="mt-4 border-t border-slate-200 pt-4">
      <p class="mb-2 text-xs text-slate-500">完了後に修正が必要な場合は、事務へ差戻しできます。</p>
      <button class="rounded-lg border px-4 py-2 text-sm font-medium" style="border-color:#FCA5A5;color:#DC2626;background:#fff;" onclick="openReturnModal('${key}')">差戻し</button>
    </div>` : ''}
  </div>`;
  renderPipeline(currentGroups());
}
async function approveGroup(key) {
  const group = currentGroups().find(item => item.key === key);
  if (!group) return;
  const config = taskConfig();
  if (!config) return;
  const lockReason = separationLockReason(group.tutor_id);
  if (lockReason) { showToast(lockReason, 'error'); return; }
  const ids = reportIdsForStatus(group, taskStatuses(config));
  if (!ids.length) return;
  if (!confirm(`${group.school_name}の${monthShortLabel(group.target_month)}分を${config.label}します。よろしいですか？`)) return;
  try {
    for (const id of ids) {
      await api(`/api/w/reports/${id}/action`, {method: 'POST', body: JSON.stringify({action: 'approve'})});
    }
  } catch (error) {
    showToast(error.message || '承認に失敗しました', 'error');
  }
  await loadAdmin();
}
function openReturnModal(key) {
  const group = currentGroups().find(item => item.key === key);
  if (group) {
    const reason = separationLockReason(group.tutor_id);
    if (reason) { showToast(reason, 'error'); return; }
  }
  returnTargetKey = key;
  returnComment.value = '';
  returnError.classList.add('hidden');
  returnModal.classList.remove('hidden');
  returnModal.classList.add('flex');
}
function closeReturnModal() {
  returnTargetKey = '';
  returnModal.classList.add('hidden');
  returnModal.classList.remove('flex');
}
async function submitReturn() {
  const group = currentGroups().find(item => item.key === returnTargetKey);
  if (!group) return;
  const config = taskConfig();
  if (!config) return;
  const comment = returnComment.value.trim();
  if (!comment) {
    returnError.textContent = '差戻し理由を入力してください';
    returnError.classList.remove('hidden');
    return;
  }
  const groupStatus = currentGroupStatus(group.reports);
  let ids;
  if (currentRole === 'sales' && groupStatus === 'approved') {
    // 営業による完了後の差戻し
    ids = group.reports.filter(r => r.status === 'approved').map(r => r.id);
  } else {
    ids = reportIdsForStatus(group, taskStatuses(config));
  }
  if (!ids.length) return;
  try {
    for (const id of ids) {
      await api(`/api/w/reports/${id}/action`, {method: 'POST', body: JSON.stringify({action: 'return', comment})});
    }
  } catch (error) {
    showToast(error.message || '差戻しに失敗しました', 'error');
  }
  closeReturnModal();
  await loadAdmin();
}
function updateUrl() {
  const params = new URLSearchParams();
  if (selectedMonth) params.set('month', selectedMonth);
  if (selectedTutorId) params.set('tutor_id', selectedTutorId);
  location.href = `${location.pathname}?${params.toString()}`;
}
function renderDashboard() {
  const groups = currentGroups();
  renderKpis();
  renderTasks(groups);
  renderPipeline(groups);
  if (openCardKey && groups.some(group => group.key === openCardKey)) {
    showDetails(openCardKey);
  } else {
    openCardKey = null;
    detailDrawer.classList.add('hidden');
    detailDrawer.innerHTML = '';
  }
}
async function loadAdmin() {
  const [reports, assignments, tutors, locks] = await Promise.all([
    api('/api/w/reports'),
    api('/api/w/assignments'),
    api('/api/w/users?roles=tutor&per_page=100'),
    api('/api/w/reports/admin-separation-locks')
  ]);
  allReports = reports;
  allAssignments = assignments;
  allTutors = tutors.items || tutors;
  separationLocks = locks || {office_tutor_ids: [], sales_tutor_ids: []};
  renderFilters();
  renderDashboard();
}
monthFilter.addEventListener('change', () => {
  selectedMonth = monthFilter.value;
  selectedTutorId = '';
  openCardKey = null;
  updateUrl();
});
tutorFilter.addEventListener('change', () => {
  selectedTutorId = tutorFilter.value;
  openCardKey = null;
  updateUrl();
});
window.authReady.then(user => {
  if (!user) return;
  currentRole = user.role;
  loadAdmin();
});
</script>
{% endblock %}
