{% extends "base.html" %}
{% block content %}
<!-- # === Phase 9: 紐付け管理 START === -->
<style>
@media (max-width: 767px) {
  .mobile-cards thead { display: none; }
  .mobile-cards tbody tr {
    display: block;
    margin: 0 0 8px;
    border-radius: 8px;
    border: 1px solid #e2e8f0 !important;
    overflow: hidden;
    background: #fff;
  }
  .mobile-cards tbody td {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    min-height: 44px;
    min-width: 0;
    border-top: 1px solid #f1f5f9;
  }
  .mobile-cards tbody td:first-child { border-top: none; }
  .mobile-cards tbody td[data-label]::before {
    content: attr(data-label);
    font-weight: 600;
    color: #64748b;
    font-size: 12px;
    flex-shrink: 0;
    min-width: 80px;
    margin-right: 8px;
  }
}
</style>
<section class="mb-4 rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
  <div class="flex flex-col gap-3 sm:flex-row sm:items-end">
    <label class="block w-full text-sm sm:w-1/3">
      <span class="mb-1 block text-slate-700">検索</span>
      <input id="searchInput" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20" placeholder="学校名・講師名">
    </label>
    <label class="block w-full text-sm sm:w-44">
      <span class="mb-1 block text-slate-700">状態</span>
      <select id="statusFilter" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20">
        <option value="all">すべて</option>
        <option value="active">有効</option>
        <option value="inactive">無効</option>
      </select>
    </label>
  </div>
</section>

<section class="rounded-xl border border-slate-200 bg-white shadow-sm">
  <div class="border-b border-slate-200 bg-slate-50 p-4">
    <h2 class="font-semibold text-slate-800">学校一覧</h2>
  </div>
  <div class="overflow-x-auto">
    <table class="mobile-cards w-full text-sm">
      <thead class="bg-slate-50 text-xs font-medium uppercase tracking-wide text-slate-500">
        <tr>
          <th class="px-4 py-3 text-left">学校名</th>
          <th class="px-4 py-3 text-left">講師名</th>
          <th class="px-4 py-3 text-left">学校スキップ</th>
          <th class="px-4 py-3 text-left">リマインド設定</th>
          <th class="px-4 py-3 text-left">状態</th>
          <th class="px-4 py-3 text-left">操作</th>
        </tr>
      </thead>
      <tbody id="assignmentRows"></tbody>
    </table>
  </div>
</section>

<!-- 新規紐付け追加は新システムでは使用しないため非表示（紐付けは講師の業務連絡表作成時に行う） -->

<div id="reminderModal" class="fixed inset-0 z-[1000] hidden items-center justify-center bg-slate-900/50 px-4" onclick="closeReminderModal()">
  <form id="reminderForm" class="w-full max-w-md rounded-xl border border-slate-200 bg-white shadow-2xl" onclick="event.stopPropagation()">
    <div class="flex items-center justify-between border-b border-slate-200 px-5 py-4">
      <h2 class="font-semibold text-slate-800">リマインド設定</h2>
      <button type="button" class="rounded-lg px-2 py-1 text-sm text-slate-500 hover:bg-slate-100" onclick="closeReminderModal()">閉じる</button>
    </div>
    <div class="grid gap-4 p-5">
      <label class="flex items-center gap-2 text-sm text-slate-700">
        <input id="reminderEnabledInput" type="checkbox" class="h-4 w-4 rounded border-slate-300">
        リマインドを有効にする
      </label>
      <label class="block text-sm">
        <span class="mb-1 block text-slate-700">承認依頼から何日後</span>
        <input id="reminderDaysInput" type="number" min="1" class="w-full rounded-lg border border-slate-300 px-3 py-2">
      </label>
      <label class="block text-sm">
        <span class="mb-1 block text-slate-700">送付回数</span>
        <input id="reminderCountInput" type="number" min="1" class="w-full rounded-lg border border-slate-300 px-3 py-2">
      </label>
    </div>
    <div class="flex justify-end gap-2 border-t border-slate-200 px-5 py-4">
      <button type="button" class="rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50" onclick="closeReminderModal()">キャンセル</button>
      <button class="rounded-lg bg-emerald-600 px-4 py-2 text-sm font-medium text-white hover:bg-emerald-700">保存</button>
    </div>
  </form>
</div>
{% endblock %}
{% block scripts %}
<script>
setBreadcrumb('管理ポータル', 'システム設定');
let assignments = [];
let editingReminderId = '';

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'}[ch]));
}
function filteredAssignments() {
  const keyword = searchInput.value.trim().toLowerCase();
  const status = statusFilter.value;
  return assignments.filter(assignment => {
    const text = [assignment.school_name, assignment.tutor?.display_name].join(' ').toLowerCase();
    if (keyword && !text.includes(keyword)) return false;
    if (status === 'active' && !assignment.is_active) return false;
    if (status === 'inactive' && assignment.is_active) return false;
    return true;
  });
}
function toggleHtml(assignment) {
  const checked = assignment.skip_school_approval ? 'checked' : '';
  return `<button type="button" class="relative inline-flex h-6 w-11 items-center rounded-full transition ${assignment.skip_school_approval ? 'bg-emerald-600' : 'bg-slate-300'}" onclick="toggleSkip('${assignment.id}', ${!assignment.skip_school_approval})" aria-label="学校スキップ">
    <span class="inline-block h-5 w-5 transform rounded-full bg-white shadow transition ${assignment.skip_school_approval ? 'translate-x-5' : 'translate-x-1'}"></span>
  </button>`;
}
function reminderLabel(assignment) {
  if (!assignment.reminder_enabled) return 'OFF';
  return `${assignment.reminder_days_after}日後 ${assignment.reminder_count}回`;
}
function renderAssignments() {
  const rows = filteredAssignments();
  assignmentRows.innerHTML = rows.length ? rows.map(assignment => {
    const action = assignment.is_active
      ? `<button class="min-h-[44px] w-full rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm font-medium text-red-700 hover:bg-red-100 sm:w-auto" onclick="setAssignmentActive('${assignment.id}', false)">無効化</button>`
      : `<button class="min-h-[44px] w-full rounded-lg border border-emerald-200 bg-emerald-50 px-3 py-2 text-sm font-medium text-emerald-700 hover:bg-emerald-100 sm:w-auto" onclick="setAssignmentActive('${assignment.id}', true)">有効化</button>`;
    const schoolName = assignment.school_name || '未登録';
    return `<tr class="border-t border-slate-100 hover:bg-slate-50 ${assignment.is_active ? '' : 'bg-slate-50 text-slate-400'}">
      <td class="px-4 py-3 font-medium text-slate-800" data-label="学校名">${escapeHtml(schoolName)}</td>
      <td class="px-4 py-3" data-label="講師名">${escapeHtml(assignment.tutor?.display_name || '-')}</td>
      <td class="px-4 py-3" data-label="スキップ">${toggleHtml(assignment)}</td>
      <td class="px-4 py-3" data-label="リマインド">${assignment.skip_school_approval
        ? `<span class="inline-block min-h-[44px] rounded-lg border border-slate-200 bg-slate-100 px-3 py-2 text-sm text-slate-400 opacity-50 cursor-not-allowed">${escapeHtml(reminderLabel(assignment))}</span>`
        : `<button class="min-h-[44px] rounded-lg border border-slate-200 px-3 py-2 text-sm hover:bg-slate-50" onclick="openReminderModal('${assignment.id}')">${escapeHtml(reminderLabel(assignment))}</button>`
      }</td>
      <td class="px-4 py-3" data-label="状態">${assignment.is_active ? '有効' : '無効'}</td>
      <td class="px-4 py-3 flex flex-wrap gap-2" data-label="操作">${action}<button class="min-h-[44px] w-full rounded-lg border border-slate-300 px-3 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50 sm:w-auto" onclick="deleteAssignment('${assignment.id}', '${escapeHtml(schoolName)}')">削除</button></td>
    </tr>`;
  }).join('') : '<tr><td class="p-4 text-slate-600" colspan="6">学校の紐付けはありません。</td></tr>';
}
async function patchAssignment(id, payload, successMessage) {
  try {
    await api(`/api/w/assignments/${id}`, {method: 'PATCH', body: JSON.stringify(payload)});
    showToast(successMessage, 'success');
    await loadAssignmentsPage();
  } catch (error) {
    showToast(error.message || '更新できませんでした', 'error');
  }
}
async function toggleSkip(id, value) {
  await patchAssignment(id, {skip_school_approval: value}, '学校スキップを更新しました');
}
async function setAssignmentActive(id, value) {
  await patchAssignment(id, {is_active: value}, value ? '紐付けを有効化しました' : '紐付けを無効化しました');
}
async function deleteAssignment(id, schoolName) {
  if (!confirm(`「${schoolName}」の紐付けを削除します。この操作は元に戻せません。よろしいですか？`)) return;
  try {
    await api(`/api/w/assignments/${id}`, {method: 'DELETE'});
    showToast('紐付けを削除しました', 'success');
    await loadAssignmentsPage();
  } catch (error) {
    showToast(error.message || '削除できませんでした', 'error');
  }
}
function openReminderModal(id) {
  const assignment = assignments.find(item => item.id === id);
  if (!assignment || assignment.skip_school_approval) return;
  editingReminderId = id;
  reminderEnabledInput.checked = assignment.reminder_enabled;
  reminderDaysInput.value = assignment.reminder_days_after || 1;
  reminderCountInput.value = assignment.reminder_count || 1;
  reminderModal.classList.remove('hidden');
  reminderModal.classList.add('flex');
}
function closeReminderModal() {
  reminderModal.classList.add('hidden');
  reminderModal.classList.remove('flex');
  editingReminderId = '';
}
async function loadAssignmentsPage() {
  assignments = await api('/api/w/assignments');
  renderAssignments();
}
reminderForm.addEventListener('submit', async event => {
  event.preventDefault();
  if (!editingReminderId) return;
  await patchAssignment(editingReminderId, {
    reminder_enabled: reminderEnabledInput.checked,
    reminder_days_after: Number(reminderDaysInput.value || 1),
    reminder_count: Number(reminderCountInput.value || 1)
  }, 'リマインド設定を更新しました');
  closeReminderModal();
});
searchInput.addEventListener('input', renderAssignments);
statusFilter.addEventListener('change', renderAssignments);
window.authReady.then(user => {
  if (!user) return;
  loadAssignmentsPage();
});
</script>
<!-- # === Phase 9 END === -->
{% endblock %}
