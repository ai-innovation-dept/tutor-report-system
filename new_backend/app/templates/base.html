<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}指導実績報告システム (新){% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
  <nav class="bg-white shadow px-6 py-3 flex items-center justify-between">
    <span class="font-bold text-indigo-700">指導実績報告システム</span>
    <div class="flex gap-4 text-sm">
      {% if user %}
        <span class="text-gray-600">{{ user.display_name }}（{{ active_role or user.role }}）</span>
        <a href="/w/logout" class="text-red-600 hover:underline">ログアウト</a>
      {% else %}
        <a href="/w/login" class="text-indigo-600 hover:underline">ログイン</a>
      {% endif %}
    </div>
  </nav>
  <main class="max-w-5xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
