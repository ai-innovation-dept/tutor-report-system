{% extends "base.html" %}

{% block content %}
<div class="mb-6 flex flex-wrap items-center justify-between gap-3">
  <div>
    <h1 class="text-xl font-bold text-slate-800">報告書詳細</h1>
    <p class="mt-1 text-sm text-slate-500">報告内容の確認と編集</p>
  </div>
  <a href="/w/tutor/reports" class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50">一覧へ戻る</a>
</div>

<section id="returnCommentArea" class="mb-4 hidden rounded-xl border border-rose-200 bg-rose-50 p-4 text-sm text-rose-800"></section>

<section class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
  <div class="mb-4 flex flex-wrap items-center gap-2">
    <span id="statusBadge" class="rounded-full bg-slate-100 px-2.5 py-1 text-xs font-medium text-slate-700"></span>
    <span id="metaText" class="text-sm text-slate-500"></span>
  </div>
  <label class="block text-sm font-medium text-slate-700">form_data</label>
  <textarea id="formDataInput" class="mt-2 min-h-96 w-full rounded-lg border border-slate-300 px-3 py-2 font-mono text-sm focus:border-emerald-500 focus:outline-none"></textarea>
  <div class="mt-4 flex flex-wrap gap-2">
    <button id="saveBtn" onclick="saveReport()" class="rounded-lg bg-emerald-600 px-4 py-2 text-sm font-medium text-white hover:bg-emerald-700">保存</button>
    <button id="submitBtn" onclick="submitReport()" class="rounded-lg bg-[#1a2e1a] px-4 py-2 text-sm font-medium text-white hover:bg-[#244224]">学校へ提出</button>
  </div>
  <div class="mt-6 rounded-xl border border-slate-200 bg-slate-50 p-4 text-sm text-slate-500">
    チャット枠は第3弾で実装予定です。
  </div>
</section>
{% endblock %}

{% block scripts %}
<script>
  const reportId = {{ report_id | tojson }};
  let report = null;

  const STATUS_LABELS = {
    draft: '下書き',
    awaiting_school: '学校確認待ち',
    awaiting_sales: '営業確認待ち',
    awaiting_office: '事務確認待ち',
    awaiting_finance: '経理確認待ち',
    approved: '承認済み',
    returned_to_tutor: '差戻し（講師へ）',
    returned_to_sales: '差戻し（営業へ）',
    closed: '終了',
  };

  async function loadReport() {
    report = await api(`/api/w/reports/${reportId}`);
    formDataInput.value = JSON.stringify(report.form_data || {}, null, 2);
    statusBadge.textContent = STATUS_LABELS[report.status] || report.status;
    metaText.textContent = `${report.target_month} / ${report.form_type}`;
    const editable = ['draft', 'returned_to_tutor'].includes(report.status);
    saveBtn.disabled = !editable;
    submitBtn.disabled = !editable;
    saveBtn.classList.toggle('opacity-50', !editable);
    submitBtn.classList.toggle('opacity-50', !editable);
    await loadReturnComments();
  }

  async function loadReturnComments() {
    const events = await api(`/api/w/reports/${reportId}/events`);
    const returns = events.filter(e => e.action === 'return' && e.comment);
    if (!returns.length) return;
    const latest = returns[returns.length - 1];
    returnCommentArea.classList.remove('hidden');
    returnCommentArea.innerHTML = `<div class="font-semibold">差戻しコメント</div><div class="mt-1 whitespace-pre-wrap">${navEscape(latest.comment)}</div>`;
  }

  async function saveReport() {
    let data;
    try { data = JSON.parse(formDataInput.value || '{}'); } catch { showToast('JSON形式が正しくありません', 'error'); return; }
    await api(`/api/w/reports/${reportId}`, {method: 'PATCH', body: JSON.stringify({form_data: data})});
    showToast('保存しました', 'success');
    await loadReport();
  }

  async function submitReport() {
    if (!confirm('学校へ提出します。よろしいですか？')) return;
    await api(`/api/w/reports/${reportId}/action`, {method: 'POST', body: JSON.stringify({action: 'submit'})});
    showToast('提出しました', 'success');
    await loadReport();
  }

  setBreadcrumb('講師', '報告書詳細');
  loadReport();
</script>
{% endblock %}
