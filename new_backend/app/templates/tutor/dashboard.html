{% extends "base.html" %}
{% block title %}講師ダッシュボード{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold mb-6">報告書一覧</h1>
<div class="space-y-3">
  {% for report in reports %}
  <div class="bg-white rounded shadow p-4 flex justify-between items-center">
    <div>
      <span class="font-medium">{{ report.target_month }}</span>
      <span class="ml-3 text-sm text-gray-500">{{ report.form_type }}</span>
      <span class="ml-3 text-xs px-2 py-0.5 rounded bg-emerald-100 text-emerald-800">{{ report.status }}</span>
    </div>
    <a href="/w/tutor/reports/{{ report.id }}" class="text-emerald-600 text-sm hover:underline">詳細</a>
  </div>
  {% else %}
  <p class="text-gray-500">報告書がありません。</p>
  {% endfor %}
</div>
<div class="mt-6">
  <a href="/w/tutor/reports/new" class="bg-emerald-600 text-white px-4 py-2 rounded hover:bg-emerald-700">新規作成</a>
</div>
{% endblock %}
