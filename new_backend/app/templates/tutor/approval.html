{% extends "base.html" %}
{% block content %}
<!-- # === Phase 9: フロントエンド ロール別画面 START === -->
<section class="mb-4 rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
  <h2 class="font-semibold text-slate-800">エクスポート</h2>
  <div class="mt-3 flex flex-wrap items-end gap-3">
    <label class="text-sm">
      <span class="mb-1 block text-slate-700">月</span>
      <select id="exportMonth" class="rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20"></select>
    </label>
    <a id="bulkExportPdf" class="inline-flex items-center rounded-lg bg-emerald-600 px-3 py-2 text-sm text-white hover:bg-emerald-700" href="#">PDFでダウンロード</a>
    <span id="exportWarning" class="text-sm text-rose-700"></span>
  </div>
  <p class="mt-2 text-xs text-slate-500">最終承認済みの報告のみダウンロード可能</p>
</section>
<div id="approvalMonths" class="grid gap-4"></div>
{% endblock %}
{% block scripts %}
<script>
setBreadcrumb('講師ポータル', '承認管理');
const WEEKDAYS = ['日', '月', '火', '水', '木', '金', '土'];
// 通常フロー: 講師→学校→事務→営業。事前確認フロー（月分超過・担当業務/副担当業務の1〜9分手入力）:
// 講師→事務(事前確認)→学校→事務→営業。事前確認フローは先頭に「運営へ依頼」ステップが入る。
const NORMAL_STEPS = [
  {key: 'request', label: '学校へ依頼'},
  {key: 'school', label: '学校承認'},
  {key: 'operation', label: '運営承認'}
];
const PRECHECK_STEPS = [
  {key: 'precheck', label: '運営へ依頼'},
  {key: 'request', label: '学校へ依頼'},
  {key: 'school', label: '学校承認'},
  {key: 'operation', label: '運営承認'}
];
function groupSteps(group) {
  return group.precheck_route ? PRECHECK_STEPS : NORMAL_STEPS;
}
const PHASE_CURRENT_STEP = {
  recording: 0,
  returned: 0,
  office_precheck: 1,
  awaiting_school: 1,
  awaiting_sales: 2,
  awaiting_office: 2,
  awaiting_finance: 2,
  completed: 3,
  closed: 3
};
// 事前確認フローは「運営へ依頼」が先頭に入るため、学校確認以降のフェーズを1つ後ろへずらす
const PRECHECK_SHIFTED_PHASES = new Set(['awaiting_school', 'awaiting_sales', 'awaiting_office', 'awaiting_finance', 'completed', 'closed']);
function currentStepIndex(group) {
  const base = PHASE_CURRENT_STEP[group.phase] ?? 0;
  return (group.precheck_route && PRECHECK_SHIFTED_PHASES.has(group.phase)) ? base + 1 : base;
}
const STATUS_LABELS = {
  draft: '下書き',
  awaiting_office_precheck: '事務事前確認待ち',
  awaiting_school: '学校承認待ち',
  awaiting_sales: '営業確認待ち',
  returned_to_tutor: '差戻し（要修正）',
  awaiting_office: '事務確認待ち',
  awaiting_finance: '最終確認待ち',
  approved: '最終承認済み',
  closed: 'クローズ'
};
let allReports = [];
let allAssignments = [];
let schoolUsers = [];
let groups = [];
let selectedApprovalMonth = currentMonth();

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'}[ch]));
}
function monthLabel(value) {
  const [year, month] = value.split('-');
  return `${year}年${Number(month)}月分`;
}
function durationLabel(minutes) {
  const hours = Math.floor(minutes / 60);
  const mins = minutes % 60;
  if (hours && mins) return `${hours}時間${mins}分`;
  if (hours) return `${hours}時間`;
  return `${mins}分`;
}
function dateLabel(value) {
  const d = new Date(`${value}T00:00:00`);
  return `${d.getMonth() + 1}月${d.getDate()}日（${WEEKDAYS[d.getDay()]}）`;
}
function timeLabel(value, fallback = '') {
  if (!value) return fallback;
  const d = new Date(value);
  if (Number.isNaN(d.getTime())) return fallback;
  return `${d.getMonth() + 1}/${d.getDate()} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
}
function statusLabel(status) { return STATUS_LABELS[status] || status; }
function currentMonth() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
}
function timeText(value) { return (value || '').slice(0, 5); }
function minutesBetween(start, end) {
  if (!start || !end) return 0;
  const [sh, sm] = start.split(':').map(Number);
  const [eh, em] = end.split(':').map(Number);
  return Math.max(0, (eh * 60 + em) - (sh * 60 + sm));
}
function teachingMinutes(report) {
  return Math.max(0, minutesBetween(timeText(report.start_time), timeText(report.end_time)) - Number(report.break_minutes || 0));
}
function latest(values) {
  return values.filter(Boolean).sort().at(-1) || null;
}
function earliest(values) {
  return values.filter(Boolean).sort()[0] || null;
}
function reportIds(group, status) {
  return group.reports.filter(r => r.status === status).map(r => r.id);
}
function reportIdsForParentSubmit(group) {
  return group.reports
    .filter(r => ['draft', 'returned_to_tutor'].includes(r.status))
    .map(r => r.id);
}
function returnedReportIds(group) {
  return group.reports.filter(r => r.status === 'returned_to_tutor').map(r => r.id);
}
function monthlyPhase(reports) {
  const statuses = reports.map(report => report.status);
  const ranks = statuses.map(status => ({
    draft: 0,
    returned_to_tutor: 0,
    awaiting_office_precheck: 1,
    awaiting_school: 1,
    awaiting_sales: 2,
    awaiting_office: 3,
    awaiting_finance: 4,
    approved: 5,
    closed: 7
  }[status] ?? 0));
  if (statuses.includes('returned_to_tutor')) return 'returned';
  // 事前確認対象（月分超過・1〜9分手入力）の報告は学校確認の前に事務の事前確認を待つ
  if (statuses.includes('awaiting_office_precheck')) return 'office_precheck';
  if (statuses.length && statuses.every(status => status === 'closed')) return 'closed';
  if (statuses.length && statuses.every(status => status === 'approved')) return 'completed';
  if (statuses.length && ranks.every(rank => rank >= 4)) return 'awaiting_finance';
  if (statuses.length && ranks.every(rank => rank >= 3)) return 'awaiting_office';
  if (statuses.length && ranks.every(rank => rank >= 2)) return 'awaiting_sales';
  if (statuses.length && ranks.every(rank => rank >= 1)) return 'awaiting_school';
  return 'recording';
}
function reportMeta(report) {
  return (report?.form_data && report.form_data.meta) || {};
}
function resolveSchoolName(assignment, reports) {
  // 1) 紐付け済みの学校名 → 2) 報告書一覧の派遣先事業所の名称・組織単位（meta）
  if (assignment?.parent?.display_name) return assignment.parent.display_name;
  for (const report of reports) {
    const meta = reportMeta(report);
    if (meta.dispatch_place_name) return meta.dispatch_place_name;
    if (meta.dispatch_place_school_id) {
      const user = schoolUsers.find(u => String(u.id) === String(meta.dispatch_place_school_id));
      if (user) return user.display_name;
    }
  }
  return '';
}
function tutorDisplayName(assignment) {
  return assignment?.tutor?.display_name || window.currentUser?.display_name || '講師未設定';
}
// 提出前に事前確認フローへ切り替わる（＝担当業務・副担当業務に1〜9分の手入力がある）下書き・差戻し中の報告書
function minuteInputReports(reports) {
  return reports.filter(report =>
    ['draft', 'returned_to_tutor'].includes(report.status) && workReportHasMinuteLevelInput(report));
}
// 事前確認フロー（講師→事務→学校→事務→営業）の判定。
// 提出後はステータス／事前確認の承認履歴で、提出前は1〜9分手入力の有無（クライアント判定）で決める。
// 学校スキップ校は事前確認を挟まない（サーバの判定と同じ優先順位）。
// ※月分超過（契約との突合が必要）は提出前には判定できないため、提出後の表示で事前確認フローに切り替わる。
function isPrecheckRoute(reports, skipSchool) {
  if (skipSchool) return false;
  return reports.some(report =>
    report.status === 'awaiting_office_precheck'
    || report.precheck_approved_at
    || (['draft', 'returned_to_tutor'].includes(report.status) && workReportHasMinuteLevelInput(report)));
}
function buildGroup(assignment, reports) {
  const sorted = [...reports].sort((a, b) => {
    const dateCompare = String(a.lesson_date || a.target_month || '').localeCompare(String(b.lesson_date || b.target_month || ''));
    if (dateCompare !== 0) return dateCompare;
    return timeText(a.start_time).localeCompare(timeText(b.start_time));
  });
  const skipSchool = Boolean(assignment?.skip_school_approval || sorted.some(report => report.skip_school_approval));
  return {
    assignment_id: assignment?.id || sorted[0]?.assignment_id,
    student_name: assignment?.student_name || '生徒未設定',
    tutor_name: tutorDisplayName(assignment),
    school_id: assignment?.parent_id || sorted[0]?.parent_id || null,
    school_display_name: resolveSchoolName(assignment, sorted),
    skip_school_approval: skipSchool,
    precheck_route: isPrecheckRoute(sorted, skipSchool),
    target_month: sorted[0]?.target_month || selectedApprovalMonth || currentMonth(),
    reports: sorted,
    phase: monthlyPhase(sorted),
    total_count: sorted.length,
    total_minutes: sorted.reduce((sum, report) => sum + teachingMinutes(report), 0),
    submitted_to_school_at: latest(sorted.map(report => report.submitted_to_school_at)),
    first_submitted_to_school_at: earliest(sorted.map(report => report.submitted_to_school_at)),
    precheck_approved_at: latest(sorted.map(report => report.precheck_approved_at)),
    school_approved_at: latest(sorted.map(report => report.school_approved_at)),
    approved_at: latest(sorted.map(report => report.approved_at)),
    can_submit: sorted.length > 0 && sorted.every(report => ['draft', 'returned_to_tutor'].includes(report.status)),
  };
}
function stepTimestamp(group, index) {
  const requestedAt = group.first_submitted_to_school_at || group.submitted_to_school_at;
  if (group.precheck_route) {
    // 運営へ依頼（講師の提出）→ 学校へ依頼（事務の事前確認の承認）→ 学校承認 → 運営承認
    if (index === 0) return requestedAt;
    if (index === 1) return group.precheck_approved_at;
    if (index === 2) return group.school_approved_at;
    if (index === 3) return group.approved_at;
    return null;
  }
  if (index === 0) return requestedAt;
  if (index === 1) return group.school_approved_at;
  if (index === 2) return group.approved_at;
  return null;
}
function stepState(group, index) {
  const current = currentStepIndex(group);
  if (group.phase === 'completed') return 'done';
  if (index < current) return 'done';
  if (index === current) return 'current';
  return 'todo';
}
function circleClass(state) {
  if (state === 'done') return 'bg-emerald-600 border-emerald-600 text-white';
  if (state === 'current') return 'bg-emerald-600 border-emerald-600 text-white';
  return 'bg-white border-dashed border-slate-300 text-slate-400';
}
function connectorClass(group, index) {
  const leftDone = stepState(group, index) === 'done';
  const rightDone = stepState(group, index + 1) === 'done';
  return leftDone && rightDone ? 'border-emerald-500 text-emerald-600' : 'border-dashed border-slate-300 text-slate-400';
}
function schoolName(group) {
  return group.school_display_name || '学校';
}
function stepLabel(group, step) {
  // 学校名はヘッダーに表示するため、ステップは汎用ラベル（学校承認）のままにする
  return step.label;
}
function renderStepper(group) {
  const steps = groupSteps(group);
  // ステップ数に応じて列数（ステップ＋間の矢印）と最小幅を変える（4ステップ=事前確認フロー）
  const columns = steps.length * 2 - 1;
  const minWidth = steps.length > 3 ? 'min-w-[640px]' : 'min-w-[480px]';
  return `<div class="mt-5 overflow-x-auto">
    <div class="grid ${minWidth} grid-cols-[repeat(${columns},minmax(0,1fr))] items-start gap-2">
    ${steps.map((step, index) => {
      const state = stepState(group, index);
      const icon = state === 'done' ? '✓' : (state === 'current' ? '⏱' : '');
      const connector = index < steps.length - 1
        ? `<div class="pt-5 text-center"><div class="border-t-2 ${connectorClass(group, index)}"></div><div class="${connectorClass(group, index)} text-lg leading-none">→</div></div>`
        : '';
      return `<div class="text-center">
          <div class="mx-auto flex h-10 w-10 items-center justify-center rounded-full border-2 text-sm font-semibold ${circleClass(state)}">${icon}</div>
          <div class="mt-2 text-sm font-medium">${escapeHtml(stepLabel(group, step))}</div>
          <div class="mt-1 min-h-5 text-xs text-slate-500">${timeLabel(stepTimestamp(group, index), state === 'todo' ? '' : '-')}</div>
          ${state === 'current' ? '<div class="mt-1 inline-block rounded-full bg-emerald-100 px-2 py-0.5 text-xs text-emerald-700">現在</div>' : ''}
        </div>${connector}`;
    }).join('')}
    </div>
  </div>`;
}
function exportButtons(group) {
  if (group.phase !== 'completed') return '';
  return `<div class="mt-3 flex flex-wrap gap-2">
    <a href="/api/w/reports/export?assignment_id=${group.assignment_id}&target_month=${group.target_month}&format=pdf" class="inline-flex items-center px-3 py-2 bg-emerald-600 hover:bg-emerald-700 text-white text-sm rounded-lg">PDFでダウンロード</a>
  </div>`;
}
function renderBulkExportArea() {
  const months = [...new Set(allReports.map(report => report.target_month))].sort().reverse();
  exportMonth.innerHTML = months.map(month => `<option value="${month}">${monthLabel(month)}</option>`).join('');
  if (!months.includes(selectedApprovalMonth)) selectedApprovalMonth = months.includes(currentMonth()) ? currentMonth() : (months[0] || currentMonth());
  exportMonth.value = selectedApprovalMonth;
  exportMonth.disabled = !months.length;
  renderBulkExportLinks();
}
function setBulkExportEnabled(enabled, message = '') {
  bulkExportPdf.classList.toggle('pointer-events-none', !enabled);
  bulkExportPdf.classList.toggle('opacity-50', !enabled);
  if (!enabled) bulkExportPdf.removeAttribute('href');
  exportWarning.textContent = message;
}
function renderBulkExportLinks() {
  const month = exportMonth.value || selectedApprovalMonth || currentMonth();
  let targetGroups = groups.filter(group => group.target_month === month);
  const params = new URLSearchParams({scope: 'all', target_month: month, format: 'pdf'});
  const exportable = targetGroups.length > 0 && targetGroups.every(group => group.phase === 'completed');
  if (!exportable) {
    setBulkExportEnabled(false, '未承認の報告が含まれています');
    return;
  }
  setBulkExportEnabled(true);
  bulkExportPdf.href = `/api/w/reports/export?${params.toString()}`;
}
function actionArea(group) {
  if (group.phase === 'completed') {
    return `<div class="mt-5 rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-700">最終承認済み（${timeLabel(group.approved_at, '-')}）<br>追加修正が必要な場合は管理へ差戻しを依頼してください。</div>${exportButtons(group)}`;
  }
  if (['awaiting_sales', 'awaiting_sales'].includes(group.phase)) {
    return '<div class="mt-5 rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-700">管理確認中</div>';
  }
  if (group.phase === 'awaiting_office') {
    return '<div class="mt-5 rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-700">営業済み</div>';
  }
  if (group.phase === 'awaiting_finance') {
    return '<div class="mt-5 rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm text-slate-700">事務済み</div>';
  }
  if (!group.skip_school_approval && !group.school_id && group.can_submit) {
    return `<div class="mt-5 grid gap-3">
      <div class="rounded-xl border border-amber-200 bg-amber-50 px-3 py-2 text-sm text-amber-800">学校が未設定のため承認依頼できません。報告書一覧で派遣先事業所を選択してください。</div>
      ${deleteButton(group) ? `<div class="flex flex-wrap items-center gap-3">${deleteButton(group)}</div>` : ''}
    </div>`;
  }
  if (group.phase === 'returned') {
    if (!group.skip_school_approval && !group.school_id) {
      return '<div class="mt-5 rounded-xl border border-amber-200 bg-amber-50 px-3 py-2 text-sm text-amber-800">学校が未設定のため再依頼できません。</div>';
    }
    // 事前確認フロー（1〜9分手入力）の再依頼は学校ではなく運営（事務の事前確認）へ向かうため文言を変える
    const label = group.skip_school_approval ? '修正済みの報告書を管理へ再提出'
      : (group.precheck_route ? '修正済みの報告書を再提出' : '修正済みの報告書を学校へ再依頼');
    return `${returnedNotice(group)}<div class="mt-3 flex flex-wrap items-center gap-3">
      <button class="rounded-lg bg-emerald-600 px-4 py-2 text-sm font-medium text-white transition hover:bg-emerald-700" onclick="resendReturnedReports('${group.assignment_id}')">${label}</button>
      <a class="text-sm text-rose-700 underline" href="/tutor/reports?month=${group.target_month}">報告書を修正する</a>
      ${deleteButton(group)}
    </div>`;
  }
  if (group.can_submit) {
    // 事前確認フロー（1〜9分手入力）は学校の前に運営（事務）の事前確認を経由するため「提出」表記にする
    const label = group.skip_school_approval ? '管理へ提出' : (group.precheck_route ? '提出' : '承認依頼');
    const precheckNote = (!group.skip_school_approval && group.precheck_route)
      ? '<div class="rounded-xl border border-amber-200 bg-amber-50 px-3 py-2 text-sm text-amber-800">担当業務・副担当業務に1〜9分単位の手入力があるため、提出すると学校へ依頼する前に運営（事務）の事前確認を経由します。</div>'
      : '';
    return `<div class="mt-5 grid gap-3">
      ${precheckNote}
      <div class="flex flex-wrap items-center gap-3">
        <button class="rounded-lg bg-emerald-600 px-4 py-2 text-sm font-medium text-white transition hover:bg-emerald-700" onclick="submitToParentGroup('${group.assignment_id}')">${label}</button>
        ${deleteButton(group)}
      </div>
    </div>`;
  }
  if (group.phase === 'recording') {
    return `<div class="mt-5 flex flex-wrap items-center gap-3">
      <button class="rounded-lg bg-slate-200 px-4 py-2 text-sm font-medium text-slate-500" disabled>まだ記録中の指導日があります</button>
      ${deleteButton(group)}
    </div>`;
  }
  if (group.phase === 'office_precheck') {
    // 発動理由に応じた案内（1〜9分手入力はクライアントで判定可。それ以外＝月分超過）
    const reason = group.reports.some(workReportHasMinuteLevelInput)
      ? '担当業務・副担当業務に1〜9分単位の手入力があるため'
      : '月分が契約の固定分を超えているため';
    return `<button class="mt-5 rounded-lg bg-slate-200 px-4 py-2 text-sm font-medium text-slate-500" disabled>${reason}、事務担当の事前確認を待っています</button>`;
  }
  if (group.phase === 'awaiting_school') {
    return '<button class="mt-5 rounded-lg bg-slate-200 px-4 py-2 text-sm font-medium text-slate-500" disabled>学校の承認を待っています</button>';
  }
  return '';
}
const DELETABLE_STATUSES = ['draft', 'returned_to_tutor'];
function deletableReportIds(group) {
  return group.reports.filter(r => DELETABLE_STATUSES.includes(r.status)).map(r => r.id);
}
function deleteButton(group) {
  // 学校へ依頼する前（下書き）または講師へ差戻された報告のみ削除できる
  if (!group.reports.length || !group.reports.every(r => DELETABLE_STATUSES.includes(r.status))) return '';
  return `<button class="rounded-lg border border-red-200 bg-red-50 px-4 py-2 text-sm font-medium text-red-700 transition hover:bg-red-100" onclick="deleteDraftReports('${group.assignment_id}')">報告を削除</button>`;
}
function returnSourceLabel(group) {
  const roles = new Set(group.reports
    .filter(r => r.status === 'returned_to_tutor')
    .map(r => r.last_return_actor_role)
    .filter(Boolean));
  if (roles.has('office') && roles.has('school')) return '学校・運営';
  if (roles.has('office')) return '運営';
  return schoolName(group);
}
function returnedNotice(group) {
  const reasons = group.reports
    .filter(r => r.status === 'returned_to_tutor' && r.last_return_comment)
    .map(r => `<div class="mt-1 whitespace-pre-wrap">差戻し理由：${escapeHtml(r.last_return_comment)}</div>`)
    .join('');
  return `<div class="mt-5 rounded-xl border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700">
    <div class="font-medium">${escapeHtml(returnSourceLabel(group))}から差戻しされています。修正のうえ再依頼してください。</div>
    ${reasons}
  </div>`;
}
async function deleteDraftReports(assignmentId) {
  const group = groups.find(item => item.assignment_id === assignmentId);
  if (!group) return;
  const ids = deletableReportIds(group);
  if (!ids.length) return;
  if (!confirm(`${group.school_display_name || '学校未設定'}の${monthLabel(group.target_month)}の報告を削除します。この操作は元に戻せません。よろしいですか？`)) return;
  try {
    for (const id of ids) {
      await api(`/api/w/reports/${id}`, {method: 'DELETE'});
    }
    showToast('報告を削除しました', 'success');
  } catch (error) {
    showToast(error.message || '報告を削除できませんでした', 'error');
  }
  await loadApproval();
}
function summaryGrid(group) {
  // 依頼前（作成中）は先頭の依頼日時欄に「作成中」を表示し、後続の「承認待ち」は依頼後にのみ表示する。
  // 事前確認フローは「運営へ依頼日時（講師の提出）」「学校へ依頼日時（事務の事前確認の承認）」の4欄になる。
  const requestedAt = group.first_submitted_to_school_at || group.submitted_to_school_at;
  const cells = [];
  if (group.precheck_route) {
    cells.push(['運営へ依頼日時', requestedAt ? timeLabel(requestedAt) : '作成中']);
    cells.push(['学校へ依頼日時', group.precheck_approved_at ? timeLabel(group.precheck_approved_at) : (requestedAt ? '事前確認待ち' : '-')]);
    cells.push(['学校承認日時', group.school_approved_at ? timeLabel(group.school_approved_at) : (group.precheck_approved_at ? '承認待ち' : '-')]);
  } else {
    cells.push(['学校へ依頼日時', requestedAt ? timeLabel(requestedAt) : '作成中']);
    cells.push(['学校承認日時', group.school_approved_at ? timeLabel(group.school_approved_at) : (requestedAt ? '承認待ち' : '-')]);
  }
  cells.push(['運営承認日時', group.approved_at ? timeLabel(group.approved_at) : '-']);
  const gridCols = cells.length === 4 ? 'sm:grid-cols-2 lg:grid-cols-4' : 'sm:grid-cols-3';
  return `<div class="mt-5 grid gap-3 ${gridCols}">
    ${cells.map(([label, value]) => `<div class="rounded-xl border border-slate-200 bg-slate-50 p-3"><div class="text-xs font-medium text-slate-500">${escapeHtml(label)}</div><div class="font-medium text-slate-800">${value}</div></div>`).join('')}
  </div>`;
}
function detailRows(group) {
  // 事前確認フローは「運営へ依頼（講師の提出）」列が先頭に入り、「学校へ依頼」は事務の事前確認の承認日時になる
  const pre = group.precheck_route;
  const rows = group.reports.map(r => `<tr class="border-t border-slate-100 hover:bg-slate-50">
    <td class="px-4 py-3">${escapeHtml(`${Number((r.target_month || '').slice(5, 7))}月分`)}</td>
    <td class="px-4 py-3">${statusLabel(r.status)}</td>
    ${pre ? `<td class="px-4 py-3">${timeLabel(r.submitted_to_school_at, '-')}</td>
    <td class="px-4 py-3">${timeLabel(r.precheck_approved_at, '-')}</td>` : `<td class="px-4 py-3">${timeLabel(r.submitted_to_school_at, '-')}</td>`}
    <td class="px-4 py-3">${timeLabel(r.school_approved_at, '-')}</td>
    <td class="px-4 py-3">${timeLabel(r.approved_at, '-')}</td>
    <td class="px-4 py-3 text-rose-700">${r.status === 'returned_to_tutor' ? (r.last_return_comment || '') : ''}</td>
    <td class="px-4 py-3 text-slate-700">${r.status === 'closed' ? `<div class="font-medium text-slate-800">クローズ済み</div><div class="mt-1 whitespace-pre-wrap">理由：${escapeHtml(r.close_reason || '-')}</div><div class="mt-1">日時：${timeLabel(r.closed_at, '-')}</div>` : ''}</td>
  </tr>`).join('');
  const requestHeads = pre ? '<th class="px-4 py-3 text-left">運営へ依頼</th><th class="px-4 py-3 text-left">学校へ依頼</th>' : '<th class="px-4 py-3 text-left">学校へ依頼</th>';
  return `<div class="mt-5 overflow-x-auto">
    <table class="w-full text-sm">
      <thead class="bg-slate-50 text-xs font-medium uppercase tracking-wide text-slate-500"><tr><th class="px-4 py-3 text-left">指導月</th><th class="px-4 py-3 text-left">状態</th>${requestHeads}<th class="px-4 py-3 text-left">学校承認</th><th class="px-4 py-3 text-left">最終承認</th><th class="px-4 py-3 text-left">差戻し理由</th><th class="px-4 py-3 text-left">クローズ情報</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}
function renderApproval() {
  const visibleGroups = groups.filter(group => group.target_month === selectedApprovalMonth);
  if (!visibleGroups.length) {
    approvalMonths.innerHTML = `<div class="rounded-xl border border-slate-200 bg-white p-5 text-sm text-slate-600 shadow-sm">${monthLabel(selectedApprovalMonth)}の承認対象はありません。</div>`;
    return;
  }
  approvalMonths.innerHTML = visibleGroups.map(group => {
    const completeBadge = group.phase === 'completed' ? '<span class="rounded-full bg-emerald-100 px-2 py-0.5 text-xs text-emerald-700">完了</span>' : '';
    const returnedBadge = group.phase === 'returned' ? '<span class="rounded-full bg-red-100 px-2 py-0.5 text-xs font-medium text-red-700">差戻しあり（要修正）</span>' : '';
    const collapsedAttr = group.phase === 'completed' ? '' : 'open';
    // ③ 見出しは学校名を主体にし、下段の「学校：〇〇」行は非表示にする
    const headTitle = group.school_display_name || '学校未設定';
    return `<details class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm overflow-hidden" ${collapsedAttr}>
      <summary class="cursor-pointer list-none">
        <div class="flex flex-wrap items-center justify-between gap-3">
          <div>
            <div class="font-semibold text-slate-800">${escapeHtml(headTitle)}　${monthLabel(group.target_month)}</div>
          </div>
          ${completeBadge}${returnedBadge}
        </div>
      </summary>
      ${renderStepper(group)}
      ${summaryGrid(group)}
      ${actionArea(group)}
      <button class="mt-4 text-sm font-medium text-emerald-600 underline decoration-emerald-300 underline-offset-4" onclick="toggleDetails('${group.assignment_id}')">対象報告書を表示</button>
      <div id="detail-${group.assignment_id}"></div>
    </details>`;
  }).join('');
}
function toggleDetails(assignmentId) {
  const group = groups.find(item => item.assignment_id === assignmentId);
  const area = document.getElementById(`detail-${assignmentId}`);
  area.innerHTML = area.innerHTML ? '' : detailRows(group);
}
// 提出（承認依頼・管理へ提出・差戻し後の再依頼）前の確認ポップアップ。キャンセルで提出を中止できる。
// 提出対象に1〜9分単位の手入力（担当業務・副担当業務）がある場合は、承認ワークフローが
// 事前確認フロー（講師→事務→学校→事務→営業）へ変わることを知らせるポップアップが確認を兼ね、
// それ以外は通常の「承認依頼の確認」ポップアップを表示する（誤操作による提出を防ぐ）。
async function confirmSubmitGroup(group, ids) {
  if (!group.skip_school_approval) {
    const hasMinuteInput = group.reports.some(report => ids.includes(report.id) && workReportHasMinuteLevelInput(report));
    if (hasMinuteInput) {
      return showConfirmModal({
        title: '承認ワークフローが変更されます',
        message: '担当業務・副担当業務に1〜9分単位の手入力があるため、この報告書は学校へ依頼する前に運営（事務）の事前確認を経由します。\n\n承認フロー：講師 → 事務（事前確認） → 学校 → 事務 → 営業\n\nこのまま提出しますか？',
        confirmLabel: '提出する',
        cancelLabel: 'キャンセル'
      });
    }
  }
  return showConfirmModal({
    title: '承認依頼の確認',
    message: `${schoolName(group)}　${monthLabel(group.target_month)}の報告書を${group.skip_school_approval ? '管理' : '学校'}へ提出します。\n提出後は差戻しされるまで内容を修正できません。よろしいですか？`,
    confirmLabel: '提出する',
    cancelLabel: 'キャンセル'
  });
}
async function submitToParentGroup(assignmentId) {
  const group = groups.find(item => item.assignment_id === assignmentId);
  // リマインド設定は講師では行わない（運営の進捗パイプラインで設定する）
  const ids = reportIdsForParentSubmit(group);
  if (!(await confirmSubmitGroup(group, ids))) return;
  for (const id of ids) {
    await api(`/api/w/reports/${id}/action`, {
      method: 'POST',
      body: JSON.stringify({action: 'submit'})
    });
  }
  await loadApproval();
}
async function resendReturnedReports(assignmentId) {
  const group = groups.find(item => item.assignment_id === assignmentId);
  const ids = returnedReportIds(group);
  if (!(await confirmSubmitGroup(group, ids))) return;
  for (const id of ids) {
    await api(`/api/w/reports/${id}/action`, {
      method: 'POST',
      body: JSON.stringify({action: 'submit'})
    });
  }
  await loadApproval();
}
async function loadSchoolUsers() {
  const result = await api('/api/w/users?role=school');
  schoolUsers = Array.isArray(result?.items) ? result.items : [];
}
async function loadApproval() {
  const [reports, assignments] = await Promise.all([
    api('/api/w/reports'),
    api('/api/w/assignments')
  ]);
  allReports = reports;
  allAssignments = assignments;
  const assignmentMap = new Map(allAssignments.map(assignment => [assignment.id, assignment]));
  const reportGroups = allReports.reduce((acc, report) => {
    (acc[`${report.assignment_id}:${report.target_month}`] ||= []).push(report);
    return acc;
  }, {});
  groups = Object.entries(reportGroups).map(([key, items]) => {
    const assignmentId = key.split(':')[0];
    return buildGroup(assignmentMap.get(assignmentId), items);
  });
  renderBulkExportArea();
  renderApproval();
  // サイドバーの「差戻しあり」バッジを再計算（再承認依頼の直後に消えるように）
  window.refreshReturnComments?.();
}
exportMonth.addEventListener('change', () => {
  selectedApprovalMonth = exportMonth.value || currentMonth();
  renderBulkExportLinks();
  renderApproval();
});
window.authReady.then(async user => {
  if (!user) return;
  await loadSchoolUsers();
  loadApproval();
});
</script>
