{% extends "base.html" %}

{% block content %}
<div class="mb-6">
  <h1 class="text-xl font-bold text-slate-800">承認管理</h1>
  <p class="mt-1 text-sm text-slate-500">月次ステータスと未提出報告書を確認します</p>
</div>

<div class="mb-4 flex flex-wrap items-center gap-3 rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
  <label class="text-sm font-medium text-slate-600">対象月</label>
  <input type="month" id="monthPicker" class="rounded-lg border border-slate-300 px-3 py-1.5 text-sm focus:border-emerald-500 focus:outline-none">
  <button onclick="submitAllDrafts()" class="rounded-lg bg-emerald-600 px-4 py-2 text-sm font-medium text-white hover:bg-emerald-700">未提出を一括学校依頼</button>
</div>

<section id="summaryArea" class="mb-4 grid gap-3 sm:grid-cols-3"></section>
<section id="approvalList" class="space-y-3"></section>
{% endblock %}

{% block scripts %}
<script>
  const STATUS_LABELS = {
    draft: '下書き', awaiting_school: '学校確認待ち', awaiting_sales: '営業確認待ち',
    awaiting_office: '事務確認待ち', awaiting_finance: '経理確認待ち', approved: '承認済み',
    returned_to_tutor: '差戻し（講師へ）', returned_to_sales: '差戻し（営業へ）', closed: '終了'
  };
  const STEPS = ['下書き', '学校', '営業', '事務', '経理', '完了'];
  const STEP_INDEX = {draft:0, returned_to_tutor:0, awaiting_school:1, awaiting_sales:2, awaiting_office:3, returned_to_sales:3, awaiting_finance:4, approved:5};
  let reports = [];

  function currentMonthValue() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
  }

  function renderStepper(status) {
    const current = STEP_INDEX[status] ?? 0;
    return `<div class="mt-3 grid grid-cols-6 gap-2">${STEPS.map((label, i) => {
      const cls = i <= current ? 'bg-emerald-600 text-white' : 'bg-slate-100 text-slate-500';
      return `<div class="rounded-lg px-2 py-2 text-center text-xs font-medium ${cls}">${label}</div>`;
    }).join('')}</div>`;
  }

  async function loadApproval() {
    const month = monthPicker.value;
    reports = await api(`/api/w/reports?target_month=${month}`);
    const summary = await api(`/api/w/reports/monthly-summary?target_month=${month}`);
    summaryArea.innerHTML = `
      <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm"><div class="text-xs text-slate-500">報告書数</div><div class="mt-1 text-2xl font-semibold">${summary.total_reports}</div></div>
      <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm"><div class="text-xs text-slate-500">指導分</div><div class="mt-1 text-2xl font-semibold">${summary.total_teach_minutes}</div></div>
      <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm"><div class="text-xs text-slate-500">交通費</div><div class="mt-1 text-2xl font-semibold">${summary.total_commute_fee}</div></div>`;
    if (!reports.length) {
      approvalList.innerHTML = '<div class="rounded-xl border border-slate-200 bg-white p-4 text-sm text-slate-500 shadow-sm">この月の報告書はありません。</div>';
      return;
    }
    approvalList.innerHTML = reports.map(r => `
      <article class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
        <div class="flex flex-wrap items-center justify-between gap-2">
          <div class="font-semibold text-slate-800">${navEscape(r.target_month)} / ${navEscape(r.form_type)}</div>
          <a href="/w/tutor/reports/${r.id}" class="text-sm font-medium text-emerald-700 underline">詳細</a>
        </div>
        <div class="mt-1 text-sm text-slate-500">${navEscape(STATUS_LABELS[r.status] || r.status)}</div>
        ${renderStepper(r.status)}
      </article>`).join('');
  }

  async function submitAllDrafts() {
    const targets = reports.filter(r => ['draft', 'returned_to_tutor'].includes(r.status));
    if (!targets.length) { showToast('提出対象がありません', 'info'); return; }
    if (!confirm(`${targets.length}件を学校へ提出します。よろしいですか？`)) return;
    for (const r of targets) {
      await api(`/api/w/reports/${r.id}/action`, {method: 'POST', body: JSON.stringify({action: 'submit'})});
    }
    showToast('一括提出しました', 'success');
    await loadApproval();
  }

  monthPicker.value = currentMonthValue();
  monthPicker.addEventListener('change', loadApproval);
  setBreadcrumb('講師', '承認管理');
  loadApproval();
</script>
{% endblock %}
