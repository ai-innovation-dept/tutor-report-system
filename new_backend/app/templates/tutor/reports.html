{% extends "base.html" %}
{% block content %}
<div>
  <!-- 当月の報告書一覧（学校ごと）。別の学校の報告書もここから作成・切替できる -->
  <section id="reportListPanel" class="mb-4 rounded-xl border border-slate-200 bg-white shadow-sm">
    <div class="flex flex-wrap items-center justify-between gap-3 border-b border-slate-200 bg-slate-50 px-4 py-3">
      <h2 class="font-semibold text-slate-800">当月の報告書（学校ごと）</h2>
      <button id="newReportBtn" type="button" class="rounded-lg bg-emerald-600 px-3 py-2 text-sm font-medium text-white transition hover:bg-emerald-700">＋ 別の学校の報告書を作成</button>
    </div>
    <div id="reportList" class="flex gap-2 overflow-x-auto px-4 py-3"></div>
  </section>

  <section class="rounded-xl border border-slate-200 bg-white shadow-sm" id="formPanel">
    <div class="p-5">
      <div id="formMessage" class="mb-3 hidden rounded-lg px-3 py-2 text-sm"></div>
      <form id="reportForm" class="space-y-4">
        <input type="hidden" id="editingId">
        <!-- 業務連絡表ヘッダー（サンプル紙面レイアウト準拠） -->
        <div class="overflow-hidden rounded-lg border border-slate-300 text-sm">

          <!-- 行1: 派遣先名称・所在地（左）＋ 月分業務連絡表（右） -->
          <div class="flex border-b border-slate-300">
            <div class="flex flex-1 flex-col border-r border-slate-300">
              <!-- 派遣先事業所の名称・組織単位 row（氏名と同じ 項目→入力ボックス 形式） -->
              <div class="flex min-h-[46px] flex-1 border-b border-slate-300">
                <div class="flex w-40 flex-shrink-0 items-center justify-center border-r border-slate-300 bg-slate-50 px-2 py-1 text-center text-xs leading-tight text-slate-700">派遣先事業所の<br>名称・組織単位</div>
                <div class="flex flex-1 items-center px-2 py-1">
                  <select id="dispatchPlaceSchool" data-meta="dispatch_place_school_id"
                    class="meta-input w-full rounded border border-slate-300 px-2 py-1.5 text-sm font-semibold focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500/20">
                    <option value="">選択してください</option>
                  </select>
                </div>
              </div>
              <!-- 派遣先事業所の所在地 row -->
              <div class="flex min-h-[46px] flex-1">
                <div class="flex w-40 flex-shrink-0 items-center justify-center border-r border-slate-300 bg-slate-50 px-2 py-1 text-center text-xs leading-tight text-slate-700">派遣先事業所の<br>所在地</div>
                <div class="flex flex-1 items-center px-2 py-1">
                  <input id="dispatchPlaceAddress" data-meta="dispatch_place_address" type="text"
                    class="meta-input w-full rounded border border-slate-300 px-2 py-1.5 text-sm focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500/20">
                </div>
              </div>
            </div>
            <div class="flex w-96 flex-shrink-0 flex-col items-center justify-center gap-2 p-3 text-center">
              <div class="flex items-center justify-center gap-1 whitespace-nowrap font-bold leading-snug text-slate-900">
                <select id="monthFilter"
                  class="w-36 rounded border border-slate-400 px-1.5 py-1 text-sm font-bold text-slate-900 focus:border-emerald-500 focus:outline-none"></select>
                <span class="text-sm">月分業務連絡表</span>
              </div>
              <div class="text-xs text-slate-400">対象月を選択してください</div>
            </div>
          </div>

          <!-- 行2: 氏名 | 値 | 従事業務内容（縦結合） | 内容テキスト -->
          <div class="flex border-b border-slate-300">
            <!-- 左ブロック: 氏名 + 講師番号・お客様ID（2段） -->
            <div class="flex flex-col border-r border-slate-300" style="flex: 0 0 420px">
              <!-- 氏名 row -->
              <div class="flex min-h-[46px] flex-1 border-b border-slate-300">
                <div class="flex w-24 flex-shrink-0 items-center justify-center border-r border-slate-300 bg-slate-50 px-2 py-1 text-center text-xs text-slate-700">氏名</div>
                <div id="tutorNameDisplay" class="flex flex-1 items-center justify-center px-3 py-1 text-center font-semibold text-slate-800">-</div>
              </div>
              <!-- 講師番号 + お客様ID row -->
              <div class="flex min-h-[46px] flex-1">
                <div class="flex w-24 flex-shrink-0 items-center justify-center border-r border-slate-300 bg-slate-50 px-2 py-1 text-center text-xs text-slate-700">講師番号</div>
                <div class="flex flex-1 items-center border-r border-slate-300 px-2 py-1">
                  <input id="tutorNo" data-meta="tutor_no" type="text"
                    class="meta-input w-full rounded border border-slate-300 px-2 py-1.5 text-center font-semibold focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500/20">
                </div>
                <div class="flex w-20 flex-shrink-0 items-center justify-center border-r border-slate-300 bg-slate-50 px-2 py-1 text-center text-xs text-slate-700">お客様ID</div>
                <div class="flex flex-1 items-center px-2 py-1">
                  <input id="customerId" data-meta="customer_id" type="text"
                    class="meta-input w-full rounded border border-slate-300 px-2 py-1.5 text-center focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500/20">
                </div>
              </div>
            </div>
            <!-- 右ブロック: 従事業務内容（左の2段分を縦に占有） -->
            <div class="flex flex-1">
              <div class="flex w-16 flex-shrink-0 items-start justify-center bg-slate-50 px-1 py-2 text-center text-xs leading-tight text-slate-700">従事業務内容</div>
              <div class="flex-1 p-2">
                <textarea id="workContent" data-meta="work_content" rows="3"
                  class="meta-input h-full min-h-[80px] w-full resize-none rounded border border-slate-300 px-2 py-1 text-sm focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500/20"></textarea>
              </div>
            </div>
          </div>

        </div>

        <div class="overflow-x-auto rounded-lg border border-slate-200">
          <table class="min-w-[1080px] w-full text-sm">
            <thead id="lineHead" class="bg-slate-50 text-xs font-medium text-slate-600"></thead>
            <tbody id="lineRows"></tbody>
          </table>
        </div>

        <div id="summaryArea" class="flex flex-wrap gap-x-6 gap-y-1 rounded-lg border border-slate-200 bg-slate-50 p-3 text-sm text-slate-700"></div>

        <div class="space-y-3">
          <div class="grid gap-3 md:grid-cols-2">
            <label class="block text-sm">
              <span class="mb-1 block text-slate-700">弊社担当</span>
              <input data-meta="our_staff" type="text" class="meta-input w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20">
            </label>
            <div class="text-sm">
              <span class="mb-1 block text-slate-700">委託業務（契約より）</span>
              <div id="taskReference" class="min-h-[42px] rounded-lg border border-slate-200 bg-slate-50 p-2 text-xs text-slate-600">-</div>
            </div>
          </div>
          <label class="block text-sm">
            <span class="mb-1 block text-slate-700">備考欄</span>
            <textarea data-meta="note_schedule" rows="2" class="meta-input w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20"></textarea>
          </label>
        </div>

        <div class="grid gap-3 md:grid-cols-2">
          <label class="block text-sm">
            <span class="block mb-1 text-slate-700">要望連絡事項</span>
            <textarea data-meta="requests" rows="3" class="meta-input w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20"></textarea>
          </label>
          <label class="block text-sm">
            <span class="block mb-1 text-slate-700">月固定分</span>
            <div class="flex items-center gap-2">
              <span>月</span>
              <input data-meta="monthly_minutes_fixed" type="text" class="meta-input min-w-0 flex-1 rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20">
              <span>分固定：週</span>
              <input data-meta="weekly_lessons" type="text" class="meta-input w-20 rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20">
              <span>コマ</span>
            </div>
          </label>
          <label class="block text-sm">
            <span class="block mb-1 text-slate-700">契約期間</span>
            <input data-meta="contract_period" type="text" placeholder="2026年04月01日〜2027年03月31日" class="meta-input w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20">
          </label>
        </div>

        <div class="rounded-lg border border-slate-200 p-3 text-sm">
          <div class="mb-3 font-medium text-slate-800">定期代セクション</div>
          <div class="mb-3 text-slate-700">購入時のみ記入</div>
          <div class="grid gap-3 md:grid-cols-2">
            <div>
              <span class="mb-1 block text-slate-700">期間選択・金額</span>
              <div class="flex flex-wrap items-center gap-3">
                <label class="inline-flex items-center gap-1"><input class="meta-input" data-meta="commuter_pass_months" name="commuter_pass_months" type="radio" value="1">1ヶ月</label>
                <label class="inline-flex items-center gap-1"><input class="meta-input" data-meta="commuter_pass_months" name="commuter_pass_months" type="radio" value="3">3ヶ月</label>
                <label class="inline-flex items-center gap-1"><input class="meta-input" data-meta="commuter_pass_months" name="commuter_pass_months" type="radio" value="6">6ヶ月</label>
                <input data-meta="commuter_pass_amount" type="number" min="0" step="1" placeholder="金額" class="meta-input w-32 rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20">
                <span>円</span>
              </div>
            </div>
            <label class="block">
              <span class="block mb-1 text-slate-700">区間（経路）</span>
              <input data-meta="commuter_pass_route" type="text" class="meta-input w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20">
            </label>
            <label class="block">
              <span class="block mb-1 text-slate-700">購入日</span>
              <input data-meta="commuter_pass_purchase_date" type="date" class="meta-input w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20">
            </label>
            <div>
              <span class="block mb-1 text-slate-700">期間（from〜to）</span>
              <div class="flex items-center gap-2">
                <input data-meta="commuter_pass_from" type="date" class="meta-input min-w-0 flex-1 rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20">
                <span>〜</span>
                <input data-meta="commuter_pass_to" type="date" class="meta-input min-w-0 flex-1 rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20">
              </div>
            </div>
          </div>
          <div class="mt-3 text-xs text-slate-500">実費の方が安い場合は購入不可</div>
        </div>

        <div class="flex flex-wrap gap-2">
          <button class="rounded-lg bg-emerald-600 px-4 py-2 font-medium text-white transition hover:bg-emerald-700" id="saveButton">保存</button>
          <button type="button" class="rounded-lg border border-slate-300 px-4 py-2 font-medium text-slate-700 transition hover:bg-slate-50" onclick="resetReportForm(true)">取消</button>
        </div>
      </form>
    </div>
  </section>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/chat.js"></script>
<script>
setBreadcrumb('講師ポータル', '報告書一覧');

const STATUS_LABELS = {
  draft: '下書き',
  awaiting_school: '学校確認待ち',
  returned_to_tutor: '差戻し（要修正）',
  awaiting_sales: '営業確認待ち',
  awaiting_office: '事務確認待ち',
  awaiting_finance: '最終確認待ち',
  approved: '最終承認済み',
  returned_to_sales: '管理内差戻し',
  closed: 'クローズ'
};
const WEEKDAYS = ['日', '月', '火', '水', '木', '金', '土'];
const LINE_COUNT = 26;
const EDITABLE_STATUSES = new Set(['draft', 'returned_to_tutor', 'returned_to_sales']);
const DEFAULT_FORM_DEFINITION = {
  form_type: 'monthly_dispatch',
  label: '月次派遣報告',
  max_lines: 26,
  columns: [
    {key: 'date', label: '日付', type: 'date', summable: false},
    {key: 'start', label: '開始時刻', type: 'time', summable: false},
    {key: 'end', label: '終了時刻', type: 'time', summable: false},
    {key: 'subject_period', label: '担当時限', type: 'number', summable: false},
    {key: 'teach_minutes', label: '数学科指導（分）', type: 'number', summable: true},
    {key: 'break_minutes', label: '休憩時間（分）', type: 'number', summable: true},
    {key: 'commute_fee', label: '往復交通費（円）', type: 'number', summable: true},
    {key: 'note', label: '内容', type: 'text', summable: false}
  ],
  summable_keys: ['teach_minutes', 'break_minutes', 'commute_fee']
};
const DEFAULT_META = {
  dispatch_place_name: '',
  dispatch_place_school_id: '',
  dispatch_place_address: '',
  customer_id: '',
  note_schedule: '月(9:30～10:20、10:30～11:20、11:30～12:20、13:20～14:10)金(11:30～12:20、13:20～14:10)。年間スケジュール又はシフト表に準ずる。',
  work_content: '',
  our_staff: '',
  tutor_no: '',
  requests: '',
  monthly_minutes_fixed: '',
  weekly_lessons: '',
  contract_period: '',
  commuter_pass_months: '',
  commuter_pass_amount: '',
  commuter_pass_route: '',
  commuter_pass_purchase_date: '',
  commuter_pass_from: '',
  commuter_pass_to: ''
};
let allReports = [];
let allAssignments = [];
let schoolUsers = [];
const isSubmitPage = location.pathname === '/tutor/submit';
const currentMonth = getCurrentMonth();
let selectedMonth = new URLSearchParams(location.search).get('month') || currentMonth;
let selectedAssignmentId = '';
let selectedSchoolId = '';
let contractsBySchool = {};

function getCurrentMonth() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
}
function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'}[ch]));
}
function formatApiError(error) {
  // FastAPIのdetailは文字列または検証エラーの配列。読みやすい文字列に整形する。
  let detail = error?.message;
  try { detail = JSON.parse(error.message).detail ?? detail; } catch (_) {}
  if (Array.isArray(detail)) return detail.map(item => item?.msg || JSON.stringify(item)).join(' / ');
  if (detail && typeof detail === 'object') return detail.msg || JSON.stringify(detail);
  return detail || '不明なエラー';
}
function statusLabel(status) { return STATUS_LABELS[status] || status; }
function monthLabel(value) {
  const [year, month] = value.split('-');
  return `${year}年${Number(month)}月分`;
}
function dateLabel(value) {
  if (!value) return '';
  const d = new Date(`${value}T00:00:00`);
  if (Number.isNaN(d.getTime())) return '';
  return `${d.getMonth() + 1}月${d.getDate()}日（${WEEKDAYS[d.getDay()]}）`;
}
function weekdayLabel(value) {
  if (!value) return '';
  const d = new Date(`${value}T00:00:00`);
  return Number.isNaN(d.getTime()) ? '' : WEEKDAYS[d.getDay()];
}
function numberValue(value) {
  const n = Number(value || 0);
  return Number.isFinite(n) ? n : 0;
}
function durationLabel(minutes) {
  const hours = Math.floor(minutes / 60);
  const mins = minutes % 60;
  if (hours && mins) return `${hours}時間${mins}分`;
  if (hours) return `${hours}時間`;
  return `${mins}分`;
}
function selectedAssignment() {
  return allAssignments.find(a => a.id === selectedAssignmentId);
}
function contractForSchool(schoolId) {
  return schoolId ? (contractsBySchool[String(schoolId)] || null) : null;
}
function columnsFromSnapshot(report) {
  const cols = report?.form_data?.meta?.column_definition;
  return Array.isArray(cols) && cols.length ? cols : null;
}
function activeColumnDefinition() {
  const report = selectedReport();
  if (report) {
    // 既存報告書: スナップショット優先。無い旧データはデフォルト列で表示（契約更新の影響を受けない）。
    return columnsFromSnapshot(report) || DEFAULT_FORM_DEFINITION.columns;
  }
  // 新規作成のみ契約管理の列定義を優先する
  const contract = contractForSchool(selectedSchoolId);
  if (contract && Array.isArray(contract.column_definition) && contract.column_definition.length) {
    return contract.column_definition;
  }
  return DEFAULT_FORM_DEFINITION.columns;
}
function columnsToFormDefinition(columns) {
  return {
    form_type: 'monthly_dispatch',
    label: '月次派遣報告',
    max_lines: LINE_COUNT,
    columns,
    summable_keys: columns.filter(column => column.summable).map(column => column.key),
  };
}
function selectedFormDefinition() {
  return columnsToFormDefinition(activeColumnDefinition());
}
function selectedFormType() {
  return DEFAULT_FORM_DEFINITION.form_type;
}
function assignmentName(id) {
  return allAssignments.find(a => a.id === id)?.student_name || '生徒未設定';
}
function emptyLine(form = selectedFormDefinition()) {
  return Object.fromEntries((form.columns || DEFAULT_FORM_DEFINITION.columns).map(column => [column.key, '']));
}
function normalizedLines(report) {
  const form = selectedFormDefinition();
  const lines = Array.isArray(report?.form_data?.lines) ? report.form_data.lines : [];
  const count = form.max_lines || LINE_COUNT;
  return Array.from({length: count}, (_, index) => ({...emptyLine(form), ...(lines[index] || {})}));
}
function formatContractPeriod(start, end) {
  const fmt = (s) => { if (!s) return ''; const [y, m, d] = s.split('-'); return `${y}年${Number(m)}月${Number(d)}日`; };
  if (!start && !end) return '';
  return `${fmt(start)}〜${fmt(end)}`;
}
function contractMetaValues() {
  // 契約管理の値を報告書メタの初期値へ反映（新規作成時のみ defaultMeta 経由で適用）
  const contract = contractForSchool(selectedSchoolId);
  if (!contract) return {};
  return {
    customer_id: contract.customer_id || '',
    our_staff: contract.our_staff || '',
    contract_period: formatContractPeriod(contract.contract_start, contract.contract_end),
    monthly_minutes_fixed: contract.monthly_minutes != null ? String(contract.monthly_minutes) : '',
    weekly_lessons: contract.weekly_lessons != null ? String(contract.weekly_lessons) : '',
    work_content: contract.work_content || '',
    note_schedule: contract.shift_note || '',
  };
}
function defaultMeta() {
  const assignment = selectedAssignment();
  return {
    ...DEFAULT_META,
    dispatch_place_school_id: selectedSchoolId || '',
    tutor_no: assignment?.tutor?.tutor_no || assignment?.tutor?.user_no || '',
    ...contractMetaValues(),
  };
}
function normalizedMeta(report) {
  return {...defaultMeta(), ...((report?.form_data || {}).meta || {})};
}
function lineHasData(line) {
  return Object.values(line).some(value => String(value ?? '').trim() !== '');
}
function reportMetrics(report) {
  const lines = Array.isArray(report?.form_data?.lines) ? report.form_data.lines : [];
  return lines.reduce((acc, line) => {
    if (lineHasData(line)) acc.days += 1;
    acc.teach += numberValue(line.teach_minutes);
    acc.break += numberValue(line.break_minutes);
    acc.fee += numberValue(line.commute_fee);
    return acc;
  }, {days: 0, teach: 0, break: 0, fee: 0});
}
function filteredReports() {
  return allReports.filter(r => {
    const monthMatches = isSubmitPage || r.target_month === selectedMonth;
    const assignmentMatches = !selectedAssignmentId || r.assignment_id === selectedAssignmentId;
    return monthMatches && assignmentMatches;
  });
}
function selectedReport() {
  if (!selectedAssignmentId) return null;
  return allReports.find(r => r.assignment_id === selectedAssignmentId && r.target_month === selectedMonth) || null;
}
function statusBadge(status) {
  const label = statusLabel(status);
  if (status === 'returned_to_tutor') return `<span class="inline-flex rounded-full bg-red-100 px-2.5 py-1 text-xs font-medium text-red-700">${label}</span>`;
  if (status === 'approved') return `<span class="inline-flex rounded-full bg-emerald-100 px-2.5 py-1 text-xs font-medium text-emerald-700">${label}</span>`;
  if (status === 'closed') return `<span class="inline-flex rounded-full bg-slate-100 px-2.5 py-1 text-xs font-medium text-slate-600">${label}</span>`;
  if (status === 'draft') return `<span class="inline-flex rounded-full bg-slate-100 px-2.5 py-1 text-xs font-medium text-slate-600">${label}</span>`;
  return `<span class="inline-flex rounded-full bg-emerald-100 px-2.5 py-1 text-xs font-medium text-emerald-700">${label}</span>`;
}
function returnComment(r) {
  if (r.status !== 'returned_to_tutor' || !r.last_return_comment) return '';
  return `<div class="mt-1 max-w-xs whitespace-pre-wrap text-xs text-red-700">差戻し理由：${escapeHtml(r.last_return_comment)}</div>`;
}
function dateTimeLabel(value) {
  if (!value) return '-';
  const d = new Date(value);
  if (Number.isNaN(d.getTime())) return '-';
  return `${d.getFullYear()}/${d.getMonth()+1}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function closeInfo(r) {
  if (r.status !== 'closed') return '';

function renderMonthFilter() {
  const months = [];
  const now = new Date();
  for (let i = 0; i < 12; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`);
  }
  monthFilter.innerHTML = months.map(month => `<option value="${month}">${monthLabel(month)}</option>`).join('');
  monthFilter.value = selectedMonth;
}
function renderAssignmentOptions() {}
function updateStudentBadge() {}
async function resolveAssignmentForSchool(schoolId) {
  // 既存の紐付けを優先し、なければサーバ側で（講師×学校の）紐付けを取得/作成する
  const existing = allAssignments.find(a => String(a.parent_id) === String(schoolId));
  if (existing) return existing;
  const assignment = await api('/api/w/assignments/for-school', {
    method: 'POST',
    body: JSON.stringify({school_id: schoolId}),
    suppressFlash: true
  });
  if (assignment && !allAssignments.some(a => a.id === assignment.id)) allAssignments.push(assignment);
  return assignment;
}
async function selectSchool(schoolId) {
  // 学校を選ぶと、その学校（紐付け）の当月報告書を読み込む。作成中でも別の学校に切替可能。
  selectedSchoolId = schoolId || '';
  clearFormMessage();
  if (!schoolId) {
    selectedAssignmentId = '';
    resetReportForm(true);
    renderCurrentList();
    return;
  }
  try {
    const assignment = await resolveAssignmentForSchool(schoolId);
    selectedAssignmentId = assignment.id;
  } catch (error) {
    showFormMessage('学校の紐付けを取得できませんでした', true);
    return;
  }
  resetReportForm(true);
  renderCurrentList();
}
function columnLabel(column) {

  return column.label;
}
function renderLineHeader(form) {

    const column = columns[index];

      headers.push(`<th class="w-36 px-2 py-2 text-left">${escapeHtml(columnLabel(column))}</th>`);
      headers.push('<th class="w-14 px-2 py-2 text-center">曜日</th>');
    } else if (column.key === 'start') {
      const next = columns[index + 1];
      if (next?.key === 'end') {
        headers.push('<th class="w-48 px-2 py-2 text-left">業務開始時間〜業務終了時間</th>');
        index += 1;
      } else {
        headers.push(`<th class="w-28 px-2 py-2 text-left">${escapeHtml(columnLabel(column))}</th>`);
      }
    } else if (column.key === 'end') {
      headers.push(`<th class="w-28 px-2 py-2 text-left">${escapeHtml(columnLabel(column))}</th>`);
    } else if (column.key === 'note') {
      headers.push(`<th class="min-w-64 px-2 py-2 text-left">${escapeHtml(columnLabel(column))}</th>`);
    } else {
      headers.push(`<th class="w-32 px-2 py-2 text-left">${escapeHtml(columnLabel(column))}</th>`);

  }
  lineHead.innerHTML = `<tr>${headers.join('')}</tr>`;
}
function inputType(column) {

function inputAttributes(column) {

  if (column.type === 'number') return 'min="0" step="1" inputmode="numeric"';

}
function inputClasses(width = 'w-full') {

function renderCell(column, line) {

  }

        <span class="text-slate-500">〜</span>
        <input type="time" data-field="end" value="${escapeHtml(line.end || '')}" class="${inputClasses('w-[82px]')}">
        <select data-quick-end title="開始時間からの経過時間で終了時間を設定" class="h-9 w-[92px] rounded border border-slate-300 px-1 text-xs text-slate-600 focus:border-emerald-500 focus:outline-none">
          <option value="">開始から▼</option>
          <option value="30">＋30分</option>
          <option value="60">＋1時間</option>
          <option value="90">＋1時間半</option>
          <option value="120">＋2時間</option>
          <option value="180">＋3時間</option>
          <option value="240">＋4時間</option>
        </select>
      </div>
    </td>`;
  }
  if (column.key === 'end') return '';
  return `<td class="px-2 py-1"><input type="${inputType(column)}" data-field="${escapeHtml(column.key)}" ${inputAttributes(column)} value="${escapeHtml(line[column.key] || '')}" class="${inputClasses()}"></td>`;
}
function buildLineRows(lines) {
  const form = selectedFormDefinition();
  const columns = form.columns || DEFAULT_FORM_DEFINITION.columns;
  renderLineHeader(form);
  lineRows.innerHTML = lines.map((line, index) => `<tr class="border-t border-slate-100" data-index="${index}">
    <td class="px-2 py-1 text-center text-slate-600">${index + 1}</td>
    ${columns.map(column => renderCell(column, line)).join('')}
  </tr>`).join('');
  lineRows.querySelectorAll('.line-input').forEach(input => {
    input.addEventListener('input', () => {
      if (input.dataset.field === 'subject_period') enforceSubjectPeriod(input);
      if (input.dataset.field === 'date') {
        input.closest('tr').querySelector('[data-weekday]').textContent = weekdayLabel(input.value);
      }
      updateLineSummary();
    });
    if (input.dataset.field === 'start' || input.dataset.field === 'end') {
      input.addEventListener('change', () => enforceTimeOrder(input));
    }
  });
  lineRows.querySelectorAll('[data-quick-end]').forEach(select => {
    select.addEventListener('change', () => applyQuickEnd(select));
  });
  updateLineSummary();
}
function timeToMinutes(value) {
  if (!value) return null;
  const [hours, minutes] = value.split(':').map(Number);
  return hours * 60 + minutes;
}
function minutesToTime(total) {
  const normalized = ((total % 1440) + 1440) % 1440;
  return `${String(Math.floor(normalized / 60)).padStart(2, '0')}:${String(normalized % 60).padStart(2, '0')}`;
}
function showTimePopup(cell, message) {
  cell.querySelectorAll('.time-popup').forEach(el => el.remove());
  const popup = document.createElement('div');
  popup.className = 'time-popup absolute left-2 top-full z-20 -mt-1 whitespace-nowrap rounded bg-slate-800 px-2 py-1 text-xs text-white shadow-lg';
  popup.textContent = message;
  cell.appendChild(popup);
  setTimeout(() => popup.remove(), 2500);
}
function enforceTimeOrder(input) {
  const cell = input.closest('[data-time-range]');
  if (!cell) return;
  const start = timeToMinutes(cell.querySelector('[data-field="start"]').value);
  const endInput = cell.querySelector('[data-field="end"]');
  const end = timeToMinutes(endInput.value);
  if (start === null || end === null) return;
  if (end < start) {
    endInput.value = '';
    showTimePopup(cell, '業務終了時間は業務開始時間より早く設定できません');
    updateLineSummary();
  }
}
function applyQuickEnd(select) {
  const cell = select.closest('[data-time-range]');
  const minutes = Number(select.value);
  select.value = '';
  if (!cell || !minutes) return;
  const start = timeToMinutes(cell.querySelector('[data-field="start"]').value);
  if (start === null) {
    showTimePopup(cell, '先に業務開始時間を入力してください');
    return;
  }
  cell.querySelector('[data-field="end"]').value = minutesToTime(start + minutes);
  updateLineSummary();
}
function enforceSubjectPeriod(input) {
  if (input.value === '') return;
  if (!/^\d+$/.test(input.value) || Number(input.value) < 1 || Number(input.value) > 10) {
    input.value = '';
  }
}
function collectLines() {
  const numericKeys = new Set((selectedFormDefinition().columns || []).filter(column => column.type === 'number').map(column => column.key));
  return [...lineRows.querySelectorAll('tr')].map(row => {
    const line = emptyLine(selectedFormDefinition());
    row.querySelectorAll('[data-field]').forEach(input => {
      const key = input.dataset.field;
      if (numericKeys.has(key)) {
        line[key] = input.value === '' ? '' : Number(input.value);
      } else {
        line[key] = input.value.trim();
      }
    });
    return line;
  });
}
function applyMeta(meta) {
  document.querySelectorAll('.meta-input').forEach(input => {
    if (input.type === 'radio') {
      input.checked = String(meta[input.dataset.meta] ?? '') === input.value;
    } else {
      input.value = meta[input.dataset.meta] ?? '';
    }
  });
}
function collectMeta() {
  const meta = {...DEFAULT_META};
  document.querySelectorAll('.meta-input').forEach(input => {
    if (input.type === 'radio') {
      if (input.checked) meta[input.dataset.meta] = input.value;
    } else {
      meta[input.dataset.meta] = input.value.trim();
    }
  });
  return meta;
}
function updateLineSummary() {
  // 集計対象（summable）列を動的に合計表示する
  const columns = selectedFormDefinition().columns.filter(column => column.summable);
  const lines = collectLines();
  let days = 0;
  const sums = {};
  columns.forEach(column => { sums[column.key] = 0; });
  lines.forEach(line => {
    if (lineHasData(line)) days += 1;
    columns.forEach(column => { sums[column.key] += numberValue(line[column.key]); });
  });
  const parts = [`<div>勤務日数：<span class="font-semibold">${days}</span>日</div>`];
  columns.forEach(column => {
    parts.push(`<div>${escapeHtml(column.label)}：<span class="font-semibold">${sums[column.key].toLocaleString()}</span></div>`);
  });
  const area = document.getElementById('summaryArea');
  if (area) area.innerHTML = parts.join('');
}

function showFormMessage(message, isError = false) {

function resetReportForm(keepAssignment = false) {

  saveButton.textContent = report ? '更新' : '保存';

function renderFormAvailability() {
  if (isSubmitPage) {
    formPanel.classList.add('hidden');
    return;
  }
  formPanel.classList.remove('hidden');
  const report = selectedReport();
  if (selectedMonth !== currentMonth) {
    setReportInputsDisabled(true);
    showFormMessage('過去月は参照のみです');
    return;
  }
  if (report && !EDITABLE_STATUSES.has(report.status)) {
    setReportInputsDisabled(true);
    showFormMessage(`この報告書は${statusLabel(report.status)}のため編集できません`);
    return;
  }
  if (report && report.status === 'returned_to_tutor') {
    setReportInputsDisabled(false);
    const reason = report.last_return_comment ? `　差戻し理由：${report.last_return_comment}` : '';
    showFormMessage(`学校から差戻しされています。修正のうえ承認管理画面から再依頼してください。${reason}`, true);
    return;
  }
  setReportInputsDisabled(false);
  if (!formMessage.textContent || formMessage.className.includes('rose')) clearFormMessage();
}
function editReport(id) {
  const report = allReports.find(item => item.id === id);
  if (!report) return;
  selectedAssignmentId = report.assignment_id;
  const assignment = allAssignments.find(a => a.id === report.assignment_id);
  selectedSchoolId = assignment?.parent_id ? String(assignment.parent_id) : '';
  selectedMonth = report.target_month;
  renderMonthFilter();
  renderAssignmentOptions();
  updateStudentBadge();
  renderCurrentList();
  resetReportForm(true);
  formPanel.scrollIntoView({behavior: 'smooth', block: 'start'});
}
async function loadContracts() {
  // 契約管理に登録された自分の契約（学校ごと）＋動的列定義を取得

async function submitReport(id) {
  const schoolSel = document.getElementById('dispatchPlaceSchool');
  const schoolId = schoolSel?.value;
  if (!schoolId) {
    showFormMessage('派遣先事業所（学校）を選択してください', true);
    return;
  }
  const report = allReports.find(r => r.id === id);
  if (!report) return;
  await api(`/api/w/assignments/${report.assignment_id}`, {method:'PATCH', body:JSON.stringify({parent_id: schoolId})});
  await api(`/api/w/reports/${id}/action`, {method:'POST', body:JSON.stringify({action: 'submit'})});
  await loadTutor();
}

async function loadTutor() {
  const nameEl = document.getElementById('tutorNameDisplay');
  if (nameEl) nameEl.textContent = window.currentUser?.display_name || '-';
  const [reports, assignments] = await Promise.all([api('/api/w/reports'), api('/api/w/assignments')]);
  allAssignments = assignments;
  allReports = [...reports].sort((a, b) => `${a.target_month}${assignmentName(a.assignment_id)}`.localeCompare(`${b.target_month}${assignmentName(b.assignment_id)}`));
  if (selectedAssignmentId && !allAssignments.some(a => a.id === selectedAssignmentId)) selectedAssignmentId = '';
  if (!selectedAssignmentId && allAssignments.length) selectedAssignmentId = allAssignments[0].id;
  const current = selectedAssignment();
  selectedSchoolId = current?.parent_id ? String(current.parent_id) : '';
  // 契約が1校のみなら自動選択（読み込み時に自動反映）。複数校はプルダウン選択時に反映。
  const contractSchoolIds = Object.keys(contractsBySchool);
  if (!selectedSchoolId && contractSchoolIds.length === 1) {
    selectedSchoolId = contractSchoolIds[0];
  }
  renderAssignmentOptions();
  renderMonthFilter();
  updateStudentBadge();
  setBreadcrumb('講師ポータル', isSubmitPage ? '管理へ提出' : '報告書一覧');
  renderCurrentList();
  renderBulkSubmit(allReports);
  resetReportForm(true);
  if (location.pathname === '/tutor/reports/new') {
    formPanel.scrollIntoView({behavior: 'smooth', block: 'start'});
  }
}
reportForm.addEventListener('submit', async e => {
  e.preventDefault();
  clearFormMessage();
  const lines = collectLines();
  if (!lines.some(lineHasData)) {
    showFormMessage('少なくとも1行入力してください', true);
    return;
  }
  const invalidPeriod = lines.some(line => line.subject_period !== '' && (Number(line.subject_period) < 1 || Number(line.subject_period) > 10));
  if (invalidPeriod) {
    showFormMessage('担当時限は1〜10で入力してください', true);
    return;
  }
  const invalidTime = lines.some(line => line.start && line.end && line.end < line.start);
  if (invalidTime) {
    showFormMessage('業務終了時間が業務開始時間より早い行があります', true);
    return;
  }
  const schoolSel = document.getElementById('dispatchPlaceSchool');
  const schoolId = schoolSel?.value || '';
  if (!schoolId) {
    showFormMessage('派遣先事業所（学校）を選択してください', true);
    return;
  }
  const form_data = {lines, meta: collectMeta()};
  const opt = schoolSel.options[schoolSel.selectedIndex];
  form_data.meta.dispatch_place_name = (opt && opt.value) ? opt.text : '';
  // 契約管理の列定義をスナップショット保存（保存済み報告書は契約更新の影響を受けない）
  form_data.meta.column_definition = activeColumnDefinition();
  const contract = contractForSchool(selectedSchoolId);
  if (contract) form_data.meta.has_scoring = contract.has_scoring;
  // 学校に対応する紐付けを取得/作成（無ければここで作る＝別の学校の報告書を新規作成できる）
  let assignmentId = selectedAssignmentId;
  try {
    const assignment = await resolveAssignmentForSchool(schoolId);
    assignmentId = assignment.id;
    selectedAssignmentId = assignment.id;
    selectedSchoolId = schoolId;
  } catch (error) {
    showFormMessage(`保存に失敗しました：${formatApiError(error)}`, true);
    return;
  }
  try {
    if (editingId.value) {
      await api(`/api/w/reports/${editingId.value}`, {method:'PATCH', body: JSON.stringify({form_data}), suppressFlash: true});
      showToast('業務連絡表を更新しました', 'success');
    } else {
      await api('/api/w/reports', {
        method:'POST',
        body: JSON.stringify({assignment_id: assignmentId, target_month: selectedMonth, form_type: selectedFormType(), form_data}),
        suppressFlash: true
      });
      showToast('業務連絡表を作成しました', 'success');
    }
    await loadTutor();
  } catch (error) {
    showFormMessage(`保存に失敗しました：${formatApiError(error)}`, true);
  }
});
monthFilter.addEventListener('change', () => {
  selectedMonth = monthFilter.value;
  renderCurrentList();
  resetReportForm(true);
});
document.getElementById('dispatchPlaceSchool').addEventListener('change', event => {
  selectSchool(event.target.value);
});
document.getElementById('newReportBtn').addEventListener('click', startNewReport);
window.authReady.then(async user => {
  if (!user) return;
  await Promise.all([loadSchoolUsers(), loadContracts()]);
  loadTutor();
});
</script>
{% endblock %}
