{% extends "base.html" %}
{% block content %}
<div class="mb-6 flex flex-wrap items-end justify-between gap-4">
  <div>
    <div id="studentBadge" class="inline-flex rounded-full bg-emerald-100 px-3 py-1.5 text-sm font-medium text-emerald-800">生徒：すべて</div>
  </div>
  <div class="flex flex-wrap items-center gap-3 rounded-xl border border-slate-200 bg-white px-4 py-3 shadow-sm">
    <label class="text-sm text-slate-700" for="monthFilter">表示月</label>
    <select id="monthFilter" class="rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20"></select>
  </div>
</div>

<div class="grid gap-4 xl:grid-cols-[minmax(360px,0.9fr)_minmax(680px,1.4fr)]">
  <section class="overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm">
    <div id="bulkSubmitPanel" class="hidden border-b border-slate-200 bg-slate-50 p-5"></div>
    <div class="overflow-x-auto">
      <table class="hidden w-full text-sm md:table">
        <thead class="bg-slate-50 text-xs font-medium uppercase tracking-wide text-slate-500">
          <tr>
            <th class="px-4 py-3 text-left">生徒</th>
            <th class="px-4 py-3 text-left">対象月</th>
            <th class="px-4 py-3 text-right">勤務日数</th>
            <th class="px-4 py-3 text-right">指導分</th>
            <th class="px-4 py-3 text-right">休憩分</th>
            <th class="px-4 py-3 text-right">交通費</th>
            <th class="px-4 py-3 text-left">状態</th>
            <th class="px-4 py-3 text-left">アクション</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
    <div id="cards" class="md:hidden divide-y"></div>
    <div id="totalTeachingTime" class="border-t border-slate-200 bg-slate-50 p-4 text-sm font-semibold text-slate-700"></div>
  </section>

  <section class="rounded-xl border border-slate-200 bg-white shadow-sm" id="formPanel">
    <div class="border-b border-slate-200 p-5">
      <div class="flex flex-wrap items-start justify-between gap-3">
        <div>
          <h2 class="font-semibold text-slate-800" id="formTitle">月次業務連絡表</h2>
          <p class="mt-1 text-sm text-slate-500">PDFの業務連絡表に合わせた月次一覧形式で入力します。</p>
        </div>
        <a href="/tutor/approval" class="rounded-lg border border-emerald-200 bg-emerald-50 px-3 py-2 text-sm font-medium text-emerald-700 hover:bg-emerald-100">承認管理へ</a>
      </div>
    </div>
    <div class="p-5">
      <div id="formMessage" class="mb-3 hidden rounded-lg px-3 py-2 text-sm"></div>
      <form id="reportForm" class="space-y-4">
        <input type="hidden" id="editingId">
        <div class="rounded-lg border border-slate-300">
          <div class="grid border-b border-slate-300 md:grid-cols-[1fr_220px]">
            <div class="space-y-3 p-3">
              <label class="block text-sm">
                <span class="block mb-1 text-slate-700">派遣先事業所の名称・組織単位</span>
                <input id="dispatchPlaceName" data-meta="dispatch_place_name" type="text" class="meta-input w-full rounded border border-slate-300 px-3 py-2 text-center text-lg font-semibold focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500/20">
              </label>
              <label class="block text-sm">
                <span class="block mb-1 text-slate-700">派遣先事業所の所在地</span>
                <input id="dispatchPlaceAddress" data-meta="dispatch_place_address" type="text" class="meta-input w-full rounded border border-slate-300 px-3 py-2 text-center font-semibold focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500/20">
              </label>
            </div>
            <div class="flex flex-col items-center justify-center border-t border-slate-300 p-3 md:border-l md:border-t-0">
              <div id="monthTitle" class="text-lg font-semibold text-slate-900">月分業務連絡表</div>
              <div class="mt-2 text-xs text-slate-500">選択中の対象月から自動生成</div>
            </div>
          </div>
          <div class="grid border-b border-slate-300 md:grid-cols-[220px_1fr_180px]">
            <label class="block border-b border-slate-300 p-3 text-sm md:border-b-0 md:border-r">
              <span class="block mb-1 text-slate-700">講師番号</span>
              <input id="tutorNo" data-meta="tutor_no" type="text" class="meta-input w-full rounded border border-slate-300 px-3 py-2 text-center font-semibold focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500/20">
            </label>
            <label class="block border-b border-slate-300 p-3 text-sm md:border-b-0 md:border-r">
              <span class="block mb-1 text-slate-700">従事業務内容</span>
              <textarea id="workContent" data-meta="work_content" rows="2" class="meta-input w-full rounded border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500/20"></textarea>
            </label>
            <label class="block p-3 text-sm">
              <span class="block mb-1 text-slate-700">お客様ID</span>
              <input id="customerId" data-meta="customer_id" type="text" class="meta-input w-full rounded border border-slate-300 px-3 py-2 text-center font-semibold focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500/20">
            </label>
          </div>
        </div>

        <div class="grid gap-3 md:grid-cols-2">
          <label class="block text-sm">
            <span class="mb-1 flex items-center gap-2">
              <span class="text-slate-700">生徒</span>
              <span id="assignmentError" class="hidden text-xs text-red-600">※生徒を選択してください</span>
            </span>
            <select name="assignment_id" id="assignment" class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20"></select>
          </label>
          <label class="block text-sm">
            <span class="block mb-1 text-slate-700">対象月</span>
            <input id="targetMonthLabel" type="text" class="w-full rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-slate-700" readonly>
          </label>
        </div>

        <div class="overflow-x-auto rounded-lg border border-slate-200">
          <table class="min-w-[1080px] w-full text-sm">
            <thead id="lineHead" class="bg-slate-50 text-xs font-medium text-slate-600"></thead>
            <tbody id="lineRows"></tbody>
          </table>
        </div>

        <div class="grid gap-3 rounded-lg border border-slate-200 bg-slate-50 p-3 text-sm text-slate-700 md:grid-cols-4">
          <div>勤務日数：<span id="summaryDays" class="font-semibold">0</span>日</div>
          <div>数学科指導（分）：<span id="summaryTeach" class="font-semibold">0</span>分</div>
          <div>休憩時間：<span id="summaryBreak" class="font-semibold">0</span>分</div>
          <div>往復交通費（円）定期代含む：<span id="summaryFee" class="font-semibold">0</span>円</div>
        </div>

        <div class="grid gap-3 md:grid-cols-2">
          <label class="block text-sm">
            <span class="block mb-1 text-slate-700">備考欄</span>
            <textarea data-meta="note_schedule" rows="3" placeholder="月(1)9:30〜10:20、(2)10:30〜11:20..." class="meta-input w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20"></textarea>
          </label>
          <label class="block text-sm">
            <span class="block mb-1 text-slate-700">要望・連絡事項</span>
            <textarea data-meta="requests" rows="3" class="meta-input w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20"></textarea>
          </label>
          <label class="block text-sm">
            <span class="block mb-1 text-slate-700">月固定分</span>
            <div class="flex items-center gap-2">
              <span>月</span>
              <input data-meta="monthly_minutes_fixed" type="text" class="meta-input min-w-0 flex-1 rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20">
              <span>分固定：週</span>
              <input data-meta="weekly_lessons" type="text" class="meta-input w-20 rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20">
              <span>コマ</span>
            </div>
          </label>
          <label class="block text-sm">
            <span class="block mb-1 text-slate-700">契約期間</span>
            <input data-meta="contract_period" type="text" placeholder="2026年04月01日〜2027年03月31日" class="meta-input w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20">
          </label>
        </div>

        <div class="flex flex-wrap gap-2">
          <button class="rounded-lg bg-emerald-600 px-4 py-2 font-medium text-white transition hover:bg-emerald-700" id="saveButton">保存</button>
          <button type="button" class="rounded-lg border border-slate-300 px-4 py-2 font-medium text-slate-700 transition hover:bg-slate-50" onclick="resetReportForm(true)">取消</button>
        </div>
      </form>
    </div>
  </section>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/chat.js"></script>
<script>
setBreadcrumb('講師ポータル', '報告書一覧');

const STATUS_LABELS = {
  draft: '下書き',
  awaiting_school: '学校確認待ち',
  returned_to_tutor: '差戻し（要修正）',
  awaiting_sales: '営業確認待ち',
  awaiting_office: '事務確認待ち',
  awaiting_finance: '最終確認待ち',
  approved: '最終承認済み',
  returned_to_sales: '管理内差戻し',
  closed: 'クローズ'
};
const WEEKDAYS = ['日', '月', '火', '水', '木', '金', '土'];
const LINE_COUNT = 26;
const EDITABLE_STATUSES = new Set(['draft', 'returned_to_tutor', 'returned_to_sales']);
const DEFAULT_FORM_DEFINITION = {
  form_type: 'monthly_dispatch',
  label: '月次派遣報告',
  max_lines: 26,
  columns: [
    {key: 'date', label: '日付', type: 'date', summable: false},
    {key: 'start', label: '開始時刻', type: 'time', summable: false},
    {key: 'end', label: '終了時刻', type: 'time', summable: false},
    {key: 'subject_period', label: '担当時限', type: 'number', summable: false},
    {key: 'teach_minutes', label: '数学科指導（分）', type: 'number', summable: true},
    {key: 'break_minutes', label: '休憩時間（分）', type: 'number', summable: true},
    {key: 'commute_fee', label: '往復交通費（円）', type: 'number', summable: true},
    {key: 'note', label: '内容', type: 'text', summable: false}
  ],
  summable_keys: ['teach_minutes', 'break_minutes', 'commute_fee']
};
const DEFAULT_META = {
  dispatch_place_name: '',
  dispatch_place_address: '',
  customer_id: '',
  note_schedule: '',
  work_content: '',
  tutor_no: '',
  requests: '',
  monthly_minutes_fixed: '',
  weekly_lessons: '',
  contract_period: ''
};
let allReports = [];
let allAssignments = [];
const isSubmitPage = location.pathname === '/tutor/submit';
const currentMonth = getCurrentMonth();
let selectedMonth = new URLSearchParams(location.search).get('month') || currentMonth;
let selectedAssignmentId = '';

function getCurrentMonth() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
}
function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'}[ch]));
}
function statusLabel(status) { return STATUS_LABELS[status] || status; }
function monthLabel(value) {
  const [year, month] = value.split('-');
  return `${year}年${Number(month)}月分`;
}
function dateLabel(value) {
  if (!value) return '';
  const d = new Date(`${value}T00:00:00`);
  if (Number.isNaN(d.getTime())) return '';
  return `${d.getMonth() + 1}月${d.getDate()}日（${WEEKDAYS[d.getDay()]}）`;
}
function weekdayLabel(value) {
  if (!value) return '';
  const d = new Date(`${value}T00:00:00`);
  return Number.isNaN(d.getTime()) ? '' : WEEKDAYS[d.getDay()];
}
function numberValue(value) {
  const n = Number(value || 0);
  return Number.isFinite(n) ? n : 0;
}
function durationLabel(minutes) {
  const hours = Math.floor(minutes / 60);
  const mins = minutes % 60;
  if (hours && mins) return `${hours}時間${mins}分`;
  if (hours) return `${hours}時間`;
  return `${mins}分`;
}
function selectedAssignment() {
  return allAssignments.find(a => a.id === selectedAssignmentId);
}
function selectedFormDefinition() {
  return selectedAssignment()?.form_definition || DEFAULT_FORM_DEFINITION;
}
function selectedFormType() {
  return selectedAssignment()?.form_type || DEFAULT_FORM_DEFINITION.form_type;
}
function assignmentName(id) {
  return allAssignments.find(a => a.id === id)?.student_name || '生徒未設定';
}
function emptyLine(form = selectedFormDefinition()) {
  return Object.fromEntries((form.columns || DEFAULT_FORM_DEFINITION.columns).map(column => [column.key, '']));
}
function normalizedLines(report) {
  const form = report ? (allAssignments.find(a => a.id === report.assignment_id)?.form_definition || DEFAULT_FORM_DEFINITION) : selectedFormDefinition();
  const lines = Array.isArray(report?.form_data?.lines) ? report.form_data.lines : [];
  const count = form.max_lines || LINE_COUNT;
  return Array.from({length: count}, (_, index) => ({...emptyLine(form), ...(lines[index] || {})}));
}
function defaultMeta() {
  const assignment = selectedAssignment();
  return {
    ...DEFAULT_META,
    tutor_no: assignment?.tutor?.tutor_no || assignment?.tutor?.user_no || ''
  };
}
function normalizedMeta(report) {
  return {...defaultMeta(), ...((report?.form_data || {}).meta || {})};
}
function lineHasData(line) {
  return Object.values(line).some(value => String(value ?? '').trim() !== '');
}
function reportMetrics(report) {
  const lines = Array.isArray(report?.form_data?.lines) ? report.form_data.lines : [];
  return lines.reduce((acc, line) => {
    if (lineHasData(line)) acc.days += 1;
    acc.teach += numberValue(line.teach_minutes);
    acc.break += numberValue(line.break_minutes);
    acc.fee += numberValue(line.commute_fee);
    return acc;
  }, {days: 0, teach: 0, break: 0, fee: 0});
}
function filteredReports() {
  return allReports.filter(r => {
    const monthMatches = isSubmitPage || r.target_month === selectedMonth;
    const assignmentMatches = !selectedAssignmentId || r.assignment_id === selectedAssignmentId;
    return monthMatches && assignmentMatches;
  });
}
function selectedReport() {
  if (!selectedAssignmentId) return null;
  return allReports.find(r => r.assignment_id === selectedAssignmentId && r.target_month === selectedMonth) || null;
}
function statusBadge(status) {
  const label = statusLabel(status);
  if (status === 'returned_to_tutor') return `<span class="inline-flex rounded-full bg-red-100 px-2.5 py-1 text-xs font-medium text-red-700">${label}</span>`;
  if (status === 'approved') return `<span class="inline-flex rounded-full bg-emerald-100 px-2.5 py-1 text-xs font-medium text-emerald-700">${label}</span>`;
  if (status === 'closed') return `<span class="inline-flex rounded-full bg-slate-100 px-2.5 py-1 text-xs font-medium text-slate-600">${label}</span>`;
  if (status === 'draft') return `<span class="inline-flex rounded-full bg-slate-100 px-2.5 py-1 text-xs font-medium text-slate-600">${label}</span>`;
  return `<span class="inline-flex rounded-full bg-emerald-100 px-2.5 py-1 text-xs font-medium text-emerald-700">${label}</span>`;
}
function returnComment(r) {
  if (r.status !== 'returned_to_tutor' || !r.last_return_comment) return '';
  return `<div class="mt-1 max-w-xs whitespace-pre-wrap text-xs text-red-700">差戻し理由：${escapeHtml(r.last_return_comment)}</div>`;
}
function dateTimeLabel(value) {
  if (!value) return '-';
  const d = new Date(value);
  if (Number.isNaN(d.getTime())) return '-';
  return `${d.getFullYear()}/${d.getMonth()+1}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function closeInfo(r) {
  if (r.status !== 'closed') return '';
  return `<div class="mt-2 max-w-xs rounded-lg border border-slate-200 bg-slate-50 p-3 text-xs text-slate-700">
    <div class="font-medium text-slate-800">クローズ済み</div>
    <div class="mt-1 whitespace-pre-wrap">理由：${escapeHtml(r.close_reason || '-')}</div>
    <div class="mt-1">日時：${escapeHtml(dateTimeLabel(r.closed_at))}</div>
  </div>`;
}
function rowAction(r) {
  const parts = [];
  if (EDITABLE_STATUSES.has(r.status) && r.target_month === currentMonth) {
    parts.push(`<button class="rounded-lg bg-emerald-600 px-3 py-2 text-sm font-medium text-white transition hover:bg-emerald-700" onclick="editReport('${r.id}')">編集</button>`);
  }
  if (r.status === 'draft') {
    parts.push(`<button class="rounded-lg border border-emerald-200 bg-emerald-50 px-3 py-2 text-sm font-medium text-emerald-700 transition hover:bg-emerald-100" onclick="submitReport('${r.id}')">学校へ依頼</button>`);
  } else if (r.status === 'returned_to_tutor') {
    parts.push('<a href="/tutor/approval" class="rounded-lg border border-red-200 bg-red-50 px-3 py-2 text-sm font-medium text-red-700 transition hover:bg-red-100">承認管理で再依頼</a>');
  }
  return parts.length ? `<div class="flex flex-wrap gap-2">${parts.join('')}</div>` : '';
}
function renderRows(reports) {
  const total = reports.reduce((acc, r) => {
    const m = reportMetrics(r);
    acc.days += m.days; acc.teach += m.teach; acc.break += m.break; acc.fee += m.fee;
    return acc;
  }, {days: 0, teach: 0, break: 0, fee: 0});
  rows.innerHTML = reports.map(r => {
    const m = reportMetrics(r);
    return `<tr class="border-t border-slate-100 hover:bg-slate-50">
      <td class="px-4 py-3">${escapeHtml(assignmentName(r.assignment_id))}</td>
      <td class="px-4 py-3">${escapeHtml(monthLabel(r.target_month))}</td>
      <td class="px-4 py-3 text-right">${m.days}日</td>
      <td class="px-4 py-3 text-right">${durationLabel(m.teach)}</td>
      <td class="px-4 py-3 text-right">${m.break}分</td>
      <td class="px-4 py-3 text-right">${m.fee.toLocaleString()}円</td>
      <td class="px-4 py-3">${statusBadge(r.status)}${returnComment(r)}${closeInfo(r)}</td>
      <td class="px-4 py-3 align-middle">${rowAction(r)}</td>
    </tr>`;
  }).join('');
  cards.innerHTML = reports.map(r => {
    const m = reportMetrics(r);
    return `<div class="p-4">
      <div class="flex flex-wrap items-start justify-between gap-2">
        <div>
          <div class="font-medium text-slate-800">${escapeHtml(assignmentName(r.assignment_id))}</div>
          <div class="mt-1 text-sm text-slate-600">${escapeHtml(monthLabel(r.target_month))} / ${m.days}日 / ${durationLabel(m.teach)} / ${m.fee.toLocaleString()}円</div>
        </div>
        ${statusBadge(r.status)}
      </div>
      ${returnComment(r)}${closeInfo(r)}
      <div class="mt-3">${rowAction(r)}</div>
    </div>`;
  }).join('');
  totalTeachingTime.textContent = `表示中合計：勤務${total.days}日 / 指導${durationLabel(total.teach)} / 休憩${total.break}分 / 交通費${total.fee.toLocaleString()}円`;
}
function renderCurrentList() {
  const visible = isSubmitPage
    ? allReports.filter(r => r.status === 'returned_to_sales' && (!selectedAssignmentId || r.assignment_id === selectedAssignmentId))
    : filteredReports();
  renderRows(visible);
}
function renderMonthFilter() {
  const months = [...new Set([...allReports.map(r => r.target_month), currentMonth, selectedMonth])]
    .filter(Boolean)
    .sort()
    .reverse();
  monthFilter.innerHTML = months.map(month => `<option value="${month}">${monthLabel(month)}</option>`).join('');
  monthFilter.value = selectedMonth;
  targetMonthLabel.value = monthLabel(selectedMonth);
  monthTitle.textContent = `${Number(selectedMonth.split('-')[1])}月分業務連絡表`;
}
function renderAssignmentOptions() {
  assignment.innerHTML = ['<option value="">生徒を選択</option>', ...allAssignments.map(a => `<option value="${a.id}">${escapeHtml(a.student_name)}</option>`)].join('');
  assignment.value = selectedAssignmentId;
}
function updateStudentBadge() {
  const current = selectedAssignment();
  studentBadge.textContent = `生徒：${current ? current.student_name : 'すべて'}`;
}
function columnLabel(column) {
  if (column.key === 'subject_period') return '担当時限（1〜10の数値のみ入力可、それ以外は入力不可）';
  return column.label;
}
function renderLineHeader(form) {
  const columns = form.columns || DEFAULT_FORM_DEFINITION.columns;
  const headers = ['<th class="w-12 px-2 py-2 text-center">回数</th>'];
  for (let index = 0; index < columns.length; index += 1) {
    const column = columns[index];
    if (column.key === 'date') {
      headers.push(`<th class="w-36 px-2 py-2 text-left">${escapeHtml(columnLabel(column))}</th>`);
      headers.push('<th class="w-14 px-2 py-2 text-center">曜日</th>');
    } else if (column.key === 'start') {
      const next = columns[index + 1];
      if (next?.key === 'end') {
        headers.push('<th class="w-48 px-2 py-2 text-left">業務開始時間〜業務終了時間</th>');
        index += 1;
      } else {
        headers.push(`<th class="w-28 px-2 py-2 text-left">${escapeHtml(columnLabel(column))}</th>`);
      }
    } else if (column.key === 'end') {
      headers.push(`<th class="w-28 px-2 py-2 text-left">${escapeHtml(columnLabel(column))}</th>`);
    } else if (column.key === 'note') {
      headers.push(`<th class="min-w-64 px-2 py-2 text-left">${escapeHtml(columnLabel(column))}</th>`);
    } else {
      headers.push(`<th class="w-32 px-2 py-2 text-left">${escapeHtml(columnLabel(column))}</th>`);
    }
  }
  lineHead.innerHTML = `<tr>${headers.join('')}</tr>`;
}
function inputType(column) {
  if (column.key === 'subject_period') return 'number';
  return column.type === 'number' ? 'number' : column.type === 'date' ? 'date' : column.type === 'time' ? 'time' : 'text';
}
function inputAttributes(column) {
  if (column.key === 'subject_period') return 'min="1" max="10" step="1" inputmode="numeric"';
  if (column.type === 'number') return 'min="0" step="1" inputmode="numeric"';
  return '';
}
function inputClasses(width = 'w-full') {
  return `line-input h-9 ${width} rounded border border-slate-300 px-2 text-sm focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500/20`;
}
function renderCell(column, line) {
  if (column.key === 'date') {
    return `<td class="px-2 py-1"><input type="date" data-field="date" value="${escapeHtml(line.date || '')}" class="${inputClasses()}"></td>
      <td class="px-2 py-1 text-center"><span data-weekday class="inline-flex min-w-7 justify-center rounded bg-slate-100 px-2 py-1 text-xs text-slate-700">${escapeHtml(weekdayLabel(line.date))}</span></td>`;
  }
  if (column.key === 'start') {
    return `<td class="px-2 py-1" data-time-range>
      <div class="flex items-center gap-1">
        <input type="time" data-field="start" value="${escapeHtml(line.start || '')}" class="${inputClasses('w-[82px]')}">
        <span class="text-slate-500">〜</span>
        <input type="time" data-field="end" value="${escapeHtml(line.end || '')}" class="${inputClasses('w-[82px]')}">
      </div>
    </td>`;
  }
  if (column.key === 'end') return '';
  return `<td class="px-2 py-1"><input type="${inputType(column)}" data-field="${escapeHtml(column.key)}" ${inputAttributes(column)} value="${escapeHtml(line[column.key] || '')}" class="${inputClasses()}"></td>`;
}
function buildLineRows(lines) {
  const form = selectedFormDefinition();
  const columns = form.columns || DEFAULT_FORM_DEFINITION.columns;
  renderLineHeader(form);
  lineRows.innerHTML = lines.map((line, index) => `<tr class="border-t border-slate-100" data-index="${index}">
    <td class="px-2 py-1 text-center text-slate-600">${index + 1}</td>
    ${columns.map(column => renderCell(column, line)).join('')}
  </tr>`).join('');
  lineRows.querySelectorAll('.line-input').forEach(input => {
    input.addEventListener('input', () => {
      if (input.dataset.field === 'subject_period') enforceSubjectPeriod(input);
      if (input.dataset.field === 'date') {
        input.closest('tr').querySelector('[data-weekday]').textContent = weekdayLabel(input.value);
      }
      updateLineSummary();
    });
  });
  updateLineSummary();
}
function enforceSubjectPeriod(input) {
  if (input.value === '') return;
  if (!/^\d+$/.test(input.value) || Number(input.value) < 1 || Number(input.value) > 10) {
    input.value = '';
  }
}
function collectLines() {
  const numericKeys = new Set((selectedFormDefinition().columns || []).filter(column => column.type === 'number').map(column => column.key));
  return [...lineRows.querySelectorAll('tr')].map(row => {
    const line = emptyLine(selectedFormDefinition());
    row.querySelectorAll('[data-field]').forEach(input => {
      const key = input.dataset.field;
      if (numericKeys.has(key)) {
        line[key] = input.value === '' ? '' : Number(input.value);
      } else {
        line[key] = input.value.trim();
      }
    });
    return line;
  });
}
function applyMeta(meta) {
  document.querySelectorAll('.meta-input').forEach(input => {
    input.value = meta[input.dataset.meta] ?? '';
  });
}
function collectMeta() {
  const meta = {...DEFAULT_META};
  document.querySelectorAll('.meta-input').forEach(input => {
    meta[input.dataset.meta] = input.value.trim();
  });
  return meta;
}
function updateLineSummary() {
  const lines = collectLines();
  const m = lines.reduce((acc, line) => {
    if (lineHasData(line)) acc.days += 1;
    acc.teach += numberValue(line.teach_minutes);
    acc.break += numberValue(line.break_minutes);
    acc.fee += numberValue(line.commute_fee);
    return acc;
  }, {days: 0, teach: 0, break: 0, fee: 0});
  summaryDays.textContent = m.days;
  summaryTeach.textContent = m.teach;
  summaryBreak.textContent = m.break;
  summaryFee.textContent = m.fee.toLocaleString();
}
function setReportInputsDisabled(disabled) {
  reportForm.querySelectorAll('input, select, textarea, button').forEach(el => {
    if (el.id !== 'assignment') el.disabled = disabled;
  });
  saveButton.classList.toggle('opacity-50', disabled);
  saveButton.classList.toggle('cursor-not-allowed', disabled);
}
function showFormMessage(message, isError = false) {
  formMessage.textContent = message;
  formMessage.className = `mb-3 rounded-lg px-3 py-2 text-sm ${isError ? 'border border-rose-200 bg-rose-50 text-rose-700' : 'border border-emerald-200 bg-emerald-50 text-emerald-700'}`;
}
function clearFormMessage() {
  formMessage.className = 'mb-3 hidden rounded-lg px-3 py-2 text-sm';
  formMessage.textContent = '';
}
function resetReportForm(keepAssignment = false) {
  if (!keepAssignment) selectedAssignmentId = '';
  const report = selectedReport();
  editingId.value = report?.id || '';
  formTitle.textContent = report ? `編集中：${assignmentName(report.assignment_id)} ${monthLabel(report.target_month)}` : '月次業務連絡表';
  saveButton.textContent = report ? '更新' : '保存';
  assignment.value = selectedAssignmentId;
  targetMonthLabel.value = monthLabel(selectedMonth);
  monthTitle.textContent = `${Number(selectedMonth.split('-')[1])}月分業務連絡表`;
  applyMeta(normalizedMeta(report));
  buildLineRows(report ? normalizedLines(report) : Array.from({length: selectedFormDefinition().max_lines || LINE_COUNT}, () => emptyLine(selectedFormDefinition())));
  clearFormMessage();
  renderFormAvailability();
}
function renderFormAvailability() {
  if (isSubmitPage) {
    formPanel.classList.add('hidden');
    return;
  }
  formPanel.classList.remove('hidden');
  document.getElementById('assignmentError').classList.toggle('hidden', Boolean(selectedAssignmentId));
  if (!selectedAssignmentId) {
    setReportInputsDisabled(true);
    showFormMessage('生徒を選択してください', true);
    return;
  }
  const report = selectedReport();
  if (selectedMonth !== currentMonth) {
    setReportInputsDisabled(true);
    showFormMessage('過去月は参照のみです');
    return;
  }
  if (report && !EDITABLE_STATUSES.has(report.status)) {
    setReportInputsDisabled(true);
    showFormMessage(`この報告書は${statusLabel(report.status)}のため編集できません`);
    return;
  }
  setReportInputsDisabled(false);
  if (!formMessage.textContent || formMessage.className.includes('rose')) clearFormMessage();
}
function editReport(id) {
  const report = allReports.find(item => item.id === id);
  if (!report) return;
  selectedAssignmentId = report.assignment_id;
  selectedMonth = report.target_month;
  renderMonthFilter();
  renderAssignmentOptions();
  updateStudentBadge();
  renderCurrentList();
  resetReportForm(true);
  formPanel.scrollIntoView({behavior: 'smooth', block: 'start'});
}
async function submitReport(id) {
  await api(`/api/w/reports/${id}/action`, {method:'POST', body:JSON.stringify({action: 'submit'})});
  await loadTutor();
}
function renderBulkSubmit(reports) {
  if (!isSubmitPage) {
    bulkSubmitPanel.classList.add('hidden');
    return;
  }
  const eligible = reports.filter(r => r.target_month === currentMonth && r.status === 'returned_to_sales');
  bulkSubmitPanel.classList.remove('hidden');
  bulkSubmitPanel.innerHTML = eligible.length
    ? eligible.map(report => `<div class="flex flex-col gap-3 rounded-lg border border-slate-200 bg-white p-4 md:flex-row md:items-center md:justify-between">
        <div class="font-medium text-slate-800">${escapeHtml(assignmentName(report.assignment_id))} <span class="text-sm text-slate-500">${monthLabel(report.target_month)}</span></div>
        <button class="rounded-lg bg-emerald-600 px-3 py-2 text-sm font-medium text-white transition hover:bg-emerald-700" onclick="submitReport('${report.id}')">再提出</button>
      </div>`).join('')
    : '<div class="text-sm text-slate-600">再提出できる報告書はありません。</div>';
}
async function loadTutor() {
  const [reports, assignments] = await Promise.all([api('/api/w/reports'), api('/api/w/assignments')]);
  allAssignments = assignments;
  allReports = [...reports].sort((a, b) => `${a.target_month}${assignmentName(a.assignment_id)}`.localeCompare(`${b.target_month}${assignmentName(b.assignment_id)}`));
  if (selectedAssignmentId && !allAssignments.some(a => a.id === selectedAssignmentId)) selectedAssignmentId = '';
  renderAssignmentOptions();
  renderMonthFilter();
  updateStudentBadge();
  setBreadcrumb('講師ポータル', isSubmitPage ? '管理へ提出' : '報告書一覧');
  renderCurrentList();
  renderBulkSubmit(allReports);
  resetReportForm(true);
  if (location.pathname === '/tutor/reports/new') {
    formPanel.scrollIntoView({behavior: 'smooth', block: 'start'});
  }
}
reportForm.addEventListener('submit', async e => {
  e.preventDefault();
  clearFormMessage();
  if (!selectedAssignmentId) {
    showFormMessage('生徒を選択してください', true);
    return;
  }
  const lines = collectLines();
  if (!lines.some(lineHasData)) {
    showFormMessage('少なくとも1行入力してください', true);
    return;
  }
  const invalidPeriod = lines.some(line => line.subject_period !== '' && (Number(line.subject_period) < 1 || Number(line.subject_period) > 10));
  if (invalidPeriod) {
    showFormMessage('担当時限は1〜10で入力してください', true);
    return;
  }
  const form_data = {lines, meta: collectMeta()};
  try {
    if (editingId.value) {
      await api(`/api/w/reports/${editingId.value}`, {method:'PATCH', body: JSON.stringify({form_data}), suppressFlash: true});
      showFormMessage('業務連絡表を更新しました');
    } else {
      await api('/api/w/reports', {
        method:'POST',
        body: JSON.stringify({assignment_id: selectedAssignmentId, target_month: selectedMonth, form_type: selectedFormType(), form_data}),
        suppressFlash: true
      });
      showFormMessage('業務連絡表を作成しました');
    }
    await loadTutor();
  } catch (error) {
    let msg = error.message;
    try { msg = JSON.parse(msg).detail || msg; } catch (_) {}
    showFormMessage(`保存に失敗しました：${msg}`, true);
  }
});
assignment.addEventListener('change', () => {
  selectedAssignmentId = assignment.value;
  updateStudentBadge();
  renderCurrentList();
  resetReportForm(true);
});
monthFilter.addEventListener('change', () => {
  selectedMonth = monthFilter.value;
  renderCurrentList();
  resetReportForm(true);
});
window.authReady.then(user => {
  if (!user) return;
  loadTutor();
});
</script>
{% endblock %}
