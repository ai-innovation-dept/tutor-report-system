{% extends "base.html" %}
{% block content %}
<style>
  /* 数値入力の上下矢印（スピナー）を非表示にして横幅を節約（モバイルは inputmode=numeric で数字キーパッド維持） */
  #reportForm input[type=number]::-webkit-inner-spin-button,
  #reportForm input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  #reportForm input[type=number] { -moz-appearance: textfield; appearance: textfield; }
  /* 明細の日付セル: 曜日をボックス内に併記するため、ネイティブのカレンダーアイコンを非表示（クリックでピッカーを開く） */
  #reportForm .line-input[type=date]::-webkit-calendar-picker-indicator { display: none; }
  /* 読取専用時はメモ未記入行の追加アイコンを表示しない（メモ帳アイコンがない行＝メモ書きなし） */
  #reportForm.form-readonly [data-note-btn][data-note-empty] { visibility: hidden; }
  /* iOS Safari は input[type=date] が width 指定を無視して枠外へはみ出す（見切れる）ため、メタ日付入力を枠内へ収める。
     スマホでは appearance を解除しないと width:100% が効かないため、<=767px で解除する（PCはネイティブ表示を維持／明細の .line-input は対象外） */
  #reportForm input.meta-input[type=date] { max-width: 100%; min-width: 0; box-sizing: border-box; }
  @media (max-width: 767px) {
    #reportForm input.meta-input[type=date] { -webkit-appearance: none; appearance: none; width: 100%; }
    #reportForm input.meta-input[type=date]::-webkit-date-and-time-value { text-align: left; margin: 0; }
  }
  /* 明細詳細シート（スマホ入力用 画面②）: 数値スピナー非表示＋日付入力のiOS対応（明細セルと同方針） */
  #lineSheetOverlay input[type=number]::-webkit-inner-spin-button,
  #lineSheetOverlay input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  #lineSheetOverlay input[type=number] { -moz-appearance: textfield; appearance: textfield; }
  #lineSheetOverlay input[type=date] { -webkit-appearance: none; appearance: none; width: 100%; max-width: 100%; min-width: 0; box-sizing: border-box; }
  #lineSheetOverlay input[type=date]::-webkit-date-and-time-value { text-align: left; margin: 0; }
  #lineSheetOverlay input[type=date]::-webkit-calendar-picker-indicator { display: none; }
</style>
<div>
  <!-- 当月の報告書（学校ごと）の横タブ。「＋別の学校の報告書を作成」も同じ行から操作できる -->
  <section id="reportListPanel" class="mb-4 rounded-xl border border-slate-200 bg-white shadow-sm">
    <div class="flex flex-col gap-2 px-3 py-2.5 sm:flex-row sm:items-center sm:gap-3">
      <button id="newReportBtn" type="button" class="w-full shrink-0 rounded-lg bg-emerald-600 px-3 py-2 text-sm font-medium text-white transition hover:bg-emerald-700 sm:w-auto">＋ 別の学校の報告書を作成</button>
      <div id="reportList" class="order-last flex w-full flex-1 gap-2 overflow-x-auto sm:order-none"></div>
      <button type="button" id="copyPrevLineBtn" onclick="copyPreviousLine()" title="最後に記入した行と同じ内容（日付以外）を次の行に追加します" class="inline-flex w-full shrink-0 items-center justify-center gap-1.5 rounded-lg border border-emerald-200 bg-emerald-50 px-3 py-2 text-sm font-medium text-emerald-700 transition hover:bg-emerald-100 disabled:cursor-not-allowed disabled:opacity-50 sm:w-auto sm:justify-start">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
        前回の記入分をコピー
      </button>
      <button type="button" id="copyLastMonthBtn" onclick="copyLastMonthLines()" title="選択中の学校の先月の報告書から明細をコピーします（日付は同じ第N曜日で当月へ変換）" class="inline-flex w-full shrink-0 items-center justify-center gap-1.5 rounded-lg border border-emerald-200 bg-emerald-50 px-3 py-2 text-sm font-medium text-emerald-700 transition hover:bg-emerald-100 disabled:cursor-not-allowed disabled:opacity-50 sm:w-auto sm:justify-start">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        先月の記入分をコピー
      </button>
    </div>
  </section>

  <section class="rounded-xl border border-slate-200 bg-white shadow-sm" id="formPanel">
    <div class="p-3 sm:p-4">
      <div id="formMessage" class="mb-3 hidden rounded-lg px-3 py-2 text-sm"></div>
      <form id="reportForm" class="space-y-4">
        <input type="hidden" id="editingId">
        <!-- 業務連絡表ヘッダー（サンプル紙面レイアウト準拠） -->
        <div class="overflow-hidden rounded-lg border border-slate-300 text-sm">

          <!-- 行1: 派遣先名称・所在地（左）＋ 月分業務連絡表（右）。モバイルは縦積み、md以上は従来の横並び -->
          <div class="flex flex-col border-b border-slate-300 md:flex-row">
            <div class="flex flex-1 flex-col border-b border-slate-300 md:border-b-0 md:border-r md:border-slate-300">
              <!-- 事業所の名称・組織単位 row（氏名と同じ 項目→入力ボックス 形式） -->
              <div class="flex min-h-[46px] flex-1 border-b border-slate-300">
                <div class="flex w-40 flex-shrink-0 items-center justify-center border-r border-slate-300 bg-slate-50 px-2 py-1 text-center text-xs leading-tight text-slate-700">事業所の<br>名称・組織単位</div>
                <div class="flex flex-1 items-center px-2 py-1">
                  <select id="dispatchPlaceSchool" data-meta="dispatch_place_school_id"
                    class="meta-input w-full rounded border border-slate-300 px-2 py-1.5 text-sm font-semibold focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500/20">
                    <option value="">選択してください</option>
                  </select>
                </div>
              </div>
              <!-- 教室名 row（契約由来・講師読取専用。「事業所の名称」の隣に表示） -->
              <div class="flex min-h-[46px] flex-1 border-b border-slate-300">
                <div class="flex w-40 flex-shrink-0 items-center justify-center border-r border-slate-300 bg-slate-50 px-2 py-1 text-center text-xs leading-tight text-slate-700">教室名</div>
                <div class="flex flex-1 items-center px-2 py-1">
                  <input id="classroomName" data-meta="classroom_name" type="text"
                    class="meta-input w-full rounded border border-slate-300 px-2 py-1.5 text-sm focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500/20">
                </div>
              </div>
              <!-- 事業所の所在地 row -->
              <div data-fieldgroup="dispatch_address" class="flex min-h-[46px] flex-1">
                <div class="flex w-40 flex-shrink-0 items-center justify-center border-r border-slate-300 bg-slate-50 px-2 py-1 text-center text-xs leading-tight text-slate-700">事業所の<br>所在地</div>
                <div class="flex flex-1 items-center px-2 py-1">
                  <input id="dispatchPlaceAddress" data-meta="dispatch_place_address" type="text"
                    class="meta-input w-full rounded border border-slate-300 px-2 py-1.5 text-sm focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500/20">
                </div>
              </div>
            </div>
            <div class="flex w-full flex-col items-center justify-center gap-2 p-3 text-center md:w-96 md:flex-shrink-0">
              <div class="flex items-center justify-center gap-1 whitespace-nowrap font-bold leading-snug text-slate-900">
                <select id="monthFilter"
                  class="w-36 rounded border border-slate-400 px-1.5 py-1 text-sm font-bold text-slate-900 focus:border-emerald-500 focus:outline-none"></select>
                <span class="text-sm">月分業務連絡表</span>
              </div>
              <div class="text-xs text-slate-400">対象月を選択してください</div>
            </div>
          </div>

          <!-- 行2: 氏名 | 値 | 従事業務内容（縦結合） | 内容テキスト。モバイルは縦積み、md以上は従来の横並び -->
          <div class="flex flex-col border-b border-slate-300 md:flex-row">
            <!-- 左ブロック: 氏名 + 講師番号・お客様ID（2段） -->
            <div class="flex flex-col border-b border-slate-300 md:flex-[0_0_420px] md:border-b-0 md:border-r">
              <!-- 氏名 row -->
              <div class="flex min-h-[46px] flex-1 border-b border-slate-300">
                <div class="flex w-24 flex-shrink-0 items-center justify-center border-r border-slate-300 bg-slate-50 px-2 py-1 text-center text-xs text-slate-700">氏名</div>
                <div id="tutorNameDisplay" class="flex flex-1 items-center justify-start px-3 py-1 text-left font-semibold text-slate-800">-</div>
              </div>
              <!-- 講師番号 + お客様ID row -->
              <div class="flex min-h-[46px] flex-1">
                <div class="flex w-24 flex-shrink-0 items-center justify-center border-r border-slate-300 bg-slate-50 px-2 py-1 text-center text-xs text-slate-700">講師番号</div>
                <div class="flex flex-1 items-center border-r border-slate-300 px-2 py-1">
                  <!-- 講師番号はアカウント情報から自動設定（読取専用・講師側では変更不可） -->
                  <input id="tutorNo" data-meta="tutor_no" type="text" readonly
                    title="講師番号はアカウント情報から自動設定されるため変更できません"
                    class="meta-input w-full cursor-not-allowed rounded border border-slate-300 bg-slate-100 px-2 py-1.5 text-center font-semibold text-slate-600 focus:outline-none">
                </div>
                <div class="flex w-20 flex-shrink-0 items-center justify-center border-r border-slate-300 bg-slate-50 px-2 py-1 text-center text-xs text-slate-700">お客様ID</div>
                <div class="flex flex-1 items-center px-2 py-1">
                  <input id="customerId" data-meta="customer_id" type="text"
                    class="meta-input w-full rounded border border-slate-300 px-2 py-1.5 text-center focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500/20">
                </div>
              </div>
            </div>
            <!-- 右ブロック: 従事業務内容（左の2段分を縦に占有） -->
            <div data-fieldgroup="work_content" class="flex flex-1">
              <div class="flex w-16 flex-shrink-0 items-start justify-center bg-slate-50 px-1 py-2 text-center text-xs leading-tight text-slate-700">従事業務内容</div>
              <div class="flex-1 p-2">
                <textarea id="workContent" data-meta="work_content" rows="3"
                  class="meta-input h-full min-h-[80px] w-full resize-none rounded border border-slate-300 px-2 py-1 text-sm focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500/20"></textarea>
              </div>
            </div>
          </div>

        </div>

        <!-- 明細テーブル（PC）。スマホ（md未満）では非表示にし、下のリスト＋詳細シートで入力する。
             非表示でも各行の入力要素が値を保持し続けるため、保存・集計・自動計算の実装は共通のまま。 -->
        <div class="hidden overflow-x-auto rounded-lg border border-slate-200 md:block">
          <table class="min-w-[1144px] w-full text-sm">
            <thead id="lineHead" class="bg-slate-50 text-xs font-medium text-slate-600"></thead>
            <tbody id="lineRows"></tbody>
          </table>
        </div>
        <!-- 明細リスト（スマホ 画面①）: 記入済みの行だけを 日付・開始・終了・交通費・事由 で一覧表示。
             行タップで詳細シート（画面②）を開いて入力する。 -->
        <div id="mobileLineList" class="md:hidden"></div>

        <div id="summaryArea" class="flex flex-wrap gap-x-6 gap-y-1 rounded-lg border border-slate-200 bg-slate-50 p-3 text-sm text-slate-700"></div>

        <div class="space-y-3">
          <div class="grid gap-3 md:grid-cols-2">
            <label class="block text-sm">
              <span class="mb-1 block text-slate-700">弊社担当</span>
              <input data-meta="our_staff" type="text" class="meta-input w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20">
            </label>
            <div class="text-sm">
              <span class="mb-1 block text-slate-700">委託業務（契約より）</span>
              <div id="taskReference" class="min-h-[42px] rounded-lg border border-slate-200 bg-slate-50 p-2 text-xs text-slate-600">-</div>
            </div>
          </div>
          <label data-fieldgroup="schedule_note" class="block text-sm">
            <span class="mb-1 block text-slate-700">スケジュール欄</span>
            <textarea data-meta="note_schedule" rows="2" class="meta-input w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20"></textarea>
          </label>
        </div>

        <label class="block text-sm">
          <span class="block mb-1 text-slate-700">要望連絡事項</span>
          <textarea data-meta="requests" rows="4" class="meta-input w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20"></textarea>
        </label>

        <div data-fieldgroup="commuter_pass" class="rounded-lg border border-slate-200 p-3 text-sm">
          <div class="mb-3 font-medium text-slate-800">定期代セクション</div>
          <div class="mb-3 text-slate-700">購入時のみ記入</div>
          <div class="grid gap-3 md:grid-cols-2">
            <div>
              <span class="mb-1 block text-slate-700">期間選択・金額</span>
              <div class="flex flex-wrap items-center gap-3">
                <label class="inline-flex items-center gap-1"><input class="meta-input" data-meta="commuter_pass_months" name="commuter_pass_months" type="radio" value="1">1ヶ月</label>
                <label class="inline-flex items-center gap-1"><input class="meta-input" data-meta="commuter_pass_months" name="commuter_pass_months" type="radio" value="3">3ヶ月</label>
                <label class="inline-flex items-center gap-1"><input class="meta-input" data-meta="commuter_pass_months" name="commuter_pass_months" type="radio" value="6">6ヶ月</label>
                <input data-meta="commuter_pass_amount" type="number" min="0" step="1" placeholder="金額" class="meta-input w-32 rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20">
                <span>円</span>
              </div>
            </div>
            <label class="block">
              <span class="block mb-1 text-slate-700">区間（経路）</span>
              <input data-meta="commuter_pass_route" type="text" class="meta-input w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20">
            </label>
            <label class="block">
              <span class="block mb-1 text-slate-700">購入日</span>
              <input data-meta="commuter_pass_purchase_date" type="date" class="meta-input w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20">
            </label>
            <div>
              <span class="block mb-1 text-slate-700">期間（from〜to）</span>
              <div class="flex items-center gap-2">
                <input data-meta="commuter_pass_from" type="date" class="meta-input min-w-0 flex-1 rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20">
                <span>〜</span>
                <input data-meta="commuter_pass_to" type="date" class="meta-input min-w-0 flex-1 rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20">
              </div>
            </div>
          </div>
          <div class="mt-3 text-xs text-slate-500">実費の方が安い場合は購入不可</div>
        </div>

        <!-- スマホでは保存ボタンを画面下部へ吸着表示する（明細をシートで入力したあと迷わず保存できるように） -->
        <div class="sticky bottom-0 z-10 -mx-3 flex flex-wrap gap-2 border-t border-slate-200 bg-white/95 px-3 py-3 backdrop-blur sm:-mx-4 sm:px-4 md:static md:z-auto md:mx-0 md:border-0 md:bg-transparent md:p-0 md:backdrop-blur-none">
          <button class="rounded-lg bg-emerald-600 px-4 py-2 font-medium text-white transition hover:bg-emerald-700" id="saveButton">保存</button>
          <button type="button" class="rounded-lg border border-slate-300 px-4 py-2 font-medium text-slate-700 transition hover:bg-slate-50" onclick="resetReportForm(true)">取消</button>
          <!-- 承認依頼: フォームを保存（更新）してから承認管理の「承認依頼」と同じ提出を行う（下書き・差戻しの当月報告書のみ表示） -->
          <button type="button" id="requestApprovalButton"
            title="フォームの内容を保存してから、学校へ承認依頼（提出）します"
            class="ml-auto hidden rounded-lg border border-emerald-200 bg-emerald-50 px-4 py-2 font-medium text-emerald-700 transition hover:bg-emerald-100 disabled:cursor-not-allowed disabled:opacity-50"
            onclick="requestApprovalFromForm()">承認依頼</button>
        </div>
      </form>
    </div>
  </section>
</div>

<div id="noteOverlay" class="fixed inset-0 z-[1200] hidden items-center justify-center bg-slate-900/50 p-4" onclick="closeNoteModal()">
  <div class="w-full max-w-lg rounded-xl border border-slate-200 bg-white shadow-2xl" onclick="event.stopPropagation()">
    <div class="flex items-center justify-between border-b border-slate-200 px-5 py-4">
      <h2 class="font-semibold text-slate-800">内容</h2>
      <button type="button" class="rounded-lg px-2 py-1 text-sm text-slate-500 hover:bg-slate-100" onclick="closeNoteModal()">閉じる</button>
    </div>
    <div class="p-5">
      <textarea id="noteModalText" rows="8" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20" placeholder="内容を入力してください"></textarea>
      <div class="mt-4 flex justify-end gap-2">
        <button type="button" class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50" onclick="closeNoteModal()">キャンセル</button>
        <button type="button" id="noteModalSave" class="rounded-lg bg-emerald-600 px-3 py-2 text-sm font-medium text-white hover:bg-emerald-700" onclick="saveNoteModal()">確定</button>
      </div>
    </div>
  </div>
</div>

<!-- 明細詳細シート（スマホ 画面②）: 1日分の明細をまとめて入力するフルスクリーンシート。
     保存でフォームの該当行へ反映して閉じる（サーバへの保存は従来どおり画面下の「保存/更新」ボタン）。
     本文はフォーム外に置き、collectLines/setReportInputsDisabled の対象にならないようにしている。 -->
<div id="lineSheetOverlay" class="fixed inset-0 z-[1150] hidden items-center justify-center bg-slate-900/60 md:p-4" onclick="closeLineSheet()">
  <div class="flex h-full w-full flex-col bg-white md:h-auto md:max-h-[92vh] md:max-w-lg md:rounded-xl md:border md:border-slate-200 md:shadow-2xl" onclick="event.stopPropagation()">
    <div class="flex items-center justify-between border-b border-slate-200 px-4 py-3">
      <h2 id="lineSheetTitle" class="font-semibold text-slate-800">明細入力</h2>
      <button type="button" class="rounded-lg px-2 py-1 text-sm text-slate-500 hover:bg-slate-100" onclick="closeLineSheet()">✕ 閉じる</button>
    </div>
    <div id="lineSheetBody" class="flex-1 space-y-4 overflow-y-auto p-4"></div>
    <div id="lineSheetError" class="hidden border-t border-rose-200 bg-rose-50 px-4 py-2 text-sm text-rose-700"></div>
    <div class="flex gap-2 border-t border-slate-200 p-3">
      <button type="button" id="lineSheetCancel" class="flex-1 rounded-lg border border-slate-300 bg-white px-4 py-2.5 font-medium text-slate-700 transition hover:bg-slate-50" onclick="closeLineSheet()">キャンセル</button>
      <button type="button" id="lineSheetSave" class="flex-1 rounded-lg bg-emerald-600 px-4 py-2.5 font-medium text-white transition hover:bg-emerald-700" onclick="saveLineSheet()">保存</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/work_report_calc.js"></script>
<script>
setBreadcrumb('講師ポータル', '報告書一覧');
// 明細の入力・自動計算コアは共通コア（work_report_calc.js）に集約している。
// 事務ダッシュボードの報告書修正（office/queue.html）と同一ルールを共有するため、
// 仕様変更は必ず work_report_calc.js 側で行うこと（このページ単独での複製・修正は禁止）。
const {
  ATTENDANCE_KINDS, MAIN_DUTY_FIELD_RE, KIND_ROW_BG, CIRCLED_NUMBERS,
  isLeaveKind, isNoMainDutyKind, numberValue, timeToMinutes, minutesToTime,
  weekdayParen, parseSubjectPeriods, lineMinutesTotal,
  computeAutoTimes, rowStartMinutesOverride, periodAutoFillValues, periodTimeRange,
  slotRangeLabel, slotScheduleText, slotSelectionMetrics,
  requiredBreakMinutes, breakBumpMessage, findDuplicateLineDate
} = window.WorkReportCalc;

const STATUS_LABELS = {
  draft: '下書き',
  awaiting_office_precheck: '事務事前確認待ち',
  awaiting_school: '学校確認待ち',
  returned_to_tutor: '差戻し（要修正）',
  awaiting_sales: '営業確認待ち',

// 例: 2026-06-03（6月の第1水曜）→ 2026-07-01（7月の第1水曜）。
// 対象月に第N曜日が存在しない場合（第5週など）は null を返す。
function mapDateToMonthByWeekday(dateStr, targetMonth) {
  const d = new Date(`${dateStr}T00:00:00`);
  if (Number.isNaN(d.getTime())) return null;
  const weekday = d.getDay();
  const nth = Math.floor((d.getDate() - 1) / 7) + 1;
  const [ty, tm] = targetMonth.split('-').map(Number);
  const firstWeekday = new Date(ty, tm - 1, 1).getDay();
  const day = 1 + ((weekday - firstWeekday + 7) % 7) + (nth - 1) * 7;
  if (day > new Date(ty, tm, 0).getDate()) return null;
  return `${ty}-${String(tm).padStart(2, '0')}-${String(day).padStart(2, '0')}`;

// 種別に応じたシート内の活殺・値の制御（明細行の applyRowKind と同一ルール）
function applySheetKind() {
  const kind = sheetField('kind')?.value || '';
  const leave = isLeaveKind(kind);
  const noMainDuty = isNoMainDutyKind(kind);
  sheetWorkControls().forEach(el => {
    const field = el.dataset.sheetField;
    if (leave) el.value = '';
    else if (noMainDuty && MAIN_DUTY_FIELD_RE.test(field)) el.value = '0';
    const lockedByKind = leave || (noMainDuty && (MAIN_DUTY_FIELD_RE.test(field) || field === 'subject_period'));
    el.disabled = lockedByKind || !formEditable;
  });
  if (leave || noMainDuty) {
    const hidden = sheetField('subject_period');
    if (hidden) hidden.value = '';
  }
  document.getElementById('lineSheetBody').querySelectorAll('[data-sheet-period]').forEach(btn => {

// 業務開始〜終了時間のプレビュー（明細行と同じ computeAutoTimes を使用）
function recomputeSheetTime() {
  const display = document.getElementById('lineSheetBody').querySelector('[data-sheet-time]');
  if (!display) return;
  const kind = sheetField('kind')?.value || '';
  const total = isLeaveKind(kind) ? 0 : timeMinuteKeys().reduce((sum, key) => {
    const input = sheetField(key);
    return sum + (input ? numberValue(input.value) : 0);
  }, 0);
  const startOverride = rowStartMinutesOverride(contractPeriodSlots(), sheetField('subject_period')?.value || '', kind);
  const {start, end, overflow} = computeAutoTimes(total, startOverride);
  display.textContent = start ? `${start}〜${end}` : (overflow ? '計算不可（同日23:59まで）' : '自動計算');
  display.classList.toggle('font-medium', !!start);
  display.classList.toggle('text-slate-800', !!start);
  display.classList.toggle('text-slate-400', !start && !overflow);
  display.classList.toggle('text-rose-600', overflow);
  display.classList.toggle('border-rose-300', overflow);
  display.classList.toggle('bg-rose-50', overflow);
  display.classList.toggle('border-slate-200', !overflow);
  display.classList.toggle('bg-slate-50', !overflow);
}
function bindSheetEvents(body) {
  const dateInput = sheetField('date');

    dateInput.addEventListener('input', () => {
      const span = body.querySelector('[data-sheet-weekday]');
      if (span) span.textContent = weekdayParen(dateInput.value);
      hideSheetError();
    });
    // カレンダーアイコンを非表示にしている代わりに、ボックスのクリックでピッカーを開く
    dateInput.addEventListener('click', () => {
      if (typeof dateInput.showPicker === 'function') { try { dateInput.showPicker(); } catch (_) {} }
    });
  }
  const kindSelect = sheetField('kind');
  if (kindSelect) {
    kindSelect.addEventListener('change', () => {
      // 勤務へ戻したとき、自己都合・学校行事で0固定にしていた担当業務（分）の残り0をクリアする（明細行と同じ挙動）
      if (!kindSelect.value) {
        sheetWorkControls().forEach(el => { if (MAIN_DUTY_FIELD_RE.test(el.dataset.sheetField) && el.value === '0') el.value = ''; });
      }
      applySheetKind();
      hideSheetError();
    });
  }
  body.querySelectorAll('[data-sheet-period]').forEach(btn => {
    btn.addEventListener('click', () => {
      const hidden = sheetField('subject_period');
      if (!hidden) return;
      const selected = new Set(parseSubjectPeriods(hidden.value));
      const n = btn.dataset.sheetPeriod;
      if (selected.has(n)) selected.delete(n); else selected.add(n);
      hidden.value = [...selected].map(Number).sort((a, b) => a - b).map(String).join('・');
      refreshSheetPeriodButtons();
      // 担当業務（分）・休憩時間（分）の自動入力（明細行の applyPeriodAutoFill と同一ルール）
      const slots = contractPeriodSlots();
      const taskKey = periodAutoFillKey();
      const taskInput = taskKey ? sheetField(taskKey) : null;
      const breakInput = sheetField('break_minutes');
      if (slots) {
        const metrics = slotSelectionMetrics(slots, hidden.value);
        if (taskInput) taskInput.value = metrics.selected ? String(metrics.taskMinutes) : '';
        if (!metrics.selected && breakInput) breakInput.value = '';
        const required = applySheetSlotBreakRules(true);
        if (required) showSheetError(breakBumpMessage(required)); else hideSheetError();
      } else {
        const auto = periodAutoFillValues(selected.size);
        if (taskInput) taskInput.value = auto.task;
        if (breakInput) breakInput.value = auto.breakMinutes;
      }
      recomputeSheetTime();
    });
  });
  const sheetMinuteKeys = new Set(timeMinuteKeys());
  const sheetSecondaryKeys = new Set(secondaryMinuteKeys());
  body.querySelectorAll('input[type="number"][data-sheet-field]').forEach(input => {
    input.addEventListener('input', () => {
      const field = input.dataset.sheetField;
      // コマ設定契約: 副担当業務等の入力で休憩＝隙間−副担当を自動再計算し、労基下限を下回る場合は引き上げて通知する
      if (field !== 'break_minutes' && sheetMinuteKeys.has(field)) {
        const required = applySheetSlotBreakRules(sheetSecondaryKeys.has(field));
        if (required) showSheetError(breakBumpMessage(required));
      }
      recomputeSheetTime();
    });
    // 休憩時間（分）の手動修正: 確定（change）時に労基下限を下回っていれば引き上げて通知する
    if (input.dataset.sheetField === 'break_minutes') {
      input.addEventListener('change', () => {
        const required = applySheetSlotBreakRules(false);
        if (required) showSheetError(breakBumpMessage(required));
        recomputeSheetTime();
      });
    }
  });
}
// シートの内容をフォームの該当行へ反映して閉じる（サーバ保存は画面下の「保存/更新」ボタンで行う）
function saveLineSheet() {
  if (!formEditable) { closeLineSheet(); return; }
  if (activeSheetIndex == null) return;
  const row = lineRows.querySelector(`tr[data-index="${activeSheetIndex}"]`);
  if (!row) { closeLineSheet(); return; }
  const dateValue = sheetField('date')?.value || '';
  const kindValue = sheetField('kind')?.value || '';
  if (dateValue) {
    const duplicated = [...lineRows.querySelectorAll('input[data-field="date"]')]
      .some(other => other.closest('tr') !== row && other.value === dateValue);
    if (duplicated) {
      showSheetError(`同じ日付の行がすでにあります（${dateLabel(dateValue)}）。日付を修正してください。`);
      return;
    }
  }
  if (kindValue && !dateValue) {
    showSheetError('種別（有給休暇・欠勤・自己都合・学校行事）を選択した場合は日付を入力してください。');
    return;
  }
  document.getElementById('lineSheetBody').querySelectorAll('[data-sheet-field]').forEach(el => {
    const target = row.querySelector(`[data-field="${el.dataset.sheetField}"]`);
    if (target) target.value = el.value;
  });
  // 行側の表示（曜日・担当時限・内容アイコン・種別ロック・自動計算時間）を反映後の値で更新する
  const weekdaySpan = row.querySelector('[data-weekday]');
  if (weekdaySpan) weekdaySpan.textContent = weekdayParen(dateValue);
  const periodCell = row.querySelector('[data-period-cell]');
  if (periodCell) refreshPeriodCell(periodCell);
  const noteCell = row.querySelector('[data-note-cell]');
  if (noteCell) refreshNoteCell(noteCell);
  applyRowKind(row);
  recomputeRowTimes(row);
  updateLineSummary();
  const savedIndex = activeSheetIndex;
  closeLineSheet();
  showToast(`${savedIndex + 1}回目に反映しました。画面下の「${saveButton.textContent}」で確定してください。`, 'success');
}
function collectLines() {
  const numericKeys = new Set();
  (selectedFormDefinition().columns || []).forEach(column => {
    if (column.type === 'count_minutes') { numericKeys.add(column.count_key); numericKeys.add(column.minutes_key); }
    else if (column.type === 'number') numericKeys.add(column.key);
  });
  // 担当時限は複数選択（"1・3・6"）のため数値化せず文字列で保持する
  numericKeys.delete('subject_period');
  return [...lineRows.querySelectorAll('tr')].map(row => {
    const line = emptyLine(selectedFormDefinition());
    row.querySelectorAll('[data-field]').forEach(input => {
      const key = input.dataset.field;
      if (numericKeys.has(key)) {
        line[key] = input.value === '' ? '' : Number(input.value);
      } else {
        line[key] = input.value.trim();
      }
    });
    return line;
  });
}
function applyMeta(meta) {
  document.querySelectorAll('.meta-input').forEach(input => {
    if (input.type === 'radio') {
      input.checked = String(meta[input.dataset.meta] ?? '') === input.value;
    } else {
      input.value = meta[input.dataset.meta] ?? '';
    }
  });
}
function collectMeta() {
  const meta = {...DEFAULT_META};
  document.querySelectorAll('.meta-input').forEach(input => {
    if (input.type === 'radio') {
      if (input.checked) meta[input.dataset.meta] = input.value;
    } else {

function updateLineSummary() {
  // 集計対象（summable）列を動的に合計表示する
  const columns = selectedFormDefinition().columns.filter(column => column.summable);
  const lines = collectLines();
  let days = 0;
  let paidLeave = 0;
  let absent = 0;
  let personalReason = 0;
  let schoolEvent = 0;
  const sums = {};
  columns.forEach(column => {
    if (column.type === 'count_minutes') { sums[column.count_key] = 0; sums[column.minutes_key] = 0; }
    else sums[column.key] = 0;
  });
  lines.forEach(line => {
    // 有給休暇・欠勤の行は勤務日数・時間に含めず、取得回数・欠勤回数として数える
    if (line.kind === 'paid_leave') { paidLeave += 1; return; }
    if (line.kind === 'absent') { absent += 1; return; }
    // 自己都合・学校行事も勤務日数に含めず回数として数える（副業務等の分は下の合計に含める）
    if (line.kind === 'personal_reason') personalReason += 1;
    else if (line.kind === 'school_event') schoolEvent += 1;
    else if (lineHasData(line)) days += 1;
    columns.forEach(column => {
      if (column.type === 'count_minutes') {
        sums[column.count_key] += numberValue(line[column.count_key]);
        sums[column.minutes_key] += numberValue(line[column.minutes_key]);
      } else {
        sums[column.key] += numberValue(line[column.key]);
      }
    });
  });
  const parts = [
    `<div>勤務日数：<span class="font-semibold">${days}</span>日</div>`,
    `<div>有給休暇：<span class="font-semibold text-amber-700">${paidLeave}</span>回</div>`,
    `<div>欠勤：<span class="font-semibold text-rose-700">${absent}</span>回</div>`,
    `<div>自己都合：<span class="font-semibold text-violet-700">${personalReason}</span>回</div>`,
    `<div>学校行事：<span class="font-semibold text-sky-700">${schoolEvent}</span>回</div>`
  ];
  columns.forEach(column => {
    if (column.type === 'count_minutes') {
      parts.push(`<div>${escapeHtml(column.label)}：<span class="font-semibold">${sums[column.count_key].toLocaleString()}</span>${escapeHtml(column.unit || '回')} / <span class="font-semibold">${sums[column.minutes_key].toLocaleString()}</span>分</div>`);
    } else {
      parts.push(`<div>${escapeHtml(column.label)}：<span class="font-semibold">${sums[column.key].toLocaleString()}</span></div>`);
    }
  });
  const area = document.getElementById('summaryArea');
  if (area) area.innerHTML = parts.join('');
  // スマホの明細リストは行入力から描画するため、集計と同じタイミングで常に追従させる
  renderMobileList();
}

// 保存/更新ボタンのほか「承認依頼」ボタン（保存→提出）からも共用する。
async function saveReportForm() {
  clearFormMessage();
  const lines = collectLines();
  if (!lines.some(lineHasData)) {
    showFormMessage('少なくとも1行入力してください', true);
    return null;
  }
  const kindWithoutDate = lines.some(line => line.kind && !line.date);
  if (kindWithoutDate) {
    showFormMessage('種別（有給休暇・欠勤・自己都合・学校行事）を選択した行は日付を入力してください', true);
    return null;
  }
  const invalidPeriod = lines.some(line => parseSubjectPeriods(line.subject_period).some(p => {
    const n = Number(p);
    return !Number.isInteger(n) || n < 1 || n > 10;
  }));
  if (invalidPeriod) {
    showFormMessage('担当時限は1〜10で選択してください', true);
    return null;
  }
  // コマ設定契約: 時限がコマ設定の範囲内か・労基下限（実働6時間超45分/8時間超60分）の休憩が確保されているか
  const periodSlots = contractPeriodSlots();
  if (periodSlots) {
    const columns = activeColumnDefinition();
    const outIndex = lines.findIndex(line => parseSubjectPeriods(line.subject_period).some(p => Number(p) > periodSlots.length));
    if (outIndex !== -1) {
      showFormMessage(`${outIndex + 1}回目：担当時限にコマ設定（①〜${CIRCLED_NUMBERS[periodSlots.length - 1]}）にない時限が含まれています。選び直してください。`, true);
      return null;
    }
    const workKeys = [...mainMinuteKeys(columns), ...secondaryMinuteKeys(columns)];
    const shortIndex = lines.findIndex(line => {
      if (isLeaveKind(line.kind)) return false;
      const work = workKeys.reduce((sum, key) => sum + numberValue(line[key]), 0);
      return numberValue(line.break_minutes) < requiredBreakMinutes(work);
    });
    if (shortIndex !== -1) {
      showFormMessage(`${shortIndex + 1}回目：実働6時間超は45分以上・8時間超は60分以上の休憩が必要です。休憩時間（分）を調整してください。`, true);
      return null;
    }
  }
  const invalidTime = lines.some(line => line.start && line.end && line.end < line.start);
  if (invalidTime) {
    showFormMessage('業務終了時間が業務開始時間より早い行があります', true);
    return null;
  }
  // 業務開始〜終了時間は自動計算のため、計算不可（分の合計が同日23:59を超過）の行は保存できない
  const minuteKeys = timeMinuteKeys();
  const overflowIndex = lines.findIndex(line =>
    !isLeaveKind(line.kind) && lineMinutesTotal(line, minuteKeys) > 0 && (!line.start || !line.end));
  if (overflowIndex !== -1) {
    showFormMessage(`${overflowIndex + 1}回目：時間（分）の合計が長すぎるため業務開始〜終了時間を計算できません。分数を修正してください。`, true);
    return null;
  }
  const duplicateDate = findDuplicateLineDate(lines);
  if (duplicateDate) {
    showFormMessage(`同じ日付の行が複数あります（${dateLabel(duplicateDate)}）。日付を修正してください。`, true);
    return null;
  }
  const schoolSel = document.getElementById('dispatchPlaceSchool');
  const schoolId = schoolSel?.value || '';
  if (!schoolId) {
    showFormMessage('派遣先事業所（学校）を選択してください', true);
    return null;
  }
  const form_data = {lines, meta: collectMeta()};
  const opt = schoolSel.options[schoolSel.selectedIndex];
  form_data.meta.dispatch_place_name = (opt && opt.value) ? opt.text : '';
  // 契約管理の列定義をスナップショット保存（保存済み報告書は契約更新の影響を受けない）
  form_data.meta.column_definition = activeColumnDefinition();
  // 学校に対応する紐付けを取得/作成（無ければここで作る＝別の学校の報告書を新規作成できる）
  let assignmentId = selectedAssignmentId;
  try {
    const assignment = await resolveAssignmentForSchool(schoolId);
    assignmentId = assignment.id;
    selectedAssignmentId = assignment.id;
    selectedSchoolId = schoolId;
  } catch (error) {
    showFormMessage(`保存に失敗しました：${formatApiError(error)}`, true);
    return null;
  }
  try {
    let savedId;
    if (editingId.value) {
      await api(`/api/w/reports/${editingId.value}`, {method:'PATCH', body: JSON.stringify({form_data}), suppressFlash: true});
      showToast('業務連絡表を更新しました', 'success');
      savedId = editingId.value;
    } else {
      const created = await api('/api/w/reports', {
        method:'POST',
        body: JSON.stringify({assignment_id: assignmentId, target_month: selectedMonth, form_type: selectedFormType(), form_data}),
        suppressFlash: true
      });
      showToast('業務連絡表を作成しました', 'success');
      savedId = created?.id || null;
    }
    await loadTutor();
    return savedId;
  } catch (error) {
    showFormMessage(`保存に失敗しました：${formatApiError(error)}`, true);
    return null;
  }
}
// 「承認依頼」ボタン: フォームの内容を保存（更新）してから、承認管理の「承認依頼」ボタンと
// 同じ提出処理を行う。保存後に確認ポップアップを表示し（入力エラーはポップアップなしで先に表示）、
// キャンセルした場合も保存（下書きの更新）は残る。
async function requestApprovalFromForm() {
  const savedId = await saveReportForm();
  if (!savedId) return;
  await submitReport(savedId, {confirmSubmit: true});
}
monthFilter.addEventListener('change', () => {
  selectedMonth = monthFilter.value;
  renderCurrentList();
  resetReportForm(true);
});
document.getElementById('dispatchPlaceSchool').addEventListener('change', event => {
  selectSchool(event.target.value);
});
document.getElementById('newReportBtn').addEventListener('click', startNewReport);
// スマホ明細リスト: 行タップで詳細シートを開く／「＋ 日付を追加」で最初の空き行のシートを開く
document.getElementById('mobileLineList').addEventListener('click', event => {
  const openBtn = event.target.closest('[data-line-open]');
  if (openBtn) {
    openLineSheet(Number(openBtn.dataset.lineOpen));
    return;
  }
  if (event.target.closest('[data-line-add]')) {
    const emptyIndex = collectLines().findIndex(line => !lineHasData(line));
    if (emptyIndex === -1) {
      showToast('空き行がありません。', 'error');
      return;
    }
    openLineSheet(emptyIndex);
  }
});

// 「！」ヒントアイコン: クリックでツールチップ表示、外側クリックで閉じる。
// ヘッダーは動的描画のためイベント委譲で拾う。
const fieldHintTip = document.createElement('div');
fieldHintTip.className = 'fixed z-50 hidden max-w-xs rounded-md bg-slate-800 px-3 py-2 text-xs leading-relaxed text-white shadow-lg';
document.body.appendChild(fieldHintTip);
document.addEventListener('click', event => {
  const btn = event.target.closest('.field-hint-btn');
  if (btn) {
    event.preventDefault();
    fieldHintTip.textContent = btn.dataset.hint || '';
    fieldHintTip.classList.remove('hidden');
    const rect = btn.getBoundingClientRect();
    let left = rect.left;
    if (left + fieldHintTip.offsetWidth > window.innerWidth - 8) {
      left = window.innerWidth - fieldHintTip.offsetWidth - 8;
    }
    fieldHintTip.style.left = `${Math.max(8, left)}px`;
    fieldHintTip.style.top = `${rect.bottom + 6}px`;
  } else if (event.target !== fieldHintTip) {
    fieldHintTip.classList.add('hidden');
  }
});

window.authReady.then(async user => {
  if (!user) return;
  await loadContracts();
  populateDispatchSchoolOptions();
  loadTutor();
});
</script>
{% endblock %}
