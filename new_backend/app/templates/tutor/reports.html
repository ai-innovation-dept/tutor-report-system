{% extends "base.html" %}
{% block content %}
<style>
  /* 数値入力の上下矢印（スピナー）を非表示にして横幅を節約（モバイルは inputmode=numeric で数字キーパッド維持） */
  #reportForm input[type=number]::-webkit-inner-spin-button,
  #reportForm input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  #reportForm input[type=number] { -moz-appearance: textfield; appearance: textfield; }
  /* 明細の日付セル: 曜日をボックス内に併記するため、ネイティブのカレンダーアイコンを非表示（クリックでピッカーを開く） */
  #reportForm .line-input[type=date]::-webkit-calendar-picker-indicator { display: none; }
  /* 読取専用時はメモ未記入行の追加アイコンを表示しない（メモ帳アイコンがない行＝メモ書きなし） */
  #reportForm.form-readonly [data-note-btn][data-note-empty] { visibility: hidden; }
  /* iOS Safari は input[type=date] が width 指定を無視して枠外へはみ出す（見切れる）ため、メタ日付入力を枠内へ収める。
     スマホでは appearance を解除しないと width:100% が効かないため、<=767px で解除する（PCはネイティブ表示を維持／明細の .line-input は対象外） */
  #reportForm input.meta-input[type=date] { max-width: 100%; min-width: 0; box-sizing: border-box; }
  @media (max-width: 767px) {
    #reportForm input.meta-input[type=date] { -webkit-appearance: none; appearance: none; width: 100%; }
    #reportForm input.meta-input[type=date]::-webkit-date-and-time-value { text-align: left; margin: 0; }
  }
</style>
<div>
  <!-- 当月の報告書（学校ごと）の横タブ。「＋別の学校の報告書を作成」も同じ行から操作できる -->
  <section id="reportListPanel" class="mb-4 rounded-xl border border-slate-200 bg-white shadow-sm">
    <div class="flex flex-col gap-2 px-3 py-2.5 sm:flex-row sm:items-center sm:gap-3">
      <button id="newReportBtn" type="button" class="w-full shrink-0 rounded-lg bg-emerald-600 px-3 py-2 text-sm font-medium text-white transition hover:bg-emerald-700 sm:w-auto">＋ 別の学校の報告書を作成</button>
      <div id="reportList" class="order-last flex w-full flex-1 gap-2 overflow-x-auto sm:order-none"></div>
      <button type="button" id="copyPrevLineBtn" onclick="copyPreviousLine()" title="最後に記入した行と同じ内容（日付以外）を次の行に追加します" class="inline-flex w-full shrink-0 items-center justify-center gap-1.5 rounded-lg border border-emerald-200 bg-emerald-50 px-3 py-2 text-sm font-medium text-emerald-700 transition hover:bg-emerald-100 disabled:cursor-not-allowed disabled:opacity-50 sm:w-auto sm:justify-start">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
        前回の記入分をコピー
      </button>
    </div>
  </section>

  <section class="rounded-xl border border-slate-200 bg-white shadow-sm" id="formPanel">
    <div class="p-3 sm:p-4">
      <div id="formMessage" class="mb-3 hidden rounded-lg px-3 py-2 text-sm"></div>
      <form id="reportForm" class="space-y-4">
        <input type="hidden" id="editingId">
        <!-- 業務連絡表ヘッダー（サンプル紙面レイアウト準拠） -->
        <div class="overflow-hidden rounded-lg border border-slate-300 text-sm">

          <!-- 行1: 派遣先名称・所在地（左）＋ 月分業務連絡表（右）。モバイルは縦積み、md以上は従来の横並び -->
          <div class="flex flex-col border-b border-slate-300 md:flex-row">
            <div class="flex flex-1 flex-col border-b border-slate-300 md:border-b-0 md:border-r md:border-slate-300">
              <!-- 事業所の名称・組織単位 row（氏名と同じ 項目→入力ボックス 形式） -->
              <div class="flex min-h-[46px] flex-1 border-b border-slate-300">
                <div class="flex w-40 flex-shrink-0 items-center justify-center border-r border-slate-300 bg-slate-50 px-2 py-1 text-center text-xs leading-tight text-slate-700">事業所の<br>名称・組織単位</div>
                <div class="flex flex-1 items-center px-2 py-1">
                  <select id="dispatchPlaceSchool" data-meta="dispatch_place_school_id"
                    class="meta-input w-full rounded border border-slate-300 px-2 py-1.5 text-sm font-semibold focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500/20">
                    <option value="">選択してください</option>
                  </select>
                </div>
              </div>
              <!-- 教室名 row（契約由来・講師読取専用。「事業所の名称」の隣に表示） -->
              <div class="flex min-h-[46px] flex-1 border-b border-slate-300">
                <div class="flex w-40 flex-shrink-0 items-center justify-center border-r border-slate-300 bg-slate-50 px-2 py-1 text-center text-xs leading-tight text-slate-700">教室名</div>
                <div class="flex flex-1 items-center px-2 py-1">
                  <input id="classroomName" data-meta="classroom_name" type="text"
                    class="meta-input w-full rounded border border-slate-300 px-2 py-1.5 text-sm focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500/20">
                </div>
              </div>
              <!-- 事業所の所在地 row -->
              <div data-fieldgroup="dispatch_address" class="flex min-h-[46px] flex-1">
                <div class="flex w-40 flex-shrink-0 items-center justify-center border-r border-slate-300 bg-slate-50 px-2 py-1 text-center text-xs leading-tight text-slate-700">事業所の<br>所在地</div>
                <div class="flex flex-1 items-center px-2 py-1">
                  <input id="dispatchPlaceAddress" data-meta="dispatch_place_address" type="text"
                    class="meta-input w-full rounded border border-slate-300 px-2 py-1.5 text-sm focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500/20">
                </div>
              </div>
            </div>
            <div class="flex w-full flex-col items-center justify-center gap-2 p-3 text-center md:w-96 md:flex-shrink-0">
              <div class="flex items-center justify-center gap-1 whitespace-nowrap font-bold leading-snug text-slate-900">
                <select id="monthFilter"
                  class="w-36 rounded border border-slate-400 px-1.5 py-1 text-sm font-bold text-slate-900 focus:border-emerald-500 focus:outline-none"></select>
                <span class="text-sm">月分業務連絡表</span>
              </div>
              <div class="text-xs text-slate-400">対象月を選択してください</div>
            </div>
          </div>

          <!-- 行2: 氏名 | 値 | 従事業務内容（縦結合） | 内容テキスト。モバイルは縦積み、md以上は従来の横並び -->
          <div class="flex flex-col border-b border-slate-300 md:flex-row">
            <!-- 左ブロック: 氏名 + 講師番号・お客様ID（2段） -->
            <div class="flex flex-col border-b border-slate-300 md:flex-[0_0_420px] md:border-b-0 md:border-r">
              <!-- 氏名 row -->
              <div class="flex min-h-[46px] flex-1 border-b border-slate-300">
                <div class="flex w-24 flex-shrink-0 items-center justify-center border-r border-slate-300 bg-slate-50 px-2 py-1 text-center text-xs text-slate-700">氏名</div>
                <div id="tutorNameDisplay" class="flex flex-1 items-center justify-start px-3 py-1 text-left font-semibold text-slate-800">-</div>
              </div>
              <!-- 講師番号 + お客様ID row -->
              <div class="flex min-h-[46px] flex-1">
                <div class="flex w-24 flex-shrink-0 items-center justify-center border-r border-slate-300 bg-slate-50 px-2 py-1 text-center text-xs text-slate-700">講師番号</div>
                <div class="flex flex-1 items-center border-r border-slate-300 px-2 py-1">
                  <input id="tutorNo" data-meta="tutor_no" type="text"
                    class="meta-input w-full rounded border border-slate-300 px-2 py-1.5 text-center font-semibold focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500/20">
                </div>
                <div class="flex w-20 flex-shrink-0 items-center justify-center border-r border-slate-300 bg-slate-50 px-2 py-1 text-center text-xs text-slate-700">お客様ID</div>
                <div class="flex flex-1 items-center px-2 py-1">
                  <input id="customerId" data-meta="customer_id" type="text"
                    class="meta-input w-full rounded border border-slate-300 px-2 py-1.5 text-center focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500/20">
                </div>
              </div>
            </div>
            <!-- 右ブロック: 従事業務内容（左の2段分を縦に占有） -->
            <div data-fieldgroup="work_content" class="flex flex-1">
              <div class="flex w-16 flex-shrink-0 items-start justify-center bg-slate-50 px-1 py-2 text-center text-xs leading-tight text-slate-700">従事業務内容</div>
              <div class="flex-1 p-2">
                <textarea id="workContent" data-meta="work_content" rows="3"
                  class="meta-input h-full min-h-[80px] w-full resize-none rounded border border-slate-300 px-2 py-1 text-sm focus:border-emerald-500 focus:outline-none focus:ring-1 focus:ring-emerald-500/20"></textarea>
              </div>
            </div>
          </div>

        </div>

        <div class="overflow-x-auto rounded-lg border border-slate-200">
          <table class="min-w-[1144px] w-full text-sm">
            <thead id="lineHead" class="bg-slate-50 text-xs font-medium text-slate-600"></thead>
            <tbody id="lineRows"></tbody>
          </table>
        </div>

        <div id="summaryArea" class="flex flex-wrap gap-x-6 gap-y-1 rounded-lg border border-slate-200 bg-slate-50 p-3 text-sm text-slate-700"></div>

        <div class="space-y-3">
          <div class="grid gap-3 md:grid-cols-2">
            <label class="block text-sm">
              <span class="mb-1 block text-slate-700">弊社担当</span>
              <input data-meta="our_staff" type="text" class="meta-input w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20">
            </label>
            <div class="text-sm">
              <span class="mb-1 block text-slate-700">委託業務（契約より）</span>
              <div id="taskReference" class="min-h-[42px] rounded-lg border border-slate-200 bg-slate-50 p-2 text-xs text-slate-600">-</div>
            </div>
          </div>
          <label data-fieldgroup="schedule_note" class="block text-sm">
            <span class="mb-1 block text-slate-700">スケジュール欄</span>
            <textarea data-meta="note_schedule" rows="2" class="meta-input w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20"></textarea>
          </label>
        </div>

        <label class="block text-sm">
          <span class="block mb-1 text-slate-700">要望連絡事項</span>
          <textarea data-meta="requests" rows="4" class="meta-input w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20"></textarea>
        </label>

        <div data-fieldgroup="commuter_pass" class="rounded-lg border border-slate-200 p-3 text-sm">
          <div class="mb-3 font-medium text-slate-800">定期代セクション</div>
          <div class="mb-3 text-slate-700">購入時のみ記入</div>
          <div class="grid gap-3 md:grid-cols-2">
            <div>
              <span class="mb-1 block text-slate-700">期間選択・金額</span>
              <div class="flex flex-wrap items-center gap-3">
                <label class="inline-flex items-center gap-1"><input class="meta-input" data-meta="commuter_pass_months" name="commuter_pass_months" type="radio" value="1">1ヶ月</label>
                <label class="inline-flex items-center gap-1"><input class="meta-input" data-meta="commuter_pass_months" name="commuter_pass_months" type="radio" value="3">3ヶ月</label>
                <label class="inline-flex items-center gap-1"><input class="meta-input" data-meta="commuter_pass_months" name="commuter_pass_months" type="radio" value="6">6ヶ月</label>
                <input data-meta="commuter_pass_amount" type="number" min="0" step="1" placeholder="金額" class="meta-input w-32 rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20">
                <span>円</span>
              </div>
            </div>
            <label class="block">
              <span class="block mb-1 text-slate-700">区間（経路）</span>
              <input data-meta="commuter_pass_route" type="text" class="meta-input w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20">
            </label>
            <label class="block">
              <span class="block mb-1 text-slate-700">購入日</span>
              <input data-meta="commuter_pass_purchase_date" type="date" class="meta-input w-full rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20">
            </label>
            <div>
              <span class="block mb-1 text-slate-700">期間（from〜to）</span>
              <div class="flex items-center gap-2">
                <input data-meta="commuter_pass_from" type="date" class="meta-input min-w-0 flex-1 rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20">
                <span>〜</span>
                <input data-meta="commuter_pass_to" type="date" class="meta-input min-w-0 flex-1 rounded-lg border border-slate-300 px-3 py-2 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20">
              </div>
            </div>
          </div>
          <div class="mt-3 text-xs text-slate-500">実費の方が安い場合は購入不可</div>
        </div>

        <div class="flex flex-wrap gap-2">
          <button class="rounded-lg bg-emerald-600 px-4 py-2 font-medium text-white transition hover:bg-emerald-700" id="saveButton">保存</button>
          <button type="button" class="rounded-lg border border-slate-300 px-4 py-2 font-medium text-slate-700 transition hover:bg-slate-50" onclick="resetReportForm(true)">取消</button>
        </div>
      </form>
    </div>
  </section>
</div>

<div id="noteOverlay" class="fixed inset-0 z-[1200] hidden items-center justify-center bg-slate-900/50 p-4" onclick="closeNoteModal()">
  <div class="w-full max-w-lg rounded-xl border border-slate-200 bg-white shadow-2xl" onclick="event.stopPropagation()">
    <div class="flex items-center justify-between border-b border-slate-200 px-5 py-4">
      <h2 class="font-semibold text-slate-800">内容</h2>
      <button type="button" class="rounded-lg px-2 py-1 text-sm text-slate-500 hover:bg-slate-100" onclick="closeNoteModal()">閉じる</button>
    </div>
    <div class="p-5">
      <textarea id="noteModalText" rows="8" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20" placeholder="内容を入力してください"></textarea>
      <div class="mt-4 flex justify-end gap-2">
        <button type="button" class="rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50" onclick="closeNoteModal()">キャンセル</button>
        <button type="button" id="noteModalSave" class="rounded-lg bg-emerald-600 px-3 py-2 text-sm font-medium text-white hover:bg-emerald-700" onclick="saveNoteModal()">確定</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/chat.js"></script>
<script>
setBreadcrumb('講師ポータル', '報告書一覧');

const STATUS_LABELS = {
  draft: '下書き',
  awaiting_office_precheck: '事務事前確認待ち',
  awaiting_school: '学校確認待ち',
  returned_to_tutor: '差戻し（要修正）',
  awaiting_sales: '営業確認待ち',
  awaiting_office: '事務確認待ち',
  awaiting_finance: '最終確認待ち',
  approved: '最終承認済み',
  returned_to_sales: '管理内差戻し',
  closed: 'クローズ'
};
const WEEKDAYS = ['日', '月', '火', '水', '木', '金', '土'];
const LINE_COUNT = 26;
const EDITABLE_STATUSES = new Set(['draft', 'returned_to_tutor', 'returned_to_sales']);
// 勤怠区分（種別）: 空＝勤務（既定）。有給休暇・欠勤の行は勤務時間を持たず、月内の取得回数・欠勤回数として集計する。
// 値（'paid_leave' / 'absent'）は report_view・PDF・事務修正と共有する不変キー。
const ATTENDANCE_KINDS = [
  {value: '', label: '勤務'},
  {value: 'paid_leave', label: '有給'},
  {value: 'absent', label: '欠勤'}
];
function isLeaveKind(value) { return value === 'paid_leave' || value === 'absent'; }
let formEditable = true;       // 報告書フォームが編集可能か（内容モーダルの編集/閲覧切替に使用）
let activeNoteCell = null;     // 内容モーダルで編集中の内容セル
const DEFAULT_FORM_DEFINITION = {
  form_type: 'monthly_dispatch',
  label: '月次派遣報告',
  max_lines: 26,
  columns: [
    {key: 'date', label: '日付', type: 'date', summable: false},
    {key: 'start', label: '開始時刻', type: 'time', summable: false},
    {key: 'end', label: '終了時刻', type: 'time', summable: false},
    {key: 'subject_period', label: '担当時限', type: 'number', summable: false},
    {key: 'teach_minutes', label: '数学科指導（分）', type: 'number', summable: true},
    {key: 'break_minutes', label: '休憩時間（分）', type: 'number', summable: true},
    {key: 'commute_fee', label: '往復交通費（円）', type: 'number', summable: true},
    {key: 'note', label: '内容', type: 'text', summable: false}
  ],
  summable_keys: ['teach_minutes', 'break_minutes', 'commute_fee']
};
// 従事業務内容の既定値（契約に従事業務内容が未設定のときに適用。報告書確認画面にも反映される）
const DEFAULT_WORK_CONTENT = '付与される権限はなし';
const DEFAULT_META = {
  dispatch_place_name: '',
  dispatch_place_school_id: '',
  dispatch_place_address: '',
  classroom_name: '',
  customer_id: '',
  // スケジュール欄は契約管理の「スケジュール欄」(shift_note)から自動反映する（固定文言は廃止）
  note_schedule: '',
  work_content: DEFAULT_WORK_CONTENT,
  our_staff: '',
  tutor_no: '',
  requests: '',
  commuter_pass_months: '',
  commuter_pass_amount: '',
  commuter_pass_route: '',
  commuter_pass_purchase_date: '',
  commuter_pass_from: '',
  commuter_pass_to: ''
};
let allReports = [];
let allAssignments = [];
const isSubmitPage = location.pathname === '/tutor/submit';
const currentMonth = getCurrentMonth();
let selectedMonth = new URLSearchParams(location.search).get('month') || currentMonth;
let selectedAssignmentId = '';
let selectedSchoolId = '';
let contractsBySchool = {};

function getCurrentMonth() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
}
function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'}[ch]));
}
function formatApiError(error) {
  // FastAPIのdetailは文字列または検証エラーの配列。読みやすい文字列に整形する。
  let detail = error?.message;
  try { detail = JSON.parse(error.message).detail ?? detail; } catch (_) {}
  if (Array.isArray(detail)) return detail.map(item => item?.msg || JSON.stringify(item)).join(' / ');
  if (detail && typeof detail === 'object') return detail.msg || JSON.stringify(detail);
  return detail || '不明なエラー';
}
function statusLabel(status) { return STATUS_LABELS[status] || status; }
function monthLabel(value) {
  const [year, month] = value.split('-');
  return `${year}年${Number(month)}月分`;
}
function dateLabel(value) {
  if (!value) return '';
  const d = new Date(`${value}T00:00:00`);
  if (Number.isNaN(d.getTime())) return '';
  return `${d.getMonth() + 1}月${d.getDate()}日（${WEEKDAYS[d.getDay()]}）`;
}
function weekdayLabel(value) {
  if (!value) return '';
  const d = new Date(`${value}T00:00:00`);
  return Number.isNaN(d.getTime()) ? '' : WEEKDAYS[d.getDay()];
}
// 日付入力ボックス内の右側に併記する曜日「(月)」（曜日以外はすべて半角）
function weekdayParen(value) {
  const wd = weekdayLabel(value);
  return wd ? `(${wd})` : '';
}
function numberValue(value) {
  const n = Number(value || 0);
  return Number.isFinite(n) ? n : 0;
}
function durationLabel(minutes) {
  const hours = Math.floor(minutes / 60);
  const mins = minutes % 60;
  if (hours && mins) return `${hours}時間${mins}分`;
  if (hours) return `${hours}時間`;
  return `${mins}分`;
}
function selectedAssignment() {
  return allAssignments.find(a => a.id === selectedAssignmentId);
}
function contractForSchool(schoolId) {
  return schoolId ? (contractsBySchool[String(schoolId)] || null) : null;
}
function columnsFromSnapshot(report) {
  const cols = report?.form_data?.meta?.column_definition;
  return Array.isArray(cols) && cols.length ? cols : null;
}
function activeColumnDefinition() {
  let columns;
  const report = selectedReport();
  if (report) {
    // 既存報告書: スナップショット優先。無い旧データはデフォルト列で表示（契約更新の影響を受けない）。
    columns = columnsFromSnapshot(report) || DEFAULT_FORM_DEFINITION.columns;
  } else {

function showFormMessage(message, isError = false) {
  formMessage.textContent = message;
  formMessage.className = `mb-3 rounded-lg px-3 py-2 text-sm ${isError ? 'border border-rose-200 bg-rose-50 text-rose-700' : 'border border-emerald-200 bg-emerald-50 text-emerald-700'}`;
}
function clearFormMessage() {
  formMessage.className = 'mb-3 hidden rounded-lg px-3 py-2 text-sm';
  formMessage.textContent = '';
}
function resetReportForm(keepAssignment = false) {
  if (!keepAssignment) selectedAssignmentId = '';
  const report = selectedReport();
  editingId.value = report?.id || '';
  saveButton.textContent = report ? '更新' : '保存';
  applyMeta(normalizedMeta(report));
  buildLineRows(report ? normalizedLines(report) : Array.from({length: selectedFormDefinition().max_lines || LINE_COUNT}, () => emptyLine(selectedFormDefinition())));
  renderTaskReference();
  applyFieldVisibility();
  clearFormMessage();
  renderFormAvailability();
}
function renderFormAvailability() {
  if (isSubmitPage) {
    formPanel.classList.add('hidden');
    const copyBtn = document.getElementById('copyPrevLineBtn');
    if (copyBtn) copyBtn.classList.add('hidden');
    return;
  }
  formPanel.classList.remove('hidden');
  const report = selectedReport();
  if (selectedMonth !== currentMonth) {
    setReportInputsDisabled(true);
    showFormMessage('過去月は参照のみです');
    return;
  }
  if (report && !EDITABLE_STATUSES.has(report.status)) {
    setReportInputsDisabled(true);
    showFormMessage(`この報告書は${statusLabel(report.status)}のため編集できません`);
    return;
  }
  if (report && report.status === 'returned_to_tutor') {
    setReportInputsDisabled(false);
    applyContractLocks();
    applyAllRowKinds();
    // 編集可能な報告書は業務開始〜終了時間を自動計算値へ正規化する（読取専用時は保存値のまま表示）
    recomputeAllRowTimes();
    const reason = report.last_return_comment ? `　差戻し理由：${report.last_return_comment}` : '';
    showFormMessage(`学校から差戻しされています。修正のうえ承認管理画面から再依頼してください。${reason}`, true);
    return;
  }
  setReportInputsDisabled(false);
  applyContractLocks();
  applyAllRowKinds();
  recomputeAllRowTimes();
  if (!formMessage.textContent || formMessage.className.includes('rose')) clearFormMessage();
}
// 契約管理で登録された項目（契約由来）は講師側で変更不可（読取専用）にする。
// 要望連絡事項(requests)は月時間・週コマのケースと契約期間を契約から自動反映するため読取専用。
const LOCKED_META_KEYS = ['customer_id', 'our_staff', 'dispatch_place_address', 'classroom_name', 'requests', 'work_content', 'note_schedule'];
function applyContractLocks() {
  LOCKED_META_KEYS.forEach(key => {
    document.querySelectorAll(`.meta-input[data-meta="${key}"]`).forEach(el => {
      el.readOnly = true;
      el.classList.add('bg-slate-100', 'cursor-not-allowed', 'text-slate-600');
      el.title = '契約管理で設定された内容のため、講師側では変更できません';
    });
  });
}
function editReport(id) {
  const report = allReports.find(item => item.id === id);
  if (!report) return;
  selectedAssignmentId = report.assignment_id;
  const assignment = allAssignments.find(a => a.id === report.assignment_id);
  selectedSchoolId = assignment?.parent_id ? String(assignment.parent_id) : '';
  selectedMonth = report.target_month;
  renderMonthFilter();
  renderAssignmentOptions();
  updateStudentBadge();
  renderCurrentList();
  resetReportForm(true);
}
async function loadContracts() {
  // 契約管理に登録された自分の契約（学校ごと）＋動的列定義を取得
  try {
    const list = await api('/api/w/contracts/for-tutor');
    contractsBySchool = {};
    (list || []).forEach(contract => { contractsBySchool[String(contract.school_id)] = contract; });
  } catch (_) {
    contractsBySchool = {};
  }
}
function populateDispatchSchoolOptions() {
  // 派遣先（学校）プルダウンは、経理の契約管理に登録された自分の契約の学校のみ表示する
  const sel = document.getElementById('dispatchPlaceSchool');
  if (!sel) return;
  const prev = sel.value;
  const schools = Object.values(contractsBySchool)
    .map(contract => ({id: String(contract.school_id), name: contract.school_name || ''}))
    .sort((a, b) => a.name.localeCompare(b.name, 'ja'));
  sel.innerHTML = '<option value="">選択してください</option>' +
    schools.map(school => `<option value="${escapeHtml(school.id)}">${escapeHtml(school.name)}</option>`).join('');
  sel.value = prev;
}
async function submitReport(id) {
  const schoolSel = document.getElementById('dispatchPlaceSchool');
  const schoolId = schoolSel?.value;
  if (!schoolId) {
    showFormMessage('派遣先事業所（学校）を選択してください', true);
    return;
  }
  const report = allReports.find(r => r.id === id);
  if (!report) return;
  // 担当業務・副担当業務に1〜9分単位の手入力がある報告書は、学校の前に運営（事務）の事前確認を
  // 経由するワークフローへ変わるため、提出前にポップアップで知らせる（学校スキップ校は変更なし）。
  const assignment = allAssignments.find(a => a.id === report.assignment_id);
  const skipSchool = Boolean(assignment?.skip_school_approval || report.skip_school_approval);
  if (!skipSchool && workReportHasMinuteLevelInput(report)) {
    const ok = await showConfirmModal({
      title: '承認ワークフローが変更されます',
      message: '担当業務・副担当業務に1〜9分単位の手入力があるため、この報告書は学校へ依頼する前に運営（事務）の事前確認を経由します。\n\n承認フロー：講師 → 事務（事前確認） → 学校 → 事務 → 営業\n\nこのまま提出しますか？',
      confirmLabel: '提出する',
      cancelLabel: 'キャンセル'
    });
    if (!ok) return;
  }
  await api(`/api/w/assignments/${report.assignment_id}`, {method:'PATCH', body:JSON.stringify({parent_id: schoolId})});
  await api(`/api/w/reports/${id}/action`, {method:'POST', body:JSON.stringify({action: 'submit'})});
  await loadTutor();
}
function renderBulkSubmit(reports) {
  const panel = document.getElementById('bulkSubmitPanel');
  if (!isSubmitPage || !panel) return;
  const eligible = reports.filter(r => r.target_month === currentMonth && r.status === 'returned_to_sales');
  panel.classList.remove('hidden');
  panel.innerHTML = eligible.length
    ? eligible.map(report => `<div class="flex flex-col gap-3 rounded-lg border border-slate-200 bg-white p-4 md:flex-row md:items-center md:justify-between">
        <div class="font-medium text-slate-800">${escapeHtml(assignmentName(report.assignment_id))} <span class="text-sm text-slate-500">${monthLabel(report.target_month)}</span></div>
        <button class="rounded-lg bg-emerald-600 px-3 py-2 text-sm font-medium text-white transition hover:bg-emerald-700" onclick="submitReport('${report.id}')">再提出</button>
      </div>`).join('')
    : '<div class="text-sm text-slate-600">再提出できる報告書はありません。</div>';
}
async function loadTutor() {
  const nameEl = document.getElementById('tutorNameDisplay');
  if (nameEl) nameEl.textContent = window.currentUser?.display_name || '-';
  const [reports, assignments] = await Promise.all([api('/api/w/reports'), api('/api/w/assignments')]);
  allAssignments = assignments;
  allReports = [...reports].sort((a, b) => `${a.target_month}${assignmentName(a.assignment_id)}`.localeCompare(`${b.target_month}${assignmentName(b.assignment_id)}`));
  if (selectedAssignmentId && !allAssignments.some(a => a.id === selectedAssignmentId)) selectedAssignmentId = '';
  if (!selectedAssignmentId && allAssignments.length) selectedAssignmentId = allAssignments[0].id;
  const current = selectedAssignment();
  selectedSchoolId = current?.parent_id ? String(current.parent_id) : '';
  // 契約が1校のみなら自動選択（読み込み時に自動反映）。複数校はプルダウン選択時に反映。
  const contractSchoolIds = Object.keys(contractsBySchool);
  if (!selectedSchoolId && contractSchoolIds.length === 1) {
    selectedSchoolId = contractSchoolIds[0];
  }
  renderAssignmentOptions();
  renderMonthFilter();
  updateStudentBadge();
  setBreadcrumb('講師ポータル', isSubmitPage ? '管理へ提出' : '報告書一覧');
  renderCurrentList();
  renderBulkSubmit(allReports);
  resetReportForm(true);
  if (location.pathname === '/tutor/reports/new') {
    formPanel.scrollIntoView({behavior: 'smooth', block: 'start'});
  }
}
reportForm.addEventListener('submit', async e => {
  e.preventDefault();
  clearFormMessage();
  const lines = collectLines();
  if (!lines.some(lineHasData)) {
    showFormMessage('少なくとも1行入力してください', true);
    return;
  }
  const leaveWithoutDate = lines.some(line => isLeaveKind(line.kind) && !line.date);
  if (leaveWithoutDate) {
    showFormMessage('有給休暇・欠勤の行は日付を入力してください', true);
    return;
  }
  const invalidPeriod = lines.some(line => parseSubjectPeriods(line.subject_period).some(p => {
    const n = Number(p);
    return !Number.isInteger(n) || n < 1 || n > 10;
  }));
  if (invalidPeriod) {
    showFormMessage('担当時限は1〜10で選択してください', true);
    return;
  }
  const invalidTime = lines.some(line => line.start && line.end && line.end < line.start);
  if (invalidTime) {
    showFormMessage('業務終了時間が業務開始時間より早い行があります', true);
    return;
  }
  // 業務開始〜終了時間は自動計算のため、計算不可（分の合計が同日23:59を超過）の行は保存できない
  const minuteKeys = timeMinuteKeys();
  const overflowIndex = lines.findIndex(line =>
    !isLeaveKind(line.kind) && lineMinutesTotal(line, minuteKeys) > 0 && (!line.start || !line.end));
  if (overflowIndex !== -1) {
    showFormMessage(`${overflowIndex + 1}回目：時間（分）の合計が長すぎるため業務開始〜終了時間を計算できません。分数を修正してください。`, true);
    return;
  }
  const duplicateDate = findDuplicateLineDate(lines);
  if (duplicateDate) {
    showFormMessage(`同じ日付の行が複数あります（${dateLabel(duplicateDate)}）。日付を修正してください。`, true);
    return;
  }
  const schoolSel = document.getElementById('dispatchPlaceSchool');
  const schoolId = schoolSel?.value || '';
  if (!schoolId) {
    showFormMessage('派遣先事業所（学校）を選択してください', true);
    return;
  }
  const form_data = {lines, meta: collectMeta()};
  const opt = schoolSel.options[schoolSel.selectedIndex];
  form_data.meta.dispatch_place_name = (opt && opt.value) ? opt.text : '';
  // 契約管理の列定義をスナップショット保存（保存済み報告書は契約更新の影響を受けない）
  form_data.meta.column_definition = activeColumnDefinition();
  // 学校に対応する紐付けを取得/作成（無ければここで作る＝別の学校の報告書を新規作成できる）
  let assignmentId = selectedAssignmentId;
  try {
    const assignment = await resolveAssignmentForSchool(schoolId);
    assignmentId = assignment.id;
    selectedAssignmentId = assignment.id;
    selectedSchoolId = schoolId;
  } catch (error) {
    showFormMessage(`保存に失敗しました：${formatApiError(error)}`, true);
    return;
  }
  try {
    if (editingId.value) {
      await api(`/api/w/reports/${editingId.value}`, {method:'PATCH', body: JSON.stringify({form_data}), suppressFlash: true});
      showToast('業務連絡表を更新しました', 'success');
    } else {
      await api('/api/w/reports', {
        method:'POST',
        body: JSON.stringify({assignment_id: assignmentId, target_month: selectedMonth, form_type: selectedFormType(), form_data}),
        suppressFlash: true
      });
      showToast('業務連絡表を作成しました', 'success');
    }
    await loadTutor();
  } catch (error) {
    showFormMessage(`保存に失敗しました：${formatApiError(error)}`, true);
  }
});
monthFilter.addEventListener('change', () => {
  selectedMonth = monthFilter.value;
  renderCurrentList();
  resetReportForm(true);
});
document.getElementById('dispatchPlaceSchool').addEventListener('change', event => {
  selectSchool(event.target.value);
});
document.getElementById('newReportBtn').addEventListener('click', startNewReport);

// 「！」ヒントアイコン: クリックでツールチップ表示、外側クリックで閉じる。
// ヘッダーは動的描画のためイベント委譲で拾う。
const fieldHintTip = document.createElement('div');
fieldHintTip.className = 'fixed z-50 hidden max-w-xs rounded-md bg-slate-800 px-3 py-2 text-xs leading-relaxed text-white shadow-lg';
document.body.appendChild(fieldHintTip);
document.addEventListener('click', event => {
  const btn = event.target.closest('.field-hint-btn');
  if (btn) {
    event.preventDefault();
    fieldHintTip.textContent = btn.dataset.hint || '';
    fieldHintTip.classList.remove('hidden');
    const rect = btn.getBoundingClientRect();
    let left = rect.left;
    if (left + fieldHintTip.offsetWidth > window.innerWidth - 8) {
      left = window.innerWidth - fieldHintTip.offsetWidth - 8;
    }
    fieldHintTip.style.left = `${Math.max(8, left)}px`;
    fieldHintTip.style.top = `${rect.bottom + 6}px`;
  } else if (event.target !== fieldHintTip) {
    fieldHintTip.classList.add('hidden');
  }
});

window.authReady.then(async user => {
  if (!user) return;
  await loadContracts();
  populateDispatchSchoolOptions();
  loadTutor();
});
</script>
{% endblock %}
