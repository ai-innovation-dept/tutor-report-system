<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>パスワードの変更 - 業務連絡表システム</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#1a2e1a]">
  <div class="min-h-screen bg-[radial-gradient(circle_at_top,_rgba(16,185,129,0.15),_transparent_28%),linear-gradient(180deg,#1a2e1a_0%,#0d1a0d_100%)] px-4 py-10">
    <div class="mx-auto flex min-h-[calc(100vh-5rem)] w-full max-w-md items-center justify-center">
      <div class="w-full rounded-2xl border border-white/10 bg-white p-8 shadow-2xl md:p-10">
        <div class="mb-8 text-center">
          <div class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-2xl bg-emerald-600 text-xl font-bold text-white">業</div>
          <h1 class="text-2xl font-bold text-slate-800">パスワードの変更</h1>
        </div>
        <div id="invalidPanel" class="hidden">
          <p class="text-sm text-rose-700">このリンクは無効または期限切れです。</p>
          <a href="/w/forgot-password" class="mt-3 block text-sm text-emerald-600 hover:text-emerald-800">もう一度リセットを申請する</a>
        </div>
        <form id="resetForm" class="hidden space-y-5">
          <p id="emailInfo" class="text-sm text-slate-600"></p>
          <div>
            <label class="mb-2 block text-sm font-medium text-slate-700">新しいパスワード</label>
            <input id="password" type="password" required minlength="8" class="w-full rounded-lg border border-slate-300 px-4 py-3 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20">
          </div>
          <div>
            <label class="mb-2 block text-sm font-medium text-slate-700">確認用パスワード</label>
            <input id="passwordConfirm" type="password" required minlength="8" class="w-full rounded-lg border border-slate-300 px-4 py-3 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20">
          </div>
          <p id="message" class="hidden text-sm"></p>
          <button type="submit" class="w-full rounded-lg bg-emerald-600 px-4 py-3 font-medium text-white transition hover:bg-emerald-700">パスワードを変更する</button>
        </form>
      </div>
    </div>
  </div>
  <script>
    const token = new URLSearchParams(location.search).get('token') || '';
    async function init() {
      const res = await fetch(`/api/auth/reset-password?token=${encodeURIComponent(token)}`);
      const data = await res.json();
      if (!data.valid) { document.getElementById('invalidPanel').classList.remove('hidden'); return; }
      document.getElementById('emailInfo').textContent = `対象アカウント：${data.email}`;
      document.getElementById('resetForm').classList.remove('hidden');
    }
    document.getElementById('resetForm').addEventListener('submit', async e => {
      e.preventDefault();
      const el = document.getElementById('message');
      if (document.getElementById('password').value !== document.getElementById('passwordConfirm').value) {
        el.textContent = '確認用パスワードが一致しません。';
        el.className = 'text-sm text-rose-700'; el.classList.remove('hidden'); return;
      }
      const res = await fetch('/api/auth/reset-password', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({token, new_password: document.getElementById('password').value})
      });
      if (!res.ok) { el.textContent = 'エラーが発生しました。'; el.className = 'text-sm text-rose-700'; el.classList.remove('hidden'); return; }
      el.textContent = 'パスワードを変更しました。ログイン画面へ移動します。';
      el.className = 'text-sm text-emerald-700'; el.classList.remove('hidden');
      setTimeout(() => { location.href = '/w/login'; }, 1500);
    });
    init();
  </script>
</body>
</html>
