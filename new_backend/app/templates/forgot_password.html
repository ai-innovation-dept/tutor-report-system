<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>パスワードをお忘れの方 - 業務連絡表システム</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#1a2e1a]">
  <div class="min-h-screen bg-[radial-gradient(circle_at_top,_rgba(16,185,129,0.15),_transparent_28%),linear-gradient(180deg,#1a2e1a_0%,#0d1a0d_100%)] px-4 py-10">
    <div class="mx-auto flex min-h-[calc(100vh-5rem)] w-full max-w-md items-center justify-center">
      <div class="w-full rounded-2xl border border-white/10 bg-white p-8 shadow-2xl md:p-10">
        <div class="mb-8 text-center">
          <div class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-2xl bg-emerald-600 text-xl font-bold text-white">業</div>
          <h1 class="text-2xl font-bold text-slate-800">パスワードのリセット</h1>
          <p class="mt-2 text-sm text-slate-500">登録済みのメールアドレスを入力してください</p>
        </div>
        <form id="forgotForm" class="space-y-5">
          <div>
            <label class="mb-2 block text-sm font-medium text-slate-700">メールアドレス</label>
            <input id="email" type="email" required class="w-full rounded-lg border border-slate-300 px-4 py-3 focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20">
          </div>
          <p id="message" class="hidden text-sm"></p>
          <button type="submit" class="w-full rounded-lg bg-emerald-600 px-4 py-3 font-medium text-white transition hover:bg-emerald-700">リセットメールを送る</button>
          <a href="/w/login" class="block text-center text-sm text-emerald-600 hover:text-emerald-800">ログイン画面へ戻る</a>
        </form>
      </div>
    </div>
  </div>
  <script>
    document.getElementById('forgotForm').addEventListener('submit', async e => {
      e.preventDefault();
      const el = document.getElementById('message');
      const res = await fetch('/api/auth/forgot-password', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({email: document.getElementById('email').value})
      });
      el.textContent = 'メールを送信しました（登録済みの場合）。';
      el.className = 'text-sm text-emerald-700';
      el.classList.remove('hidden');
    });
  </script>
</body>
</html>
